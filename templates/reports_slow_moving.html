{% extends 'shared_layout.html' %}

{% set active_page = 'reports-slow-moving' %}
{% set page_title = 'الأدوية الراكدة' %}

{% block extra_css %}
<style>

    /* ─── Sidebar ─── */

    /* ─── Topbar ─── */
    
    
    
    
    
    
    
    
    
    
    
    

    /* ─── Main Content ─── */
    

    /* ─── Page Header ─── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 {
      margin: 0 0 6px;
      font: 700 26px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-header h1 svg {
      width: 28px;
      height: 28px;
      color: #1AA7EC;
    }
    .page-header .subtitle {
      margin: 0;
      color: #64748B;
      font-size: 14.5px;
    }
    .page-header .header-actions {
      display: flex;
      gap: 10px;
    }
    .page-header .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 18px;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .page-header .btn svg { width: 17px; height: 17px; }
    .btn-primary {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
    }
    .btn-primary:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #fff;
      color: #334155;
      border: 1px solid #E2E8F0;
    }
    .btn-secondary:hover {
      background: #F8FAFC;
    }

    /* ─── Filter Bar ─── */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 13px;
      color: #64748B;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-label svg { width: 15px; height: 15px; }
    .filter-select {
      height: 38px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #0F172A;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      -webkit-appearance: none;
    }
    .filter-select:hover { border-color: #CBD5E1; }
    .filter-select:focus {
      outline: none;
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.12);
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 38px;
      padding: 0 16px;
      border-radius: 10px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 14px -6px rgba(26, 167, 236, 0.45);
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .filter-btn svg { width: 15px; height: 15px; }
    .filter-stats {
      font-size: 13px;
      color: #64748B;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .filter-stats strong { color: #0F172A; font-weight: 700; }

    /* ─── Metric Cards ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
    }
    .metric-card .metric-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .metric-card .metric-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-card .metric-icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .metric-card .metric-icon.red { background: #FEE2E2; color: #DC2626; }
    .metric-card .metric-icon.yellow { background: #FEF3C7; color: #D97706; }
    .metric-card .metric-icon.green { background: #ECFDF5; color: #16A34A; }
    .metric-card .metric-icon svg { width: 20px; height: 20px; }
    .metric-card .metric-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .metric-card .metric-badge.danger { color: #DC2626; background: #FEF2F2; }
    .metric-card .metric-badge.warning { color: #D97706; background: #FFFBeb; }
    .metric-card .metric-badge.success { color: #16A34A; background: #ECFDF5; }
    .metric-card .metric-label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .metric-card .metric-value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .metric-card .metric-value .unit {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 600;
    }
    .metric-card .metric-sub {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 4px;
    }

    /* ─── Panel ─── */
    .panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 22px;
      overflow: hidden;
    }
    .panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #F1F5F9;
    }
    .panel .panel-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel .panel-title svg { width: 18px; height: 18px; color: #1AA7EC; }
    .panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }

    /* ─── Table ─── */
    .table-container {
      overflow-x: auto;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 800px;
    }
    .table th {
      text-align: right;
      padding: 12px 14px;
      font: 600 11px 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      text-transform: uppercase;
      border-bottom: 1px solid #F1F5F9;
      white-space: nowrap;
    }
    .table td {
      padding: 13px 14px;
      border-bottom: 1px solid #F6F8FA;
      color: #0F172A;
      vertical-align: middle;
    }
    .table tr:hover td {
      background: #F8FAFC;
    }
    .table tr:last-child td {
      border-bottom: none;
    }
    .table .med-name {
      font-weight: 600;
      color: #0F172A;
    }
    .table .num {
      direction: ltr;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }
    .table .stock-val {
      font-weight: 700;
      direction: ltr;
      font-family: 'IBM Plex Mono', monospace;
    }
    .table .col-base-unit,
    .table .col-stock-value { /* shown on desktop */ }

    /* ─── Risk Badge ─── */
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .risk-critical {
      background: rgba(185,28,28,0.2);
      color: #B91C1C;
      border-color: rgba(185,28,28,0.35);
    }
    .risk-high {
      background: rgba(239,68,68,0.1);
      color: #DC2626;
      border-color: rgba(239,68,68,0.2);
    }
    .risk-medium {
      background: rgba(245,158,11,0.1);
      color: #D97706;
      border-color: rgba(245,158,11,0.2);
    }
    .risk-low {
      background: rgba(34,197,94,0.1);
      color: #16A34A;
      border-color: rgba(34,197,94,0.2);
    }

    /* ─── Expiry Warning ─── */
    .expiry-urgent { color: #DC2626; font-weight: 600; }
    .expiry-warning { color: #D97706; font-weight: 600; }
    .expiry-ok { color: #16A34A; }
    .expiry-far { color: #94A3B8; }
    .expiry-none { color: #94A3B8; font-style: italic; }

    /* ─── Recommendations Grid ─── */
    .recommendations-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .rec-card {
      background: rgba(26,167,236,0.04);
      border: 1px solid rgba(26,167,236,0.15);
      border-radius: 14px;
      padding: 18px;
      transition: border-color 0.2s ease;
    }
    .rec-card:hover { border-color: rgba(26,167,236,0.35); }
    .rec-card.rec-critical {
      background: rgba(185,28,28,0.06);
      border-color: rgba(185,28,28,0.2);
    }
    .rec-card.rec-critical:hover { border-color: rgba(185,28,28,0.4); }
    .rec-card.rec-high {
      background: rgba(239,68,68,0.04);
      border-color: rgba(239,68,68,0.15);
    }
    .rec-card.rec-high:hover { border-color: rgba(239,68,68,0.35); }
    .rec-card.rec-medium {
      background: rgba(245,158,11,0.04);
      border-color: rgba(245,158,11,0.15);
    }
    .rec-card.rec-medium:hover { border-color: rgba(245,158,11,0.35); }
    .rec-card .rec-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .rec-card .rec-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .rec-card .rec-icon svg { width: 17px; height: 17px; }
    .rec-card.rec-critical .rec-icon { background: #FEE2E2; color: #DC2626; }
    .rec-card.rec-high .rec-icon { background: #FEE2E2; color: #EF4444; }
    .rec-card.rec-medium .rec-icon { background: #FEF3C7; color: #D97706; }
    .rec-card .rec-title {
      font-size: 14px;
      font-weight: 600;
    }
    .rec-card.rec-critical .rec-title { color: #B91C1C; }
    .rec-card.rec-high .rec-title { color: #DC2626; }
    .rec-card.rec-medium .rec-title { color: #D97706; }
    .rec-card .rec-desc {
      font-size: 13px;
      color: #64748B;
      line-height: 1.7;
    }
    .rec-card .rec-desc strong { color: #0F172A; }

    /* ─── Loading & Error States ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { color: #94A3B8; font-size: 14px; }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
    }
    .error-state .err-icon { width: 48px; height: 48px; color: #DC2626; }
    .error-state .err-msg { color: #DC2626; font-size: 16px; font-weight: 600; }
    .error-state .err-detail { color: #64748B; font-size: 13px; margin-bottom: 8px; }
    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: #94A3B8;
      font-size: 14px;
    }
    .no-data .no-data-icon { font-size: 40px; margin-bottom: 12px; }
    .no-data .no-data-sub { color: #94A3B8; font-size: 13px; margin-top: 4px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    
      .recommendations-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .page-header h1 { font-size: 20px; }
      .page-header .header-actions { width: 100%; }
      .metric-card { padding: 14px; }
      .metric-card .metric-value { font-size: 20px; }
      .table { font-size: 12px; }
      .table th, .table td { padding: 10px 8px; }
      .table .col-base-unit,
      .table .col-stock-value { display: none; }
      .filter-bar { flex-direction: column; align-items: stretch; }
    }
    @media (max-width: 480px) {
      .metrics-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .metric-card .metric-value { font-size: 18px; }
    }
      
    
    .notif-header a { font-size: 12px; color: #1AA7EC; text-decoration: none; }
    .notif-list { max-height: 340px; overflow-y: auto; }
    
    .notif-item:hover { background: #F6F8FA; }
    .notif-item .notif-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }

</style>
{% endblock %}

{% block content %}
<!-- ═══════ Sidebar ═══════ -->
    

    <!-- ═══════ Topbar ═══════ -->
    

    <!-- ═══════ Main Content ═══════ -->
    <main class="main-content">

      <!-- Loading State -->
      <template x-if="loading">
        <div class="loading-state">
          <div class="spinner"></div>
          <div class="loading-text">جاري تحميل تقرير الأدوية الراكدة...</div>
        </div>
      </template>

      <!-- Error State -->
      <template x-if="error">
        <div class="error-state">
          <div class="err-icon"><i data-lucide="triangle-alert"></i></div>
          <div class="err-msg">تعذر تحميل التقرير</div>
          <div class="err-detail" x-text="errorMessage"></div>
          <button class="btn-primary btn" @click="loadReport()">
            <i data-lucide="refresh-cw"></i>
            <span>إعادة المحاولة</span>
          </button>
        </div>
      </template>

      <!-- Report Content -->
      <template x-if="!loading && !error">
        <div>

          <!-- Page Header -->
          <div class="page-header">
            <div>
              <h1>
                <i data-lucide="snail"></i>
                الأدوية بطيئة الحركة
              </h1>
              <p class="subtitle">تحليل الأدوية التي لم تُبَع خلال الفترة المحددة</p>
            </div>
            <div class="header-actions">
              <button class="btn btn-secondary" @click="loadReport()">
                <i data-lucide="refresh-cw"></i>
                <span>تحديث</span>
              </button>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <span class="filter-label">
                <i data-lucide="clock"></i>
                لم تُبَع منذ:
              </span>
              <select class="filter-select" x-model="selectedDays" @change="loadReport()">
                <option value="15">15 يوم</option>
                <option value="30" selected>30 يوم</option>
                <option value="45">45 يوم</option>
                <option value="60">60 يوم</option>
                <option value="90">90 يوم</option>
                <option value="180">6 أشهر</option>
                <option value="365">سنة</option>
              </select>
              <button class="filter-btn" @click="loadReport()">
                <i data-lucide="search"></i>
                تحديث
              </button>
            </div>
            <div class="filter-stats" x-show="!loading && !error">
              <span>إجمالي الأدوية: <strong x-text="medicines.length"></strong></span>
              <span>القيمة الراكدة: <strong x-text="formatCurrency(totalSlowMovingValue)"></strong></span>
            </div>
          </div>

          <!-- Summary Metrics -->
          <div class="metrics-grid">
            <div class="metric-card">
              <div class="metric-header">
                <div class="metric-icon blue"><i data-lucide="snail"></i></div>
                <div class="metric-badge warning" x-text="'خلال ' + selectedDays + ' يوم'"></div>
              </div>
              <div class="metric-label">أدوية بطيئة الحركة</div>
              <div class="metric-value" x-text="medicines.length"></div>
              <div class="metric-sub">خلال آخر <span x-text="selectedDays"></span> يوم</div>
            </div>
            <div class="metric-card">
              <div class="metric-header">
                <div class="metric-icon red"><i data-lucide="alert-octagon"></i></div>
                <div class="metric-badge danger">إجراء فوري</div>
              </div>
              <div class="metric-label">حرجة (راكدة + منتهية)</div>
              <div class="metric-value" x-text="countByRisk('critical')"></div>
              <div class="metric-sub">تتطلب إجراء فوري</div>
            </div>
            <div class="metric-card">
              <div class="metric-header">
                <div class="metric-icon yellow"><i data-lucide="alert-triangle"></i></div>
                <div class="metric-badge warning">مراقبة</div>
              </div>
              <div class="metric-label">متوسطة الخطورة</div>
              <div class="metric-value" x-text="countByRisk('medium')"></div>
              <div class="metric-sub">مراقبة مطلوبة</div>
            </div>
            <div class="metric-card">
              <div class="metric-header">
                <div class="metric-icon green"><i data-lucide="banknote"></i></div>
                <div class="metric-badge success">رأس مال</div>
              </div>
              <div class="metric-label">القيمة الراكدة الإجمالية</div>
              <div class="metric-value" x-text="formatCurrency(totalSlowMovingValue)"></div>
              <div class="metric-sub">رأس مال مقيد في المخزون</div>
            </div>
          </div>

          <!-- Main Medicines Table -->
          <div class="panel">
            <div class="panel-header">
              <div>
                <div class="panel-title">
                  <i data-lucide="list"></i>
                  قائمة الأدوية بطيئة الحركة
                </div>
                <div class="panel-subtitle">مرتبة حسب الأقدمية</div>
              </div>
            </div>
            <div class="table-container">
              <template x-if="medicines.length > 0">
                <table class="table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>اسم الدواء</th>
                      <th>المخزون</th>
                      <th class="col-base-unit">الوحدة</th>
                      <th>آخر بيع</th>
                      <th>أيام منذ البيع</th>
                      <th>أقرب صلاحية</th>
                      <th>أيام للصلاحية</th>
                      <th class="col-stock-value">قيمة المخزون</th>
                      <th>مستوى الخطر</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="(med, index) in medicines" :key="med.medicine_id">
                      <tr>
                        <td class="num" x-text="index + 1"></td>
                        <td class="med-name" x-text="med.trade_name"></td>
                        <td class="num" x-text="med.total_stock"></td>
                        <td class="col-base-unit" x-text="med.base_unit"></td>
                        <td x-text="formatDate(med.last_sale_date)"></td>
                        <td>
                          <span x-text="med.days_since_last_sale" :class="med.days_since_last_sale >= 60 ? 'expiry-urgent' : (med.days_since_last_sale >= 30 ? 'expiry-warning' : '')"></span>
                          <span style="font-size:11px;color:#94A3B8;margin-right:2px;">يوم</span>
                        </td>
                        <td x-text="formatDate(med.nearest_expiry)"></td>
                        <td>
                          <span x-show="med.days_to_expiry !== null" :class="med.days_to_expiry < 90 ? 'expiry-urgent' : (med.days_to_expiry < 180 ? 'expiry-warning' : (med.days_to_expiry < 365 ? 'expiry-ok' : 'expiry-far'))" x-text="med.days_to_expiry + ' يوم'"></span>
                          <span x-show="med.days_to_expiry === null" class="expiry-none">غير متاح</span>
                        </td>
                        <td class="col-stock-value stock-val" x-text="formatCurrency(med.stock_value)"></td>
                        <td>
                          <span class="risk-badge"
                                :class="'risk-' + med.risk_level"
                                x-text="riskLabel(med.risk_level)"></span>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </template>
              <template x-if="medicines.length === 0">
                <div class="no-data">
                  <div class="no-data-icon">✅</div>
                  <div>لا توجد أدوية بطيئة الحركة في هذه الفترة</div>
                  <div class="no-data-sub">جميع الأدوية تم بيعها خلال آخر <span x-text="selectedDays"></span> يوم</div>
                </div>
              </template>
            </div>
          </div>

          <!-- Recommendations Section -->
          <div class="panel" x-show="medicines.length > 0">
            <div class="panel-header">
              <div>
                <div class="panel-title">
                  <i data-lucide="lightbulb"></i>
                  التوصيات والحلول المقترحة
                </div>
                <div class="panel-subtitle">إجراءات لتحسين دوران المخزون</div>
              </div>
            </div>
            <div class="recommendations-grid">
              <!-- Critical recommendations -->
              <div class="rec-card rec-critical" x-show="countByRisk('critical') > 0">
                <div class="rec-header">
                  <div class="rec-icon"><i data-lucide="alert-octagon"></i></div>
                  <span class="rec-title">حرجة — خطر فقدان المخزون</span>
                </div>
                <div class="rec-desc">
                  <strong x-text="countByRisk('critical')"></strong> دواء (أدوية) في المرحلة الحرجة — مزيج من البطء وانتهاء الصلاحية الوشيك.
                </div>
                <div class="rec-desc" style="margin-top:8px;">
                  • خصم عاجل أو بيع بسعر التكلفة لتحريك المخزون قبل انتهاء الصلاحية<br>
                  • التواصل مع صيدليات أخرى لشراء الدفعة بسعر مخفض<br>
                  • إرجاع البضاعة للموزع إذا كانت سياسة الإرجاع متاحة
                </div>
              </div>

              <!-- High risk recommendations -->
              <div class="rec-card rec-high" x-show="countByRisk('high') > 0">
                <div class="rec-header">
                  <div class="rec-icon"><i data-lucide="alert-circle"></i></div>
                  <span class="rec-title">عالية — لم تُبَع لأكثر من 60 يوم</span>
                </div>
                <div class="rec-desc">
                  <strong x-text="countByRisk('high')"></strong> دواء (أدوية) لم تُبَع منذ أكثر من 60 يوماً.
                </div>
                <div class="rec-desc" style="margin-top:8px;">
                  • مراجعة سياسة التسعير — خفض السعر لتحفيز الطلب<br>
                  • عرض ترويجي (اشترِ 2 واحصل على 1 مجاناً)<br>
                  • تقييم الحاجة للصنف — هل هو موسمي؟
                </div>
              </div>

              <!-- Medium risk recommendations -->
              <div class="rec-card rec-medium" x-show="countByRisk('medium') > 0">
                <div class="rec-header">
                  <div class="rec-icon"><i data-lucide="alert-triangle"></i></div>
                  <span class="rec-title">متوسطة — مراقبة مطلوبة</span>
                </div>
                <div class="rec-desc">
                  <strong x-text="countByRisk('medium')"></strong> دواء (أدوية) بطيئة الحركة — يمكن اتخاذ إجراءات وقائية.
                </div>
                <div class="rec-desc" style="margin-top:8px;">
                  • خفض كميات الطلب المستقبلي لهذه الأصناف<br>
                  • وضعها في مكان بارز لزيادة فرص البيع<br>
                  • إعادة ترتيب المخزون — وضع الأصناف بطيئة الحركة أمام الأصناف سريعة الحركة
                </div>
              </div>

              <!-- General inventory recommendations -->
              <div class="rec-card" style="border-color:rgba(26,167,236,0.2);">
                <div class="rec-header">
                  <div class="rec-icon" style="background:#DBEAFE;color:#1AA7EC;"><i data-lucide="bar-chart-3"></i></div>
                  <span class="rec-title" style="color:#1E2F97;">إدارة المخزون العامة</span>
                </div>
                <div class="rec-desc">
                  القيمة الراكدة الإجمالية: <strong x-text="formatCurrency(totalSlowMovingValue)"></strong> — هذا المبلغ مقيد ولا يحقق عائداً.
                </div>
                <div class="rec-desc" style="margin-top:8px;">
                  • إعادة تقييم سياسات الشراء لتجنب تكدس المخزون<br>
                  • تطبيق تحليل ABC لتصنيف الأدوية حسب قيمتها ودورانها<br>
                  • اعتماد نظام كمية الطلب الاقتصادية (EOQ) لتحديد أحجام الطلب المثلى
                </div>
              </div>
            </div>
          </div>

        </div>
      </template>
    </main>
  
{% endblock %}

{% block extra_js %}
<script>

    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      // Restore dark mode
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
      }
    });

    function slowMovingApp() {
      return {
        // Auth
        loading: true,
        error: false,
        errorMessage: '',
        userName: localStorage.getItem('userName') || 'المستخدم',
        isAdmin: localStorage.getItem('role') === 'admin',
        userInitials: '',
        pharmacyName: localStorage.getItem('pharmacyName') || 'صيدلية الزاريات',

        // Dark Mode
        isDark: localStorage.getItem('darkMode') === 'true',

        // Language
        lang: localStorage.getItem('lang') || 'ar',

        // Current Date
        currentDate: '',

        // Report Data
        selectedDays: 30,
        medicines: [],
        totalSlowMovingValue: 0,

        async init() {
          // Auth check
          const token = localStorage.getItem('token');
          if (!token) {
            window.location.href = '/login';
            return;
          }

          const name = this.userName;
          this.userInitials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

          // Apply dark mode
          if (this.isDark) {
            document.body.classList.add('dark-mode');
          }

          // Apply saved language
          if (this.lang === 'en') {
            document.documentElement.setAttribute('dir', 'ltr');
            document.documentElement.setAttribute('lang', 'en');
          }

          // Set date
          this.formatDate();

          // Load report
          await this.loadReport();

          // Re-render Lucide icons after Alpine binds
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
        },

        // ─── Dark Mode Toggle ───
        toggleDark() {
          this.isDark = !this.isDark;
          localStorage.setItem('darkMode', this.isDark);
          document.body.classList.toggle('dark-mode', this.isDark);
          if (this.isDark) {
            document.body.classList.add('dark-mode');
          } else {
            document.body.classList.remove('dark-mode');
          }
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
        },

        // ─── Language Toggle ───
        switchLang(lang) {
          this.lang = lang;
          localStorage.setItem('lang', lang);
          if (lang === 'en') {
            document.documentElement.setAttribute('dir', 'ltr');
            document.documentElement.setAttribute('lang', 'en');
          } else {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.setAttribute('lang', 'ar');
          }
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
        },

        formatDate() {
          const now = new Date();
          const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          };
          this.currentDate = now.toLocaleDateString('ar-SA', options);
        },

        async loadReport() {
          this.loading = true;
          this.error = false;
          this.errorMessage = '';
          try {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/reports/slow-moving?days=' + this.selectedDays, {
              method: 'GET',
              headers: {
                'Authorization': 'Bearer ' + (token || ''),
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              }
            });
            if (!response.ok) {
              if (response.status === 401) {
                window.location.href = '/login';
                return;
              }
              throw new Error('فشل تحميل التقرير (' + response.status + ')');
            }
            const result = await response.json();
            this.medicines = result.medicines || [];
            this.totalSlowMovingValue = result.total_slow_moving_value || 0;
          } catch (e) {
            this.error = true;
            this.errorMessage = e.message || 'حدث خطأ غير متوقع';
          } finally {
            this.loading = false;
            this.$nextTick(() => {
              if (window.lucide) lucide.createIcons();
            });
          }
        },

        countByRisk(level) {
          return this.medicines.filter(m => m.risk_level === level).length;
        },

        riskLabel(level) {
          const labels = {
            'critical': '🔴 حرج',
            'high': '🔴 عالي',
            'medium': '🟡 متوسط',
            'low': '🟢 منخفض'
          };
          return labels[level] || level;
        },

        formatCurrency(value) {
          if (value === null || value === undefined) return '0.00 ج.م';
          const num = typeof value === 'number' ? value : parseFloat(value);
          return num.toLocaleString('ar-EG', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          }) + ' ج.م';
        },

        formatDate(dateStr) {
          if (!dateStr) return '—';
          try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('ar-SA', {
              year: 'numeric',
              month: 'short',
              day: 'numeric'
            });
          } catch (e) {
            return dateStr;
          }
        },

        logout() {
          localStorage.removeItem('token');
          localStorage.removeItem('role');
          window.location.href = '/login';
        },

        // ─── Mobile Sidebar ───
        toggleMobileSidebar() {
          const sidebar = document.querySelector('.sidebar');
          const overlay = document.querySelector('.sidebar-overlay');
          const btn = document.querySelector('.mobile-menu-btn');

          if (!sidebar) return;

          const isOpen = sidebar.classList.toggle('open');

          if (!overlay) {
            const newOverlay = document.createElement('div');
            newOverlay.className = 'sidebar-overlay';
            document.body.appendChild(newOverlay);
            newOverlay.addEventListener('click', () => this.closeMobileSidebar());
          }

          const finalOverlay = document.querySelector('.sidebar-overlay');
          if (isOpen) {
            finalOverlay.classList.add('visible');
            if (btn) btn.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.addEventListener('keydown', this.handleEscKey);
          } else {
            finalOverlay.classList.remove('visible');
            if (btn) btn.classList.remove('active');
            document.body.style.overflow = '';
            document.removeEventListener('keydown', this.handleEscKey);
          }
        },

        handleEscKey(e) {
          if (e.key === 'Escape') {
            this.closeMobileSidebar();
          }
        },

        closeMobileSidebar() {
          const sidebar = document.querySelector('.sidebar');
          const overlay = document.querySelector('.sidebar-overlay');
          const btn = document.querySelector('.mobile-menu-btn');

          if (sidebar) sidebar.classList.remove('open');
          if (overlay) overlay.classList.remove('visible');
          if (btn) btn.classList.remove('active');
          document.body.style.overflow = '';
          document.removeEventListener('keydown', this.handleEscKey);
        },

        ,async loadNotifications() {
          this.notificationsLoading = true;
          try {
            const token = localStorage.getItem('token');
            const r = await fetch('/api/alerts/count', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (r.ok) {
              const data = await r.json();
              this.notifications = [];
              // Build notification items from count data
              if (data.total_count > 0 || data.expiry_count > 0 || data.low_stock_count > 0) {
                if (data.expiry_count > 0) {
                  this.notifications.push({
                    id: 'expiry', type: 'expiry',
                    title: 'تنبيهات الصلاحية',
                    message: data.expiry_count + ' دووان قاربت على الانتهاء',
                    time: 'الآن',
                    href: '/alerts'
                  });
                }
                if (data.low_stock_count > 0) {
                  this.notifications.push({
                    id: 'stock', type: 'low_stock',
                    title: 'تنبيهات المخزون',
                    message: data.low_stock_count + ' دووان مخزونها منخفض',
                    time: 'الآن',
                    href: '/medicines'
                  });
                }
              }
            }
          } catch (e) { /* silent */ }
          this.notificationsLoading = false;
        },
      };
    }

        
  
</script>
{% endblock %}
