<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <title>تقرير الأدوية الراكدة - PharmaSUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Dark Mode ─── */
    body.dark-mode body,
    body.dark-mode .sidebar { background: #0B1120; color: #E2E8F0; }
    body.dark-mode .sidebar { border-left-color: #1E293B; }
    body.dark-mode .sidebar .brand .name { color: #E2E8F0; }
    body.dark-mode .sidebar .nav-item { color: #94A3B8; }
    body.dark-mode .sidebar .nav-item:hover { background: #1E293B; color: #E2E8F0; }
    body.dark-mode .sidebar .nav-item.active { background: #1AA7EC; color: #fff; box-shadow: 0 8px 18px -8px rgba(26,167,236,0.55); }
    body.dark-mode .sidebar .nav-item .badge { background: #7F1D1D; color: #FCA5A5; }
    body.dark-mode .sidebar .nav-section { color: #475569; }
    body.dark-mode .sidebar .user-card { border-color: #1E293B; }
    body.dark-mode .sidebar .user-name { color: #E2E8F0; }
    body.dark-mode .sidebar .user-role { color: #64748B; }
    body.dark-mode .sidebar .brand .icon { background: #1AA7EC; }

    body.dark-mode .topbar { background: #0B1120; border-bottom-color: #1E293B; }
    body.dark-mode .topbar .search-box { background: #1E293B; color: #64748B; }
    body.dark-mode .topbar .icon-btn { border-color: #1E293B; color: #94A3B8; }
    body.dark-mode .topbar .icon-btn:hover { background: #1E293B; }
    body.dark-mode .topbar .lang-toggle { border-color: #1E293B; }
    body.dark-mode .topbar .lang-toggle span { color: #94A3B8; }
    body.dark-mode .topbar .lang-toggle span.active { background: #1AA7EC; color: #fff; }
    body.dark-mode .topbar .page-info h1 { color: #F1F5F9; }
    body.dark-mode .topbar .page-info .subtitle { color: #64748B; }

    body.dark-mode { background: #0B1120; }
        body.dark-mode .notif-dropdown { background: #1E293B; border-color: #334155; }
    body.dark-mode .notif-header { color: #E2E8F0; border-color: #334155; }
    body.dark-mode .notif-item { border-color: #1E293B; }
    body.dark-mode .notif-item:hover { background: #111C2E; }
    body.dark-mode .notif-title { color: #F1F5F9; }
    body.dark-mode .notif-desc { color: #94A3B8; }
    body.dark-mode .notif-time { color: #64748B; }
    body.dark-mode .notif-empty { color: #64748B; }
    body.dark-mode .main-content { background: #0B1120; }
    body.dark-mode .page-header h1 { color: #F1F5F9; }
    body.dark-mode .page-header .subtitle { color: #64748B; }

    body.dark-mode .metric-card { background: #111827; border-color: #1E293B; }
    body.dark-mode .metric-card .metric-label { color: #64748B; }
    body.dark-mode .metric-card .metric-value { color: #F1F5F9; }
    body.dark-mode .metric-card .metric-badge.success { color: #4ADE80; background: #052e16; }
    body.dark-mode .metric-card .metric-badge.warning { color: #FCD34D; background: #451a03; }
    body.dark-mode .metric-card .metric-badge.danger { color: #FCA5A5; background: #450a0a; }

    body.dark-mode .panel { background: #111827; border-color: #1E293B; }
    body.dark-mode .panel .panel-title { color: #F1F5F9; }
    body.dark-mode .panel .panel-subtitle { color: #64748B; }
    body.dark-mode .panel .panel-header { border-bottom-color: #1E293B; }

    body.dark-mode .table th { color: #475569; border-bottom-color: #1E293B; }
    body.dark-mode .table td { color: #E2E8F0; border-bottom-color: #1E293B; }
    body.dark-mode .table tr:hover td { background: #1E293B; }

    body.dark-mode .risk-critical { background: rgba(185,28,28,0.3); color: #FCA5A5; border-color: rgba(185,28,28,0.5); }
    body.dark-mode .risk-high { background: rgba(239,68,68,0.15); color: #FCA5A5; border-color: rgba(239,68,68,0.4); }
    body.dark-mode .risk-medium { background: rgba(245,158,11,0.15); color: #FCD34D; border-color: rgba(245,158,11,0.4); }
    body.dark-mode .risk-low { background: rgba(34,197,94,0.15); color: #4ADE80; border-color: rgba(34,197,94,0.4); }

    body.dark-mode .expiry-urgent { color: #FCA5A5; }
    body.dark-mode .expiry-warning { color: #FCD34D; }
    body.dark-mode .expiry-ok { color: #4ADE80; }
    body.dark-mode .expiry-far { color: #64748B; }
    body.dark-mode .expiry-none { color: #64748B; }

    body.dark-mode .rec-card { background: rgba(26,167,236,0.08); border-color: rgba(26,167,236,0.25); }
    body.dark-mode .rec-card.rec-critical { background: rgba(185,28,28,0.1); border-color: rgba(185,28,28,0.35); }
    body.dark-mode .rec-card.rec-high { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); }
    body.dark-mode .rec-card.rec-medium { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.25); }
    body.dark-mode .rec-card .rec-title { color: #E2E8F0; }
    body.dark-mode .rec-card .rec-desc { color: #94A3B8; }

    body.dark-mode .filter-select { background: #1E293B; border-color: #334155; color: #E2E8F0; }
    body.dark-mode .filter-select:focus { border-color: #1AA7EC; }
    body.dark-mode .btn-primary { background: #1AA7EC; }
    body.dark-mode .loading-state .spinner { border-color: #334155; border-top-color: #1AA7EC; }
    body.dark-mode .loading-text { color: #64748B; }
    body.dark-mode .error-state .err-icon { color: #FCA5A5; }
    body.dark-mode .error-state .err-msg { color: #FCA5A5; }
    body.dark-mode .error-state .err-detail { color: #64748B; }
    body.dark-mode .no-data { color: #64748B; }
    body.dark-mode .filter-stats { color: #64748B; }
    body.dark-mode .filter-stats strong { color: #E2E8F0; }

    /* ─── Layout ─── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 248px;
      background: #fff;
      border-left: 1px solid #EEF2F6;
      display: flex;
      flex-direction: column;
      padding: 22px 16px;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
    }
    .sidebar .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 8px 22px;
    }
    .sidebar .brand .icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: #1AA7EC;
      position: relative;
      flex-shrink: 0;
    }
    .sidebar .brand .icon::before,
    .sidebar .brand .icon::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 3px;
    }
    .sidebar .brand .icon::before { width: 18px; height: 5.5px; }
    .sidebar .brand .icon::after { width: 5.5px; height: 18px; }
    .sidebar .brand .name {
      font: 700 18px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .sidebar .brand .name span { color: #1AA7EC; }
    .sidebar .nav-section {
      font: 600 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.1em;
      color: #CBD5E1;
      padding: 14px 10px 10px;
    }
    .sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      color: #475569;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 4px;
      transition: all 0.2s ease;
    }
    .sidebar .nav-item:hover {
      background: #F8FAFC;
      color: #0F172A;
    }
    .sidebar .nav-item.active {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 8px 18px -8px rgba(26, 167, 236, 0.55);
    }
    .sidebar .nav-item svg {
      width: 19px;
      height: 19px;
      flex-shrink: 0;
    }
    .sidebar .nav-item .badge {
      margin-right: auto;
      background: #FEF2F2;
      color: #DC2626;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .sidebar .user-card {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px;
      border: 1px solid #EEF2F6;
      border-radius: 13px;
      cursor: pointer;
    }
    .sidebar .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1AA7EC;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sidebar .user-info {
      min-width: 0;
      flex: 1;
    }
    .sidebar .user-name {
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .user-role {
      font-size: 11.5px;
      color: #94A3B8;
    }
    .sidebar .user-card svg {
      width: 16px;
      height: 16px;
      color: #CBD5E1;
      flex-shrink: 0;
    }

    /* ─── Topbar ─── */
    .topbar {
      height: 70px;
      background: #fff;
      border-bottom: 1px solid #EEF2F6;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 18px;
      position: fixed;
      top: 0;
      right: 248px;
      left: 0;
      z-index: 90;
    }
    .topbar .page-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar .page-info h1 {
      margin: 0;
      font: 700 20px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .topbar .page-info .subtitle {
      margin: 0;
      color: #64748B;
      font-size: 13px;
      margin-top: 3px;
    }
    .topbar .topbar-actions {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar .lang-toggle {
      display: flex;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      overflow: hidden;
      font-size: 13px;
      font-weight: 600;
    }
    .topbar .lang-toggle span {
      padding: 7px 12px;
      color: #64748B;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .topbar .lang-toggle span.active {
      background: #1AA7EC;
      color: #fff;
    }
    .topbar .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      border: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    .topbar .icon-btn:hover {
      background: #F8FAFC;
    }
    .topbar .icon-btn svg {
      width: 18px;
      height: 18px;
    }
    .topbar .icon-btn .dot {
      position: absolute;
      top: 9px;
      left: 11px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #DC2626;
      border: 2px solid #fff;
    }

    /* ─── Main Content ─── */
    .main-content {
      margin-right: 248px;
      padding: calc(70px + 28px) 28px 28px;
      min-height: 100vh;
    }

    /* ─── Page Header ─── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 {
      margin: 0 0 6px;
      font: 700 26px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-header h1 svg {
      width: 28px;
      height: 28px;
      color: #1AA7EC;
    }
    .page-header .subtitle {
      margin: 0;
      color: #64748B;
      font-size: 14.5px;
    }
    .page-header .header-actions {
      display: flex;
      gap: 10px;
    }
    .page-header .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 18px;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .page-header .btn svg { width: 17px; height: 17px; }
    .btn-primary {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
    }
    .btn-primary:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #fff;
      color: #334155;
      border: 1px solid #E2E8F0;
    }
    .btn-secondary:hover {
      background: #F8FAFC;
    }

    /* ─── Filter Bar ─── */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      font-size: 13px;
      color: #64748B;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-label svg { width: 15px; height: 15px; }
    .filter-select {
      height: 38px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #0F172A;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      -webkit-appearance: none;
    }
    .filter-select:hover { border-color: #CBD5E1; }
    .filter-select:focus {
      outline: none;
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.12);
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 38px;
      padding: 0 16px;
      border-radius: 10px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 14px -6px rgba(26, 167, 236, 0.45);
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .filter-btn svg { width: 15px; height: 15px; }
    .filter-stats {
      font-size: 13px;
      color: #64748B;
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .filter-stats strong { color: #0F172A; font-weight: 700; }

    /* ─── Metric Cards ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
    }
    .metric-card .metric-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .metric-card .metric-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-card .metric-icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .metric-card .metric-icon.red { background: #FEE2E2; color: #DC2626; }
    .metric-card .metric-icon.yellow { background: #FEF3C7; color: #D97706; }
    .metric-card .metric-icon.green { background: #ECFDF5; color: #16A34A; }
    .metric-card .metric-icon svg { width: 20px; height: 20px; }
    .metric-card .metric-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .metric-card .metric-badge.danger { color: #DC2626; background: #FEF2F2; }
    .metric-card .metric-badge.warning { color: #D97706; background: #FFFBeb; }
    .metric-card .metric-badge.success { color: #16A34A; background: #ECFDF5; }
    .metric-card .metric-label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .metric-card .metric-value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .metric-card .metric-value .unit {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 600;
    }
    .metric-card .metric-sub {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 4px;
    }

    /* ─── Panel ─── */
    .panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 22px;
      overflow: hidden;
    }
    .panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #F1F5F9;
    }
    .panel .panel-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel .panel-title svg { width: 18px; height: 18px; color: #1AA7EC; }
    .panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }

    /* ─── Table ─── */
    .table-container {
      overflow-x: auto;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 800px;
    }
    .table th {
      text-align: right;
      padding: 12px 14px;
      font: 600 11px 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      text-transform: uppercase;
      border-bottom: 1px solid #F1F5F9;
      white-space: nowrap;
    }
    .table td {
      padding: 13px 14px;
      border-bottom: 1px solid #F6F8FA;
      color: #0F172A;
      vertical-align: middle;
    }
    .table tr:hover td {
      background: #F8FAFC;
    }
    .table tr:last-child td {
      border-bottom: none;
    }
    .table .med-name {
      font-weight: 600;
      color: #0F172A;
    }
    .table .num {
      direction: ltr;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }
    .table .stock-val {
      font-weight: 700;
      direction: ltr;
      font-family: 'IBM Plex Mono', monospace;
    }
    .table .col-base-unit,
    .table .col-stock-value { /* shown on desktop */ }

    /* ─── Risk Badge ─── */
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .risk-critical {
      background: rgba(185,28,28,0.2);
      color: #B91C1C;
      border-color: rgba(185,28,28,0.35);
    }
    .risk-high {
      background: rgba(239,68,68,0.1);
      color: #DC2626;
      border-color: rgba(239,68,68,0.2);
    }
    .risk-medium {
      background: rgba(245,158,11,0.1);
      color: #D97706;
      border-color: rgba(245,158,11,0.2);
    }
    .risk-low {
      background: rgba(34,197,94,0.1);
      color: #16A34A;
      border-color: rgba(34,197,94,0.2);
    }

    /* ─── Expiry Warning ─── */
    .expiry-urgent { color: #DC2626; font-weight: 600; }
    .expiry-warning { color: #D97706; font-weight: 600; }
    .expiry-ok { color: #16A34A; }
    .expiry-far { color: #94A3B8; }
    .expiry-none { color: #94A3B8; font-style: italic; }

    /* ─── Recommendations Grid ─── */
    .recommendations-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .rec-card {
      background: rgba(26,167,236,0.04);
      border: 1px solid rgba(26,167,236,0.15);
      border-radius: 14px;
      padding: 18px;
      transition: border-color 0.2s ease;
    }
    .rec-card:hover { border-color: rgba(26,167,236,0.35); }
    .rec-card.rec-critical {
      background: rgba(185,28,28,0.06);
      border-color: rgba(185,28,28,0.2);
    }
    .rec-card.rec-critical:hover { border-color: rgba(185,28,28,0.4); }
    .rec-card.rec-high {
      background: rgba(239,68,68,0.04);
      border-color: rgba(239,68,68,0.15);
    }
    .rec-card.rec-high:hover { border-color: rgba(239,68,68,0.35); }
    .rec-card.rec-medium {
      background: rgba(245,158,11,0.04);
      border-color: rgba(245,158,11,0.15);
    }
    .rec-card.rec-medium:hover { border-color: rgba(245,158,11,0.35); }
    .rec-card .rec-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .rec-card .rec-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .rec-card .rec-icon svg { width: 17px; height: 17px; }
    .rec-card.rec-critical .rec-icon { background: #FEE2E2; color: #DC2626; }
    .rec-card.rec-high .rec-icon { background: #FEE2E2; color: #EF4444; }
    .rec-card.rec-medium .rec-icon { background: #FEF3C7; color: #D97706; }
    .rec-card .rec-title {
      font-size: 14px;
      font-weight: 600;
    }
    .rec-card.rec-critical .rec-title { color: #B91C1C; }
    .rec-card.rec-high .rec-title { color: #DC2626; }
    .rec-card.rec-medium .rec-title { color: #D97706; }
    .rec-card .rec-desc {
      font-size: 13px;
      color: #64748B;
      line-height: 1.7;
    }
    .rec-card .rec-desc strong { color: #0F172A; }

    /* ─── Loading & Error States ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { color: #94A3B8; font-size: 14px; }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
    }
    .error-state .err-icon { width: 48px; height: 48px; color: #DC2626; }
    .error-state .err-msg { color: #DC2626; font-size: 16px; font-weight: 600; }
    .error-state .err-detail { color: #64748B; font-size: 13px; margin-bottom: 8px; }
    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: #94A3B8;
      font-size: 14px;
    }
    .no-data .no-data-icon { font-size: 40px; margin-bottom: 12px; }
    .no-data .no-data-sub { color: #94A3B8; font-size: 13px; margin-top: 4px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .topbar { right: 0; }
      .main-content { margin-right: 0; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .recommendations-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .page-header h1 { font-size: 20px; }
      .page-header .header-actions { width: 100%; }
      .metric-card { padding: 14px; }
      .metric-card .metric-value { font-size: 20px; }
      .table { font-size: 12px; }
      .table th, .table td { padding: 10px 8px; }
      .table .col-base-unit,
      .table .col-stock-value { display: none; }
      .filter-bar { flex-direction: column; align-items: stretch; }
    }
    @media (max-width: 480px) {
      .metrics-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .metric-card .metric-value { font-size: 18px; }
    }
      .notif-dropdown {
      position: absolute; top: 64px; left: 0; width: 380px; max-height: 460px;
      background: #fff; border: 1px solid #E2E8F0; border-radius: 14px;

    }

    .notif-list { max-height: 340px; overflow-y: auto; }
    .notif-item {

  </style>
</head>
<body x-data="slowMovingApp()">

  <div class="app-layout">
    <!-- ═══════ Sidebar ═══════ -->

      <div class="nav-section">MENU</div>

      </a>

    <!-- ═══════ Topbar ═══════ -->

    <!-- ═══════ Main Content ═══════ -->

          <!-- Filter Bar -->

            <div class="metric-card">

                  • تطبيق تحليل ABC لتصنيف الأدوية حسب قيمتها ودورانها<br>
                  • اعتماد نظام كمية الطلب الاقتصادية (EOQ) لتحديد أحجام الطلب المثلى
                </div>
              </div>
            </div>
          </div>

        </div>
      </template>
    </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      // Restore dark mode
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
      }
    });

    function slowMovingApp() {
      return {
        // Auth
        loading: true,
        error: false,
        errorMessage: '',
        userName: localStorage.getItem('userName') || 'المستخدم',
        isAdmin: localStorage.getItem('role') === 'admin',
        userInitials: '',
        pharmacyName: localStorage.getItem('pharmacyName') || 'صيدلية الزاريات',

        // Dark Mode
        isDark: localStorage.getItem('darkMode') === 'true',

        // Language
        lang: localStorage.getItem('lang') || 'ar',

        // Current Date
        currentDate: '',

        // Report Data
        selectedDays: 30,
        medicines: [],
        totalSlowMovingValue: 0,

        async init() {
          // Auth check
          const token = localStorage.getItem('token');
          if (!token) {
            window.location.href = '/login';
            return;
          }

          const name = this.userName;
          this.userInitials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

          // Apply dark mode
          if (this.isDark) {
            document.body.classList.add('dark-mode');
          }

          // Apply saved language
          if (this.lang === 'en') {
            document.documentElement.setAttribute('dir', 'ltr');
            document.documentElement.setAttribute('lang', 'en');
          }

          // Set date
          this.formatDate();

          // Load report
          await this.loadReport();

          // Re-render Lucide icons after Alpine binds
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
        },

        // ─── Dark Mode Toggle ───
        toggleDark() {
          this.isDark = !this.isDark;
          localStorage.setItem('darkMode', this.isDark);
          document.body.classList.toggle('dark-mode', this.isDark);
          if (this.isDark) {
            document.body.classList.add('dark-mode');
          } else {
            document.body.classList.remove('dark-mode');
          }
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
        },

        // ─── Language Toggle ───
        switchLang(lang) {
          this.lang = lang;
          localStorage.setItem('lang', lang);
          if (lang === 'en') {
            document.documentElement.setAttribute('dir', 'ltr');
            document.documentElement.setAttribute('lang', 'en');
          } else {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.setAttribute('lang', 'ar');
          }
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
        },

        formatDate() {
          const now = new Date();
          const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          };
          this.currentDate = now.toLocaleDateString('ar-SA', options);
        },

        async loadReport() {
          this.loading = true;
          this.error = false;
          this.errorMessage = '';
          try {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/reports/slow-moving?days=' + this.selectedDays, {
              method: 'GET',
              headers: {
                'Authorization': 'Bearer ' + (token || ''),
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              }
            });
            if (!response.ok) {
              if (response.status === 401) {
                window.location.href = '/login';
                return;
              }
              throw new Error('فشل تحميل التقرير (' + response.status + ')');
            }
            const result = await response.json();
            this.medicines = result.medicines || [];
            this.totalSlowMovingValue = result.total_slow_moving_value || 0;
          } catch (e) {
            this.error = true;
            this.errorMessage = e.message || 'حدث خطأ غير متوقع';
          } finally {
            this.loading = false;
            this.$nextTick(() => {
              if (window.lucide) lucide.createIcons();
            });
          }
        },

        countByRisk(level) {
          return this.medicines.filter(m => m.risk_level === level).length;
        },

        riskLabel(level) {
          const labels = {
            'critical': '🔴 حرج',
            'high': '🔴 عالي',
            'medium': '🟡 متوسط',
            'low': '🟢 منخفض'
          };
          return labels[level] || level;
        },

        formatCurrency(value) {
          if (value === null || value === undefined) return '0.00 ج.م';
          const num = typeof value === 'number' ? value : parseFloat(value);
          return num.toLocaleString('ar-EG', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
          }) + ' ج.م';
        },

        formatDate(dateStr) {
          if (!dateStr) return '—';
          try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('ar-SA', {
              year: 'numeric',
              month: 'short',
              day: 'numeric'
            });
          } catch (e) {
            return dateStr;
          }
        },

        logout() {
          localStorage.removeItem('token');
          localStorage.removeItem('role');
          window.location.href = '/login';
        }
      
        async loadNotifications() {
          this.notificationsLoading = true;
          try {
            const token = localStorage.getItem('token');
            const r = await fetch('/api/alerts/count', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (r.ok) {
              const data = await r.json();
              this.notifications = [];
              // Build notification items from count data
              if (data.total_count > 0 || data.expiry_count > 0 || data.low_stock_count > 0) {
                if (data.expiry_count > 0) {
                  this.notifications.push({
                    id: 'expiry', type: 'expiry',
                    title: 'تنبيهات الصلاحية',
                    message: data.expiry_count + ' دووان قاربت على الانتهاء',
                    time: 'الآن',
                    href: '/alerts'
                  });
                }
                if (data.low_stock_count > 0) {
                  this.notifications.push({
                    id: 'stock', type: 'low_stock',
                    title: 'تنبيهات المخزون',
                    message: data.low_stock_count + ' دووان مخزونها منخفض',
                    time: 'الآن',
                    href: '/medicines'
                  });
                }
              }
            }
          } catch (e) { /* silent */ }
          this.notificationsLoading = false;
        },
      };
    }

        
  </script>
