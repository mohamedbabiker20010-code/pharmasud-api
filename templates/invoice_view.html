<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <title>فاتورة - PharmaSUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ─── Base ─── */
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }
    .app-layout { display: flex; min-height: 100vh; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 248px; background: #fff; border-left: 1px solid #EEF2F6;
      display: flex; flex-direction: column; padding: 22px 16px;
      position: fixed; right: 0; top: 0; bottom: 0; z-index: 100;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .sidebar .brand {
      display: flex; align-items: center; gap: 11px;
      padding: 0 8px 22px;
    }
    .sidebar .brand .icon {
      width: 38px; height: 38px; border-radius: 11px;
      background: #1AA7EC; position: relative; flex-shrink: 0;
    }
    .sidebar .brand .icon::before, .sidebar .brand .icon::after {
      content: ''; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%); background: #fff; border-radius: 3px;
    }
    .sidebar .brand .icon::before { width: 18px; height: 5.5px; }
    .sidebar .brand .icon::after { width: 5.5px; height: 18px; }
    .sidebar .brand .name {
      font: 700 18px/1 'IBM Plex Sans Arabic', sans-serif; letter-spacing: -0.02em;
    }
    .sidebar .brand .name span { color: #1AA7EC; }
    .sidebar .nav-section {
      font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: 0.1em;
      color: #CBD5E1; padding: 14px 10px 10px;
    }
    .sidebar .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 12px; border-radius: 11px;
      color: #475569; font-size: 14px; font-weight: 500;
      text-decoration: none; margin-bottom: 4px;
      transition: all 0.2s ease;
    }
    .sidebar .nav-item:hover { background: #F8FAFC; color: #0F172A; }
    .sidebar .nav-item.active {
      background: #1AA7EC; color: #fff;
      box-shadow: 0 8px 18px -8px rgba(26,167,236,0.55);
    }
    .sidebar .nav-item svg { width: 19px; height: 19px; flex-shrink: 0; }
    .sidebar .nav-item .badge {
      margin-right: auto; background: #FEF2F2; color: #DC2626;
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    }
    .sidebar .user-card {
      margin-top: auto; display: flex; align-items: center; gap: 11px;
      padding: 11px; border: 1px solid #EEF2F6; border-radius: 13px; cursor: pointer;
      transition: border-color 0.3s ease;
    }
    .sidebar .user-avatar {
      width: 36px; height: 36px; border-radius: 10px; background: #1AA7EC;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .sidebar .user-name { font-size: 13.5px; font-weight: 600; }
    .sidebar .user-role { font-size: 11.5px; color: #94A3B8; }
    .sidebar .user-card svg { width: 16px; height: 16px; color: #CBD5E1; flex-shrink: 0; }

    /* ─── Topbar ─── */
    .topbar {
      height: 70px; background: #fff; border-bottom: 1px solid #EEF2F6;
      display: flex; align-items: center; padding: 0 28px; gap: 18px;
      position: fixed; top: 0; right: 248px; left: 0; z-index: 90;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .topbar .search-box {
      display: flex; align-items: center; gap: 10px; flex: 1; max-width: 380px;
      height: 42px; padding: 0 14px; border-radius: 11px; background: #F6F8FA;
      color: #94A3B8; font-size: 14px;
    }
    .topbar .search-box svg { width: 18px; height: 18px; flex-shrink: 0; }
    .topbar .actions { margin-right: auto; display: flex; align-items: center; gap: 12px; }
    .topbar .lang-toggle {
      display: flex; border: 1px solid #E2E8F0; border-radius: 9px;
      overflow: hidden; font-size: 13px; font-weight: 600;
      transition: border-color 0.3s ease;
    }
    .topbar .lang-toggle span {
      padding: 7px 12px; color: #64748B; cursor: pointer;
      transition: all 0.2s ease;
    }
    .topbar .lang-toggle span:hover { background: #F8FAFC; }
    .topbar .lang-toggle span.active { background: #1AA7EC; color: #fff; }
    .topbar .icon-btn {
      width: 42px; height: 42px; border-radius: 11px; border: 1px solid #E2E8F0;
      display: flex; align-items: center; justify-content: center;
      color: #475569; background: transparent; cursor: pointer; position: relative;
      transition: all 0.2s ease;
    }
    .topbar .icon-btn:hover { background: #F8FAFC; }
    .topbar .icon-btn svg { width: 18px; height: 18px; }
    .topbar .icon-btn .dot {
      position: absolute; top: 9px; left: 11px; width: 8px; height: 8px;
      border-radius: 50%; background: #DC2626; border: 2px solid #fff;
    }

    /* ─── Main Content ─── */
    .main-content {
      margin-right: 248px;
      padding: calc(70px + 28px) 28px 28px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ─── Invoice Container ─── */
    .invoice-container {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 1px 2px rgba(15,23,42,0.04);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .invoice-header {
      text-align: center;
      padding-bottom: 20px;
      border-bottom: 1px solid #EEF2F6;
      margin-bottom: 20px;
    }
    .invoice-header h1 {
      font: 700 22px/1.2 'IBM Plex Sans Arabic', sans-serif;
      color: #1AA7EC;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .invoice-header .sub {
      font-size: 13px;
      color: #64748B;
    }
    .invoice-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px;
      background: #F6F8FA;
      border-radius: 11px;
      margin-bottom: 16px;
      font-size: 13px;
      transition: background 0.3s ease;
    }
    .invoice-info .label { color: #64748B; }
    .invoice-info .value { color: #0F172A; text-align: left; font-weight: 600; }
    .invoice-info .full-width { grid-column: 1 / -1; }

    /* ─── Items Section ─── */
    .items-section { margin-bottom: 16px; }
    .items-header {
      display: grid;
      grid-template-columns: 3fr 1fr 1fr 1fr;
      padding: 8px 12px;
      background: #EEF2F6;
      border-radius: 8px;
      font: 600 12px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.04em;
      color: #64748B;
      margin-bottom: 8px;
      transition: background 0.3s ease;
    }
    .item-row {
      display: grid;
      grid-template-columns: 3fr 1fr 1fr 1fr;
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid #F6F8FA;
      transition: background 0.2s ease;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #F8FAFC; }
    .item-row .item-name { font-weight: 600; color: #0F172A; }
    .item-row .item-unit { font-size: 11px; color: #94A3B8; margin-top: 2px; }
    .item-row .amount { text-align: left; color: #16A34A; font-weight: 600; }

    /* ─── Total Section ─── */
    .total-section {
      background: #F6F8FA;
      border-radius: 11px;
      padding: 16px;
      margin-bottom: 16px;
      transition: background 0.3s ease;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-row .label { color: #64748B; font-size: 14px; }
    .total-row .value {
      font: 700 24px/1 'IBM Plex Sans Arabic', sans-serif;
      color: #16A34A;
      letter-spacing: -0.02em;
    }

    /* ─── Payment Badge ─── */
    .payment-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }
    .payment-cash { background: rgba(16,185,129,0.12); color: #16A34A; }
    .payment-bankak { background: rgba(26,167,236,0.10); color: #1AA7EC; }
    .payment-fory { background: #EDE9FE; color: #7C3AED; }
    .payment-transfer { background: rgba(245,158,11,0.12); color: #D97706; }

    /* ─── Footer ─── */
    .invoice-footer {
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid #EEF2F6;
      color: #94A3B8;
      font-size: 12px;
    }

    /* ─── Loading ─── */
    .loading {
      text-align: center;
      padding: 60px 20px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #EEF2F6;
      border-top: 3px solid #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .loading p { color: #64748B; font-size: 14px; font-weight: 500; }

    /* ─── Error ─── */
    .error-msg {
      text-align: center;
      padding: 60px 20px;
    }
    .error-msg .icon { font-size: 48px; margin-bottom: 12px; }
    .error-msg h2 {
      font: 600 18px/1.3 'IBM Plex Sans Arabic', sans-serif;
      color: #0F172A; margin-bottom: 6px;
    }
    .error-msg p { color: #64748B; font-size: 13px; }

    /* ─── Back Link ─── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      color: #1AA7EC;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    .back-link:hover { color: #0284C7; }
    .back-link svg { width: 16px; height: 16px; }

    /* ─── Print Button ─── */
    .print-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 11px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none;
      background: #1AA7EC; color: #fff;
      box-shadow: 0 10px 22px -8px rgba(26,167,236,0.55);
      transition: all 0.2s ease;
      margin-top: 16px;
    }
    .print-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .print-btn svg { width: 17px; height: 17px; }

    /* ─── Animations ─── */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .topbar { right: 0; }
      .main-content { margin-right: 0; }
    }
    @media (max-width: 600px) {
      .main-content { padding: calc(70px + 16px) 16px 16px; }
      .invoice-container { padding: 20px; }
      .items-header, .item-row { font-size: 11px; }
      .total-row .value { font-size: 20px; }
    }

    /* ═══════════════════════════════════
       DARK MODE
    ═══════════════════════════════════ */
    body.dark-mode body {
      background: #0B1120;
      color: #E2E8F0;
    }
    body.dark-mode .sidebar {
      background: #111827;
      border-color: #1E293B;
    }
    body.dark-mode .sidebar .brand .name { color: #E2E8F0; }
    body.dark-mode .sidebar .nav-item { color: #94A3B8; }
    body.dark-mode .sidebar .nav-item:hover { background: #1E293B; color: #E2E8F0; }
    body.dark-mode .sidebar .nav-item.active { background: #1AA7EC; color: #fff; }
    body.dark-mode .sidebar .user-card { border-color: #1E293B; }
    body.dark-mode .sidebar .user-name { color: #E2E8F0; }
    body.dark-mode .sidebar .user-role { color: #64748B; }
    body.dark-mode .sidebar .user-card svg { color: #475569; }

    body.dark-mode .topbar {
      background: #111827;
      border-color: #1E293B;
    }
    body.dark-mode .topbar .search-box {
      background: #1E293B;
      color: #64748B;
    }
    body.dark-mode .topbar .lang-toggle { border-color: #334155; }
    body.dark-mode .topbar .lang-toggle span { color: #94A3B8; }
    body.dark-mode .topbar .lang-toggle span.active { background: #1AA7EC; color: #fff; }
    body.dark-mode .topbar .icon-btn {
      border-color: #334155; color: #94A3B8;
    }
    body.dark-mode .topbar .icon-btn:hover { background: #1E293B; }

    body.dark-mode .invoice-container {
      background: #111827;
      border-color: #1E293B;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    body.dark-mode .invoice-header { border-color: #1E293B; }
    body.dark-mode .invoice-header h1 { color: #4ADEDE; }
    body.dark-mode .invoice-header .sub { color: #94A3B8; }

    body.dark-mode .invoice-info { background: #1E293B; }
    body.dark-mode .invoice-info .label { color: #94A3B8; }
    body.dark-mode .invoice-info .value { color: #E2E8F0; }

    body.dark-mode .items-header { background: #1E293B; color: #94A3B8; }
    body.dark-mode .item-row { border-color: #1E293B; }
    body.dark-mode .item-row:hover { background: #1E293B; }
    body.dark-mode .item-row .item-name { color: #E2E8F0; }
    body.dark-mode .item-row .item-unit { color: #64748B; }
    body.dark-mode .item-row .amount { color: #6EE7B7; }

    body.dark-mode .total-section { background: #1E293B; }
    body.dark-mode .total-row .label { color: #94A3B8; }
    body.dark-mode .total-row .value { color: #6EE7B7; }

    body.dark-mode .invoice-footer { border-color: #1E293B; color: #64748B; }

    body.dark-mode .payment-cash { background: rgba(16,185,129,0.15); color: #6EE7B7; }
    body.dark-mode .payment-bankak { background: rgba(26,167,236,0.15); color: #4ADEDE; }
    body.dark-mode .payment-fory { background: rgba(124,58,237,0.2); color: #A78BFA; }
    body.dark-mode .payment-transfer { background: rgba(245,158,11,0.15); color: #FBBF24; }

    body.dark-mode .loading p { color: #94A3B8; }
    body.dark-mode .spinner { border-color: #1E293B; border-top-color: #1AA7EC; }
    body.dark-mode .error-msg h2 { color: #E2E8F0; }
    body.dark-mode .error-msg p { color: #94A3B8; }

    body.dark-mode .back-link { color: #4ADEDE; }
    body.dark-mode .back-link:hover { color: #67E8F9; }

    body.dark-mode .print-btn { box-shadow: 0 10px 22px -8px rgba(26,167,236,0.35); }

    /* ─── Print Styles ─── */
    @media print {
      .sidebar, .topbar { display: none !important; }
      .main-content { margin: 0 !important; padding: 0 !important; }
      .invoice-container {
        box-shadow: none !important;
        border: none !important;
        max-width: 100% !important;
      }
      .print-btn, .back-link { display: none !important; }
    }
      .notif-dropdown {
      position: absolute; top: 64px; left: 0; width: 380px; max-height: 460px;
      background: #fff; border: 1px solid #E2E8F0; border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12); z-index: 200; overflow: hidden;
    }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #E2E8F0;
      font-weight: 700; font-size: 14px; color: #0F172A;
    }
    .notif-header a { font-size: 12px; color: #1AA7EC; text-decoration: none; }
    .notif-list { max-height: 340px; overflow-y: auto; }
    .notif-item {
      display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #F1F5F9;
      cursor: pointer; transition: background 0.15s;
    }
    .notif-item:hover { background: #F6F8FA; }
    .notif-item .notif-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .notif-icon.expiry { background: #FEF3C7; color: #D97706; }
    .notif-icon.stock { background: #FEE2E2; color: #DC2626; }
    .notif-icon.system { background: #DBEAFE; color: #2563EB; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 13px; font-weight: 600; color: #0F172A; }
    .notif-desc { font-size: 12px; color: #64748B; margin-top: 2px; }
    .notif-time { font-size: 11px; color: #94A3B8; margin-top: 3px; }
    .notif-empty { padding: 28px 16px; text-align: center; color: #94A3B8; font-size: 13px; }
    .notif-loading { padding: 16px; text-align: center; color: #64748B; font-size: 13px; }

  </style>
</head>
<body x-data="invoiceApp()">

  <div class="app-layout">
    <!-- ═══════ Sidebar ═══════ -->
    <aside class="sidebar">
      <div class="brand">
        <div class="icon"></div>
        <div class="name">Pharma<span>SUD</span></div>
      </div>
      <div class="nav-section">MENU</div>
      <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i><span x-text="lang==='ar'?'لوحة التحكم':'Dashboard'"></span></a>
      <a href="/pos" class="nav-item"><i data-lucide="scan-barcode"></i><span x-text="lang==='ar'?'نقطة البيع':'POS'"></span></a>
      <a href="/medicines" class="nav-item"><i data-lucide="pill"></i><span x-text="lang==='ar'?'الأدوية':'Medicines'"></span></a>
      <a href="/inventory" class="nav-item"><i data-lucide="package"></i><span x-text="lang==='ar'?'المخزون':'Inventory'"></span></a>
      <a href="/batches" class="nav-item"><i data-lucide="calendar-clock"></i><span x-text="lang==='ar'?'الدفعات':'Batches'"></span></a>
      <a href="/reports-sales" class="nav-item active"><i data-lucide="chart-line"></i><span x-text="lang==='ar'?'التقارير':'Reports'"></span></a>
      <a href="/employees" class="nav-item" x-show="isAdmin"><i data-lucide="users"></i><span x-text="lang==='ar'?'الموظفين':'Employees'"></span></a>
      <a href="/alerts" class="nav-item"><i data-lucide="bell"></i><span x-text="lang==='ar'?'التنبيهات':'Alerts'"></span><span class="badge">7</span></a>
      <a href="/settings" class="nav-item"><i data-lucide="settings"></i><span x-text="lang==='ar'?'الإعدادات':'Settings'"></span></a>
      <div class="user-card" @click="logout()">
        <div class="user-avatar" x-text="userInitials || 'U'"></div>
        <div style="min-width:0;flex:1">
          <div class="user-name" x-text="userName || (lang==='ar'?'المستخدم':'User')"></div>
          <div class="user-role" x-text="isAdmin ? (lang==='ar'?'مدير':'Admin') : (lang==='ar'?'صيدلي':'Pharmacist')"></div>
        </div>
        <i data-lucide="chevron-left"></i>
      </div>
    </aside>

    <!-- ═══════ Topbar ═══════ -->
    <header class="topbar">
      <div class="search-box">
        <i data-lucide="search"></i>
        <span x-text="lang==='ar'?'البحث في الأدوية، المبيعات، الدفعات...':'Search medicines, sales, batches...'"></span>
      </div>
      <div class="actions">
        <div class="lang-toggle">
          <span :class="{ 'active': lang==='en' }" @click="switchLang('en')">EN</span>
          <span :class="{ 'active': lang==='ar' }" @click="switchLang('ar')">ع</span>
        </div>
        <button class="icon-btn" @click="toggleDark()" :title="isDark ? (lang==='ar'?'الوضع الفاتح':'Light Mode') : (lang==='ar'?'الوضع الداكن':'Dark Mode')">
          <i :data-lucide="isDark ? 'sun' : 'moon'"></i>
        </button>
        <a href="/alerts" class="icon-btn" style="text-decoration:none;">
          <i data-lucide="bell"></i>
          <span class="dot"></span>
        </a>
      </div>
    </header>

    <!-- ═══════ Main Content ═══════ -->
    <main class="main-content">

      <!-- Loading State -->
      <div class="invoice-container" x-show="loading">
        <div class="loading">
          <div class="spinner"></div>
          <p x-text="lang==='ar'?'جاري تحميل الفاتورة...':'Loading invoice...'"></p>
        </div>
      </div>

      <!-- Error State -->
      <div class="invoice-container" x-show="error && !loading" style="display:none;">
        <div class="error-msg">
          <div class="icon">⚠️</div>
          <h2 x-text="lang==='ar'?'الفاتورة غير موجودة':'Invoice Not Found'"></h2>
          <p x-text="errorMessage || (lang==='ar'?'قد يكون الرابط غير صحيح أو تم حذف الفاتورة':'The link may be incorrect or the invoice was deleted')"></p>
          <a href="/reports-sales" class="back-link">
            <i data-lucide="arrow-right"></i>
            <span x-text="lang==='ar'?'العودة للتقارير':'Back to Reports'"></span>
          </a>
        </div>
      </div>

      <!-- Invoice Content -->
      <div class="invoice-container" x-show="!loading && !error" style="display:none;">
        <div class="invoice-header">
          <h1>🏥 <span x-text="pharmacyName || (lang==='ar'?'صيدلية':'Pharmacy')"></span></h1>
          <div class="sub" x-text="pharmacyAddress"></div>
        </div>

        <div class="invoice-info">
          <div><span class="label" x-text="lang==='ar'?'فاتورة رقم':'Invoice #'"></span></div>
          <div class="value">#<span x-text="invoiceNumber"></span></div>
          <div><span class="label" x-text="lang==='ar'?'التاريخ':'Date'"></span></div>
          <div class="value" x-text="invoiceDate"></div>
          <div><span class="label" x-text="lang==='ar'?'الكاشير':'Cashier'"></span></div>
          <div class="value" x-text="cashierName"></div>
          <template x-if="customerName">
            <div class="full-width">
              <span class="label" x-text="lang==='ar'?'العميل':'Customer'">: </span>
              <span class="value" x-text="customerName"></span>
            </div>
          </template>
        </div>

        <div class="items-section">
          <div class="items-header">
            <span x-text="lang==='ar'?'الدواء':'Medicine'"></span>
            <span x-text="lang==='ar'?'الكمية':'Qty'"></span>
            <span x-text="lang==='ar'?'السعر':'Price'"></span>
            <span style="text-align:left;" x-text="lang==='ar'?'الإجمالي':'Total'"></span>
          </div>
          <template x-for="(item, idx) in items" :key="idx">
            <div class="item-row">
              <div>
                <div class="item-name" x-text="item.medicine_name"></div>
                <div class="item-unit" x-text="item.unit_name || ''"></div>
              </div>
              <div x-text="'×'+item.quantity"></div>
              <div x-text="Number(item.unit_price).toLocaleString(lang==='ar'?'ar-SA':'en-US')"></div>
              <div class="amount" x-text="Number(item.total_price).toLocaleString(lang==='ar'?'ar-SA':'en-US') + ' ج'"></div>
            </div>
          </template>
        </div>

        <div class="total-section">
          <div class="total-row">
            <span class="label" x-text="lang==='ar'?'المجموع الكلي':'Grand Total'"></span>
            <span class="value" x-text="totalDisplay"></span>
          </div>
          <div id="paymentBadge">
            <span class="payment-badge" :class="paymentClass" x-text="paymentEmoji + ' ' + paymentMethod"></span>
          </div>
        </div>

        <div class="invoice-footer">
          <p x-text="lang==='ar'?'شكراً لثقتكم - دمتم بصحة':'Thank you for your trust — Stay healthy'"></p>
          <p style="font-size:10px;margin-top:4px;">pharmasud.onrender.com</p>
        </div>

        <div style="text-align:center;">
          <button class="print-btn" @click="window.print()">
            <i data-lucide="printer"></i>
            <span x-text="lang==='ar'?'طباعة الفاتورة':'Print Invoice'"></span>
          </button>
        </div>
      </div>

    </main>
  </div>

  <script>
    function invoiceApp() {
      return {
        // ─── State ───
        loading: true,
        error: false,
        errorMessage: '',
        lang: localStorage.getItem('lang') || 'ar',
        isDark: localStorage.getItem('darkMode') === 'true',

        // ─── Invoice Data ───
        pharmacyName: '',
        pharmacyAddress: '',
        invoiceNumber: '-',
        invoiceDate: '-',
        cashierName: '-',
        customerName: '',
        items: [],
        totalAmount: 0,
        paymentMethod: '',
        paymentClass: '',
        paymentEmoji: '',

        // ─── User ───
        userName: localStorage.getItem('userName') || '',
        isAdmin: localStorage.getItem('role') === 'admin',
        userInitials: '',

        // ─── Init ───
        init() {
          // Apply dark mode
          if (this.isDark) document.body.classList.add('dark-mode');
          // Apply language direction
          this.applyLang();
          // User initials
          if (this.userName) {
            this.userInitials = this.userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
          }
          // Load invoice
          this.loadInvoice();
          // Re-render lucide icons after Alpine processes
          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
        },

        // ─── Dark Mode ───
        toggleDark() {
          this.isDark = !this.isDark;
          localStorage.setItem('darkMode', this.isDark);
          document.body.classList.toggle('dark-mode', this.isDark);
          if (this.isDark) {
            document.body.classList.add('dark-mode');
          } else {
            document.body.classList.remove('dark-mode');
          }
          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
        },

        // ─── Language ───
        switchLang(l) {
          this.lang = l;
          localStorage.setItem('lang', l);
          this.applyLang();
          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
        },
        applyLang() {
          const html = document.documentElement;
          if (this.lang === 'ar') {
            html.setAttribute('lang', 'ar');
            html.setAttribute('dir', 'rtl');
          } else {
            html.setAttribute('lang', 'en');
            html.setAttribute('dir', 'ltr');
          }
        },

        // ─── Computed ───
        get totalDisplay() {
          const locale = this.lang === 'ar' ? 'ar-SA' : 'en-US';
          const currency = this.lang === 'ar' ? ' ج.س' : ' SDG';
          return Number(this.totalAmount).toLocaleString(locale) + currency;
        },

        // ─── Load Invoice ───
        async loadInvoice() {
          const pathParts = window.location.pathname.split('/');
          const invoiceNumber = pathParts[pathParts.length - 1];

          try {
            const response = await fetch('/api/public/invoice/' + invoiceNumber);

            if (!response.ok) {
              this.loading = false;
              this.error = true;
              this.errorMessage = response.status === 404
                ? (this.lang === 'ar' ? 'الفاتورة غير موجودة' : 'Invoice not found')
                : (this.lang === 'ar' ? 'حدث خطأ في تحميل الفاتورة' : 'Error loading invoice');
              return;
            }

            const data = await response.json();

            if (!data.success) {
              this.loading = false;
              this.error = true;
              return;
            }

            // Fill in data
            this.pharmacyName = data.pharmacy_name || (this.lang === 'ar' ? 'صيدلية' : 'Pharmacy');
            this.pharmacyAddress = [data.pharmacy_address, data.pharmacy_phone].filter(Boolean).join(' - ');
            this.invoiceNumber = data.invoice_number;
            this.invoiceDate = data.created_at
              ? data.created_at.substring(0, 10) + ' ' + data.created_at.substring(11, 16)
              : '-';
            this.cashierName = data.cashier_name || (this.lang === 'ar' ? 'غير معروف' : 'Unknown');
            this.customerName = data.customer_name || '';
            this.items = data.items || [];
            this.totalAmount = data.total_amount;

            // Payment method
            const methodMap = {
              'نقدي':       { cls: 'payment-cash',      emoji: '💵' },
              'بنكك':       { cls: 'payment-bankak',    emoji: '📱' },
              'فوري':       { cls: 'payment-fory',      emoji: '📲' },
              'تحويل بنكي': { cls: 'payment-transfer',  emoji: '🏦' }
            };
            const pm = methodMap[data.payment_method] || { cls: 'payment-cash', emoji: '💵' };
            this.paymentClass = pm.cls;
            this.paymentEmoji = pm.emoji;
            this.paymentMethod = data.payment_method;

            // Done loading
            this.loading = false;

          } catch (err) {
            this.loading = false;
            this.error = true;
            this.errorMessage = this.lang === 'ar' ? 'حدث خطأ في الاتصال بالخادم' : 'Server connection error';
          }

          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
        },

        // ─── Logout ───
        logout() {
          localStorage.clear();
          window.location.href = '/login';
        }
      
        async loadNotifications() {
          this.notificationsLoading = true;
          try {
            const token = localStorage.getItem('token');
            const r = await fetch('/api/alerts/count', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (r.ok) {
              const data = await r.json();
              this.notifications = [];
              // Build notification items from count data
              if (data.total_count > 0 || data.expiry_count > 0 || data.low_stock_count > 0) {
                if (data.expiry_count > 0) {
                  this.notifications.push({
                    id: 'expiry', type: 'expiry',
                    title: 'تنبيهات الصلاحية',
                    message: data.expiry_count + ' دووان قاربت على الانتهاء',
                    time: 'الآن',
                    href: '/alerts'
                  });
                }
                if (data.low_stock_count > 0) {
                  this.notifications.push({
                    id: 'stock', type: 'low_stock',
                    title: 'تنبيهات المخزون',
                    message: data.low_stock_count + ' دووان مخزونها منخفض',
                    time: 'الآن',
                    href: '/medicines'
                  });
                }
              }
            }
          } catch (e) { /* silent */ }
          this.notificationsLoading = false;
        },
      };
    }

        
  </script>

</body>
</html>
