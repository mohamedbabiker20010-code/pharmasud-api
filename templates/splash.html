<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaSUD</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <style>
    .splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #1E40AF 0%, #2563EB 50%, #0EA5E9 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      filter: blur(2px);
      animation: floatSlow 22s ease-in-out infinite alternate;
    }
    .particle.p1 { width: 260px; height: 260px; top: -80px; right: -60px; animation-delay: 0s; }
    .particle.p2 { width: 180px; height: 180px; bottom: -40px; left: -50px; animation-delay: -6s; }
    .particle.p3 { width: 120px; height: 120px; top: 20%; left: 10%; background: rgba(255,255,255,0.08); animation-delay: -3s; }
    .particle.p4 { width: 90px; height: 90px; bottom: 18%; right: 12%; background: rgba(255,255,255,0.07); animation-delay: -10s; }
    .particle.p5 { width: 340px; height: 340px; bottom: -160px; right: 20%; background: rgba(255,255,255,0.05); animation-delay: -14s; }
    @keyframes floatSlow {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(20px, -25px) scale(1.06); }
      100% { transform: translate(-15px, 15px) scale(0.97); }
    }
    .splash-icon-box {
      width: 96px; height: 96px; border-radius: 26px;
      background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      opacity: 0; transform: scale(0.8); z-index: 2;
      animation: logoEnter 0.8s var(--ease-smooth, cubic-bezier(0.22,1,0.36,1)) forwards, pulseGlow 2.4s ease-in-out 0.9s infinite;
    }
    @keyframes logoEnter {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
      50%     { box-shadow: 0 0 35px 12px rgba(255,255,255,0.18); }
    }
    .splash-icon-box::after {
      content: ''; position: absolute; top: 0; left: -150%;
      width: 60%; height: 100%;
      background: linear-gradient(115deg, transparent, rgba(255,255,255,0.45), transparent);
      transform: skewX(-20deg);
      animation: shimmer 1.4s ease-in-out 1.1s 1 forwards;
    }
    @keyframes shimmer { to { left: 150%; } }
    .splash-icon-box svg {
      width: 48px; height: 48px; stroke: #ffffff; stroke-width: 2.2; position: relative; z-index: 2;
    }
    .splash-brand {
      margin-top: 26px; font-size: 36px; font-weight: 800; letter-spacing: 0.5px;
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
      font-family: 'Cairo', sans-serif;
    }
    .splash-brand .brand-pharma { color: #1E40AF; }
    .splash-brand .brand-sud { color: #0EA5E9; }
    .splash-subtitle {
      margin-top: 10px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.8);
      opacity: 0; transform: translateY(20px); animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .splash-dots { position: absolute; bottom: 56px; display: flex; gap: 8px; }
    .splash-dots span {
      width: 9px; height: 9px; border-radius: 50%;
      background: #0EA5E9; opacity: 0.4; animation: dotPulse 1.2s ease-in-out infinite;
    }
    .splash-dots span:nth-child(1) { animation-delay: 0s; }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; background: #fff; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%,100% { transform: scale(0.7); opacity: 0.35; }
      50%     { transform: scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="splash-icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
      </svg>
    </div>
    <div class="splash-brand">
      <span class="brand-pharma">Pharma</span><span class="brand-sud">SUD</span>
    </div>
    <div class="splash-subtitle">نظام إدارة الصيدليات الذكي</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hide');
        window.location.href = '/login';
      }, 1800);
    });
  </script>
</body>
</html>
