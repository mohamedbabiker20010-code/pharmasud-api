{% extends 'shared_layout.html' %}

{% set active_page = 'reports-profits' %}
{% set page_title = 'تقرير الأرباح' %}

{% block extra_css %}
<style>
    /* ─── Page Header ─── */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h1 {
      margin: 0 0 6px; font: 700 26px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .page-header .subtitle { margin: 0; color: #64748B; font-size: 14.5px; }

    /* ─── Filter Bar ─── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #64748B;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      border-color: #CBD5E1;
      color: #0F172A;
      background: #F8FAFC;
    }
    .filter-btn.active {
      background: #1AA7EC;
      border-color: #1AA7EC;
      color: #fff;
      box-shadow: 0 6px 14px -6px rgba(26, 167, 236, 0.45);
    }
    .filter-btn svg {
      width: 15px;
      height: 15px;
    }
    .filter-date {
      height: 38px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #0F172A;
      font-size: 13px;
      font-family: inherit;
      direction: ltr;
      transition: all 0.2s ease;
    }
    .filter-date:focus {
      outline: none;
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.12);
    }
    .filter-date::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }
    .custom-dates {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .custom-dates span {
      font-size: 12px;
      color: #94A3B8;
      font-weight: 500;
    }

    /* ─── Metric Cards ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
      transition: box-shadow 0.2s ease;
    }
    .metric-card:hover {
      box-shadow: 0 4px 12px -2px rgba(15,23,42,0.06);
    }
    .metric-card .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .metric-card .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-card .icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .metric-card .icon.red { background: #FEE2E2; color: #DC2626; }
    .metric-card .icon.green { background: #ECFDF5; color: #16A34A; }
    .metric-card .icon.yellow { background: #FEF3C7; color: #D97706; }
    .metric-card .icon.cyan { background: #E0F2FE; color: #0284C7; }
    .metric-card .icon svg {
      width: 20px;
      height: 20px;
    }
    .metric-card .badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .metric-card .badge.success {
      color: #16A34A;
      background: #ECFDF5;
    }
    .metric-card .badge.warning {
      color: #D97706;
      background: #FFF7ED;
    }
    .metric-card .badge.danger {
      color: #DC2626;
      background: #FEF2F2;
    }
    .metric-card .badge.info {
      color: #0284C7;
      background: #E0F2FE;
    }
    .metric-card .label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .metric-card .value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .metric-card .value .unit {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 600;
    }

    /* ─── Panel ─── */
    .panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
    }
    .panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }
    .panel .panel-action {
      font-size: 13px;
      font-weight: 600;
      color: #1AA7EC;
      cursor: pointer;
    }

    /* ─── Two Column Layout ─── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    /* ─── Ranked List (for top/bottom medicines) ─── */
    .ranked-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ranked-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ranked-item .rank {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ranked-item .rank.r1 { background: #FEF3C7; color: #D97706; }
    .ranked-item .rank.r2 { background: #F1F5F9; color: #64748B; }
    .ranked-item .rank.r3 { background: #FFF7ED; color: #CD7F32; }
    .ranked-item .rank.rn { background: #DBEAFE; color: #1AA7EC; }
    .ranked-item .r-info {
      flex: 1;
      min-width: 0;
    }
    .ranked-item .r-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ranked-item .r-meta {
      font-size: 11px;
      color: #94A3B8;
    }
    .ranked-item .r-value {
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ranked-item .r-value.positive { color: #16A34A; }
    .ranked-item .r-value.negative { color: #DC2626; }
    .ranked-item .r-margin {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .ranked-item .r-margin.high { color: #16A34A; background: #ECFDF5; }
    .ranked-item .r-margin.mid { color: #D97706; background: #FFF7ED; }
    .ranked-item .r-margin.low { color: #64748B; background: #F1F5F9; }

    /* ─── Monthly Bar Chart Panel ─── */
    .chart-panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 22px;
    }
    .chart-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .chart-panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .chart-panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }
    .monthly-chart {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      height: 200px;
      padding: 20px 0 0;
    }
    .bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-value {
      font-size: 11px;
      color: #64748B;
      margin-bottom: 6px;
      font-weight: 700;
      white-space: nowrap;
    }
    .bar {
      width: 100%;
      max-width: 52px;
      min-height: 4px;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, #16A34A 0%, #22C55E 100%);
      transition: height 0.5s ease;
    }
    .bar-label {
      font-size: 11px;
      color: #94A3B8;
      margin-top: 8px;
      text-align: center;
    }

    /* ─── Table (for profit detail view) ─── */
    .table-container {
      overflow-x: auto;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .table th {
      text-align: right;
      padding: 12px 14px;
      font: 600 11px 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      text-transform: uppercase;
      border-bottom: 1px solid #F1F5F9;
      white-space: nowrap;
    }
    .table td {
      padding: 13px 14px;
      border-bottom: 1px solid #F6F8FA;
      color: #0F172A;
      vertical-align: middle;
    }
    .table tr:hover td {
      background: #F8FAFC;
    }
    .table tr:last-child td {
      border-bottom: none;
    }
    .rank-num {
      display: inline-flex;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .rank-1 { background: #FEF3C7; color: #D97706; }
    .rank-2 { background: #F1F5F9; color: #64748B; }
    .rank-3 { background: #FFF7ED; color: #CD7F32; }
    .rank-n { background: #DBEAFE; color: #1AA7EC; }

    .profit-positive { color: #16A34A; }
    .profit-negative { color: #DC2626; }
    .margin-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .margin-badge.high { color: #16A34A; background: #ECFDF5; }
    .margin-badge.mid { color: #D97706; background: #FFF7ED; }
    .margin-badge.low { color: #64748B; background: #F1F5F9; }

    /* ─── Loading & Error ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
    }
    .error-state .err-icon {
      width: 48px;
      height: 48px;
      color: #DC2626;
    }
    .error-state .err-msg {
      color: #DC2626;
      font-size: 16px;
      font-weight: 600;
    }
    .error-state .err-detail {
      color: #64748B;
      font-size: 13px;
    }
    .retry-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 20px;
      border-radius: 11px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
      transition: all 0.2s ease;
    }
    .retry-btn:hover {
      filter: brightness(1.05);
    }
    .no-data {
      text-align: center;
      padding: 30px 20px;
      color: #94A3B8;
      font-size: 14px;
    }

    /* ─── Access Denied ─── */
    .access-denied {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      text-align: center;
    }
    .access-denied .ad-icon {
      width: 56px;
      height: 56px;
      color: #DC2626;
    }
    .access-denied .ad-title {
      font-size: 22px;
      color: #DC2626;
      font-weight: 700;
    }
    .access-denied .ad-desc {
      color: #64748B;
      font-size: 14px;
      max-width: 360px;
    }
    .access-denied .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 20px;
      border-radius: 11px;
      background: #F1F5F9;
      color: #0F172A;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .access-denied .back-btn:hover {
      background: #E2E8F0;
    }

    /* ─── Report Tabs ─── */
    .report-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .report-tab {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 11px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #94A3B8;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .report-tab.active {
      background: #DBEAFE;
      color: #1AA7EC;
    }
    .report-tab:hover {
      color: #0F172A;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      .three-col { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
      .filter-bar { gap: 6px; }
      .filter-btn { padding: 0 10px; font-size: 12px; height: 34px; }
      .monthly-chart { height: 140px; gap: 8px; }
      .bar { max-width: 36px; }
    }
    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: 1fr; }
      .metric-card .value { font-size: 20px; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    [x-cloak] { display: none !important; }
</style>
{% endblock %}

{% block content %}
<div x-data="profitReportApp()" x-init="init()" class="page-content">

    <!-- ─── Access Denied (non-admin) ─── -->
    <template x-if="accessDenied && !loading">
      <div class="access-denied">
        <i data-lucide="shield-alert" style="width:56px;height:56px;color:#DC2626"></i>
        <div class="ad-title">غير مصرح بالوصول</div>
        <div class="ad-desc">تقرير الأرباح متاح للمدير فقط. يرجى تسجيل الدخول بحساب مدير.</div>
        <a href="/dashboard" class="back-btn">
          <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
          العودة للوحة التحكم
        </a>
      </div>
    </template>

    <!-- ─── Main Report (admin only) ─── -->
    <template x-if="!accessDenied">
      <div>

        <!-- Filter Bar -->
        <div class="filter-bar">
          <button class="filter-btn"
                  :class="{ 'active': period === 'today' }"
                  @click="setPeriod('today')">
            <i data-lucide="calendar-check" style="width:15px;height:15px"></i>
            اليوم
          </button>
          <button class="filter-btn"
                  :class="{ 'active': period === 'yesterday' }"
                  @click="setPeriod('yesterday')">
            أمس
          </button>
          <button class="filter-btn"
                  :class="{ 'active': period === 'week' }"
                  @click="setPeriod('week')">
            <i data-lucide="calendar-days" style="width:15px;height:15px"></i>
            هذا الأسبوع
          </button>
          <button class="filter-btn"
                  :class="{ 'active': period === 'month' }"
                  @click="setPeriod('month')">
            <i data-lucide="calendar-range" style="width:15px;height:15px"></i>
            هذا الشهر
          </button>
          <button class="filter-btn"
                  :class="{ 'active': period === 'custom' }"
                  @click="toggleCustom()">
            <i data-lucide="calendar-search" style="width:15px;height:15px"></i>
            فترة مخصصة
          </button>

          <!-- Custom Date Inputs -->
          <template x-if="period === 'custom'">
            <div class="custom-dates">
              <span>من</span>
              <input type="date" class="filter-date" x-model="customStart" @change="loadReport()">
              <span>إلى</span>
              <input type="date" class="filter-date" x-model="customEnd" @change="loadReport()">
            </div>
          </template>
        </div>

        <!-- Report Tabs -->
        <div class="report-tabs">
          <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-sales' }" @click="window.location='/reports-sales'">تقرير المبيعات</button>
          <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-profits' }" @click="window.location='/reports-profits'">تقرير الأرباح</button>
          <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-slow-moving' }" @click="window.location='/reports-slow-moving'">الأدوية الراكدة</button>
          <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-purchase-forecast' }" @click="window.location='/reports-purchase-forecast'">توقعات الشراء</button>
          <button class="report-tab" :class="{ 'active': window.location.pathname === '/sales-history' }" @click="window.location='/sales-history'">سجل المبيعات</button>
        </div>

        <!-- Loading State -->
        <template x-if="loading">
          <div class="loading-state">
            <div class="spinner"></div>
            <span>جاري تحميل تقرير الأرباح...</span>
          </div>
        </template>

        <!-- Error State -->
        <template x-if="error && !loading">
          <div class="error-state">
            <i data-lucide="triangle-alert" style="width:48px;height:48px;color:#DC2626"></i>
            <span class="err-msg">تعذر تحميل البيانات</span>
            <span class="err-detail" x-text="errorMessage"></span>
            <button class="retry-btn" @click="loadReport()">
              <i data-lucide="refresh-cw" style="width:16px;height:16px"></i>
              إعادة المحاولة
            </button>
          </div>
        </template>

        <!-- Report Content -->
        <template x-if="!loading && !error && report">
          <div>

            <!-- 4 KPI Metric Cards -->
            <div class="metrics-grid">
              <!-- Total Revenue -->
              <div class="metric-card">
                <div class="header">
                  <div class="icon blue"><i data-lucide="banknote"></i></div>
                  <div class="badge info">
                    <i data-lucide="trending-up" style="width:13px;height:13px"></i>
                    الإيرادات
                  </div>
                </div>
                <div class="label">إجمالي الإيرادات</div>
                <div class="value">
                  <span x-text="formatCurrency(report.summary.total_revenue)"></span>
                  <span class="unit">ج.س</span>
                </div>
              </div>

              <!-- Total Cost -->
              <div class="metric-card">
                <div class="header">
                  <div class="icon red"><i data-lucide="receipt"></i></div>
                  <div class="badge danger">
                    <i data-lucide="trending-down" style="width:13px;height:13px"></i>
                    التكلفة
                  </div>
                </div>
                <div class="label">إجمالي التكلفة</div>
                <div class="value">
                  <span x-text="formatCurrency(report.summary.total_cost)"></span>
                  <span class="unit">ج.س</span>
                </div>
              </div>

              <!-- Net Profit -->
              <div class="metric-card">
                <div class="header">
                  <div class="icon green"><i data-lucide="trending-up"></i></div>
                  <div class="badge success">
                    <i data-lucide="trending-up" style="width:13px;height:13px"></i>
                    الربح
                  </div>
                </div>
                <div class="label">صافي الربح</div>
                <div class="value">
                  <span x-text="formatCurrency(report.summary.net_profit)"></span>
                  <span class="unit">ج.س</span>
                </div>
              </div>

              <!-- Profit Margin -->
              <div class="metric-card">
                <div class="header">
                  <div class="icon yellow"><i data-lucide="percent"></i></div>
                  <div class="badge warning">
                    <i data-lucide="target" style="width:13px;height:13px"></i>
                    الهامش
                  </div>
                </div>
                <div class="label">هامش الربح</div>
                <div class="value">
                  <span x-text="report.summary.profit_margin"></span>
                  <span class="unit">%</span>
                </div>
              </div>
            </div>

            <!-- Two Column: Top & Bottom Profitable Medicines -->
            <div class="two-col">

              <!-- Top Profitable Medicines -->
              <div class="panel">
                <div class="panel-header">
                  <div>
                    <div class="panel-title">أعلى الأدوية ربحية</div>
                    <div class="panel-subtitle">الأكثر تحقيقاً للربح</div>
                  </div>
                </div>
                <div class="ranked-list">
                  <template x-if="topProfitable.length > 0">
                    <template x-for="(med, idx) in topProfitable" :key="idx">
                      <div class="ranked-item">
                        <div class="rank"
                             :class="idx === 0 ? 'r1' : (idx === 1 ? 'r2' : (idx === 2 ? 'r3' : 'rn'))"
                             x-text="idx + 1"></div>
                        <div class="r-info">
                          <div class="r-name" x-text="med.trade_name"></div>
                          <div class="r-meta"><span x-text="med.quantity_sold"></span> وحدة مباعة</div>
                        </div>
                        <span class="r-value positive" x-text="formatCurrency(med.profit) + ' ج.س'"></span>
                        <span class="r-margin"
                              :class="med.margin_percentage >= 30 ? 'high' : (med.margin_percentage >= 15 ? 'mid' : 'low')"
                              x-text="med.margin_percentage + '%'"></span>
                      </div>
                    </template>
                  </template>
                  <template x-if="topProfitable.length === 0">
                    <div class="no-data">لا توجد بيانات أرباح للفترة المحددة</div>
                  </template>
                </div>
              </div>

              <!-- Bottom Profitable Medicines -->
              <div class="panel">
                <div class="panel-header">
                  <div>
                    <div class="panel-title">أقل الأدوية ربحية</div>
                    <div class="panel-subtitle">الأقل تحقيقاً للربح</div>
                  </div>
                </div>
                <div class="ranked-list">
                  <template x-if="bottomProfitable.length > 0">
                    <template x-for="(med, idx) in bottomProfitable" :key="idx">
                      <div class="ranked-item">
                        <div class="rank rn" x-text="idx + 1"></div>
                        <div class="r-info">
                          <div class="r-name" x-text="med.trade_name"></div>
                          <div class="r-meta"><span x-text="med.quantity_sold"></span> وحدة مباعة</div>
                        </div>
                        <span class="r-value"
                              :class="med.profit >= 0 ? 'positive' : 'negative'"
                              x-text="formatCurrency(med.profit) + ' ج.س'"></span>
                        <span class="r-margin"
                              :class="med.margin_percentage >= 30 ? 'high' : (med.margin_percentage >= 15 ? 'mid' : 'low')"
                              x-text="med.margin_percentage + '%'"></span>
                      </div>
                    </template>
                  </template>
                  <template x-if="bottomProfitable.length === 0">
                    <div class="no-data">لا توجد بيانات أرباح للفترة المحددة</div>
                  </template>
                </div>
              </div>
            </div>

            <!-- Monthly Comparison Chart (last 6 months) -->
            <div class="chart-panel">
              <div class="panel-header">
                <div>
                  <div class="panel-title">مقارنة الأرباح الشهرية</div>
                  <div class="panel-subtitle">آخر 6 أشهر</div>
                </div>
              </div>
              <template x-if="monthlyData.length > 0">
                <div class="monthly-chart">
                  <template x-for="(m, idx) in monthlyData" :key="idx">
                    <div class="bar-wrapper">
                      <div class="bar-value" x-text="formatCurrency(m.profit)"></div>
                      <div class="bar"
                           :style="'height: ' + Math.max((parseFloat(m.profit) / Math.max(maxMonthlyProfit, 1)) * 100, 4) + '%'">
                      </div>
                      <div class="bar-label" x-text="m.month_name"></div>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="monthlyData.length === 0">
                <div class="no-data">لا توجد بيانات أرباح شهرية متاحة</div>
              </template>
            </div>

          </div>
        </template>

      </div>
    </template>

{% endblock %}

{% block extra_js %}
<script>

document.addEventListener('DOMContentLoaded', () => {
  if (window.lucide) lucide.createIcons();
});

function profitReportApp() {
  return {
    // ── State ──
    loading: true,
    error: false,
    errorMessage: '',
    sidebarOpen: false,
    accessDenied: false,
    currentDate: '',
    userName: '',
    pharmacyName: '',
    isAdmin: false,
    userInitials: '',
    period: 'month',
    customStart: '',
    customEnd: '',
    report: null,
    monthlyData: [],
    maxMonthlyProfit: 0,
    isDark: false,
    lang: 'ar',

    // ── Computed ──
    get topProfitable() {
      if (!this.report || !this.report.by_medicine) return [];
      return [...this.report.by_medicine].sort((a, b) => b.profit - a.profit).slice(0, 10);
    },

    get bottomProfitable() {
      if (!this.report || !this.report.by_medicine) return [];
      return [...this.report.by_medicine].sort((a, b) => a.profit - b.profit).slice(0, 10);
    },

    // ── Init ──
    init() {
      this.formatDate();
      this.checkAccess();
      this.initTheme();
    },

    checkAccess() {
      try {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.href = '/login';
          return;
        }
        const payload = JSON.parse(atob(token.split('.')[1]));
        const role = payload.role || '';
        this.userName = payload.username || payload.sub || 'مستخدم';
        this.pharmacyName = payload.pharmacy_name || 'صيدلية الزاريات';
        this.isAdmin = role === 'admin';
        this.userInitials = this.userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

        if (role !== 'admin') {
          this.accessDenied = true;
          this.loading = false;
          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
          return;
        }

        this.loadReport();
      } catch (e) {
        console.error('Auth check failed:', e);
        window.location.href = '/login';
      }
    },

    formatDate() {
      const now = new Date();
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      };
      this.currentDate = now.toLocaleDateString('ar-SA', options);
    },

    // ── Dark Mode ──
    initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        this.isDark = true;
        document.body.classList.add('dark-mode');
      }
    },

    toggleTheme() {
      this.isDark = !this.isDark;
      if (this.isDark) {
        document.body.classList.add('dark-mode');
        localStorage.setItem('darkMode', true);
      } else {
        document.body.classList.remove('dark-mode');
        localStorage.setItem('darkMode', false);
      }
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    },

    // ── Language Toggle ──
    setLang(l) {
      this.lang = l;
      if (l === 'en') {
        document.documentElement.setAttribute('lang', 'en');
        document.documentElement.setAttribute('dir', 'ltr');
        document.documentElement.classList.remove('rtl');
      } else {
        document.documentElement.setAttribute('lang', 'ar');
        document.documentElement.setAttribute('dir', 'rtl');
      }
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    },

    // ── Period Filters ──
    setPeriod(p) {
      this.period = p;
      if (p !== 'custom') {
        this.customStart = '';
        this.customEnd = '';
      }
      this.loadReport();
    },

    toggleCustom() {
      if (this.period === 'custom') {
        this.period = 'month';
        this.loadReport();
      } else {
        this.period = 'custom';
        const now = new Date();
        const monthAgo = new Date(now);
        monthAgo.setDate(monthAgo.getDate() - 30);
        this.customStart = monthAgo.toISOString().slice(0, 10);
        this.customEnd = now.toISOString().slice(0, 10);
        this.loadReport();
      }
    },

    toggleCustomPeriod() {
      if (this.period !== 'custom') {
        this.period = 'custom';
        const now = new Date();
        const monthAgo = new Date(now);
        monthAgo.setDate(monthAgo.getDate() - 30);
        this.customStart = monthAgo.toISOString().slice(0, 10);
        this.customEnd = now.toISOString().slice(0, 10);
      } else {
        this.period = 'month';
        this.customStart = '';
        this.customEnd = '';
      }
    },

    getPeriodLabel() {
      const labels = {
        'today': 'اليوم',
        'week': 'هذا الأسبوع',
        'month': 'هذا الشهر',
        'custom': 'فترة مخصصة'
      };
      return labels[this.period] || 'اختر الفترة';
    },

    // ── API ──
    async loadReport() {
      this.loading = true;
      this.error = false;
      this.errorMessage = '';

      try {
        const token = localStorage.getItem('token');
        let url = '/api/reports/profits?period=' + this.period;

        if (this.period === 'custom' && this.customStart && this.customEnd) {
          url += '&start_date=' + this.customStart + '&end_date=' + this.customEnd;
        }

        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + (token || ''),
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          }
        });

        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/login';
            return;
          }
          if (response.status === 403) {
            this.accessDenied = true;
            this.loading = false;
            return;
          }
          throw new Error('فشل تحميل البيانات (' + response.status + ')');
        }

        const result = await response.json();
        this.report = result;
        this.monthlyData = result.monthly_comparison || [];

        // Calculate max profit for chart scaling
        if (this.monthlyData.length > 0) {
          let maxVal = 0;
          this.monthlyData.forEach(d => {
            const val = parseFloat(d.profit) || 0;
            if (val > maxVal) maxVal = val;
          });
          this.maxMonthlyProfit = maxVal;
        }

        // Re-init lucide icons after Alpine renders
        this.$nextTick(() => {
          if (window.lucide) lucide.createIcons();
        });

      } catch (e) {
        this.error = true;
        this.errorMessage = e.message || 'حدث خطأ غير متوقع';
      } finally {
        this.loading = false;
      }
    },

    formatCurrency(value) {
      const num = parseFloat(value) || 0;
      return num.toLocaleString('ar-SA', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    },

    exportPDF() {
      window.print();
    },

    logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = '/login';
    },

    // ─── Mobile Sidebar ───
    toggleMobileSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      const btn = document.querySelector('.mobile-menu-btn');

      if (!sidebar) return;

      const isOpen = sidebar.classList.toggle('open');

      if (!overlay) {
        const newOverlay = document.createElement('div');
        newOverlay.className = 'sidebar-overlay';
        document.body.appendChild(newOverlay);
        newOverlay.addEventListener('click', () => this.closeMobileSidebar());
      }

      const finalOverlay = document.querySelector('.sidebar-overlay');
      if (isOpen) {
        finalOverlay.classList.add('visible');
        if (btn) btn.classList.add('active');
        document.body.style.overflow = 'hidden';
        this._escHandler = this._escHandler || this.handleEscKey.bind(this);
        document.addEventListener('keydown', this._escHandler);
      } else {
        finalOverlay.classList.remove('visible');
        if (btn) btn.classList.remove('active');
        document.body.style.overflow = '';
        if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
      }
    },

    handleEscKey(e) {
      if (e.key === 'Escape') {
        this.closeMobileSidebar();
      }
    },

    closeMobileSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      const btn = document.querySelector('.mobile-menu-btn');

      if (sidebar) sidebar.classList.remove('open');
      if (overlay) overlay.classList.remove('visible');
      if (btn) btn.classList.remove('active');
      document.body.style.overflow = '';
      if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
    },
  };
}

</script>
{% endblock %}
