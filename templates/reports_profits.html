<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/theme.css">
    <title>تقرير الأرباح - PharmaSUD</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans Arabic', system-ui, -apple-system, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 220px;
            background: var(--surface);
            min-height: 100vh;
            padding: 24px 0;
            border-left: 1px solid var(--border);
            position: fixed;
            right: 0;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar .logo {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .sidebar .logo h1 {
            font-size: 18px;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar .logo h1 svg { flex-shrink: 0; }
        .sidebar .logo p {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            margin-right: 30px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            border-right: 3px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--border);
            color: var(--text-primary);
            border-right-color: var(--primary-blue);
        }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .nav-item .badge {
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            margin-right: auto;
        }
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        .sidebar-footer .nav-item {
            border-right: none;
            color: var(--danger);
            padding: 12px 0;
        }
        .sidebar-footer .nav-item:hover {
            background: transparent;
            color: #FCA5A5;
        }

        /* ─── Mobile toggle ─── */
        .mobile-toggle {
            display: none;
            background: var(--border);
            border: none;
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-left: 12px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* ─── Main Content ─── */
        .main-content {
            margin-right: 220px;
            padding: 32px 40px;
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-right h2 { font-size: 22px; }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .header-left .date { direction: ltr; }
        .header-left .user-info { text-align: left; }
        .header-left .user-info .name { color: var(--text-primary); font-weight: 600; }
        .header-left .user-info .pharmacy { font-size: 12px; color: var(--text-secondary); }

        /* ─── Period Filters ─── */
        .period-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--primary-blue); color: var(--text-primary); }
        .filter-btn.active {
            background: var(--primary-blue);
            border-color: var(--primary-blue);
            color: white;
        }
        .custom-date-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            direction: ltr;
        }
        .custom-date-input:focus { outline: none; border-color: var(--primary-blue); }

        /* ─── Summary Cards ─── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .summary-card:hover { border-color: var(--text-secondary); }
        .summary-card .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .summary-card .card-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .summary-card .card-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .card-blue .card-icon { background: rgba(26,167,236,0.15); color: var(--primary-blue); }
        .card-green .card-icon { background: rgba(34,197,94,0.15); color: var(--success); }
        .card-yellow .card-icon { background: rgba(245,158,11,0.15); color: var(--warning); }
        .card-red .card-icon { background: rgba(239,68,68,0.15); color: var(--danger); }

        /* ─── Tables Section ─── */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .section-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .section-card .card-header h3 {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-card .card-header .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .section-card .card-body { padding: 16px 20px; }

        /* ─── Medicine Profit Table ─── */
        .profit-table {
            width: 100%;
            border-collapse: collapse;
        }
        .profit-table th {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
            padding: 8px 4px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            white-space: nowrap;
        }
        .profit-table td {
            font-size: 13px;
            padding: 10px 4px;
            border-bottom: 1px solid var(--surface);
        }
        .profit-table tr:last-child td { border-bottom: none; }
        .profit-table .rank {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }
        .rank-gold { background: rgba(245,158,11,0.2); color: var(--warning); }
        .rank-silver { background: rgba(148,163,184,0.2); color: var(--text-secondary); }
        .rank-bronze { background: rgba(205,127,50,0.2); color: #CD7F32; }
        .rank-default { background: rgba(26,167,236,0.15); color: var(--primary-blue); }

        .profit-positive { color: var(--success); }
        .profit-negative { color: var(--danger); }
        .margin-high { color: var(--success); font-weight: 600; }
        .margin-mid { color: var(--warning); font-weight: 600; }
        .margin-low { color: var(--text-secondary); }

        /* ─── Monthly Chart ─── */
        .monthly-chart-container {
            margin-bottom: 28px;
        }
        .monthly-chart {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            height: 200px;
            padding: 20px 0 0;
        }
        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }
        .bar-value {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
            white-space: nowrap;
        }
        .bar {
            width: 100%;
            max-width: 52px;
            min-height: 4px;
            border-radius: 4px 4px 0 0;
            background: linear-gradient(180deg, var(--success) 0%, #16A34A 100%);
            transition: height 0.5s ease;
        }
        .bar-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }

        /* ─── Loading & Error ─── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-secondary); font-size: 14px; }

        .error-state {
            text-align: center;
            padding: 80px 20px;
        }
        .error-state .err-icon { font-size: 48px; margin-bottom: 12px; }
        .error-state .err-msg { color: var(--danger); font-size: 16px; margin-bottom: 8px; }
        .error-state .err-detail { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
        .retry-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: #1AA7EC; }

        .no-data { text-align: center; padding: 30px 20px; color: var(--text-secondary); font-size: 14px; }

        /* ─── Access Denied ─── */
        .access-denied {
            text-align: center;
            padding: 80px 20px;
        }
        .access-denied .ad-icon { font-size: 64px; margin-bottom: 16px; }
        .access-denied .ad-title { font-size: 24px; color: var(--danger); font-weight: 700; margin-bottom: 8px; }
        .access-denied .ad-desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .access-denied .back-btn {
            display: inline-block;
            background: var(--border);
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .access-denied .back-btn:hover { background: var(--text-secondary); }

        /* ─── Responsive ─── */
        @media (max-width: 1200px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 992px) {
            .two-col { grid-template-columns: 1fr; }
            .main-content { padding: 24px 20px; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.mobile-open { display: flex; }
            .sidebar-overlay.mobile-open { display: block; }
            .main-content { margin-right: 0; padding: 16px; }
            .mobile-toggle { display: flex; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header-right h2 { font-size: 17px; }
            .header-left { gap: 8px; }
            .header-left .date { display: none; }
            .summary-card { padding: 14px; }
            .summary-card .card-value { font-size: 18px; }
            .monthly-chart { height: 140px; gap: 8px; }
            .bar { max-width: 36px; }
            .period-filters { gap: 6px; }
            .filter-btn { padding: 6px 12px; font-size: 12px; }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .summary-card .card-value { font-size: 16px; }
        }
    </style>
</head>
<body>

<div x-data="profitReportApp()" x-init="init()">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay"
         :class="{ 'mobile-open': sidebarOpen }"
         @click="sidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside class="sidebar" :class="{ 'mobile-open': sidebarOpen }">
        <div class="logo">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                PharmaSUD
            </h1>
            <p>نظام إدارة الصيدلية</p>
        </div>

        <a href="/dashboard" class="nav-item">
            <span class="icon">📊</span> لوحة التحكم
        </a>
        <a href="/medicines" class="nav-item">
            <span class="icon">💊</span> الأدوية
        </a>
        <a href="/inventory" class="nav-item">
            <span class="icon">📦</span> المخزون
        </a>
        <a href="/batch-receive" class="nav-item">
            <span class="icon">🚚</span> استلام دفعة
        </a>
        <a href="/pos" class="nav-item">
            <span class="icon">🛒</span> نقطة البيع
        </a>
        <a href="/sales-history" class="nav-item">
            <span class="icon">📋</span> سجل المبيعات
        </a>
        <a href="/settings" class="nav-item">
            <span class="icon">⚙️</span> الإعدادات
        </a>

        <div class="sidebar-footer">
            <a href="#" @click.prevent="logout()" class="nav-item">
                <span class="icon">🚪</span> تسجيل الخروج
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- ─── Access Denied (non-admin) ─── -->
        <template x-if="accessDenied && !loading">
            <div class="access-denied">
                <div class="ad-icon">🚫</div>
                <div class="ad-title">غير مصرح بالوصول</div>
                <div class="ad-desc">تقرير الأرباح متاح للمدير فقط. يرجى تسجيل الدخول بحساب مدير.</div>
                <a href="/dashboard" class="back-btn">← العودة للوحة التحكم</a>
            </div>
        </template>

        <!-- ─── Main Report (admin only) ─── -->
        <template x-if="!accessDenied">
            <div>
                <!-- Header -->
                <div class="dashboard-header">
                    <div class="header-right">
                        <button class="mobile-toggle" @click="sidebarOpen = !sidebarOpen" aria-label="القائمة">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="3" y1="6" x2="21" y2="6"/>
                                <line x1="3" y1="12" x2="21" y2="12"/>
                                <line x1="3" y1="18" x2="21" y2="18"/>
                            </svg>
                        </button>
                        <h2>📈 تقرير الأرباح</h2>
                    </div>
                    <div class="header-left">
                        <span class="date" x-text="currentDate"></span>
                        <div class="user-info">
                            <div class="name" x-text="userName || 'مستخدم'"></div>
                            <div class="pharmacy" x-text="pharmacyName || 'الصيدلية'"></div>
                        </div>
                    </div>
                </div>

                <!-- Period Filters -->
                <div class="period-filters">
                    <button class="filter-btn"
                            :class="{ 'active': period === 'today' }"
                            @click="setPeriod('today')">📅 اليوم</button>
                    <button class="filter-btn"
                            :class="{ 'active': period === 'week' }"
                            @click="setPeriod('week')">📅 هذا الأسبوع</button>
                    <button class="filter-btn"
                            :class="{ 'active': period === 'month' }"
                            @click="setPeriod('month')">📅 هذا الشهر</button>
                    <button class="filter-btn"
                            :class="{ 'active': period === 'custom' }"
                            @click="toggleCustom">📅 مخصص</button>
                    <template x-if="period === 'custom'">
                        <span>
                            <input type="date" class="custom-date-input" x-model="customStart" @change="loadReport()">
                            <span style="color:var(--text-secondary);margin:0 4px;">إلى</span>
                            <input type="date" class="custom-date-input" x-model="customEnd" @change="loadReport()">
                        </span>
                    </template>
                </div>

                <!-- Loading State -->
                <template x-if="loading">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <div class="loading-text">جاري تحميل تقرير الأرباح...</div>
                    </div>
                </template>

                <!-- Error State -->
                <template x-if="error && !loading">
                    <div class="error-state">
                        <div class="err-icon">⚠️</div>
                        <div class="err-msg">تعذر تحميل البيانات</div>
                        <div class="err-detail" x-text="errorMessage"></div>
                        <button class="retry-btn" @click="loadReport()">إعادة المحاولة</button>
                    </div>
                </template>

                <!-- Report Content -->
                <template x-if="!loading && !error && report">
                    <div>
                        <!-- Summary Cards -->
                        <div class="cards-grid">
                            <div class="summary-card card-blue">
                                <div class="card-icon">💰</div>
                                <div class="card-label">إجمالي الإيرادات</div>
                                <div class="card-value" x-text="formatCurrency(report.summary.total_revenue)"></div>
                            </div>
                            <div class="summary-card card-red">
                                <div class="card-icon">💸</div>
                                <div class="card-label">إجمالي التكلفة</div>
                                <div class="card-value" x-text="formatCurrency(report.summary.total_cost)"></div>
                            </div>
                            <div class="summary-card card-green">
                                <div class="card-icon">📈</div>
                                <div class="card-label">صافي الربح</div>
                                <div class="card-value" x-text="formatCurrency(report.summary.net_profit)"></div>
                            </div>
                            <div class="summary-card card-yellow">
                                <div class="card-icon">🎯</div>
                                <div class="card-label">هامش الربح</div>
                                <div class="card-value" x-text="report.summary.profit_margin + '%'"></div>
                            </div>
                        </div>

                        <!-- Two Column: Top Profitable + Bottom Profitable -->
                        <div class="two-col">
                            <!-- Top Profitable Medicines -->
                            <div class="section-card">
                                <div class="card-header">
                                    <h3>🏆 أعلى الأدوية ربحية</h3>
                                    <span class="subtitle">الأكثر تحقيقاً للربح</span>
                                </div>
                                <div class="card-body">
                                    <template x-if="topProfitable.length > 0">
                                        <table class="profit-table">
                                            <thead>
                                                <tr>
                                                    <th>#</th>
                                                    <th>اسم الدواء</th>
                                                    <th>الكمية</th>
                                                    <th>الربح</th>
                                                    <th>الهامش</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="(med, index) in topProfitable" :key="index">
                                                    <tr>
                                                        <td>
                                                            <span class="rank"
                                                                  :class="index === 0 ? 'rank-gold' : (index === 1 ? 'rank-silver' : (index === 2 ? 'rank-bronze' : 'rank-default'))"
                                                                  x-text="index + 1"></span>
                                                        </td>
                                                        <td x-text="med.trade_name"></td>
                                                        <td x-text="med.quantity_sold"></td>
                                                        <td class="profit-positive" x-text="formatCurrency(med.profit)"></td>
                                                        <td>
                                                            <span :class="med.margin_percentage >= 30 ? 'margin-high' : (med.margin_percentage >= 15 ? 'margin-mid' : 'margin-low')"
                                                                  x-text="med.margin_percentage + '%'"></span>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </template>
                                    <template x-if="topProfitable.length === 0">
                                        <div class="no-data">لا توجد بيانات أرباح للفترة المحددة</div>
                                    </template>
                                </div>
                            </div>

                            <!-- Bottom Profitable Medicines -->
                            <div class="section-card">
                                <div class="card-header">
                                    <h3>🐢 أقل الأدوية ربحية</h3>
                                    <span class="subtitle">الأقل تحقيقاً للربح</span>
                                </div>
                                <div class="card-body">
                                    <template x-if="bottomProfitable.length > 0">
                                        <table class="profit-table">
                                            <thead>
                                                <tr>
                                                    <th>#</th>
                                                    <th>اسم الدواء</th>
                                                    <th>الكمية</th>
                                                    <th>الربح</th>
                                                    <th>الهامش</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="(med, index) in bottomProfitable" :key="index">
                                                    <tr>
                                                        <td>
                                                            <span class="rank rank-default" x-text="index + 1"></span>
                                                        </td>
                                                        <td x-text="med.trade_name"></td>
                                                        <td x-text="med.quantity_sold"></td>
                                                        <td :class="med.profit >= 0 ? 'profit-positive' : 'profit-negative'"
                                                            x-text="formatCurrency(med.profit)"></td>
                                                        <td>
                                                            <span :class="med.margin_percentage >= 30 ? 'margin-high' : (med.margin_percentage >= 15 ? 'margin-mid' : 'margin-low')"
                                                                  x-text="med.margin_percentage + '%'"></span>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </template>
                                    <template x-if="bottomProfitable.length === 0">
                                        <div class="no-data">لا توجد بيانات أرباح للفترة المحددة</div>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <!-- Monthly Comparison Chart (last 6 months) -->
                        <div class="section-card monthly-chart-container">
                            <div class="card-header">
                                <h3>📊 مقارنة الأرباح الشهرية</h3>
                                <span class="subtitle">آخر 6 أشهر</span>
                            </div>
                            <div class="card-body">
                                <template x-if="monthlyData.length > 0">
                                    <div class="monthly-chart">
                                        <template x-for="(m, idx) in monthlyData" :key="idx">
                                            <div class="bar-wrapper">
                                                <div class="bar-value" x-text="formatCurrency(m.profit)"></div>
                                                <div class="bar"
                                                     :data-value="m.profit"
                                                     :data-max="maxMonthlyProfit"
                                                     :style="'height: ' + Math.max((parseFloat(m.profit) / Math.max(maxMonthlyProfit, 1)) * 100, 4) + '%'">
                                                </div>
                                                <div class="bar-label" x-text="m.month_name"></div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="monthlyData.length === 0">
                                    <div class="no-data">لا توجد بيانات أرباح شهرية متاحة</div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </main>
</div>

<script>
function profitReportApp() {
    return {
        // ── State ──
        loading: true,
        error: false,
        errorMessage: '',
        sidebarOpen: false,
        accessDenied: false,
        currentDate: '',
        userName: '',
        pharmacyName: '',
        period: 'month',
        customStart: '',
        customEnd: '',
        report: null,
        monthlyData: [],
        maxMonthlyProfit: 0,

        // ── Computed ──
        get topProfitable() {
            if (!this.report || !this.report.by_medicine) return [];
            return [...this.report.by_medicine].sort((a, b) => b.profit - a.profit).slice(0, 10);
        },

        get bottomProfitable() {
            if (!this.report || !this.report.by_medicine) return [];
            return [...this.report.by_medicine].sort((a, b) => a.profit - b.profit).slice(0, 10);
        },

        // ── Init ──
        init() {
            this.formatDate();
            this.checkAccess();
        },

        checkAccess() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }
                const payload = JSON.parse(atob(token.split('.')[1]));
                const role = payload.role || '';
                this.userName = payload.username || payload.sub || 'مستخدم';
                this.pharmacyName = payload.pharmacy_name || 'صيدلية الزاريات';

                if (role !== 'admin') {
                    this.accessDenied = true;
                    this.loading = false;
                    return;
                }

                this.loadReport();
            } catch (e) {
                console.error('Auth check failed:', e);
                window.location.href = '/login';
            }
        },

        formatDate() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            this.currentDate = now.toLocaleDateString('ar-SA', options);
        },

        setPeriod(p) {
            this.period = p;
            if (p !== 'custom') {
                this.customStart = '';
                this.customEnd = '';
            }
            this.loadReport();
        },

        toggleCustom() {
            if (this.period === 'custom') {
                this.period = 'month';
                this.loadReport();
            } else {
                this.period = 'custom';
                const now = new Date();
                const monthAgo = new Date(now);
                monthAgo.setDate(monthAgo.getDate() - 30);
                this.customStart = monthAgo.toISOString().slice(0, 10);
                this.customEnd = now.toISOString().slice(0, 10);
                this.loadReport();
            }
        },

        async loadReport() {
            this.loading = true;
            this.error = false;
            this.errorMessage = '';

            try {
                const token = localStorage.getItem('token');
                let url = '/api/reports/profits?period=' + this.period;

                if (this.period === 'custom' && this.customStart && this.customEnd) {
                    url += '&start_date=' + this.customStart + '&end_date=' + this.customEnd;
                }

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + (token || ''),
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/login';
                        return;
                    }
                    if (response.status === 403) {
                        this.accessDenied = true;
                        this.loading = false;
                        return;
                    }
                    throw new Error('فشل تحميل البيانات (' + response.status + ')');
                }

                const result = await response.json();
                this.report = result;
                this.monthlyData = result.monthly_comparison || [];

                // Calculate max profit for chart scaling
                if (this.monthlyData.length > 0) {
                    let maxVal = 0;
                    this.monthlyData.forEach(d => {
                        const val = parseFloat(d.profit) || 0;
                        if (val > maxVal) maxVal = val;
                    });
                    this.maxMonthlyProfit = maxVal;
                }

            } catch (e) {
                this.error = true;
                this.errorMessage = e.message || 'حدث خطأ غير متوقع';
            } finally {
                this.loading = false;
            }
        },

        formatCurrency(value) {
            const num = parseFloat(value) || 0;
            return num.toLocaleString('ar-SA', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }) + ' ج.س';
        },

        logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = '/login';
        }
    };
}
</script>

</body>
