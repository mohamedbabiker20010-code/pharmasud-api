<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <title>تقرير الأرباح - PharmaSUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Dark Mode ─── */
    body.dark-mode body,
    body.dark-mode {
      background: #0F172A;
      color: #E2E8F0;
    }
    body.dark-mode .sidebar {
      background: #1E293B;
      border-color: #334155;
    }
    body.dark-mode .sidebar .nav-item {
      color: #94A3B8;
    }
    body.dark-mode .sidebar .nav-item:hover {
      background: #334155;
      color: #E2E8F0;
    }
    body.dark-mode .sidebar .nav-item.active {
      background: #1AA7EC;
      color: #fff;
    }
    body.dark-mode .sidebar .user-card {
      border-color: #334155;
    }
    body.dark-mode .sidebar .user-role {
      color: #64748B;
    }
    body.dark-mode .topbar {
      background: #1E293B;
      border-color: #334155;
    }
    body.dark-mode .topbar .page-info h1 {
      color: #F1F5F9;
    }
    body.dark-mode .topbar .page-info .subtitle {
      color: #94A3B8;
    }
    body.dark-mode .topbar .icon-btn {
      border-color: #334155;
      color: #94A3B8;
    }
    body.dark-mode .topbar .icon-btn:hover {
      background: #334155;
    }
    body.dark-mode .topbar .lang-toggle {
      border-color: #334155;
    }
    body.dark-mode .topbar .lang-toggle span {
      color: #94A3B8;
    }
    body.dark-mode .topbar .lang-toggle span.active {
      background: #1AA7EC;
      color: #fff;
    }
        body.dark-mode .notif-dropdown { background: #1E293B; border-color: #334155; }
    body.dark-mode .notif-header { color: #E2E8F0; border-color: #334155; }
    body.dark-mode .notif-item { border-color: #1E293B; }
    body.dark-mode .notif-item:hover { background: #111C2E; }
    body.dark-mode .notif-title { color: #F1F5F9; }
    body.dark-mode .notif-desc { color: #94A3B8; }
    body.dark-mode .notif-time { color: #64748B; }
    body.dark-mode .notif-empty { color: #64748B; }
    body.dark-mode .main-content {
      background: #0F172A;
    }
    body.dark-mode .filter-btn {
      background: #1E293B;
      border-color: #334155;
      color: #94A3B8;
    }
    body.dark-mode .filter-btn:hover {
      border-color: #475569;
      color: #E2E8F0;
      background: #334155;
    }
    body.dark-mode .filter-btn.active {
      background: #1AA7EC;
      border-color: #1AA7EC;
      color: #fff;
    }
    body.dark-mode .filter-date {
      background: #1E293B;
      border-color: #334155;
      color: #E2E8F0;
    }
    body.dark-mode .filter-date:focus {
      border-color: #1AA7EC;
    }
    body.dark-mode .metric-card {
      background: #1E293B;
      border-color: #334155;
    }
    body.dark-mode .metric-card .metric-label {
      color: #94A3B8;
    }
    body.dark-mode .metric-card .metric-value {
      color: #F1F5F9;
    }
    body.dark-mode .metric-card .metric-value .unit {
      color: #94A3B8;
    }
    body.dark-mode .panel {
      background: #1E293B;
      border-color: #334155;
    }
    body.dark-mode .panel .panel-title {
      color: #F1F5F9;
    }
    body.dark-mode .panel .panel-subtitle {
      color: #94A3B8;
    }
    body.dark-mode .ranked-item .r-name {
      color: #E2E8F0;
    }
    body.dark-mode .ranked-item .r-meta {
      color: #64748B;
    }
    body.dark-mode .ranked-item .r-value {
      color: #1AA7EC;
    }
    body.dark-mode .table th {
      color: #64748B;
      border-bottom-color: #334155;
    }
    body.dark-mode .table td {
      color: #E2E8F0;
      border-bottom-color: #1E293B;
    }
    body.dark-mode .table tr:hover td {
      background: #334155;
    }
    body.dark-mode .no-data {
      color: #64748B;
    }
    body.dark-mode .loading-state {
      color: #94A3B8;
    }
    body.dark-mode .error-state .err-msg {
      color: #FCA5A5;
    }
    body.dark-mode .error-state .err-detail {
      color: #94A3B8;
    }
    body.dark-mode .access-denied .ad-title {
      color: #FCA5A5;
    }
    body.dark-mode .access-denied .ad-desc {
      color: #94A3B8;
    }
    body.dark-mode .access-denied .back-btn {
      background: #334155;
      color: #E2E8F0;
    }
    body.dark-mode .bar {
      background: linear-gradient(180deg, #16A34A 0%, #166534 100%);
    }
    body.dark-mode .bar-label,
    body.dark-mode .bar-value {
      color: #94A3B8;
    }
    body.dark-mode .custom-dates span {
      color: #64748B;
    }

    /* ─── Layout ─── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 248px;
      background: #fff;
      border-left: 1px solid #EEF2F6;
      display: flex;
      flex-direction: column;
      padding: 22px 16px;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
    }
    .sidebar .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 8px 22px;
    }
    .sidebar .brand .icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: #1AA7EC;
      position: relative;
      flex-shrink: 0;
    }
    .sidebar .brand .icon::before,
    .sidebar .brand .icon::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 3px;
    }
    .sidebar .brand .icon::before {
      width: 18px;
      height: 5.5px;
    }
    .sidebar .brand .icon::after {
      width: 5.5px;
      height: 18px;
    }
    .sidebar .brand .name {
      font: 700 18px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .sidebar .brand .name span {
      color: #1AA7EC;
    }
    .sidebar .nav-section {
      font: 600 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.1em;
      color: #CBD5E1;
      padding: 14px 10px 10px;
    }
    .sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      color: #475569;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 4px;
      transition: all 0.2s ease;
    }
    .sidebar .nav-item:hover {
      background: #F8FAFC;
      color: #0F172A;
    }
    .sidebar .nav-item.active {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 8px 18px -8px rgba(26, 167, 236, 0.55);
    }
    .sidebar .nav-item svg {
      width: 19px;
      height: 19px;
      flex-shrink: 0;
    }
    .sidebar .nav-item .badge {
      margin-right: auto;
      background: #FEF2F2;
      color: #DC2626;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .sidebar .user-card {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px;
      border: 1px solid #EEF2F6;
      border-radius: 13px;
      margin-top: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .sidebar .user-card:hover {
      background: #F8FAFC;
    }
    .sidebar .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1AA7EC;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sidebar .user-info {
      min-width: 0;
      flex: 1;
    }
    .sidebar .user-name {
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .user-role {
      font-size: 11.5px;
      color: #94A3B8;
    }
    .sidebar .user-card svg {
      width: 16px;
      height: 16px;
      color: #CBD5E1;
      flex-shrink: 0;
    }

    /* ─── Topbar ─── */
    .topbar {
      height: 70px;
      background: #fff;
      border-bottom: 1px solid #EEF2F6;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 18px;
      position: fixed;
      top: 0;
      right: 248px;
      left: 0;
      z-index: 90;
    }
    .topbar .page-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar .page-info h1 {
      margin: 0;
      font: 700 20px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .topbar .page-info .subtitle {
      margin: 0;
      color: #64748B;
      font-size: 13px;
      margin-top: 3px;
    }
    .topbar .topbar-actions {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar .date-range-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 16px;
      border-radius: 11px;
      background: #F6F8FA;
      border: 1px solid #EEF2F6;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .topbar .date-range-btn:hover {
      background: #F8FAFC;
      border-color: #CBD5E1;
    }
    .topbar .date-range-btn svg {
      width: 17px;
      height: 17px;
      color: #64748B;
    }
    .topbar .export-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 18px;
      border-radius: 11px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
      transition: all 0.2s ease;
    }
    .topbar .export-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .topbar .export-btn svg {
      width: 17px;
      height: 17px;
    }
    .topbar .lang-toggle {
      display: flex;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      overflow: hidden;
      font-size: 13px;
      font-weight: 600;
    }
    .topbar .lang-toggle span {
      padding: 7px 12px;
      color: #64748B;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .topbar .lang-toggle span.active {
      background: #1AA7EC;
      color: #fff;
    }
    .topbar .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      border: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    .topbar .icon-btn:hover {
      background: #F8FAFC;
    }
    .topbar .icon-btn svg {
      width: 18px;
      height: 18px;
    }
    .topbar .icon-btn .dot {
      position: absolute;
      top: 9px;
      left: 11px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #DC2626;
      border: 2px solid #fff;
    }

    /* ─── Main Content ─── */
    .main-content {
      margin-right: 248px;
      padding: calc(70px + 28px) 28px 28px;
      min-height: 100vh;
    }

    /* ─── Filter Bar ─── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #64748B;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      border-color: #CBD5E1;
      color: #0F172A;
      background: #F8FAFC;
    }
    .filter-btn.active {
      background: #1AA7EC;
      border-color: #1AA7EC;
      color: #fff;
      box-shadow: 0 6px 14px -6px rgba(26, 167, 236, 0.45);
    }
    .filter-btn svg {
      width: 15px;
      height: 15px;
    }
    .filter-date {
      height: 38px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #0F172A;
      font-size: 13px;
      font-family: inherit;
      direction: ltr;
      transition: all 0.2s ease;
    }
    .filter-date:focus {
      outline: none;
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.12);
    }
    .filter-date::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }
    .custom-dates {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .custom-dates span {
      font-size: 12px;
      color: #94A3B8;
      font-weight: 500;
    }

    /* ─── Metric Cards ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
      transition: box-shadow 0.2s ease;
    }
    .metric-card:hover {
      box-shadow: 0 4px 12px -2px rgba(15,23,42,0.06);
    }
    .metric-card .metric-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .metric-card .metric-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-card .metric-icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .metric-card .metric-icon.red { background: #FEE2E2; color: #DC2626; }
    .metric-card .metric-icon.green { background: #ECFDF5; color: #16A34A; }
    .metric-card .metric-icon.yellow { background: #FEF3C7; color: #D97706; }
    .metric-card .metric-icon svg {
      width: 20px;
      height: 20px;
    }
    .metric-card .metric-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .metric-card .metric-badge.success {
      color: #16A34A;
      background: #ECFDF5;
    }
    .metric-card .metric-badge.danger {
      color: #DC2626;
      background: #FEF2F2;
    }
    .metric-card .metric-badge.warning {
      color: #D97706;
      background: #FFFbeb;
    }
    .metric-card .metric-badge.info {
      color: #0284C7;
      background: #E0F2FE;
    }
    .metric-card .metric-label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .metric-card .metric-value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .metric-card .metric-value .unit {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 600;
    }

    /* ─── Panel ─── */
    .panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
    }
    .panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }
    .panel .panel-action {
      font-size: 13px;
      font-weight: 600;
      color: #1AA7EC;
      cursor: pointer;
    }

    /* ─── Two Column Layout ─── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    /* ─── Ranked List (for top/bottom medicines) ─── */
    .ranked-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ranked-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ranked-item .rank {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ranked-item .rank.r1 { background: #FEF3C7; color: #D97706; }
    .ranked-item .rank.r2 { background: #F1F5F9; color: #64748B; }
    .ranked-item .rank.r3 { background: #FFFbeb; color: #CD7F32; }
    .ranked-item .rank.rn { background: #DBEAFE; color: #1AA7EC; }
    .ranked-item .r-info {
      flex: 1;
      min-width: 0;
    }
    .ranked-item .r-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ranked-item .r-meta {
      font-size: 11px;
      color: #94A3B8;
    }
    .ranked-item .r-value {
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ranked-item .r-value.positive { color: #16A34A; }
    .ranked-item .r-value.negative { color: #DC2626; }
    .ranked-item .r-margin {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .ranked-item .r-margin.high { color: #16A34A; background: #ECFDF5; }
    .ranked-item .r-margin.mid { color: #D97706; background: #FFFbeb; }
    .ranked-item .r-margin.low { color: #64748B; background: #F1F5F9; }

    /* ─── Monthly Bar Chart Panel ─── */
    .chart-panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 22px;
    }
    .chart-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .chart-panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .chart-panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }
    .monthly-chart {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      height: 200px;
      padding: 20px 0 0;
    }
    .bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-value {
      font-size: 11px;
      color: #64748B;
      margin-bottom: 6px;
      font-weight: 700;
      white-space: nowrap;
    }
    .bar {
      width: 100%;
      max-width: 52px;
      min-height: 4px;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, #16A34A 0%, #22C55E 100%);
      transition: height 0.5s ease;
    }
    .bar-label {
      font-size: 11px;
      color: #94A3B8;
      margin-top: 8px;
      text-align: center;
    }

    /* ─── Table (for profit detail view) ─── */
    .table-container {
      overflow-x: auto;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .table th {
      text-align: right;
      padding: 12px 14px;
      font: 600 11px 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      text-transform: uppercase;
      border-bottom: 1px solid #F1F5F9;
      white-space: nowrap;
    }
    .table td {
      padding: 13px 14px;
      border-bottom: 1px solid #F6F8FA;
      color: #0F172A;
      vertical-align: middle;
    }
    .table tr:hover td {
      background: #F8FAFC;
    }
    .table tr:last-child td {
      border-bottom: none;
    }
    .rank-num {
      display: inline-flex;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .rank-1 { background: #FEF3C7; color: #D97706; }
    .rank-2 { background: #F1F5F9; color: #64748B; }
    .rank-3 { background: #FFFbeb; color: #CD7F32; }
    .rank-n { background: #DBEAFE; color: #1AA7EC; }

    .profit-positive { color: #16A34A; }
    .profit-negative { color: #DC2626; }
    .margin-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .margin-badge.high { color: #16A34A; background: #ECFDF5; }
    .margin-badge.mid { color: #D97706; background: #FFFbeb; }
    .margin-badge.low { color: #64748B; background: #F1F5F9; }

    /* ─── Loading & Error ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
    }
    .error-state .err-icon {
      width: 48px;
      height: 48px;
      color: #DC2626;
    }
    .error-state .err-msg {
      color: #DC2626;
      font-size: 16px;
      font-weight: 600;
    }
    .error-state .err-detail {
      color: #64748B;
      font-size: 13px;
    }
    .retry-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 20px;
      border-radius: 11px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
      transition: all 0.2s ease;
    }
    .retry-btn:hover {
      filter: brightness(1.05);
    }
    .no-data {
      text-align: center;
      padding: 30px 20px;
      color: #94A3B8;
      font-size: 14px;
    }

    /* ─── Access Denied ─── */
    .access-denied {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      text-align: center;
    }
    .access-denied .ad-icon {
      width: 56px;
      height: 56px;
      color: #DC2626;
    }
    .access-denied .ad-title {
      font-size: 22px;
      color: #DC2626;
      font-weight: 700;
    }
    .access-denied .ad-desc {
      color: #64748B;
      font-size: 14px;
      max-width: 360px;
    }
    .access-denied .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 20px;
      border-radius: 11px;
      background: #F1F5F9;
      color: #0F172A;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .access-denied .back-btn:hover {
      background: #E2E8F0;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 1024px) {
      .topbar { right: 0; }
      .main-content { margin-right: 0; }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .topbar { padding: 0 16px; }
      .topbar .page-info h1 { font-size: 16px; }
      .topbar .date-range-btn span { display: none; }
      .main-content { padding: calc(70px + 16px) 16px 16px; }
      .filter-bar { gap: 6px; }
      .filter-btn { padding: 0 10px; font-size: 12px; height: 34px; }
      .monthly-chart { height: 140px; gap: 8px; }
      .bar { max-width: 36px; }
    }
    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: 1fr; }
      .metric-card .metric-value { font-size: 20px; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    [x-cloak] { display: none !important; }
      .notif-dropdown {
      position: absolute; top: 64px; left: 0; width: 380px; max-height: 460px;
      background: #fff; border: 1px solid #E2E8F0; border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12); z-index: 200; overflow: hidden;
    }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #E2E8F0;
      font-weight: 700; font-size: 14px; color: #0F172A;
    }
    .notif-header a { font-size: 12px; color: #1AA7EC; text-decoration: none; }
    .notif-list { max-height: 340px; overflow-y: auto; }
    .notif-item {
      display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #F1F5F9;
      cursor: pointer; transition: background 0.15s;
    }
    .notif-item:hover { background: #F6F8FA; }
    .notif-item .notif-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .notif-icon.expiry { background: #FEF3C7; color: #D97706; }
    .notif-icon.stock { background: #FEE2E2; color: #DC2626; }
    .notif-icon.system { background: #DBEAFE; color: #2563EB; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 13px; font-weight: 600; color: #0F172A; }
    .notif-desc { font-size: 12px; color: #64748B; margin-top: 2px; }
    .notif-time { font-size: 11px; color: #94A3B8; margin-top: 3px; }
    .notif-empty { padding: 28px 16px; text-align: center; color: #94A3B8; font-size: 13px; }

  </style>
</head>
<body class="show">

<div x-data="profitReportApp()" x-init="init()" class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="icon"></div>
      <div class="name">Pharma<span>SUD</span></div>
    </div>

    <div class="nav-section">MENU</div>
    <a href="/dashboard" class="nav-item">

    </a>

    </a>
    <a href="/medicines" class="nav-item">

    <a href="/inventory" class="nav-item">
      <i data-lucide="package"></i>
      <span>المخزون</span>
    </a>
    <a href="/batch-receive" class="nav-item">
      <i data-lucide="truck"></i>

    </a>
    <a href="/sales-history" class="nav-item">
      <i data-lucide="receipt"></i>

    </a>
    <a href="/reports-profits" class="nav-item active" id="nav-reports">
      <i data-lucide="chart-line"></i>

    </a>

    </a>

    <div class="user-card" @click="logout()">

      <div class="user-info">

  <!-- Topbar -->
  <header class="topbar">
    <!-- Mobile Menu Button - FIRST (RTL: rightmost) -->
    <button class="mobile-menu-btn" @click="toggleMobileSidebar()" aria-label="فتح القائمة" title="القائمة">

    </button>
    <div class="page-info">

      <div class="access-denied">

<script>
document.addEventListener('DOMContentLoaded', () => {
  if (window.lucide) lucide.createIcons();
});

function profitReportApp() {
  return {
    // ── State ──
    loading: true,
    error: false,
    errorMessage: '',
    sidebarOpen: false,
    accessDenied: false,
    currentDate: '',
    userName: '',
    pharmacyName: '',
    isAdmin: false,
    userInitials: '',
    period: 'month',
    customStart: '',
    customEnd: '',
    report: null,
    monthlyData: [],
    maxMonthlyProfit: 0,
    isDark: false,
    lang: 'ar',

    // ── Computed ──
    get topProfitable() {
      if (!this.report || !this.report.by_medicine) return [];
      return [...this.report.by_medicine].sort((a, b) => b.profit - a.profit).slice(0, 10);
    },

    get bottomProfitable() {
      if (!this.report || !this.report.by_medicine) return [];
      return [...this.report.by_medicine].sort((a, b) => a.profit - b.profit).slice(0, 10);
    },

    // ── Init ──
    init() {
      this.formatDate();
      this.checkAccess();
      this.initTheme();
    },

    checkAccess() {
      try {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.href = '/login';
          return;
        }
        const payload = JSON.parse(atob(token.split('.')[1]));
        const role = payload.role || '';
        this.userName = payload.username || payload.sub || 'مستخدم';
        this.pharmacyName = payload.pharmacy_name || 'صيدلية الزاريات';
        this.isAdmin = role === 'admin';
        this.userInitials = this.userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

        if (role !== 'admin') {
          this.accessDenied = true;
          this.loading = false;
          this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
          return;
        }

        this.loadReport();
      } catch (e) {
        console.error('Auth check failed:', e);
        window.location.href = '/login';
      }
    },

    formatDate() {
      const now = new Date();
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      };
      this.currentDate = now.toLocaleDateString('ar-SA', options);
    },

    // ── Dark Mode ──
    initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        this.isDark = true;
        document.body.classList.add('dark-mode');
      }
    },

    toggleTheme() {
      this.isDark = !this.isDark;
      if (this.isDark) {
        document.body.classList.add('dark-mode');
        localStorage.setItem('darkMode', true);
      } else {
        document.body.classList.remove('dark-mode');
        localStorage.setItem('darkMode', false);
      }
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    },

    // ── Language Toggle ──
    setLang(l) {
      this.lang = l;
      if (l === 'en') {
        document.documentElement.setAttribute('lang', 'en');
        document.documentElement.setAttribute('dir', 'ltr');
        document.documentElement.classList.remove('rtl');
      } else {
        document.documentElement.setAttribute('lang', 'ar');
        document.documentElement.setAttribute('dir', 'rtl');
      }
      this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
    },

    // ── Period Filters ──
    setPeriod(p) {
      this.period = p;
      if (p !== 'custom') {
        this.customStart = '';
        this.customEnd = '';
      }
      this.loadReport();
    },

    toggleCustom() {
      if (this.period === 'custom') {
        this.period = 'month';
        this.loadReport();
      } else {
        this.period = 'custom';
        const now = new Date();
        const monthAgo = new Date(now);
        monthAgo.setDate(monthAgo.getDate() - 30);
        this.customStart = monthAgo.toISOString().slice(0, 10);
        this.customEnd = now.toISOString().slice(0, 10);
        this.loadReport();
      }
    },

    toggleCustomPeriod() {
      if (this.period !== 'custom') {
        this.period = 'custom';
        const now = new Date();
        const monthAgo = new Date(now);
        monthAgo.setDate(monthAgo.getDate() - 30);
        this.customStart = monthAgo.toISOString().slice(0, 10);
        this.customEnd = now.toISOString().slice(0, 10);
      } else {
        this.period = 'month';
        this.customStart = '';
        this.customEnd = '';
      }
    },

    getPeriodLabel() {
      const labels = {
        'today': 'اليوم',
        'week': 'هذا الأسبوع',
        'month': 'هذا الشهر',
        'custom': 'فترة مخصصة'
      };
      return labels[this.period] || 'اختر الفترة';
    },

    // ── API ──
    async loadReport() {
      this.loading = true;
      this.error = false;
      this.errorMessage = '';

      try {
        const token = localStorage.getItem('token');
        let url = '/api/reports/profits?period=' + this.period;

        if (this.period === 'custom' && this.customStart && this.customEnd) {
          url += '&start_date=' + this.customStart + '&end_date=' + this.customEnd;
        }

        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + (token || ''),
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          }
        });

        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/login';
            return;
          }
          if (response.status === 403) {
            this.accessDenied = true;
            this.loading = false;
            return;
          }
          throw new Error('فشل تحميل البيانات (' + response.status + ')');
        }

        const result = await response.json();
        this.report = result;
        this.monthlyData = result.monthly_comparison || [];

        // Calculate max profit for chart scaling
        if (this.monthlyData.length > 0) {
          let maxVal = 0;
          this.monthlyData.forEach(d => {
            const val = parseFloat(d.profit) || 0;
            if (val > maxVal) maxVal = val;
          });
          this.maxMonthlyProfit = maxVal;
        }

        // Re-init lucide icons after Alpine renders
        this.$nextTick(() => {
          if (window.lucide) lucide.createIcons();
        });

      } catch (e) {
        this.error = true;
        this.errorMessage = e.message || 'حدث خطأ غير متوقع';
      } finally {
        this.loading = false;
      }
    },

    formatCurrency(value) {
      const num = parseFloat(value) || 0;
      return num.toLocaleString('ar-SA', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    },

    exportPDF() {
      window.print();
    },

    logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = '/login';
    },

    // ─── Mobile Sidebar ───
    toggleMobileSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      const btn = document.querySelector('.mobile-menu-btn');

      if (!sidebar) return;

      const isOpen = sidebar.classList.toggle('open');

      if (!overlay) {
        const newOverlay = document.createElement('div');
        newOverlay.className = 'sidebar-overlay';
        document.body.appendChild(newOverlay);
        newOverlay.addEventListener('click', () => this.closeMobileSidebar());
      }

      const finalOverlay = document.querySelector('.sidebar-overlay');
      if (isOpen) {
        finalOverlay.classList.add('visible');
        if (btn) btn.classList.add('active');
        document.body.style.overflow = 'hidden';
        this._escHandler = this._escHandler || this.handleEscKey.bind(this);
        document.addEventListener('keydown', this._escHandler);
      } else {
        finalOverlay.classList.remove('visible');
        if (btn) btn.classList.remove('active');
        document.body.style.overflow = '';
        if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
      }
    },

    handleEscKey(e) {
      if (e.key === 'Escape') {
        this.closeMobileSidebar();
      }
    },

    closeMobileSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay');
      const btn = document.querySelector('.mobile-menu-btn');

      if (sidebar) sidebar.classList.remove('open');
      if (overlay) overlay.classList.remove('visible');
      if (btn) btn.classList.remove('active');
      document.body.style.overflow = '';
      if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
    },
  };
}
</script>
