<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/theme.css">
    <title>تقرير المبيعات - PharmaSUD</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans Arabic', system-ui, -apple-system, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 220px;
            background: var(--surface);
            min-height: 100vh;
            padding: 24px 0;
            border-left: 1px solid var(--border);
            position: fixed;
            right: 0;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar .logo {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .sidebar .logo h1 {
            font-size: 18px;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar .logo h1 svg { flex-shrink: 0; }
        .sidebar .logo p {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            margin-right: 30px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            border-right: 3px solid transparent;
            cursor: pointer;
            background: none;
            border-left: none;
            border-top: none;
            border-bottom: none;
            width: 100%;
            text-align: right;
            font-family: inherit;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--border);
            color: var(--text-primary);
            border-right-color: var(--primary-blue);
        }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        .sidebar-footer .nav-item {
            border-right: none;
            color: var(--danger);
            padding: 12px 0;
        }
        .sidebar-footer .nav-item:hover {
            background: transparent;
            color: #FCA5A5;
        }

        /* ─── Mobile toggle ─── */
        .mobile-toggle {
            display: none;
            background: var(--border);
            border: none;
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-left: 12px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* ─── Main Content ─── */
        .main-content {
            margin-right: 220px;
            padding: 32px 40px;
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-right h2 { font-size: 22px; }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .header-left .date { direction: ltr; }
        .header-left .user-info { text-align: left; }
        .header-left .user-info .name { color: var(--text-primary); font-weight: 600; }
        .header-left .user-info .pharmacy { font-size: 12px; color: var(--text-secondary); }

        /* ─── Filter Bar ─── */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--primary-blue); color: var(--text-primary); }
        .filter-btn.active {
            background: var(--primary-blue);
            border-color: var(--primary-blue);
            color: white;
        }
        .filter-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .filter-select:focus { outline: none; border-color: var(--primary-blue); }
        .filter-date {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            direction: ltr;
        }
        .filter-date:focus { outline: none; border-color: var(--primary-blue); }
        .filter-date::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
            cursor: pointer;
        }
        .search-btn {
            background: var(--primary-blue);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: background 0.2s;
        }
        .search-btn:hover { background: #2563EB; }

        /* ─── Summary Cards ─── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .summary-card:hover { border-color: var(--text-secondary); }
        .summary-card .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .summary-card .card-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .summary-card .card-value {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .card-blue .card-icon { background: rgba(59,130,246,0.15); color: var(--primary-blue); }
        .card-green .card-icon { background: rgba(34,197,94,0.15); color: var(--success); }
        .card-yellow .card-icon { background: rgba(245,158,11,0.15); color: var(--warning); }

        /* ─── Two Column Layout ─── */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* ─── Section Card ─── */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .section-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .section-card .card-header h3 {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-card .card-header .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .section-card .card-body { padding: 16px 20px; }

        /* ─── Payment Distribution ─── */
        .payment-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--background);
        }
        .payment-item:last-child { border-bottom: none; }
        .payment-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .payment-icon.cash { background: rgba(6,95,70,0.25); color: #6EE7B7; }
        .payment-icon.bankak { background: rgba(30,58,95,0.25); color: #60A5FA; }
        .payment-icon.fory { background: rgba(91,33,182,0.25); color: #A78BFA; }
        .payment-icon.transfer { background: rgba(120,53,15,0.25); color: #FBBF24; }
        .payment-info { flex: 1; min-width: 0; }
        .payment-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .payment-detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .payment-bar-wrap { margin-top: 6px; }
        .payment-bar-bg {
            height: 6px;
            background: var(--background);
            border-radius: 3px;
            overflow: hidden;
        }
        .payment-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .payment-bar-fill.cash { background: linear-gradient(90deg, #059669, #6EE7B7); }
        .payment-bar-fill.bankak { background: linear-gradient(90deg, #1D4ED8, #60A5FA); }
        .payment-bar-fill.fory { background: linear-gradient(90deg, #6D28D9, #A78BFA); }
        .payment-bar-fill.transfer { background: linear-gradient(90deg, #B45309, #FBBF24); }
        .payment-amount {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: left;
            white-space: nowrap;
        }
        .payment-percent {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: left;
        }

        /* ─── Tables ─── */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
            padding: 10px 6px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            white-space: nowrap;
        }
        .data-table td {
            font-size: 13px;
            padding: 10px 6px;
            border-bottom: 1px solid var(--surface);
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: rgba(51,65,85,0.3); }

        .pm-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .pm-cash { background: rgba(16,185,129,0.15); color: #6EE7B7; }
        .pm-bankak { background: rgba(59,130,246,0.10); color: #60A5FA; }
        .pm-fory { background: #5B21B6; color: #A78BFA; }
        .pm-transfer { background: rgba(245,158,11,0.15); color: #FBBF24; }

        .rank-num {
            display: inline-flex;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }
        .rank-1 { background: rgba(245,158,11,0.2); color: var(--warning); }
        .rank-2 { background: rgba(148,163,184,0.2); color: var(--text-secondary); }
        .rank-3 { background: rgba(205,127,50,0.2); color: #CD7F32; }
        .rank-n { background: rgba(59,130,246,0.15); color: var(--primary-blue); }

        /* ─── Sales List ─── */
        .sales-list { margin-top: 24px; }

        /* ─── Loading & Error ─── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-secondary); font-size: 14px; }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
        .error-state .err-icon { font-size: 48px; margin-bottom: 12px; }
        .error-state .err-msg { color: var(--danger); font-size: 16px; margin-bottom: 8px; }
        .error-state .err-detail { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
        .retry-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: #2563EB; }

        .no-data { text-align: center; padding: 30px 20px; color: var(--text-secondary); font-size: 14px; }

        /* ─── Responsive ─── */
        @media (max-width: 1200px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 992px) {
            .two-col { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
            .main-content { padding: 24px 20px; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.mobile-open { display: flex; }
            .sidebar-overlay.mobile-open { display: block; }
            .main-content { margin-right: 0; padding: 16px; }
            .mobile-toggle { display: flex; }
            .cards-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .header-right h2 { font-size: 17px; }
            .header-left { gap: 8px; }
            .header-left .date { display: none; }
            .summary-card { padding: 14px; }
            .summary-card .card-value { font-size: 20px; }
            .filter-bar { gap: 8px; }
            .filter-btn { font-size: 12px; padding: 6px 12px; }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .summary-card .card-value { font-size: 18px; }
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body>

<div x-data="salesReportApp()" x-init="init()" x-cloak>
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay"
         :class="{ 'mobile-open': sidebarOpen }"
         @click="sidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside class="sidebar" :class="{ 'mobile-open': sidebarOpen }">
        <div class="logo">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                PharmaSUD
            </h1>
            <p>نظام إدارة الصيدلية</p>
        </div>

        <a href="/dashboard" class="nav-item">
            <span class="icon">📊</span> لوحة التحكم
        </a>
        <a href="/medicines" class="nav-item">
            <span class="icon">💊</span> الأدوية
        </a>
        <a href="/inventory" class="nav-item">
            <span class="icon">📦</span> المخزون
        </a>
        <a href="/batch-receive" class="nav-item">
            <span class="icon">🚚</span> استلام دفعة
        </a>
        <a href="/pos" class="nav-item">
            <span class="icon">🛒</span> نقطة البيع
        </a>
        <a href="/sales-history" class="nav-item">
            <span class="icon">📋</span> سجل المبيعات
        </a>
        <a href="/reports-sales" class="nav-item active">
            <span class="icon">📊</span> تقارير المبيعات
        </a>
        <a href="/settings" class="nav-item">
            <span class="icon">⚙️</span> الإعدادات
        </a>

        <div class="sidebar-footer">
            <button @click.prevent="logout()" class="nav-item" style="border-right:none;">
                <span class="icon">🚪</span> تسجيل الخروج
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-right">
                <button class="mobile-toggle" @click="sidebarOpen = !sidebarOpen" aria-label="القائمة">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h2>📊 تقرير المبيعات</h2>
            </div>
            <div class="header-left">
                <span class="date" x-text="currentDate"></span>
                <div class="user-info">
                    <div class="name" x-text="userName || 'مستخدم'"></div>
                    <div class="pharmacy" x-text="pharmacyName || 'الصيدلية'"></div>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <button class="filter-btn"
                    :class="{ 'active': filters.period === 'today' }"
                    @click="filters.period = 'today'; filters.showCustom = false">
                📅 اليوم
            </button>
            <button class="filter-btn"
                    :class="{ 'active': filters.period === 'yesterday' }"
                    @click="filters.period = 'yesterday'; filters.showCustom = false">
                📅 أمس
            </button>
            <button class="filter-btn"
                    :class="{ 'active': filters.period === 'week' }"
                    @click="filters.period = 'week'; filters.showCustom = false">
                📅 هذا الأسبوع
            </button>
            <button class="filter-btn"
                    :class="{ 'active': filters.period === 'month' }"
                    @click="filters.period = 'month'; filters.showCustom = false">
                📅 هذا الشهر
            </button>
            <button class="filter-btn"
                    :class="{ 'active': filters.period === 'custom' }"
                    @click="filters.period = 'custom'; filters.showCustom = true">
                📅 فترة مخصصة
            </button>

            <!-- Date inputs (hidden until custom selected) -->
            <template x-if="filters.showCustom">
                <div style="display:flex;gap:6px;align-items:center;">
                    <span style="font-size:12px;color:var(--text-secondary);">من</span>
                    <input type="date" class="filter-date" x-model="filters.startDate">
                    <span style="font-size:12px;color:var(--text-secondary);">إلى</span>
                    <input type="date" class="filter-date" x-model="filters.endDate">
                </div>
            </template>

            <select class="filter-select" x-model="filters.paymentMethod">
                <option value="all">💳 كل طرق الدفع</option>
                <option value="cash">💵 كاش</option>
                <option value="bankak">📱 بنكك</option>
                <option value="fory">📲 فوري</option>
                <option value="transfer">🏦 تحويل</option>
            </select>

            <select class="filter-select" x-model="filters.userId">
                <option value="all">👤 كل الكاشير</option>
                <template x-for="cashier in cashiers" :key="cashier.id">
                    <option :value="cashier.id" x-text="cashier.full_name"></option>
                </template>
            </select>

            <button class="search-btn" @click="loadReport()">🔍 بحث</button>
        </div>

        <!-- Loading State -->
        <template x-if="loading">
            <div class="loading-state">
                <div class="spinner"></div>
                <div class="loading-text">جاري تحميل التقرير...</div>
            </div>
        </template>

        <!-- Error State -->
        <template x-if="error">
            <div class="error-state">
                <div class="err-icon">⚠️</div>
                <div class="err-msg">تعذر تحميل التقرير</div>
                <div class="err-detail" x-text="errorMessage"></div>
                <button class="retry-btn" @click="loadReport()">إعادة المحاولة</button>
            </div>
        </template>

        <!-- Report Content -->
        <template x-if="!loading && !error && loaded">
            <div>
                <!-- Summary Cards -->
                <div class="cards-grid">
                    <div class="summary-card card-blue">
                        <div class="card-icon">💰</div>
                        <div class="card-label">إجمالي الإيرادات</div>
                        <div class="card-value" x-text="formatCurrency(report.summary.total_revenue) + ' ج.س'"></div>
                    </div>
                    <div class="summary-card card-green">
                        <div class="card-icon">📄</div>
                        <div class="card-label">عدد الفواتير</div>
                        <div class="card-value" x-text="report.summary.invoices_count"></div>
                    </div>
                    <div class="summary-card card-yellow">
                        <div class="card-icon">📈</div>
                        <div class="card-label">متوسط الفاتورة</div>
                        <div class="card-value" x-text="formatCurrency(report.summary.average_invoice) + ' ج.س'"></div>
                    </div>
                </div>

                <!-- Two Column: Payment Distribution + Top Days -->
                <div class="two-col">
                    <!-- Payment Distribution -->
                    <div class="section-card">
                        <div class="card-header">
                            <h3>💳 توزيع طرق الدفع</h3>
                            <span class="subtitle">حسب الإيرادات</span>
                        </div>
                        <div class="card-body">
                            <template x-if="hasPaymentData()">
                                <div>
                                    <!-- Cash -->
                                    <div class="payment-item" x-show="report.summary.payment_breakdown.cash">
                                        <div class="payment-icon cash">💵</div>
                                        <div class="payment-info">
                                            <div class="payment-name">كاش</div>
                                            <div class="payment-detail">
                                                <span x-text="report.summary.payment_breakdown.cash.count"></span> فاتورة
                                            </div>
                                            <div class="payment-bar-wrap">
                                                <div class="payment-bar-bg">
                                                    <div class="payment-bar-fill cash"
                                                         :style="'width: ' + report.summary.payment_breakdown.cash.percentage + '%'"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div style="text-align:left;">
                                            <div class="payment-amount" x-text="formatCurrency(report.summary.payment_breakdown.cash.amount)"></div>
                                            <div class="payment-percent" x-text="report.summary.payment_breakdown.cash.percentage + '%'"></div>
                                        </div>
                                    </div>
                                    <!-- Bankak -->
                                    <div class="payment-item" x-show="report.summary.payment_breakdown.bankak">
                                        <div class="payment-icon bankak">📱</div>
                                        <div class="payment-info">
                                            <div class="payment-name">بنكك</div>
                                            <div class="payment-detail">
                                                <span x-text="report.summary.payment_breakdown.bankak.count"></span> فاتورة
                                            </div>
                                            <div class="payment-bar-wrap">
                                                <div class="payment-bar-bg">
                                                    <div class="payment-bar-fill bankak"
                                                         :style="'width: ' + report.summary.payment_breakdown.bankak.percentage + '%'"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div style="text-align:left;">
                                            <div class="payment-amount" x-text="formatCurrency(report.summary.payment_breakdown.bankak.amount)"></div>
                                            <div class="payment-percent" x-text="report.summary.payment_breakdown.bankak.percentage + '%'"></div>
                                        </div>
                                    </div>
                                    <!-- Fory -->
                                    <div class="payment-item" x-show="report.summary.payment_breakdown.fory">
                                        <div class="payment-icon fory">📲</div>
                                        <div class="payment-info">
                                            <div class="payment-name">فوري</div>
                                            <div class="payment-detail">
                                                <span x-text="report.summary.payment_breakdown.fory.count"></span> فاتورة
                                            </div>
                                            <div class="payment-bar-wrap">
                                                <div class="payment-bar-bg">
                                                    <div class="payment-bar-fill fory"
                                                         :style="'width: ' + report.summary.payment_breakdown.fory.percentage + '%'"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div style="text-align:left;">
                                            <div class="payment-amount" x-text="formatCurrency(report.summary.payment_breakdown.fory.amount)"></div>
                                            <div class="payment-percent" x-text="report.summary.payment_breakdown.fory.percentage + '%'"></div>
                                        </div>
                                    </div>
                                    <!-- Transfer -->
                                    <div class="payment-item" x-show="report.summary.payment_breakdown.transfer">
                                        <div class="payment-icon transfer">🏦</div>
                                        <div class="payment-info">
                                            <div class="payment-name">تحويل</div>
                                            <div class="payment-detail">
                                                <span x-text="report.summary.payment_breakdown.transfer.count"></span> فاتورة
                                            </div>
                                            <div class="payment-bar-wrap">
                                                <div class="payment-bar-bg">
                                                    <div class="payment-bar-fill transfer"
                                                         :style="'width: ' + report.summary.payment_breakdown.transfer.percentage + '%'"></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div style="text-align:left;">
                                            <div class="payment-amount" x-text="formatCurrency(report.summary.payment_breakdown.transfer.amount)"></div>
                                            <div class="payment-percent" x-text="report.summary.payment_breakdown.transfer.percentage + '%'"></div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="!hasPaymentData()">
                                <div class="no-data">لا توجد بيانات طرق دفع في هذه الفترة</div>
                            </template>
                        </div>
                    </div>

                    <!-- Top Days -->
                    <div class="section-card">
                        <div class="card-header">
                            <h3>🏆 أعلى الأيام</h3>
                            <span class="subtitle">حسب الإيرادات</span>
                        </div>
                        <div class="card-body">
                            <template x-if="report.summary.top_days && report.summary.top_days.length > 0">
                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>التاريخ</th>
                                            <th>الإيرادات</th>
                                            <th>الفواتير</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(day, idx) in report.summary.top_days" :key="idx">
                                            <tr>
                                                <td>
                                                    <span class="rank-num"
                                                          :class="idx === 0 ? 'rank-1' : (idx === 1 ? 'rank-2' : (idx === 2 ? 'rank-3' : 'rank-n'))"
                                                          x-text="idx + 1"></span>
                                                </td>
                                                <td x-text="formatDate(day.date)"></td>
                                                <td style="color:var(--success);font-weight:600;" x-text="formatCurrency(day.revenue) + ' ج.س'"></td>
                                                <td x-text="day.invoices"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template x-if="!report.summary.top_days || report.summary.top_days.length === 0">
                                <div class="no-data">لا توجد بيانات أيام في هذه الفترة</div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Sales List/Table -->
                <div class="section-card sales-list">
                    <div class="card-header">
                        <h3>📋 تفاصيل المبيعات</h3>
                        <span class="subtitle" x-text="report.total_records + ' فاتورة'"></span>
                    </div>
                    <div class="card-body" style="padding:0;">
                        <template x-if="report.sales && report.sales.length > 0">
                            <div style="overflow-x:auto;">
                                <table class="data-table" style="min-width:700px;">
                                    <thead>
                                        <tr>
                                            <th>رقم الفاتورة</th>
                                            <th>التاريخ</th>
                                            <th>الكاشير</th>
                                            <th>طريقة الدفع</th>
                                            <th>العميل</th>
                                            <th>الأصناف</th>
                                            <th style="text-align:left;">المبلغ</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="sale in report.sales" :key="sale.invoice_number">
                                            <tr>
                                                <td style="color:var(--primary-blue);font-weight:600;" x-text="'#' + sale.invoice_number"></td>
                                                <td style="font-size:12px;color:var(--text-secondary);" x-text="formatDateTime(sale.created_at)"></td>
                                                <td x-text="sale.cashier_name"></td>
                                                <td>
                                                    <span class="pm-badge" :class="getPaymentClass(sale.payment_method)"
                                                          x-text="getPaymentName(sale.payment_method)"></span>
                                                </td>
                                                <td x-text="sale.customer_name || '—'"></td>
                                                <td x-text="sale.items_count + ' صنف'"></td>
                                                <td style="text-align:left;color:var(--success);font-weight:700;white-space:nowrap;"
                                                    x-text="formatCurrency(sale.total_amount) + ' ج.س'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                        <template x-if="!report.sales || report.sales.length === 0">
                            <div class="no-data">لا توجد مبيعات في هذه الفترة</div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Initial state before first search -->
        <template x-if="!loading && !error && !loaded">
            <div class="loading-state" style="padding:80px 20px;">
                <div style="font-size:48px;margin-bottom:12px;">📊</div>
                <div class="loading-text">اختر الفترة والفلاتر ثم اضغط "بحث" لعرض التقرير</div>
            </div>
        </template>
    </main>
</div>

<script>
function salesReportApp() {
    return {
        sidebarOpen: false,
        loading: false,
        error: false,
        errorMessage: '',
        loaded: false,
        currentDate: '',
        userName: '',
        pharmacyName: '',
        cashiers: [],
        report: {
            summary: {
                total_revenue: 0,
                invoices_count: 0,
                average_invoice: 0,
                payment_breakdown: {},
                top_days: []
            },
            sales: [],
            total_records: 0
        },
        filters: {
            period: 'today',
            showCustom: false,
            startDate: '',
            endDate: '',
            paymentMethod: 'all',
            userId: 'all'
        },

        init() {
            this.formatDate();
            this.loadUserInfo();
            this.loadCashiers();
            this.loadReport();
        },

        formatDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            this.currentDate = now.toLocaleDateString('ar-SA', options);
            // Set default date range (last 30 days)
            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);
            this.filters.startDate = thirtyDaysAgo.toISOString().split('T')[0];
            this.filters.endDate = today.toISOString().split('T')[0];
        },

        loadUserInfo() {
            try {
                const token = localStorage.getItem('token');
                if (token) {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    this.userName = payload.username || payload.sub || 'مستخدم';
                    this.pharmacyName = payload.pharmacy_name || 'صيدلية الزاريات';
                } else {
                    this.userName = 'مستخدم';
                    this.pharmacyName = 'صيدلية الزاريات';
                }
            } catch (e) {
                this.userName = 'مستخدم';
                this.pharmacyName = 'صيدلية الزاريات';
            }
        },

        async loadCashiers() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;
                const resp = await fetch('/api/settings/employees', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Accept': 'application/json'
                    }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    this.cashiers = data.employees || [];
                }
            } catch (e) {
                console.error('Failed to load cashiers:', e);
            }
        },

        async loadReport() {
            this.loading = true;
            this.error = false;
            this.errorMessage = '';
            this.loaded = false;

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }

                // Build query params
                const params = new URLSearchParams();
                params.set('period', this.filters.period);

                if (this.filters.period === 'custom') {
                    if (this.filters.startDate) params.set('start_date', this.filters.startDate);
                    if (this.filters.endDate) params.set('end_date', this.filters.endDate);
                }

                if (this.filters.paymentMethod !== 'all') {
                    params.set('payment_method', this.filters.paymentMethod);
                }

                if (this.filters.userId !== 'all') {
                    params.set('user_id', this.filters.userId);
                }

                const url = '/api/reports/sales?' + params.toString();

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/login';
                        return;
                    }
                    throw new Error('فشل تحميل التقرير (' + response.status + ')');
                }

                const result = await response.json();
                this.report = result;
                this.loaded = true;

            } catch (e) {
                this.error = true;
                this.errorMessage = e.message || 'حدث خطأ غير متوقع';
            } finally {
                this.loading = false;
            }
        },

        hasPaymentData() {
            const pb = this.report.summary.payment_breakdown;
            return pb && (pb.cash || pb.bankak || pb.fory || pb.transfer);
        },

        getPaymentName(method) {
            const names = {
                'cash': 'كاش',
                'bankak': 'بنكك',
                'fory': 'فوري',
                'transfer': 'تحويل'
            };
            return names[method] || method;
        },

        getPaymentClass(method) {
            const classes = {
                'cash': 'pm-cash',
                'bankak': 'pm-bankak',
                'fory': 'pm-fory',
                'transfer': 'pm-transfer'
            };
            return classes[method] || 'pm-cash';
        },

        formatCurrency(value) {
            const num = Number(value);
            if (isNaN(num)) return '0';
            return num.toLocaleString('ar-SA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        },

        formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr);
                const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
                return d.toLocaleDateString('ar-SA', options);
            } catch (e) {
                return dateStr;
            }
        },

        formatDateTime(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr);
                const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                return d.toLocaleDateString('ar-SA', options);
            } catch (e) {
                return dateStr;
            }
        },

        logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = '/login';
        }
    };
}
</script>

</body>
</html>
