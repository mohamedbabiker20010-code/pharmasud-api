<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <title>التقارير والتحليلات - PharmaSUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ─── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 248px;
      background: #fff;
      border-left: 1px solid #EEF2F6;
      display: flex;
      flex-direction: column;
      padding: 22px 16px;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
    }
    .sidebar .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 8px 22px;
    }
    .sidebar .brand .icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: #1AA7EC;
      position: relative;
      flex-shrink: 0;
    }
    .sidebar .brand .icon::before,
    .sidebar .brand .icon::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 3px;
    }
    .sidebar .brand .icon::before {
      width: 18px;
      height: 5.5px;
    }
    .sidebar .brand .icon::after {
      width: 5.5px;
      height: 18px;
    }
    .sidebar .brand .name {
      font: 700 18px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .sidebar .brand .name span {
      color: #1AA7EC;
    }
    .sidebar .nav-section {
      font: 600 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.1em;
      color: #CBD5E1;
      padding: 14px 10px 10px;
    }
    .sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      color: #475569;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 4px;
      transition: all 0.2s ease;
    }
    .sidebar .nav-item:hover {
      background: #F8FAFC;
      color: #0F172A;
    }
    .sidebar .nav-item.active {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 8px 18px -8px rgba(26, 167, 236, 0.55);
    }
    .sidebar .nav-item svg {
      width: 19px;
      height: 19px;
      flex-shrink: 0;
    }
    .sidebar .nav-item .badge {
      margin-right: auto;
      background: #FEF2F2;
      color: #DC2626;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .sidebar .user-card {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px;
      border: 1px solid #EEF2F6;
      border-radius: 13px;
      margin-top: 20px;
      cursor: pointer;
    }
    .sidebar .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1AA7EC;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sidebar .user-info {
      min-width: 0;
      flex: 1;
    }
    .sidebar .user-name {
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .user-role {
      font-size: 11.5px;
      color: #94A3B8;
    }
    .sidebar .user-card svg {
      width: 16px;
      height: 16px;
      color: #CBD5E1;
      flex-shrink: 0;
    }

    /* ─── Topbar ─── */
    .topbar {
      height: 70px;
      background: #fff;
      border-bottom: 1px solid #EEF2F6;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 18px;
      position: fixed;
      top: 0;
      right: 248px;
      left: 0;
      z-index: 90;
    }
    .topbar .page-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar .page-info h1 {
      margin: 0;
      font: 700 20px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .topbar .page-info .subtitle {
      margin: 0;
      color: #64748B;
      font-size: 13px;
      margin-top: 3px;
    }
    .topbar .topbar-actions {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar .date-range-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 16px;
      border-radius: 11px;
      background: #F6F8FA;
      border: 1px solid #EEF2F6;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .topbar .date-range-btn:hover {
      background: #F8FAFC;
      border-color: #CBD5E1;
    }
    .topbar .date-range-btn svg {
      width: 17px;
      height: 17px;
      color: #64748B;
    }
    .topbar .export-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 18px;
      border-radius: 11px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
      transition: all 0.2s ease;
    }
    .topbar .export-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .topbar .export-btn svg {
      width: 17px;
      height: 17px;
    }
    .topbar .lang-toggle {
      display: flex;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      overflow: hidden;
      font-size: 13px;
      font-weight: 600;
    }
    .topbar .lang-toggle span {
      padding: 7px 12px;
      color: #64748B;
    }
    .topbar .lang-toggle span.active {
      background: #1AA7EC;
      color: #fff;
    }
    .topbar .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      border: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    .topbar .icon-btn:hover {
      background: #F8FAFC;
    }
    .topbar .icon-btn svg {
      width: 18px;
      height: 18px;
    }
    .topbar .icon-btn .dot {
      position: absolute;
      top: 9px;
      left: 11px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #DC2626;
      border: 2px solid #fff;
    }

    /* ─── Main Content ─── */
    .main-content {
      margin-right: 248px;
      padding: calc(70px + 28px) 28px 28px;
      min-height: 100vh;
    }

    /* ─── Filter Bar ─── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 38px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #64748B;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .filter-btn:hover {
      border-color: #CBD5E1;
      color: #0F172A;
      background: #F8FAFC;
    }
    .filter-btn.active {
      background: #1AA7EC;
      border-color: #1AA7EC;
      color: #fff;
      box-shadow: 0 6px 14px -6px rgba(26, 167, 236, 0.45);
    }
    .filter-btn svg {
      width: 15px;
      height: 15px;
    }
    .filter-select {
      height: 38px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #0F172A;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      -webkit-appearance: none;
    }
    .filter-select:focus {
      outline: none;
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.12);
    }
    .filter-date {
      height: 38px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid #EEF2F6;
      background: #fff;
      color: #0F172A;
      font-size: 13px;
      font-family: inherit;
      direction: ltr;
      transition: all 0.2s ease;
    }
    .filter-date:focus {
      outline: none;
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.12);
    }
    .filter-date::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }
    .search-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 38px;
      padding: 0 18px;
      border-radius: 10px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 14px -6px rgba(26, 167, 236, 0.45);
      transition: all 0.2s ease;
    }
    .search-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .search-btn svg {
      width: 15px;
      height: 15px;
    }
    .custom-dates {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .custom-dates span {
      font-size: 12px;
      color: #94A3B8;
      font-weight: 500;
    }

    /* ─── Metric Cards ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
      transition: box-shadow 0.2s ease;
    }
    .metric-card:hover {
      box-shadow: 0 4px 12px -2px rgba(15,23,42,0.06);
    }
    .metric-card .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .metric-card .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-card .icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .metric-card .icon.green { background: #ECFDF5; color: #16A34A; }
    .metric-card .icon.yellow { background: #FEF3C7; color: #D97706; }
    .metric-card .icon.cyan { background: #E0F2FE; color: #0284C7; }
    .metric-card .icon svg {
      width: 20px;
      height: 20px;
    }
    .metric-card .badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .metric-card .badge.success {
      color: #16A34A;
      background: #ECFDF5;
    }
    .metric-card .badge.warning {
      color: #D97706;
      background: #FFFbeb;
    }
    .metric-card .badge.danger {
      color: #DC2626;
      background: #FEF2F2;
    }
    .metric-card .label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .metric-card .value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .metric-card .value .unit {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 600;
    }

    /* ─── Revenue Trend Chart ─── */
    .chart-panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 22px;
    }
    .chart-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .chart-panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .chart-panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }
    .chart-panel .period-tabs {
      display: flex;
      gap: 6px;
    }
    .chart-panel .period-tab {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 11px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #94A3B8;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .chart-panel .period-tab.active {
      background: #DBEAFE;
      color: #1AA7EC;
    }
    .chart-panel .period-tab:hover {
      color: #0F172A;
    }
    .chart-area {
      position: relative;
      height: 220px;
      overflow: hidden;
    }
    .chart-area svg {
      width: 100%;
      height: 100%;
    }
    .chart-area .chart-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #CBD5E1;
      gap: 8px;
    }
    .chart-area .chart-placeholder svg {
      width: 48px;
      height: 48px;
    }

    /* ─── Three Column Layout ─── */
    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    /* ─── Panel ─── */
    .panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
    }
    .panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }
    .panel .panel-action {
      font-size: 13px;
      font-weight: 600;
      color: #1AA7EC;
      cursor: pointer;
    }

    /* ─── Category Progress Bars ─── */
    .category-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .category-item .cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
    }
    .category-item .cat-name {
      font-size: 13.5px;
      font-weight: 600;
    }
    .category-item .cat-value {
      font-size: 12px;
      font-weight: 700;
      color: #1AA7EC;
    }
    .category-item .bar-track {
      height: 7px;
      border-radius: 4px;
      background: #F1F5F9;
      overflow: hidden;
    }
    .category-item .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }
    .category-item .bar-fill.blue { background: linear-gradient(90deg, #1AA7EC, #4ADEDE); }
    .category-item .bar-fill.green { background: linear-gradient(90deg, #16A34A, #6EE7B7); }
    .category-item .bar-fill.yellow { background: linear-gradient(90deg, #D97706, #FBBF24); }
    .category-item .bar-fill.purple { background: linear-gradient(90deg, #7C3AED, #A78BFA); }
    .category-item .cat-meta {
      font-size: 11px;
      color: #94A3B8;
      margin-top: 5px;
    }

    /* ─── Payment Distribution ─── */
    .payment-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .payment-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .payment-item .p-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .payment-item .p-icon.cash { background: #ECFDF5; color: #16A34A; }
    .payment-item .p-icon.bankak { background: #DBEAFE; color: #1AA7EC; }
    .payment-item .p-icon.fory { background: #EDE9FE; color: #7C3AED; }
    .payment-item .p-icon.transfer { background: #FEF3C7; color: #D97706; }
    .payment-item .p-icon svg {
      width: 17px;
      height: 17px;
    }
    .payment-item .p-info {
      flex: 1;
      min-width: 0;
    }
    .payment-item .p-name {
      font-size: 13px;
      font-weight: 600;
      color: #0F172A;
    }
    .payment-item .p-detail {
      font-size: 11px;
      color: #94A3B8;
      margin-top: 2px;
    }
    .payment-item .p-bar-track {
      height: 5px;
      border-radius: 3px;
      background: #F1F5F9;
      overflow: hidden;
      margin-top: 6px;
    }
    .payment-item .p-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .payment-item .p-bar-fill.cash { background: linear-gradient(90deg, #16A34A, #6EE7B7); }
    .payment-item .p-bar-fill.bankak { background: linear-gradient(90deg, #1E2F97, #4ADEDE); }
    .payment-item .p-bar-fill.fory { background: linear-gradient(90deg, #7C3AED, #A78BFA); }
    .payment-item .p-bar-fill.transfer { background: linear-gradient(90deg, #D97706, #FBBF24); }
    .payment-item .p-right {
      text-align: left;
      flex-shrink: 0;
      min-width: 70px;
    }
    .payment-item .p-amount {
      font-size: 13px;
      font-weight: 700;
      color: #0F172A;
    }
    .payment-item .p-percent {
      font-size: 11px;
      color: #94A3B8;
    }

    /* ─── Top Medicines Ranked ─── */
    .ranked-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ranked-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ranked-item .rank {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ranked-item .rank.r1 { background: #FEF3C7; color: #D97706; }
    .ranked-item .rank.r2 { background: #F1F5F9; color: #64748B; }
    .ranked-item .rank.r3 { background: #FFFbeb; color: #CD7F32; }
    .ranked-item .rank.rn { background: #DBEAFE; color: #1AA7EC; }
    .ranked-item .r-info {
      flex: 1;
      min-width: 0;
    }
    .ranked-item .r-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ranked-item .r-meta {
      font-size: 11px;
      color: #94A3B8;
    }
    .ranked-item .r-value {
      font-size: 13px;
      font-weight: 700;
      color: #1AA7EC;
      flex-shrink: 0;
    }

    /* ─── Table Panel ─── */
    .table-panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 22px;
    }
    .table-panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .table-panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .table-panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }

    /* ─── Data Table ─── */
    .table-container {
      overflow-x: auto;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 700px;
    }
    .table th {
      text-align: right;
      padding: 12px 14px;
      font: 600 11px 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      text-transform: uppercase;
      border-bottom: 1px solid #F1F5F9;
      white-space: nowrap;
    }
    .table td {
      padding: 13px 14px;
      border-bottom: 1px solid #F6F8FA;
      color: #0F172A;
      vertical-align: middle;
    }
    .table tr:hover td {
      background: #F8FAFC;
    }
    .table tr:last-child td {
      border-bottom: none;
    }

    /* ─── Payment Badges ─── */
    .pm-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .pm-cash { background: #ECFDF5; color: #15803D; }
    .pm-bankak { background: #DBEAFE; color: #1AA7EC; }
    .pm-fory { background: #EDE9FE; color: #7C3AED; }
    .pm-transfer { background: #FEF3C7; color: #B45309; }

    /* ─── Top Days Rank ─── */
    .rank-num {
      display: inline-flex;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }
    .rank-1 { background: #FEF3C7; color: #D97706; }
    .rank-2 { background: #F1F5F9; color: #64748B; }
    .rank-3 { background: #FFFbeb; color: #CD7F32; }
    .rank-n { background: #DBEAFE; color: #1AA7EC; }

    /* ─── Loading & Error ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
    }
    .error-state .err-icon {
      width: 48px;
      height: 48px;
      color: #DC2626;
    }
    .error-state .err-msg {
      color: #DC2626;
      font-size: 16px;
      font-weight: 600;
    }
    .error-state .err-detail {
      color: #64748B;
      font-size: 13px;
    }
    .retry-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 20px;
      border-radius: 11px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
      transition: all 0.2s ease;
    }
    .retry-btn:hover {
      filter: brightness(1.05);
    }
    .no-data {
      text-align: center;
      padding: 30px 20px;
      color: #94A3B8;
      font-size: 14px;
    }

    /* ─── Initial State ─── */
    .initial-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .initial-state svg {
      width: 56px;
      height: 56px;
      color: #CBD5E1;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      .three-col { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .topbar { right: 0; }
      .main-content { margin-right: 0; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .three-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .topbar .page-info h1 { font-size: 16px; }
      .topbar .date-range-btn span { display: none; }
      .main-content { padding: calc(70px + 16px) 16px 16px; }
      .filter-bar { gap: 6px; }
      .filter-btn { padding: 0 10px; font-size: 12px; height: 34px; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="show">

<div x-data="salesReportApp()" x-init="init()" class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="icon"></div>
      <div class="name">Pharma<span>SUD</span></div>
    </div>

    <div class="nav-section">MENU</div>
    <a href="/dashboard" class="nav-item">
      <i data-lucide="layout-dashboard"></i>
      <span>لوحة التحكم</span>
    </a>
    <a href="/pos" class="nav-item">
      <i data-lucide="scan-barcode"></i>
      <span>نقطة البيع</span>
    </a>
    <a href="/medicines" class="nav-item">
      <i data-lucide="pill"></i>
      <span>الأدوية</span>
    </a>
    <a href="/inventory" class="nav-item">
      <i data-lucide="package"></i>
      <span>المخزون</span>
    </a>
    <a href="/batch-receive" class="nav-item">
      <i data-lucide="truck"></i>
      <span>استلام دفعة</span>
    </a>
    <a href="/sales-history" class="nav-item">
      <i data-lucide="receipt"></i>
      <span>سجل المبيعات</span>
    </a>
    <a href="/reports-sales" class="nav-item active" id="nav-reports">
      <i data-lucide="chart-line"></i>
      <span>التقارير</span>
    </a>
    <a href="/settings" class="nav-item">
      <i data-lucide="settings"></i>
      <span>الإعدادات</span>
    </a>

    <div class="user-card" @click="logout()">
      <div class="user-avatar" x-text="userInitials"></div>
      <div class="user-info">
        <div class="user-name" x-text="userName || 'المستخدم'"></div>
        <div class="user-role" x-text="isAdmin ? 'مدير' : 'صيدلي'"></div>
      </div>
      <i data-lucide="chevron-left"></i>
    </div>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <div class="page-info">
      <h1>التقارير والتحليلات</h1>
      <p class="subtitle">نظرة عامة على الأداء</p>
    </div>
    <div class="topbar-actions">
      <button class="date-range-btn" @click="filters.showCustom = !filters.showCustom">
        <i data-lucide="calendar"></i>
        <span x-text="getDateRangeLabel()"></span>
      </button>
      <button class="export-btn" @click="exportPDF()">
        <i data-lucide="file-down"></i>
        <span>تصدير PDF</span>
      </button>
      <div class="lang-toggle">
        <span>EN</span>
        <span class="active">ع</span>
      </div>
      <button class="icon-btn" @click="toggleTheme()">
        <i data-lucide="moon"></i>
      </button>
      <button class="icon-btn">
        <i data-lucide="bell"></i>
        <span class="dot"></span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn"
              :class="{ 'active': filters.period === 'today' }"
              @click="filters.period = 'today'; filters.showCustom = false; loadReport()">
        اليوم
      </button>
      <button class="filter-btn"
              :class="{ 'active': filters.period === 'yesterday' }"
              @click="filters.period = 'yesterday'; filters.showCustom = false; loadReport()">
        أمس
      </button>
      <button class="filter-btn"
              :class="{ 'active': filters.period === 'week' }"
              @click="filters.period = 'week'; filters.showCustom = false; loadReport()">
        هذا الأسبوع
      </button>
      <button class="filter-btn"
              :class="{ 'active': filters.period === 'month' }"
              @click="filters.period = 'month'; filters.showCustom = false; loadReport()">
        هذا الشهر
      </button>
      <button class="filter-btn"
              :class="{ 'active': filters.period === 'custom' }"
              @click="filters.period = 'custom'; filters.showCustom = true">
        فترة مخصصة
      </button>

      <!-- Custom Date Inputs -->
      <template x-if="filters.showCustom">
        <div class="custom-dates">
          <span>من</span>
          <input type="date" class="filter-date" x-model="filters.startDate">
          <span>إلى</span>
          <input type="date" class="filter-date" x-model="filters.endDate">
        </div>
      </template>

      <select class="filter-select" x-model="filters.paymentMethod">
        <option value="all">كل طرق الدفع</option>
        <option value="cash">كاش</option>
        <option value="bankak">بنكك</option>
        <option value="fory">فوري</option>
        <option value="transfer">تحويل</option>
      </select>

      <select class="filter-select" x-model="filters.userId">
        <option value="all">كل الكاشير</option>
        <template x-for="cashier in cashiers" :key="cashier.id">
          <option :value="cashier.id" x-text="cashier.full_name"></option>
        </template>
      </select>

      <button class="search-btn" @click="loadReport()">
        <i data-lucide="search"></i>
        بحث
      </button>
    </div>

    <!-- Loading State -->
    <template x-if="loading">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>جاري تحميل التقرير...</span>
      </div>
    </template>

    <!-- Error State -->
    <template x-if="error">
      <div class="error-state">
        <i data-lucide="triangle-alert" style="width:48px;height:48px;color:#DC2626"></i>
        <span class="err-msg">تعذر تحميل التقرير</span>
        <span class="err-detail" x-text="errorMessage"></span>
        <button class="retry-btn" @click="loadReport()">
          <i data-lucide="refresh-cw" style="width:16px;height:16px"></i>
          إعادة المحاولة
        </button>
      </div>
    </template>

    <!-- Report Content -->
    <template x-if="!loading && !error && loaded">
      <div>
        <!-- 4 KPI Metric Cards -->
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="header">
              <div class="icon blue"><i data-lucide="banknote"></i></div>
              <div class="badge success">
                <i data-lucide="trending-up" style="width:13px;height:13px"></i>
                الإيرادات
              </div>
            </div>
            <div class="label">إجمالي الإيرادات</div>
            <div class="value">
              <span x-text="formatCurrency(report.summary.total_revenue)"></span>
              <span class="unit">ج.س</span>
            </div>
          </div>
          <div class="metric-card">
            <div class="header">
              <div class="icon green"><i data-lucide="trending-up"></i></div>
              <div class="badge success">
                <i data-lucide="trending-up" style="width:13px;height:13px"></i>
                الربح
              </div>
            </div>
            <div class="label">الربح الإجمالي</div>
            <div class="value">
              <span x-text="formatCurrency(report.summary.total_profit || 0)"></span>
              <span class="unit">ج.س</span>
            </div>
          </div>
          <div class="metric-card">
            <div class="header">
              <div class="icon yellow"><i data-lucide="package"></i></div>
              <div class="badge warning">
                <i data-lucide="layers" style="width:13px;height:13px"></i>
                الأصناف
              </div>
            </div>
            <div class="label">الأصناف المباعة</div>
            <div class="value">
              <span x-text="report.summary.items_sold || report.summary.invoices_count || 0"></span>
              <span class="unit">صنف</span>
            </div>
          </div>
          <div class="metric-card">
            <div class="header">
              <div class="icon cyan"><i data-lucide="shopping-cart"></i></div>
              <div class="badge info" style="color:#0284C7;background:#E0F2FE">
                <i data-lucide="bar-chart-2" style="width:13px;height:13px"></i>
                المتوسط
              </div>
            </div>
            <div class="label">متوسط السلة</div>
            <div class="value">
              <span x-text="formatCurrency(report.summary.average_invoice)"></span>
              <span class="unit">ج.س</span>
            </div>
          </div>
        </div>

        <!-- Revenue Trend Area Chart -->
        <div class="chart-panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">اتجاه الإيرادات</div>
              <div class="panel-subtitle" x-text="formatCurrency(report.summary.total_revenue) + ' ج.س إجمالي الفترة'"></div>
            </div>
            <div class="period-tabs">
              <button class="period-tab" :class="{ 'active': filters.period === 'week' }" @click="filters.period = 'week'; loadReport()">أسبوع</button>
              <button class="period-tab" :class="{ 'active': filters.period === 'month' }" @click="filters.period = 'month'; loadReport()">شهر</button>
            </div>
          </div>
          <div class="chart-area">
            <template x-if="report.summary.top_days && report.summary.top_days.length > 0">
              <svg viewBox="0 0 700 200" preserveAspectRatio="none" style="width:100%;height:100%;">
                <defs>
                  <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#1AA7EC" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#1AA7EC" stop-opacity="0.02"/>
                  </linearGradient>
                </defs>
                <template x-if="report.summary.top_days.length >= 2">
                  <polyline
                    :points="getChartPoints(report.summary.top_days)"
                    fill="none"
                    stroke="#1AA7EC"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></polyline>
                </template>
                <template x-if="report.summary.top_days.length >= 2">
                  <polygon
                    :points="getChartArea(report.summary.top_days)"
                    fill="url(#areaGrad)"
                  ></polygon>
                </template>
              </svg>
            </template>
            <template x-if="!report.summary.top_days || report.summary.top_days.length < 2">
              <div class="chart-placeholder">
                <i data-lucide="area-chart"></i>
                <span>لا توجد بيانات كافية لعرض الاتجاه</span>
              </div>
            </template>
          </div>
        </div>

        <!-- 3-Column Grid: Category / Payment / Top Medicines -->
        <div class="three-col">

          <!-- المبيعات حسب الفئة -->
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">المبيعات حسب الفئة</div>
            </div>
            <div class="category-list">
              <template x-if="report.summary.category_breakdown && report.summary.category_breakdown.length > 0">
                <template x-for="(cat, idx) in report.summary.category_breakdown" :key="idx">
                  <div class="category-item">
                    <div class="cat-header">
                      <span class="cat-name" x-text="cat.name"></span>
                      <span class="cat-value" x-text="formatCurrency(cat.revenue) + ' ج.س'"></span>
                    </div>
                    <div class="bar-track">
                      <div class="bar-fill"
                           :class="['blue','green','yellow','purple'][idx % 4]"
                           :style="'width: ' + cat.percentage + '%'"></div>
                    </div>
                    <div class="cat-meta" x-text="cat.count + ' صنف · ' + cat.percentage + '%'"></div>
                  </div>
                </template>
              </template>
              <template x-if="!report.summary.category_breakdown || report.summary.category_breakdown.length === 0">
                <div class="no-data">لا توجد بيانات فئات</div>
              </template>
            </div>
          </div>

          <!-- طرق الدفع -->
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">طرق الدفع</div>
            </div>
            <div class="payment-list">
              <template x-if="hasPaymentData()">
                <div style="display:flex;flex-direction:column;gap:14px;">
                  <!-- Cash -->
                  <div class="payment-item" x-show="report.summary.payment_breakdown.cash">
                    <div class="p-icon cash"><i data-lucide="banknote"></i></div>
                    <div class="p-info">
                      <div class="p-name">كاش</div>
                      <div class="p-detail"><span x-text="report.summary.payment_breakdown.cash.count"></span> فاتورة</div>
                      <div class="p-bar-track">
                        <div class="p-bar-fill cash"
                             :style="'width: ' + report.summary.payment_breakdown.cash.percentage + '%'"></div>
                      </div>
                    </div>
                    <div class="p-right">
                      <div class="p-amount" x-text="formatCurrency(report.summary.payment_breakdown.cash.amount)"></div>
                      <div class="p-percent" x-text="report.summary.payment_breakdown.cash.percentage + '%'"></div>
                    </div>
                  </div>
                  <!-- Bankak -->
                  <div class="payment-item" x-show="report.summary.payment_breakdown.bankak">
                    <div class="p-icon bankak"><i data-lucide="smartphone"></i></div>
                    <div class="p-info">
                      <div class="p-name">بنكك</div>
                      <div class="p-detail"><span x-text="report.summary.payment_breakdown.bankak.count"></span> فاتورة</div>
                      <div class="p-bar-track">
                        <div class="p-bar-fill bankak"
                             :style="'width: ' + report.summary.payment_breakdown.bankak.percentage + '%'"></div>
                      </div>
                    </div>
                    <div class="p-right">
                      <div class="p-amount" x-text="formatCurrency(report.summary.payment_breakdown.bankak.amount)"></div>
                      <div class="p-percent" x-text="report.summary.payment_breakdown.bankak.percentage + '%'"></div>
                    </div>
                  </div>
                  <!-- Fory -->
                  <div class="payment-item" x-show="report.summary.payment_breakdown.fory">
                    <div class="p-icon fory"><i data-lucide="zap"></i></div>
                    <div class="p-info">
                      <div class="p-name">فوري</div>
                      <div class="p-detail"><span x-text="report.summary.payment_breakdown.fory.count"></span> فاتورة</div>
                      <div class="p-bar-track">
                        <div class="p-bar-fill fory"
                             :style="'width: ' + report.summary.payment_breakdown.fory.percentage + '%'"></div>
                      </div>
                    </div>
                    <div class="p-right">
                      <div class="p-amount" x-text="formatCurrency(report.summary.payment_breakdown.fory.amount)"></div>
                      <div class="p-percent" x-text="report.summary.payment_breakdown.fory.percentage + '%'"></div>
                    </div>
                  </div>
                  <!-- Transfer -->
                  <div class="payment-item" x-show="report.summary.payment_breakdown.transfer">
                    <div class="p-icon transfer"><i data-lucide="arrow-right-left"></i></div>
                    <div class="p-info">
                      <div class="p-name">تحويل</div>
                      <div class="p-detail"><span x-text="report.summary.payment_breakdown.transfer.count"></span> فاتورة</div>
                      <div class="p-bar-track">
                        <div class="p-bar-fill transfer"
                             :style="'width: ' + report.summary.payment_breakdown.transfer.percentage + '%'"></div>
                      </div>
                    </div>
                    <div class="p-right">
                      <div class="p-amount" x-text="formatCurrency(report.summary.payment_breakdown.transfer.amount)"></div>
                      <div class="p-percent" x-text="report.summary.payment_breakdown.transfer.percentage + '%'"></div>
                    </div>
                  </div>
                </div>
              </template>
              <template x-if="!hasPaymentData()">
                <div class="no-data">لا توجد بيانات طرق دفع</div>
              </template>
            </div>
          </div>

          <!-- أكثر الأدوية مبيعاً -->
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">أكثر الأدوية مبيعاً</div>
            </div>
            <div class="ranked-list">
              <template x-if="report.top_medicines && report.top_medicines.length > 0">
                <template x-for="(med, idx) in report.top_medicines" :key="idx">
                  <div class="ranked-item">
                    <div class="rank"
                         :class="idx === 0 ? 'r1' : (idx === 1 ? 'r2' : (idx === 2 ? 'r3' : 'rn'))"
                         x-text="idx + 1"></div>
                    <div class="r-info">
                      <div class="r-name" x-text="med.name"></div>
                      <div class="r-meta"><span x-text="med.sold || med.quantity"></span> وحدة</div>
                    </div>
                    <span class="r-value" x-text="formatCurrency(med.revenue || med.total_sales) + ' ج.س'"></span>
                  </div>
                </template>
              </template>
              <template x-if="!report.top_medicines || report.top_medicines.length === 0">
                <div class="no-data">لا توجد بيانات أدوية</div>
              </template>
            </div>
          </div>
        </div>

        <!-- Top Days Table (if available) -->
        <template x-if="report.summary.top_days && report.summary.top_days.length > 0">
          <div class="panel" style="margin-bottom:22px;">
            <div class="panel-header">
              <div>
                <div class="panel-title">أعلى الأيام مبيعاً</div>
                <div class="panel-subtitle">حسب الإيرادات</div>
              </div>
            </div>
            <div class="table-container">
              <table class="table" style="min-width:auto;">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>التاريخ</th>
                    <th>الإيرادات</th>
                    <th>الفواتير</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(day, idx) in report.summary.top_days" :key="idx">
                    <tr>
                      <td>
                        <span class="rank-num"
                              :class="idx === 0 ? 'rank-1' : (idx === 1 ? 'rank-2' : (idx === 2 ? 'rank-3' : 'rank-n'))"
                              x-text="idx + 1"></span>
                      </td>
                      <td style="color:#64748B" x-text="formatDate(day.date)"></td>
                      <td style="color:#16A34A;font-weight:700;" x-text="formatCurrency(day.revenue) + ' ج.س'"></td>
                      <td x-text="day.invoices"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </template>

        <!-- Recent Sales Table -->
        <div class="table-panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">تفاصيل المبيعات</div>
              <div class="panel-subtitle" x-text="report.total_records + ' فاتورة'"></div>
            </div>
            <span class="panel-action">عرض الكل</span>
          </div>
          <div class="table-container">
            <template x-if="report.sales && report.sales.length > 0">
              <table class="table">
                <thead>
                  <tr>
                    <th>رقم الفاتورة</th>
                    <th>التاريخ</th>
                    <th>الكاشير</th>
                    <th>طريقة الدفع</th>
                    <th>العميل</th>
                    <th>الأصناف</th>
                    <th style="text-align:left">المبلغ</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="sale in report.sales" :key="sale.invoice_number">
                    <tr>
                      <td style="color:#1AA7EC;font-weight:600;" x-text="'#' + sale.invoice_number"></td>
                      <td style="font-size:12px;color:#64748B;" x-text="formatDateTime(sale.created_at)"></td>
                      <td x-text="sale.cashier_name"></td>
                      <td>
                        <span class="pm-badge" :class="getPaymentClass(sale.payment_method)"
                              x-text="getPaymentName(sale.payment_method)"></span>
                      </td>
                      <td x-text="sale.customer_name || '—'"></td>
                      <td x-text="sale.items_count + ' صنف'"></td>
                      <td style="text-align:left;color:#16A34A;font-weight:700;white-space:nowrap;"
                          x-text="formatCurrency(sale.total_amount) + ' ج.س'"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </template>
            <template x-if="!report.sales || report.sales.length === 0">
              <div class="no-data">لا توجد مبيعات في هذه الفترة</div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- Initial state before first search -->
    <template x-if="!loading && !error && !loaded">
      <div class="initial-state">
        <i data-lucide="bar-chart-2"></i>
        <span>اختر الفترة والفلاتر ثم اضغط "بحث" لعرض التقرير</span>
      </div>
    </template>

  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  if (window.lucide) lucide.createIcons();
});

function salesReportApp() {
  return {
    sidebarOpen: false,
    loading: false,
    error: false,
    errorMessage: '',
    loaded: false,
    currentDate: '',
    userName: '',
    pharmacyName: '',
    isAdmin: false,
    userInitials: '',
    cashiers: [],
    report: {
      summary: {
        total_revenue: 0,
        total_profit: 0,
        items_sold: 0,
        invoices_count: 0,
        average_invoice: 0,
        payment_breakdown: {},
        top_days: [],
        category_breakdown: []
      },
      top_medicines: [],
      sales: [],
      total_records: 0
    },
    filters: {
      period: 'today',
      showCustom: false,
      startDate: '',
      endDate: '',
      paymentMethod: 'all',
      userId: 'all'
    },

    init() {
      this.formatDate();
      this.loadUserInfo();
      this.loadCashiers();
      this.loadReport();
    },

    formatDate() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      this.currentDate = now.toLocaleDateString('ar-SA', options);
      // Set default date range (last 30 days)
      const today = new Date();
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(today.getDate() - 30);
      this.filters.startDate = thirtyDaysAgo.toISOString().split('T')[0];
      this.filters.endDate = today.toISOString().split('T')[0];
    },

    loadUserInfo() {
      try {
        const token = localStorage.getItem('token');
        if (token) {
          const payload = JSON.parse(atob(token.split('.')[1]));
          this.userName = payload.username || payload.sub || 'مستخدم';
          this.pharmacyName = payload.pharmacy_name || 'صيدلية الزاريات';
          this.isAdmin = localStorage.getItem('role') === 'admin';
          this.userInitials = this.userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        } else {
          this.userName = 'مستخدم';
          this.pharmacyName = 'صيدلية الزاريات';
        }
      } catch (e) {
        this.userName = 'مستخدم';
        this.pharmacyName = 'صيدلية الزاريات';
      }
    },

    async loadCashiers() {
      try {
        const token = localStorage.getItem('token');
        if (!token) return;
        const resp = await fetch('/api/settings/employees', {
          headers: {
            'Authorization': 'Bearer ' + token,
            'Accept': 'application/json'
          }
        });
        if (resp.ok) {
          const data = await resp.json();
          this.cashiers = data.employees || [];
        }
      } catch (e) {
        console.error('Failed to load cashiers:', e);
      }
    },

    async loadReport() {
      this.loading = true;
      this.error = false;
      this.errorMessage = '';
      this.loaded = false;

      try {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.href = '/login';
          return;
        }

        // Build query params
        const params = new URLSearchParams();
        params.set('period', this.filters.period);

        if (this.filters.period === 'custom') {
          if (this.filters.startDate) params.set('start_date', this.filters.startDate);
          if (this.filters.endDate) params.set('end_date', this.filters.endDate);
        }

        if (this.filters.paymentMethod !== 'all') {
          params.set('payment_method', this.filters.paymentMethod);
        }

        if (this.filters.userId !== 'all') {
          params.set('user_id', this.filters.userId);
        }

        const url = '/api/reports/sales?' + params.toString();

        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          }
        });

        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/login';
            return;
          }
          throw new Error('فشل تحميل التقرير (' + response.status + ')');
        }

        const result = await response.json();
        this.report = result;
        this.loaded = true;

        // Re-init lucide icons after Alpine renders
        this.$nextTick(() => {
          if (window.lucide) lucide.createIcons();
        });

      } catch (e) {
        this.error = true;
        this.errorMessage = e.message || 'حدث خطأ غير متوقع';
      } finally {
        this.loading = false;
      }
    },

    hasPaymentData() {
      const pb = this.report.summary.payment_breakdown;
      return pb && (pb.cash || pb.bankak || pb.fory || pb.transfer);
    },

    getPaymentName(method) {
      const names = {
        'cash': 'كاش',
        'bankak': 'بنكك',
        'fory': 'فوري',
        'transfer': 'تحويل'
      };
      return names[method] || method;
    },

    getPaymentClass(method) {
      const classes = {
        'cash': 'pm-cash',
        'bankak': 'pm-bankak',
        'fory': 'pm-fory',
        'transfer': 'pm-transfer'
      };
      return classes[method] || 'pm-cash';
    },

    formatCurrency(value) {
      const num = Number(value);
      if (isNaN(num)) return '0';
      return num.toLocaleString('ar-SA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        const d = new Date(dateStr);
        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        return d.toLocaleDateString('ar-SA', options);
      } catch (e) {
        return dateStr;
      }
    },

    formatDateTime(dateStr) {
      if (!dateStr) return '—';
      try {
        const d = new Date(dateStr);
        const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        return d.toLocaleDateString('ar-SA', options);
      } catch (e) {
        return dateStr;
      }
    },

    getDateRangeLabel() {
      const labels = {
        'today': 'اليوم',
        'yesterday': 'أمس',
        'week': 'هذا الأسبوع',
        'month': 'هذا الشهر',
        'custom': 'فترة مخصصة'
      };
      return labels[this.filters.period] || 'اختر الفترة';
    },

    getChartPoints(days) {
      if (!days || days.length < 2) return '';
      const maxRev = Math.max(...days.map(d => d.revenue || 0), 1);
      const w = 700, h = 180, pad = 10;
      const step = (w - 2 * pad) / (days.length - 1);
      return days.map((d, i) => {
        const x = pad + i * step;
        const y = pad + (1 - (d.revenue || 0) / maxRev) * h;
        return x + ',' + y;
      }).join(' ');
    },

    getChartArea(days) {
      if (!days || days.length < 2) return '';
      const maxRev = Math.max(...days.map(d => d.revenue || 0), 1);
      const w = 700, h = 180, pad = 10;
      const step = (w - 2 * pad) / (days.length - 1);
      const points = days.map((d, i) => {
        const x = pad + i * step;
        const y = pad + (1 - (d.revenue || 0) / maxRev) * h;
        return x + ',' + y;
      });
      const lastX = pad + (days.length - 1) * step;
      return points.join(' ') + ' ' + lastX + ',200 ' + pad + ',200';
    },

    exportPDF() {
      // PDF export placeholder
      window.print();
    },

    toggleTheme() {
      this.isDark = !this.isDark;
      localStorage.setItem("darkMode", this.isDark);
      document.body.classList.toggle("dark-mode", this.isDark);
    },

    logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = '/login';
    }
  };
}
</script>

</body>
</html>
