{% extends 'shared_layout.html' %}

{% set active_page = 'purchase-forecast' %}
{% set page_title = 'توقعات الشراء' %}

{% block extra_css %}
<style>
    /* ─── Page Header ─── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 {
      margin: 0 0 6px;
      font: 700 26px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .page-header .subtitle {
      margin: 0;
      color: #64748B;
      font-size: 14.5px;
    }

    /* ─── Report Tabs ─── */
    .report-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .report-tab {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 11px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #94A3B8;
      font-family: inherit;
      transition: all 0.2s ease;
    }
    .report-tab.active {
      background: #DBEAFE;
      color: #1AA7EC;
    }
    .report-tab:hover {
      color: #0F172A;
    }

    /* ─── Metric Cards ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
      transition: box-shadow 0.2s ease;
    }
    .metric-card:hover {
      box-shadow: 0 4px 12px -2px rgba(15,23,42,0.06);
    }
    .metric-card .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .metric-card .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-card .icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .metric-card .icon.red { background: #FEE2E2; color: #DC2626; }
    .metric-card .icon.green { background: #ECFDF5; color: #16A34A; }
    .metric-card .icon.yellow { background: #FEF3C7; color: #D97706; }
    .metric-card .icon svg {
      width: 20px;
      height: 20px;
    }
    .metric-card .badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .metric-card .badge.success {
      color: #16A34A;
      background: #ECFDF5;
    }
    .metric-card .badge.warning {
      color: #D97706;
      background: #FFF7ED;
    }
    .metric-card .badge.danger {
      color: #DC2626;
      background: #FEF2F2;
    }
    .metric-card .badge.info {
      color: #0284C7;
      background: #E0F2FE;
    }
    .metric-card .label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .metric-card .value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .metric-card .value .unit {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 600;
    }
    .metric-card .sub {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 4px;
    }

    /* ─── Panel ─── */
    .panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
    }
    .panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }

    /* ─── Table ─── */
    .table-container { overflow-x: auto; }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .table th {
      text-align: right;
      padding: 12px 14px;
      font: 600 11px 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      text-transform: uppercase;
      border-bottom: 1px solid #F1F5F9;
      white-space: nowrap;
    }
    .table td {
      padding: 13px 14px;
      border-bottom: 1px solid #F6F8FA;
      color: #0F172A;
      vertical-align: middle;
    }
    .table tr:hover td { background: #F8FAFC; }
    .table tr:last-child td { border-bottom: none; }
    .table .med-name { font-weight: 600; }
    .table .num { direction: ltr; text-align: right; }
    .table .stock-num { font-weight: 600; direction: ltr; }
    .table .runout-date { font-size: 12px; color: #64748B; }

    /* ─── Priority Badge ─── */
    .priority-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid;
    }
    .priority-critical {
      background: rgba(239,68,68,0.12);
      color: #DC2626;
      border-color: rgba(239,68,68,0.25);
    }
    .priority-high {
      background: rgba(245,158,11,0.12);
      color: #D97706;
      border-color: rgba(245,158,11,0.25);
    }
    .priority-medium {
      background: rgba(26,167,236,0.1);
      color: #1AA7EC;
      border-color: rgba(26,167,236,0.25);
    }
    .priority-ok {
      background: rgba(34,197,94,0.1);
      color: #16A34A;
      border-color: rgba(34,197,94,0.2);
    }

    /* ─── Action Box ─── */
    .action-box {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
      margin-bottom: 22px;
    }
    .action-box .action-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .action-box .action-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .action-box .action-icon.red { background: #FEE2E2; color: #DC2626; }
    .action-box .action-icon.yellow { background: #FEF3C7; color: #D97706; }
    .action-box .action-icon svg { width: 20px; height: 20px; }
    .action-box .action-title {
      font-size: 15px;
      font-weight: 600;
    }
    .action-box .action-title.critical { color: #DC2626; }
    .action-box .action-title.high { color: #D97706; }
    .action-box .action-body {
      font-size: 13px;
      color: #64748B;
      line-height: 1.6;
    }
    .action-box .action-body strong { font-weight: 700; }
    .action-box .action-body .critical-num { color: #DC2626; }
    .action-box .action-body .high-num { color: #D97706; }

    /* ─── Two Column Layout ─── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    /* ─── Loading & Error ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
    }
    .error-state .err-msg {
      color: #DC2626;
      font-size: 16px;
      font-weight: 600;
    }
    .error-state .err-detail {
      color: #64748B;
      font-size: 13px;
    }
    .retry-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 20px;
      border-radius: 11px;
      background: #1AA7EC;
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
      transition: all 0.2s ease;
    }
    .retry-btn:hover { filter: brightness(1.05); }
    .no-data {
      text-align: center;
      padding: 30px 20px;
      color: #94A3B8;
      font-size: 14px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
      .report-tabs { flex-wrap: wrap; }
    }
    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .metric-card { padding: 16px; }
      .metric-card .value { font-size: 20px; }
      .page-header h1 { font-size: 20px; }
      .table { font-size: 13px; }
      .table th, .table td { padding: 10px 12px; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    [x-cloak] { display: none !important; }
</style>
{% endblock %}

{% block content %}
<div x-data="purchaseForecastApp()" x-init="init()" class="page-content">

    <!-- Report Tabs -->
    <div class="report-tabs">
      <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-sales' }" @click="window.location='/reports-sales'">تقرير المبيعات</button>
      <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-profits' }" @click="window.location='/reports-profits'">تقرير الأرباح</button>
      <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-slow-moving' }" @click="window.location='/reports-slow-moving'">الأدوية الراكدة</button>
      <button class="report-tab" :class="{ 'active': window.location.pathname === '/reports-purchase-forecast' }" @click="window.location='/reports-purchase-forecast'">توقعات الشراء</button>
      <button class="report-tab" :class="{ 'active': window.location.pathname === '/sales-history' }" @click="window.location='/sales-history'">سجل المبيعات</button>
    </div>

    <!-- Loading State -->
    <template x-if="loading">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>جاري تحميل توقعات الشراء...</span>
      </div>
    </template>

    <!-- Error State -->
    <template x-if="error">
      <div class="error-state">
        <i data-lucide="triangle-alert" style="width:48px;height:48px;color:#DC2626"></i>
        <span class="err-msg">تعذر تحميل البيانات</span>
        <span class="err-detail" x-text="errorMessage"></span>
        <button class="retry-btn" @click="loadReport()">
          <i data-lucide="refresh-cw" style="width:16px;height:16px"></i>
          إعادة المحاولة
        </button>
      </div>
    </template>

    <!-- Report Content -->
    <template x-if="!loading && !error && loaded">
      <div>
        <!-- Page Header -->
        <div class="page-header">
          <div>
            <h1>توقعات الشراء</h1>
            <p class="subtitle" x-text="pharmacyName + ' · ' + currentDate"></p>
          </div>
          <div class="actions">
            <button class="btn btn-secondary" @click="loadReport()" style="display:flex;align-items:center;gap:8px;height:42px;padding:0 16px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid #E2E8F0;background:#fff;color:#334155;">
              <i data-lucide="refresh-cw" style="width:17px;height:17px"></i>
              <span>تحديث</span>
            </button>
          </div>
        </div>

        <!-- Summary Description -->
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
          <div style="font-size:13px;color:#64748B;">
            تحليل توقعات الشراء لجميع الأدوية — يعتمد على متوسط المبيعات اليومية لآخر 30 يوماً
          </div>
          <div style="font-size:13px;color:#64748B;">
            إجمالي الأدوية: <strong style="color:#0F172A;" x-text="medicines.length"></strong>
          </div>
        </div>

        <!-- Summary Metric Cards -->
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="header">
              <div class="icon red">
                <i data-lucide="alert-octagon"></i>
              </div>
              <div class="badge danger">≤ 7 أيام</div>
            </div>
            <div class="label">حرجة — شراء فوري</div>
            <div class="value" x-text="summary.critical_count"></div>
            <div class="sub">أقل من 7 أيام متبقية</div>
          </div>
          <div class="metric-card">
            <div class="header">
              <div class="icon yellow">
                <i data-lucide="alert-triangle"></i>
              </div>
              <div class="badge warning">8–14 يوم</div>
            </div>
            <div class="label">عالية — شراء هذا الأسبوع</div>
            <div class="value" x-text="summary.high_count"></div>
            <div class="sub">8–14 يوم متبقية</div>
          </div>
          <div class="metric-card">
            <div class="header">
              <div class="icon blue">
                <i data-lucide="clock"></i>
              </div>
              <div class="badge info">15–30 يوم</div>
            </div>
            <div class="label">متوسطة — خطط للشراء</div>
            <div class="value" x-text="summary.medium_count"></div>
            <div class="sub">15–30 يوم متبقية</div>
          </div>
          <div class="metric-card">
            <div class="header">
              <div class="icon green">
                <i data-lucide="check-circle-2"></i>
              </div>
              <div class="badge success">30+ يوم</div>
            </div>
            <div class="label">مُستقرّة — لا حاجة للشراء الآن</div>
            <div class="value" x-text="summary.ok_count"></div>
            <div class="sub">أكثر من 30 يوم متبقية</div>
          </div>
        </div>

        <!-- Action Boxes for Critical & High -->
        <template x-if="summary.critical_count > 0 || summary.high_count > 0">
          <div class="two-col">
            <template x-if="summary.critical_count > 0">
              <div class="action-box">
                <div class="action-header">
                  <div class="action-icon red">
                    <i data-lucide="alert-octagon"></i>
                  </div>
                  <div class="action-title critical">حالات حرجة تحتاج شراء فوري</div>
                </div>
                <div class="action-body">
                  <span x-text="summary.critical_count"></span> دواء <strong>حرج</strong> — مخزونك يكفي <strong class="critical-num">أقل من أسبوع</strong>. يرجى <strong>طلب الشراء فوراً</strong> لتجنب نفاد المخزون.
                </div>
              </div>
            </template>
            <template x-if="summary.high_count > 0">
              <div class="action-box">
                <div class="action-header">
                  <div class="action-icon yellow">
                    <i data-lucide="alert-triangle"></i>
                  </div>
                  <div class="action-title high">حالات عالية تحتاج خطة شراء</div>
                </div>
                <div class="action-body">
                  <span x-text="summary.high_count"></span> دواء <strong>عالي الأولوية</strong> — مخزونك يكفي لمدة <strong class="high-num">أسبوع إلى اثنين</strong>. يرجى <strong>التخطيط للشراء هذا الأسبوع</strong>.
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Forecast Table -->
        <div class="panel">
          <div class="panel-header">
            <div>
              <div class="panel-title">جدول توقعات الشراء</div>
              <div class="panel-subtitle">توقعات النفاد حسب متوسط المبيعات اليومية</div>
            </div>
          </div>
          <template x-if="medicines.length > 0">
            <div class="table-container">
              <table class="table">
                <thead>
                  <tr>
                    <th>الدواء</th>
                    <th>المخزون الحالي</th>
                    <th class="col-unit">مبيعات يومية</th>
                    <th>الأيام المتبقية</th>
                    <th>تاريخ النفاد المتوقع</th>
                    <th>الأولوية</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="med in medicines" :key="med.id">
                    <tr>
                      <td class="med-name" x-text="med.trade_name"></td>
                      <td class="stock-num" x-text="med.current_stock"></td>
                      <td class="col-unit" x-text="med.avg_daily_sales.toFixed(1)"></td>
                      <td>
                        <span :class="med.days_remaining <= 7 ? 'days-urgent' : (med.days_remaining <= 14 ? 'days-warning' : (med.days_remaining <= 30 ? 'days-notice' : 'days-fine'))" x-text="med.days_remaining"></span>
                        <span class="days-label">يوم</span>
                      </td>
                      <td class="runout-date" x-text="med.expected_runout_date"></td>
                      <td>
                        <span class="priority-badge" :class="med.priority_class" x-text="med.priority_label"></span>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
          <template x-if="medicines.length === 0">
            <div class="no-data">
              لا توجد بيانات متوفرة لعرضها
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
{% endblock %}
