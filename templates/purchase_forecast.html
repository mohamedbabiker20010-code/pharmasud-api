<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقعات الشراء - PharmaSUD</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0F172A;
            color: #F8FAFC;
            min-height: 100vh;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 220px;
            background: #1E293B;
            min-height: 100vh;
            padding: 24px 0;
            border-left: 1px solid #334155;
            position: fixed;
            right: 0;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar .logo {
            padding: 0 20px 24px;
            border-bottom: 1px solid #334155;
            margin-bottom: 16px;
        }
        .sidebar .logo h1 {
            font-size: 18px;
            color: #3B82F6;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar .logo h1 svg { flex-shrink: 0; }
        .sidebar .logo p {
            font-size: 11px;
            color: #64748B;
            margin-top: 2px;
            margin-right: 30px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #94A3B8;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            border-right: 3px solid transparent;
            cursor: pointer;
            background: none;
            border-left: none;
            border-top: none;
            border-bottom: none;
            width: 100%;
            text-align: right;
            font-family: inherit;
        }
        .nav-item:hover, .nav-item.active {
            background: #334155;
            color: #F8FAFC;
            border-right-color: #3B82F6;
        }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .nav-item .badge {
            background: #EF4444;
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            margin-right: auto;
        }
        .nav-section-label {
            font-size: 11px;
            color: #475569;
            padding: 8px 20px 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid #334155;
        }
        .sidebar-footer .nav-item {
            border-right: none;
            color: #EF4444;
            padding: 12px 0;
        }
        .sidebar-footer .nav-item:hover {
            background: transparent;
            color: #FCA5A5;
        }

        /* ─── Mobile toggle ─── */
        .mobile-toggle {
            display: none;
            background: #334155;
            border: none;
            color: #F8FAFC;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-left: 12px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* ─── Main Content ─── */
        .main-content {
            margin-right: 220px;
            padding: 32px 40px;
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-right h2 { font-size: 22px; }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: #94A3B8;
        }
        .header-left .date { direction: ltr; }
        .header-left .user-info { text-align: left; }
        .header-left .user-info .name { color: #F8FAFC; font-weight: 600; }
        .header-left .user-info .pharmacy { font-size: 12px; color: #64748B; }
        .notification-bell {
            position: relative;
            background: #334155;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94A3B8;
            transition: all 0.2s;
        }
        .notification-bell:hover { background: #475569; color: #F8FAFC; }

        /* ─── Summary Cards ─── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .summary-card {
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .summary-card:hover { border-color: #475569; }
        .summary-card .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 20px;
        }
        .summary-card .card-label {
            font-size: 13px;
            color: #94A3B8;
            margin-bottom: 4px;
        }
        .summary-card .card-value {
            font-size: 26px;
            font-weight: 700;
            color: #F8FAFC;
        }
        .summary-card .card-sub {
            font-size: 12px;
            color: #64748B;
            margin-top: 4px;
        }
        .card-red .card-icon { background: rgba(239,68,68,0.15); color: #EF4444; }
        .card-yellow .card-icon { background: rgba(245,158,11,0.15); color: #F59E0B; }
        .card-green .card-icon { background: rgba(34,197,94,0.15); color: #22C55E; }
        .card-gray .card-icon { background: rgba(148,163,184,0.15); color: #94A3B8; }

        /* ─── Section Card ─── */
        .section-card {
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        .section-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
        }
        .section-card .card-header h3 {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-card .card-header .subtitle {
            font-size: 12px;
            color: #64748B;
        }
        .section-card .card-body { padding: 0; }

        /* ─── Forecast Table ─── */
        .forecast-table {
            width: 100%;
            border-collapse: collapse;
        }
        .forecast-table th {
            font-size: 12px;
            color: #64748B;
            text-align: right;
            padding: 10px 8px;
            border-bottom: 1px solid #334155;
            font-weight: 600;
            white-space: nowrap;
            user-select: none;
        }
        .forecast-table td {
            font-size: 13px;
            padding: 12px 8px;
            border-bottom: 1px solid #1E293B;
        }
        .forecast-table tbody tr {
            transition: background 0.15s;
        }
        .forecast-table tbody tr:hover { background: rgba(59,130,246,0.04); }
        .forecast-table tr:last-child td { border-bottom: none; }
        .forecast-table .med-name {
            font-weight: 600;
            color: #F8FAFC;
        }
        .forecast-table .num {
            direction: ltr;
            text-align: right;
        }
        .forecast-table .stock-num {
            font-weight: 600;
            direction: ltr;
        }
        .forecast-table .runout-date {
            font-size: 12px;
            color: #94A3B8;
        }

        /* ─── Priority Badge ─── */
        .priority-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .priority-critical {
            background: rgba(185,28,28,0.25);
            color: #FCA5A5;
            border: 1px solid rgba(239,68,68,0.35);
        }
        .priority-high {
            background: rgba(180,83,9,0.2);
            color: #FCD34D;
            border: 1px solid rgba(245,158,11,0.3);
        }
        .priority-medium {
            background: rgba(30,64,175,0.2);
            color: #93C5FD;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .priority-ok {
            background: rgba(22,101,52,0.15);
            color: #86EFAC;
            border: 1px solid rgba(34,197,94,0.2);
        }

        /* ─── Day Count Styling ─── */
        .days-urgent { color: #EF4444; font-weight: 700; }
        .days-warning { color: #F59E0B; font-weight: 600; }
        .days-notice { color: #3B82F6; }
        .days-fine { color: #22C55E; }
        .days-label { font-size: 11px; color: #64748B; margin-right: 2px; }

        /* ─── Loading & Error States ─── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #334155;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #94A3B8; font-size: 14px; }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
        .error-state .err-icon { font-size: 48px; margin-bottom: 12px; }
        .error-state .err-msg { color: #EF4444; font-size: 16px; margin-bottom: 8px; }
        .error-state .err-detail { color: #94A3B8; font-size: 13px; margin-bottom: 16px; }
        .retry-btn {
            background: #3B82F6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: #2563EB; }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #64748B;
            font-size: 14px;
        }
        .no-data .no-data-icon { font-size: 40px; margin-bottom: 12px; }
        .no-data .no-data-sub { color: #475569; font-size: 13px; margin-top: 4px; }

        /* ─── Scrollable Table Wrapper ─── */
        .table-wrap {
            overflow-x: auto;
            padding: 0;
        }

        /* ─── Responsive ─── */
        @media (max-width: 1200px) {
            .cards-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 992px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
            .main-content { padding: 24px 20px; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.mobile-open { display: flex; }
            .sidebar-overlay.mobile-open { display: block; }
            .main-content { margin-right: 0; padding: 16px; }
            .mobile-toggle { display: flex; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header-right h2 { font-size: 17px; }
            .header-left { gap: 8px; }
            .header-left .date { display: none; }
            .summary-card { padding: 14px; }
            .summary-card .card-value { font-size: 20px; }
            .forecast-table { font-size: 12px; }
            .forecast-table th, .forecast-table td { padding: 8px 6px; }
            .forecast-table .col-unit,
            .forecast-table .col-daily { display: none; }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .summary-card .card-value { font-size: 18px; }
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body>

<div x-data="purchaseForecastApp()" x-init="init()" x-cloak>
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay"
         :class="{ 'mobile-open': sidebarOpen }"
         @click="sidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside class="sidebar" :class="{ 'mobile-open': sidebarOpen }">
        <div class="logo">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                PharmaSUD
            </h1>
            <p>نظام إدارة الصيدلية</p>
        </div>

        <a href="/dashboard" class="nav-item">
            <span class="icon">📊</span> لوحة التحكم
        </a>
        <a href="/medicines" class="nav-item">
            <span class="icon">💊</span> الأدوية
        </a>
        <a href="/inventory" class="nav-item">
            <span class="icon">📦</span> المخزون
        </a>
        <a href="/batch-receive" class="nav-item">
            <span class="icon">🚚</span> استلام دفعة
        </a>
        <a href="/pos" class="nav-item">
            <span class="icon">🛒</span> نقطة البيع
        </a>
        <a href="/sales-history" class="nav-item">
            <span class="icon">📋</span> سجل المبيعات
        </a>

        <div class="nav-section-label">التقارير</div>

        <a href="/reports-sales" class="nav-item">
            <span class="icon">📈</span> تقارير المبيعات
        </a>
        <a href="/reports-profits" class="nav-item">
            <span class="icon">💰</span> تقارير الأرباح
        </a>
        <a href="/reports-slow-moving" class="nav-item">
            <span class="icon">🐢</span> بطيئة الحركة
        </a>
        <a href="/reports-purchase-forecast" class="nav-item active">
            <span class="icon">📋</span> توقعات الشراء
        </a>
        <a href="/settings" class="nav-item">
            <span class="icon">⚙️</span> الإعدادات
        </a>

        <div class="sidebar-footer">
            <button @click.prevent="logout()" class="nav-item" style="border-right:none;">
                <span class="icon">🚪</span> تسجيل الخروج
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-right">
                <button class="mobile-toggle" @click="sidebarOpen = !sidebarOpen" aria-label="القائمة">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h2>📋 توقعات الشراء</h2>
            </div>
            <div class="header-left">
                <span class="date" x-text="currentDate"></span>
                <div class="user-info">
                    <div class="name" x-text="userName || 'مستخدم'"></div>
                    <div class="pharmacy" x-text="pharmacyName || 'الصيدلية'"></div>
                </div>
                <button class="notification-bell" title="الإشعارات">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Summary Description Bar -->
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
            <div style="font-size:13px;color:#94A3B8;">
                تحليل توقعات الشراء لجميع الأدوية — يعتمد على متوسط المبيعات اليومية لآخر 30 يوماً
            </div>
            <template x-if="!loading && !error && loaded">
                <div style="font-size:13px;color:#64748B;">
                    إجمالي الأدوية: <strong style="color:#F8FAFC;" x-text="medicines.length"></strong>
                </div>
            </template>
        </div>

        <!-- Loading State -->
        <template x-if="loading">
            <div class="loading-state">
                <div class="spinner"></div>
                <div class="loading-text">جاري تحميل توقعات الشراء...</div>
            </div>
        </template>

        <!-- Error State -->
        <template x-if="error">
            <div class="error-state">
                <div class="err-icon">⚠️</div>
                <div class="err-msg">تعذر تحميل توقعات الشراء</div>
                <div class="err-detail" x-text="errorMessage"></div>
                <button class="retry-btn" @click="loadReport()">إعادة المحاولة</button>
            </div>
        </template>

        <!-- Report Content -->
        <template x-if="!loading && !error && loaded">
            <div>
                <!-- Summary Cards -->
                <div class="cards-grid">
                    <div class="summary-card card-red">
                        <div class="card-icon">🔴</div>
                        <div class="card-label">حرجة — شراء فوري</div>
                        <div class="card-value" x-text="summary.critical_count"></div>
                        <div class="card-sub">أقل من 7 أيام متبقية</div>
                    </div>
                    <div class="summary-card card-yellow">
                        <div class="card-icon">🟡</div>
                        <div class="card-label">عالية — شراء هذا الأسبوع</div>
                        <div class="card-value" x-text="summary.high_count"></div>
                        <div class="card-sub">8–14 يوم متبقية</div>
                    </div>
                    <div class="summary-card card-green">
                        <div class="card-icon">🟢</div>
                        <div class="card-label">متوسطة — خطط للشراء</div>
                        <div class="card-value" x-text="summary.medium_count"></div>
                        <div class="card-sub">15–30 يوم متبقية</div>
                    </div>
                    <div class="summary-card card-gray">
                        <div class="card-icon">✅</div>
                        <div class="card-label">جيدة — لا حاجة الآن</div>
                        <div class="card-value" x-text="summary.ok_count"></div>
                        <div class="card-sub">أكثر من 30 يوم متبقية</div>
                    </div>
                </div>

                <!-- Medicines Table -->
                <div class="section-card">
                    <div class="card-header">
                        <h3>💊 قائمة توقعات شراء الأدوية</h3>
                        <span class="subtitle">مرتبة حسب الأولوية — الأكثر إلحاحاً أولاً</span>
                    </div>
                    <div class="card-body">
                        <div class="table-wrap">
                            <template x-if="medicines.length > 0">
                                <table class="forecast-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>اسم الدواء</th>
                                            <th>المخزون الحالي</th>
                                            <th class="col-unit">الوحدة</th>
                                            <th class="col-daily">متوسط البيع اليومي</th>
                                            <th>الأيام المتبقية</th>
                                            <th>تاريخ النفاد المتوقع</th>
                                            <th>كمية الطلب المقترحة</th>
                                            <th>الأولوية</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(med, index) in medicines" :key="med.medicine_id">
                                            <tr>
                                                <td class="num" x-text="index + 1"></td>
                                                <td class="med-name" x-text="med.trade_name"></td>
                                                <td class="stock-num" x-text="med.current_stock"></td>
                                                <td class="col-unit" x-text="med.base_unit"></td>
                                                <td class="col-daily num" x-text="formatDailyAvg(med.avg_daily_sales)"></td>
                                                <td>
                                                    <span :class="daysClass(med.days_remaining)" x-text="med.days_remaining"></span>
                                                    <span class="days-label">يوم</span>
                                                </td>
                                                <td class="runout-date" x-text="formatDate(med.expected_runout_date)"></td>
                                                <td class="stock-num" x-text="med.suggested_order_qty"></td>
                                                <td>
                                                    <span class="priority-badge"
                                                          :class="'priority-' + med.priority"
                                                          x-text="priorityLabel(med.priority)"></span>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template x-if="medicines.length === 0">
                                <div class="no-data">
                                    <div class="no-data-icon">✅</div>
                                    <div>لا توجد أدوية تحتاج للشراء حالياً</div>
                                    <div class="no-data-sub">جميع الأدوية لديها مخزون كافٍ لأكثر من 30 يوماً</div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions Section -->
                <div class="section-card" x-show="summary.critical_count > 0 || summary.high_count > 0">
                    <div class="card-header">
                        <h3>⚡ إجراءات مقترحة</h3>
                        <span class="subtitle">بناءً على الأولويات الحالية</span>
                    </div>
                    <div class="card-body" style="padding:16px 20px;">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                            <div style="background:rgba(185,28,28,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:16px;" x-show="summary.critical_count > 0">
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                                    <span style="font-size:20px;">🔴</span>
                                    <span style="font-size:14px;font-weight:600;color:#FCA5A5;">حرجة — شراء فوري مطلوب</span>
                                </div>
                                <div style="font-size:13px;color:#94A3B8;line-height:1.6;">
                                    <strong style="color:#FCA5A5;" x-text="summary.critical_count"></strong> دواء (أدوية) على وشك النفاد خلال 7 أيام أو أقل.
                                    يوصى بطلب شراء عاجل لتجنب نفاد المخزون وانقطاع الخدمة.
                                </div>
                            </div>
                            <div style="background:rgba(180,83,9,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:16px;" x-show="summary.high_count > 0">
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                                    <span style="font-size:20px;">🟡</span>
                                    <span style="font-size:14px;font-weight:600;color:#FCD34D;">عالية — يجب الشراء هذا الأسبوع</span>
                                </div>
                                <div style="font-size:13px;color:#94A3B8;line-height:1.6;">
                                    <strong style="color:#FCD34D;" x-text="summary.high_count"></strong> دواء (أدوية) ستنفد خلال 14 يوماً.
                                    يوصى بتضمينها في طلب الشراء القادم هذا الأسبوع.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Initial/Empty State -->
        <template x-if="!loading && !error && !loaded">
            <div class="loading-state" style="padding:80px 20px;">
                <div style="font-size:48px;margin-bottom:12px;">📋</div>
                <div class="loading-text">جاري تحميل توقعات الشراء...</div>
            </div>
        </template>
    </main>
</div>

<script>
function purchaseForecastApp() {
    return {
        sidebarOpen: false,
        loading: true,
        error: false,
        errorMessage: '',
        loaded: false,
        currentDate: '',
        userName: '',
        pharmacyName: '',
        medicines: [],
        summary: {
            critical_count: 0,
            high_count: 0,
            medium_count: 0,
            ok_count: 0
        },

        init() {
            // Admin only
            if (localStorage.getItem('role') !== 'admin') {
                alert('هذه الصفحة للمدير فقط');
                window.location.href = '/dashboard';
                return;
            }
            this.formatCurrentDate();
            this.loadUserInfo();
            this.loadReport();
        },

        formatCurrentDate() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            this.currentDate = now.toLocaleDateString('ar-SA', options);
        },

        loadUserInfo() {
            try {
                const token = localStorage.getItem('token');
                if (token) {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    this.userName = payload.username || payload.sub || 'مستخدم';
                    this.pharmacyName = payload.pharmacy_name || 'صيدلية الزاريات';
                } else {
                    this.userName = 'مستخدم';
                    this.pharmacyName = 'صيدلية الزاريات';
                }
            } catch (e) {
                this.userName = 'مستخدم';
                this.pharmacyName = 'صيدلية الزاريات';
            }
        },

        async loadReport() {
            this.loading = true;
            this.error = false;
            this.errorMessage = '';
            this.loaded = false;

            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '/login';
                    return;
                }

                const response = await fetch('/api/reports/purchase-forecast', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/login';
                        return;
                    }
                    throw new Error('فشل تحميل التقرير (' + response.status + ')');
                }

                const result = await response.json();

                // Normalize response — accept either top-level fields or nested in a report object
                let meds = [];
                let sum = { critical_count: 0, high_count: 0, medium_count: 0, ok_count: 0 };

                if (result.medicines) {
                    meds = result.medicines;
                } else if (result.report && result.report.medicines) {
                    meds = result.report.medicines;
                }

                if (result.summary) {
                    sum.critical_count = result.summary.critical_count || 0;
                    sum.high_count = result.summary.high_count || 0;
                    sum.medium_count = result.summary.medium_count || 0;
                    sum.ok_count = result.summary.ok_count || 0;
                } else if (result.report && result.report.summary) {
                    const s = result.report.summary;
                    sum.critical_count = s.critical_count || 0;
                    sum.high_count = s.high_count || 0;
                    sum.medium_count = s.medium_count || 0;
                    sum.ok_count = s.ok_count || 0;
                }

                // If summary isn't provided, compute it from the medicines list
                if (meds.length > 0 && sum.critical_count === 0 && sum.high_count === 0 && sum.medium_count === 0 && sum.ok_count === 0) {
                    for (const m of meds) {
                        const days = m.days_remaining;
                        if (days <= 7) sum.critical_count++;
                        else if (days <= 14) sum.high_count++;
                        else if (days <= 30) sum.medium_count++;
                        else sum.ok_count++;
                    }
                }

                // Sort medicines by priority: critical first, then high, medium, ok
                const priorityOrder = { critical: 0, high: 1, medium: 2, ok: 3 };
                meds.sort((a, b) => {
                    const pA = priorityOrder[a.priority] !== undefined ? priorityOrder[a.priority] : 99;
                    const pB = priorityOrder[b.priority] !== undefined ? priorityOrder[b.priority] : 99;
                    if (pA !== pB) return pA - pB;
                    return (a.days_remaining || 0) - (b.days_remaining || 0);
                });

                this.medicines = meds;
                this.summary = sum;
                this.loaded = true;

            } catch (e) {
                this.error = true;
                this.errorMessage = e.message || 'حدث خطأ غير متوقع';
            } finally {
                this.loading = false;
            }
        },

        priorityLabel(priority) {
            const labels = {
                'critical': '🔴 اشترِ الآن فوراً',
                'high': '🟡 اشترِ هذا الأسبوع',
                'medium': '🔵 خطط للشراء',
                'ok': '✅ لا حاجة الآن'
            };
            return labels[priority] || priority;
        },

        daysClass(days) {
            if (days === null || days === undefined) return '';
            if (days <= 7) return 'days-urgent';
            if (days <= 14) return 'days-warning';
            if (days <= 30) return 'days-notice';
            return 'days-fine';
        },

        formatDailyAvg(value) {
            if (value === null || value === undefined) return '—';
            const num = typeof value === 'number' ? value : parseFloat(value);
            return num.toFixed(1);
        },

        formatCurrency(value) {
            if (value === null || value === undefined) return '0.00';
            const num = typeof value === 'number' ? value : parseFloat(value);
            return num.toLocaleString('ar-EG', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        },

        formatDate(dateStr) {
            if (!dateStr) return '—';
            try {
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr;
                return d.toLocaleDateString('ar-SA', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            } catch (e) {
                return dateStr;
            }
        },

        logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = '/login';
        }
    };
}
</script>

</body>
</html>
