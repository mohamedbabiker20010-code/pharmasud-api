<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - PharmaSUD</title>
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Login Page ─── */
    .login-page {
      min-height: 100vh;
      display: flex;
      width: 100%;
    }

    /* ─── Left Panel (Brand) ─── */
    .login-left {
      width: 46%;
      background: linear-gradient(160deg, #1E2F97 0%, #1AA7EC 55%, #4ADEDE 100%);
      position: relative;
      overflow: hidden;
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .login-left .ring-1 {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      right: -120px;
      top: -110px;
    }
    .login-left .ring-2 {
      position: absolute;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      right: -40px;
      top: -40px;
    }
    .login-left .ring-3 {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 34px;
      background: rgba(255,255,255,0.06);
      left: -30px;
      bottom: 60px;
      transform: rotate(18deg);
    }
    .login-left .brand {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .login-left .brand .icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.16);
      position: relative;
    }
    .login-left .brand .icon::before,
    .login-left .brand .icon::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 3px;
    }
    .login-left .brand .icon::before {
      width: 20px;
      height: 6px;
    }
    .login-left .brand .icon::after {
      width: 6px;
      height: 20px;
    }
    .login-left .brand .name {
      color: #fff;
      font: 700 21px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .login-left .hero {
      position: relative;
    }
    .login-left .hero h2 {
      margin: 0 0 14px;
      color: #fff;
      font: 700 30px/1.25 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .login-left .hero p {
      margin: 0;
      color: rgba(255,255,255,0.82);
      font-size: 15px;
      line-height: 1.6;
    }
    .login-left .features {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }
    .login-left .feature {
      display: flex;
      align-items: center;
      gap: 11px;
      color: rgba(255,255,255,0.92);
      font-size: 14px;
      font-weight: 500;
    }
    .login-left .feature .icon-box {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: rgba(255,255,255,0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .login-left .feature .icon-box svg {
      width: 14px;
      height: 14px;
      color: #fff;
    }

    /* ─── Right Panel (Form) ─── */
    .login-right {
      flex: 1;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      background: #fff;
    }
    .login-right .lang-toggle {
      position: absolute;
      top: 24px;
      left: 28px;
      display: flex;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      overflow: hidden;
      font-size: 13px;
      font-weight: 600;
    }
    .login-right .lang-toggle span {
      padding: 7px 13px;
      color: #64748B;
      cursor: pointer;
    }
    .login-right .lang-toggle span.active {
      background: #1AA7EC;
      color: #fff;
    }
    .login-right .form-wrap {
      max-width: 340px;
      margin: 0 auto;
      width: 100%;
    }
    .login-right .form-wrap h2 {
      margin: 0 0 8px;
      font: 700 27px/1.2 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .login-right .form-wrap .subtitle {
      margin: 0 0 30px;
      color: #64748B;
      font-size: 14.5px;
    }
    .login-right .input-group {
      margin-bottom: 18px;
    }
    .login-right .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }
    .login-right .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 46px;
      padding: 0 14px;
      border: 1.5px solid #E2E8F0;
      border-radius: 11px;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .login-right .input-wrap:focus-within {
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.12);
    }
    .login-right .input-wrap svg {
      width: 18px;
      height: 18px;
      color: #94A3B8;
      flex-shrink: 0;
    }
    .login-right .input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 14.5px;
      color: #334155;
      outline: none;
      padding: 0;
    }
    .login-right .input-wrap input::placeholder {
      color: #94A3B8;
    }
    .login-right .input-wrap .toggle-pwd {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: #94A3B8;
      display: flex;
      align-items: center;
    }
    .login-right .input-wrap .toggle-pwd:hover {
      color: #1AA7EC;
    }
    .login-right .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .login-right .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #475569;
      cursor: pointer;
    }
    .login-right .remember .check {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: #1AA7EC;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-right .remember .check svg {
      width: 12px;
      height: 12px;
      color: #fff;
    }
    .login-right .forgot {
      font-size: 13px;
      font-weight: 600;
      color: #1AA7EC;
      text-decoration: none;
    }
    .login-right .forgot:hover {
      text-decoration: underline;
    }
    .login-right .btn-signin {
      width: 100%;
      height: 48px;
      border-radius: 11px;
      background: #1AA7EC;
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.6);
      transition: filter 0.2s ease, transform 0.2s ease;
    }
    .login-right .btn-signin:hover {
      filter: brightness(1.05);
    }
    .login-right .btn-signin:active {
      transform: translateY(0);
    }
    .login-right .btn-signin svg {
      width: 18px;
      height: 18px;
    }
    .login-right .form-footer {
      margin-top: 22px;
      padding-top: 20px;
      border-top: 1px solid #F1F5F9;
      text-align: center;
      font-size: 13.5px;
      color: #64748B;
    }
    .login-right .form-footer a {
      font-weight: 600;
      color: #1AA7EC;
      text-decoration: none;
    }
    .login-right .form-footer a:hover {
      text-decoration: underline;
    }
    .login-right .error-msg {
      background: #FEF2F2;
      color: #DC2626;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .login-right .error-msg.show {
      display: block;
    }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .login-left { display: none; }
      .login-right {
        width: 100%;
        padding: 40px 24px;
      }
    }
  </style>
</head>
<body>

<div class="login-page" x-data="loginApp()">
  <!-- Left Panel -->
  <div class="login-left">
    <div class="ring-1"></div>
    <div class="ring-2"></div>
    <div class="ring-3"></div>

    <div class="brand">
      <div class="icon"></div>
      <span class="name">PharmaSUD</span>
    </div>

    <div class="hero">
      <h2>نظّم صيدليتك بثقة</h2>
      <p>مخزون FEFO، تنبيهات انتهاء الصلاحية، ونقطة بيع سريعة — يعمل حتى بدون إنترنت.</p>
    </div>

    <div class="features">
      <div class="feature">
        <div class="icon-box"><i data-lucide="wifi-off"></i></div>
        <span>يعمل بدون إنترنت ويتزامن تلقائياً</span>
      </div>
      <div class="feature">
        <div class="icon-box"><i data-lucide="calendar-clock"></i></div>
        <span>لا يبيع أدوية منتهية الصلاحية</span>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="login-right">
    <div class="lang-toggle">
      <span class="active">EN</span>
      <span>ع</span>
    </div>

    <div class="form-wrap">
      <h2>مرحباً بعودتك</h2>
      <p class="subtitle">سجل الدخول إلى حساب صيدليتك</p>

      <div class="error-msg" :class="{ 'show': errorMsg }" x-text="errorMsg"></div>

      <div class="input-group">
        <label>اسم المستخدم</label>
        <div class="input-wrap">
          <i data-lucide="mail"></i>
          <input type="text" x-model="username" placeholder="ادخل اسم المستخدم" required>
        </div>
      </div>

      <div class="input-group">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <i data-lucide="lock"></i>
          <input :type="showPassword ? 'text' : 'password'" x-model="password" placeholder="••••••••" required>
          <button type="button" class="toggle-pwd" @click="showPassword = !showPassword">
            <i :data-lucide="showPassword ? 'eye-off' : 'eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember">
          <span class="check"><i data-lucide="check"></i></span>
          <span>تذكرني</span>
        </label>
        <a href="#" class="forgot">نسيت كلمة المرور؟</a>
      </div>

      <button type="button" class="btn-signin" @click="login()" :disabled="loading">
        <span x-show="!loading">تسجيل الدخول</span>
        <span x-show="loading">جاري تسجيل الدخول...</span>
        <i data-lucide="arrow-left" x-show="!loading"></i>
      </button>

      <div class="form-footer">
        صيدلية جديدة؟ <a href="#">تفعيل بمفتاح المنتج</a>
      </div>
    </div>
  </div>
</div>

<script>
  // Initialize Lucide icons
  document.addEventListener('DOMContentLoaded', () => {
    if (window.lucide) lucide.createIcons();
  });

  function loginApp() {
    return {
      username: '',
      password: '',
      showPassword: false,
      loading: false,
      errorMsg: '',

      async login() {
        this.errorMsg = '';
        if (!this.username || !this.password) {
          this.errorMsg = 'يرجى إدخال اسم المستخدم وكلمة المرور';
          return;
        }
        this.loading = true;
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: this.username,
              password: this.password
            })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('role', data.role);
            localStorage.setItem('userName', data.full_name || this.username);
            localStorage.setItem('pharmacyName', data.pharmacy_name || '');
            window.location.href = '/dashboard';
          } else {
            this.errorMsg = data.detail || 'اسم المستخدم أو كلمة المرور غير صحيحة';
          }
        } catch (e) {
          this.errorMsg = 'خطأ في الاتصال بالخادم';
        } finally {
          this.loading = false;
        }
      }
    }
  }
</script>

</body>
</html>
