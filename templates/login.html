<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - PharmaSUD</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0F172A;
            color: #F8FAFC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-card .logo h1 {
            font-size: 24px;
            color: #3B82F6;
        }
        .login-card .logo p {
            font-size: 13px;
            color: #64748B;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #94A3B8;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #F8FAFC;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #3B82F6;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #2563EB; }
        .btn-login:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .error-msg {
            background: #7F1D1D;
            border: 1px solid #991B1B;
            border-radius: 8px;
            padding: 10px 14px;
            color: #FECACA;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="login-card" x-data="loginApp()">
        <div class="logo">
            <h1>🏥 PharmaSUD</h1>
            <p>نظام إدارة الصيدليات</p>
        </div>
        
        <div class="error-msg" :class="{ 'show': errorMsg }" x-text="errorMsg"></div>
        
        <form @submit.prevent="login">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" x-model="username" placeholder="أدخل اسم المستخدم" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" x-model="password" placeholder="أدخل كلمة المرور" required>
            </div>
            <button type="submit" class="btn-login" :disabled="loading">
                <span x-show="!loading">تسجيل الدخول</span>
                <span x-show="loading">جاري تسجيل الدخول <span class="loading-spinner"></span></span>
            </button>
        </form>
        
        <p class="footer-text">PharmaSUD v6.6.0</p>
    </div>

    <script>
        function loginApp() {
            return {
                username: '',
                password: '',
                loading: false,
                errorMsg: '',
                
                async login() {
                    this.loading = true;
                    this.errorMsg = '';
                    
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.username,
                                password: this.password
                            })
                        });
                        
                        const data = await res.json();
                        
                        if (data.success && data.token) {
                            localStorage.setItem('token', data.token);
                            localStorage.setItem('role', data.role || '');
                            window.location.href = '/dashboard';
                        } else {
                            this.errorMsg = data.message || 'فشل تسجيل الدخول';
                        }
                    } catch (e) {
                        this.errorMsg = 'حدث خطأ في الاتصال بالخادم';
                    } finally {
                        this.loading = false;
                    }
                }
            };
        }
    </script>
</body>
</html>
