<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - PharmaSUD</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Cairo', 'IBM Plex Sans Arabic', Tahoma, sans-serif;
      color: var(--text-primary);
      background: var(--background);
      overflow-x: hidden;
      width: 100%;
      min-height: 100vh;
    }

    /* ============ SPLASH SCREEN ============ */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--splash-gradient);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    .splash.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      filter: blur(2px);
      animation: floatSlow 22s ease-in-out infinite alternate;
    }
    .particle.p1 { width: 260px; height: 260px; top: -80px; right: -60px; animation-delay: 0s; }
    .particle.p2 { width: 180px; height: 180px; bottom: -40px; left: -50px; animation-delay: -6s; }
    .particle.p3 { width: 120px; height: 120px; top: 20%; left: 10%; background: rgba(255,255,255,0.08); animation-delay: -3s; }
    .particle.p4 { width: 90px; height: 90px; bottom: 18%; right: 12%; background: rgba(255,255,255,0.07); animation-delay: -10s; }
    .particle.p5 { width: 340px; height: 340px; bottom: -160px; right: 20%; background: rgba(255,255,255,0.05); animation-delay: -14s; }

    @keyframes floatSlow {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(20px, -25px) scale(1.06); }
      100% { transform: translate(-15px, 15px) scale(0.97); }
    }

    .splash-icon-box {
      width: 96px;
      height: 96px;
      border-radius: 26px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: scale(0.8);
      z-index: 2;
      animation: logoEnter 0.8s var(--ease-smooth) forwards, pulseGlow 2.4s ease-in-out 0.9s infinite;
    }

    @keyframes logoEnter {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
      50%      { box-shadow: 0 0 35px 12px rgba(255,255,255,0.18); }
    }

    .splash-icon-box::after {
      content: '';
      position: absolute;
      top: 0; left: -150%;
      width: 60%; height: 100%;
      background: linear-gradient(115deg, transparent, rgba(255,255,255,0.45), transparent);
      transform: skewX(-20deg);
      animation: shimmer 1.4s ease-in-out 1.1s 1 forwards;
    }

    @keyframes shimmer {
      to { left: 150%; }
    }

    .splash-icon-box svg {
      width: 48px;
      height: 48px;
      stroke: #ffffff;
      stroke-width: 2.2;
      position: relative;
      z-index: 2;
    }

    .splash-brand {
      margin-top: 26px;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.5px;
      direction: ltr;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s var(--ease-smooth) 0.5s forwards;
    }
    .splash-brand .brand-pharma { color: #ffffff; }
    .splash-brand .brand-sud    { color: #BAE6FD; }

    .splash-subtitle {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s var(--ease-smooth) 0.7s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .splash-dots {
      position: absolute;
      bottom: 56px;
      display: flex;
      gap: 8px;
    }
    .splash-dots span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent-sky);
      opacity: 0.4;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .splash-dots span:nth-child(1) { animation-delay: 0s; }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; background: #fff; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 100% { transform: scale(0.7); opacity: 0.35; }
      50%      { transform: scale(1.15); opacity: 1; }
    }

    /* ============ LOGIN PAGE ============ */
    .login-page {
      min-height: 100vh;
      display: flex;
      width: 100%;
    }

    .login-left {
      flex: 1;
      background: var(--main-gradient);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: #fff;
      text-align: center;
    }

    .login-left .lcircle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      animation: floatSlow 26s ease-in-out infinite alternate;
    }
    .login-left .lc1 { width: 300px; height: 300px; top: -100px; left: -90px; }
    .login-left .lc2 { width: 220px; height: 220px; bottom: -90px; right: -60px; animation-delay: -8s; background: rgba(255,255,255,0.06); }
    .login-left .lc3 { width: 140px; height: 140px; top: 30%; right: 8%; animation-delay: -15s; background: rgba(255,255,255,0.05); }

    .login-left-content {
      position: relative;
      z-index: 2;
      max-width: 420px;
      opacity: 0;
      transform: translateY(24px);
    }
    .show .login-left-content {
      animation: fadeUp 0.7s var(--ease-smooth) 0.15s forwards;
    }

    .left-brand {
      justify-content: center;
      margin-bottom: 26px;
    }
    .left-brand .brand-icon { width: 36px; height: 36px; }
    .left-brand .brand-text { font-size: 30px; }

    .login-left h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .login-left p.desc {
      font-size: 14.5px;
      line-height: 1.9;
      color: rgba(255,255,255,0.85);
      margin-bottom: 32px;
    }

    .stat-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-card {
      flex: 1;
      min-width: 110px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 16px 10px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .stat-card .icon { font-size: 22px; margin-bottom: 8px; display: block; }

    .login-right {
      flex: 1;
      background: var(--background);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .login-form-wrap {
      width: 100%;
      max-width: 380px;
      opacity: 0;
      transform: translateY(28px);
    }
    .show .login-form-wrap {
      animation: fadeUp 0.6s var(--ease-smooth) 0.35s forwards;
    }

    .mobile-logo {
      display: none;
      margin-bottom: 36px;
    }
    .mobile-logo .brand-icon { width: 26px; height: 26px; }
    .mobile-logo .brand-text { font-size: 20px; }

    .login-form-wrap h2 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .login-form-wrap h2 .brand-pharma,
    .login-form-wrap h2 .brand-sud {
      font-weight: 800;
    }
    .login-form-wrap p.sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }
    .input-wrap input {
      width: 100%;
      padding: 13px 44px 13px 44px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 14.5px;
      color: var(--text-primary);
      background: var(--surface);
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .input-wrap input:focus {
      border-color: var(--primary-blue);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }
    .input-wrap .field-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: var(--text-secondary);
      transition: stroke 0.25s ease;
      pointer-events: none;
    }
    .input-wrap input:focus ~ .field-icon {
      stroke: var(--primary-blue);
    }
    .input-wrap .toggle-eye {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      stroke: var(--text-secondary);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: flex;
      transition: stroke 0.2s ease;
    }
    .input-wrap .toggle-eye:hover { stroke: var(--primary-blue); }

    .input-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 100%;
      height: 2px;
      background: var(--accent-sky);
      border-radius: 2px;
      transition: transform 0.35s var(--ease-smooth);
      transform-origin: center;
    }
    .input-wrap:focus-within::after {
      transform: translateX(-50%) scaleX(1);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--main-gradient);
      color: #fff;
      font-family: inherit;
      font-size: 15.5px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.18);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.28);
    }
    .login-btn:active {
      transform: translateY(0);
    }

    .form-links {
      margin-top: 26px;
      text-align: center;
      font-size: 13.5px;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-links a {
      color: var(--primary-blue);
      font-weight: 700;
      text-decoration: none;
    }
    .form-links a:hover { text-decoration: underline; }
    .form-links .secondary-link {
      color: var(--text-secondary);
      font-weight: 600;
    }
    .form-links .secondary-link:hover {
      color: var(--primary-blue);
    }

    @media (max-width: 768px) {
      .login-left { display: none; }
      .login-right { width: 100%; flex: 1; }
      .mobile-logo { display: flex; }
    }
  </style>
</head>
<body class="show">
  <div class="login-page" x-data="loginApp()">
    <!-- Left Panel -->
    <div class="login-left">
      <div class="lcircle lc1"></div>
      <div class="lcircle lc2"></div>
      <div class="lcircle lc3"></div>

      <div class="login-left-content">
        <div class="brand-logo on-dark left-brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
          </svg>
          <span class="brand-text"><span class="brand-pharma">Pharma</span><span class="brand-sud">SUD</span></span>
        </div>

        <h1>نظام إدارة الصيدليات</h1>
        <p class="desc">
          نظام متكامل لإدارة المخزون والمبيعات والتقارير،
          مصمم خصيصاً للصيدليات العربية.
        </p>

        <div class="stat-cards">
          <div class="stat-card"><span class="icon">🔒</span>آمن 100%</div>
          <div class="stat-card"><span class="icon">⏰</span>متاح 24/7</div>
          <div class="stat-card"><span class="icon">🌐</span>عربي بالكامل</div>
        </div>
      </div>
    </div>

    <!-- Right Panel (Form) -->
    <div class="login-right">
      <div class="login-form-wrap">
        <div class="mobile-logo">
          <div class="brand-logo">
            <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
            </svg>
            <span class="brand-text"><span class="brand-pharma">Pharma</span><span class="brand-sud">SUD</span></span>
          </div>
        </div>

        <h2><span class="brand-pharma">Pharma</span><span class="brand-sud">SUD</span> يرحب بكم</h2>
        <p class="sub">أدخل بياناتك للوصول إلى النظام</p>

        <form @submit.prevent="login">
          <div class="input-group">
            <label>اسم المستخدم</label>
            <div class="input-wrap">
              <input type="text" x-model="username" placeholder="ادخل اسم المستخدم" required>
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
          </div>

          <div class="input-group">
            <label>كلمة المرور</label>
            <div class="input-wrap">
              <input type="password" id="pwdInput" x-model="password" placeholder="••••••••" required>
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="11" width="16" height="9" rx="2"></rect>
                <path d="M8 11V7a4 4 0 018 0v4"></path>
              </svg>
              <button type="button" class="toggle-eye" onclick="togglePwd()" aria-label="إظهار كلمة المرور">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <div class="error-msg" :class="{ 'show': errorMsg }" x-text="errorMsg"></div>

          <button type="submit" class="login-btn" :disabled="loading">
            <span x-show="!loading">تسجيل الدخول</span>
            <span x-show="loading">جاري تسجيل الدخول <span class="loading-spinner"></span></span>
          </button>
        </form>

        <div class="form-links">
          <div>ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a></div>
          <a href="#" class="secondary-link">دليل استخدام النظام</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Content is visible by default (show class added to body)

    function togglePwd() {
      const input = document.getElementById('pwdInput');
      const eye = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 014.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        eye.innerHTML = '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }
  </script>
</body>
</html>
