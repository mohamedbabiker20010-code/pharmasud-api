<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
    <title>قائمة الأدوية - صيدلية الزاريات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM Plex Sans Arabic:wght@400;600;700&display=swap');
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; }
    </style>

  <style>
    .sidebar { width:248px; background:#fff; border-left:1px solid #EEF2F6; display:flex; flex-direction:column; padding:22px 16px; position:fixed; right:0; top:0; bottom:0; z-index:100; font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif; }
    .sidebar .brand { display:flex; align-items:center; gap:11px; padding:0 8px 22px; }
    .sidebar .brand .icon { width:38px; height:38px; border-radius:11px; background:#1AA7EC; position:relative; flex-shrink:0; }
    .sidebar .brand .icon::before,.sidebar .brand .icon::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; border-radius:3px; }
    .sidebar .brand .icon::before { width:18px; height:5.5px; }
    .sidebar .brand .icon::after { width:5.5px; height:18px; }
    .sidebar .brand .name { font:700 18px/1 'IBM Plex Sans Arabic',sans-serif; letter-spacing:-0.02em; }
    .sidebar .brand .name span { color:#1AA7EC; }
    .sidebar .nav-section { font:600 11px/1 'IBM Plex Mono',monospace; letter-spacing:0.1em; color:#CBD5E1; padding:14px 10px 10px; }
    .sidebar .nav-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; color:#475569; font-size:14px; font-weight:500; text-decoration:none; margin-bottom:4px; transition:all 0.2s ease; }
    .sidebar .nav-item:hover { background:#F8FAFC; color:#0F172A; }
    .sidebar .nav-item.active { background:#1AA7EC; color:#fff; box-shadow:0 8px 18px -8px rgba(26,167,236,0.55); }
    .sidebar .nav-item svg { width:19px; height:19px; flex-shrink:0; }
    .sidebar .nav-item .badge { margin-right:auto; background:#FEF2F2; color:#DC2626; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .sidebar .user-card { margin-top:auto; display:flex; align-items:center; gap:11px; padding:11px; border:1px solid #EEF2F6; border-radius:13px; cursor:pointer; }
    .sidebar .user-avatar { width:36px; height:36px; border-radius:10px; background:#1AA7EC; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .sidebar .user-name { font-size:13.5px; font-weight:600; }
    .sidebar .user-role { font-size:11.5px; color:#94A3B8; }
    .sidebar .user-card svg { width:16px; height:16px; color:#CBD5E1; flex-shrink:0; margin-right:auto; }
    .main-wrap { margin-right:248px; min-height:100vh; }
    @media(max-width:1024px){ .sidebar{display:none;} .main-wrap{margin-right:0;} }
  </style>

</head>
<body class="bg-[var(--background)] text-[#0F172A] min-h-screen">

  <!-- Cloud Design Sidebar -->
  <aside class="sidebar" id="cloud-sidebar">
    <div class="brand">
      <div class="icon"></div>
      <div class="name">Pharma<span>SUD</span></div>
    </div>
    <div class="nav-section">MENU</div>
    <a href="/dashboard" class="nav-item" id="nav-dashboard"><i data-lucide="layout-dashboard"></i><span>لوحة التحكم</span></a>
    <a href="/pos" class="nav-item" id="nav-pos"><i data-lucide="scan-barcode"></i><span>نقطة البيع</span></a>
    <a href="/medicines" class="nav-item active" id="nav-medicines"><i data-lucide="pill"></i><span>الأدوية</span></a>
    <a href="/inventory" class="nav-item" id="nav-inventory"><i data-lucide="package"></i><span>المخزون</span></a>
    <a href="/batches" class="nav-item" id="nav-batches"><i data-lucide="calendar-clock"></i><span>الدفعات</span></a>
    <a href="/reports-sales" class="nav-item" id="nav-reports"><i data-lucide="chart-line"></i><span>التقارير</span></a>
    <a href="/employees" class="nav-item" id="nav-employees" style="display:none"><i data-lucide="users"></i><span>الموظفين</span></a>
    <a href="/alerts" class="nav-item" id="nav-alerts"><i data-lucide="bell"></i><span>التنبيهات</span><span class="badge">7</span></a>
    <a href="/settings" class="nav-item" id="nav-settings"><i data-lucide="settings"></i><span>الإعدادات</span></a>
    <div class="user-card" onclick="logout()">
      <div class="user-avatar" id="user-initials">U</div>
      <div style="min-width:0;flex:1">
        <div class="user-name" id="user-name">المستخدم</div>
        <div class="user-role" id="user-role">صيدلي</div>
      </div>
      <i data-lucide="chevron-left"></i>
    </div>
  </aside>
  <script>
    function logout() { localStorage.clear(); window.location.href='/login'; }
    document.addEventListener('DOMContentLoaded', function() {
      const name = localStorage.getItem('userName') || 'المستخدم';
      const role = localStorage.getItem('role') || 'pharmacist';
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-role').textContent = role === 'admin' ? 'مدير' : 'صيدلي';
      document.getElementById('user-initials').textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      if(role === 'admin') document.getElementById('nav-employees').style.display='flex';
    });
  </script>

    <div x-data="medicinesListApp()" x-init="init()">
        <!-- Header -->
        <header class="bg-[var(--surface)] border-b border-[#EEF2F6] sticky top-0 z-10">
            <div class="max-w-3xl mx-auto px-4 py-4">
                <div class="flex justify-between items-center">
                    <h1 class="text-xl font-bold">قائمة الأدوية</h1>
                    <a href="/dashboard" class="text-[#94A3B8] hover:text-[#0F172A] flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                        الرجوع
                    </a>
                </div>
            </div>
        </header>

        <!-- Search and Filter -->
        <div class="max-w-3xl mx-auto px-4 py-4">
            <div class="bg-[var(--surface)] rounded-lg p-4 space-y-4">
                <!-- Search -->
                <div class="relative">
                    <input 
                        type="text" 
                        x-model="searchQuery"
                        @input="searchMedicines()"
                        placeholder="ابحث بالاسم أو الباركود..."
                        class="w-full bg-[var(--background)] border border-[#E2E8F0] rounded-lg px-4 py-3 pr-10 text-[#0F172A] placeholder-gray-400 focus:outline-none focus:border-[#1AA7EC]"
                    >
                    <svg class="absolute left-3 top-3.5 w-5 h-5 text-[#94A3B8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>

                <!-- Category Filter -->
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button 
                        @click="selectedCategory = ''; searchMedicines()"
                        :class="selectedCategory === '' ? 'bg-[#1AA7EC]' : 'bg-[var(--background)] border border-[#E2E8F0]'"
                        class="px-4 py-2 rounded-lg whitespace-nowrap text-sm"
                    >
                        الكل
                    </button>
                    <template x-for="category in categories" :key="category">
                        <button 
                            @click="selectedCategory = category; searchMedicines()"
                            :class="selectedCategory === category ? 'bg-[#1AA7EC]' : 'bg-[var(--background)] border border-[#E2E8F0]'"
                            class="px-4 py-2 rounded-lg whitespace-nowrap text-sm"
                            x-text="category"
                        ></button>
                    </template>
                </div>

                <!-- Add Button -->
                <a 
                    href="/medicine-form"
                    class="block w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold text-center"
                >
                    + إضافة دواء جديد
                </a>
            </div>
        </div>

        <!-- Medicines Grid -->
        <div class="max-w-3xl mx-auto px-4 pb-8">
            <div x-show="loading" class="text-center py-8">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#1AA7EC] mx-auto"></div>
                <p class="text-[#94A3B8] mt-4">جاري التحميل...</p>
            </div>

            <div x-show="!loading && medicines.length === 0" class="text-center py-8">
                <svg class="w-16 h-16 text-[#475569] mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                </svg>
                <p class="text-[#94A3B8]">لا توجد أدوية</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <template x-for="medicine in medicines" :key="medicine.id">
                    <div class="bg-[var(--surface)] rounded-lg overflow-hidden">
                        <!-- Image -->
                        <div class="h-32 bg-[var(--background)] flex items-center justify-center relative">
                            <img :src="medicine.image_url" class="h-full w-full object-contain p-4" :alt="medicine.trade_name">
                            <!-- Stock Status -->
                            <div 
                                class="absolute top-2 right-2 w-3 h-3 rounded-full"
                                :class="{
                                    'bg-green-500': medicine.stock_status === 'available',
                                    'bg-yellow-500': medicine.stock_status === 'low',
                                    'bg-red-500': medicine.stock_status === 'out'
                                }"
                            ></div>
                        </div>
                        
                        <!-- Content -->
                        <div class="p-4">
                            <h3 class="font-bold text-lg mb-1" x-text="medicine.trade_name"></h3>
                            <p class="text-[#94A3B8] text-sm mb-2" x-text="medicine.scientific_name || medicine.category"></p>
                            
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-[#1AA7EC] font-bold" x-text="medicine.sale_price + ' ج.س'"></span>
                                <span class="text-[#94A3B8] text-sm" x-text="'مخزون: ' + medicine.total_stock + ' ' + medicine.base_unit"></span>
                            </div>
                            
                            <!-- Actions -->
                            <div class="flex gap-2">
                                <a 
                                    :href="'/medicine-form?id=' + medicine.id"
                                    class="flex-1 bg-[#1AA7EC] hover:bg-blue-700 py-2 rounded-lg text-sm text-center"
                                >
                                    تعديل
                                </a>
                                <button 
                                    @click="deleteMedicine(medicine.id, medicine.trade_name)"
                                    x-show="isAdmin"
                                    class="px-3 bg-red-600 hover:bg-red-700 py-2 rounded-lg text-sm"
                                >
                                    حذف
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function medicinesListApp() {
            return {
                medicines: [],
                categories: [],
                searchQuery: '',
                selectedCategory: '',
                loading: true,
                isAdmin: false,

                async init() {
                    // Check if admin from stored role
                    this.isAdmin = localStorage.getItem('role') === 'admin';
                    
                    await this.loadCategories();
                    await this.loadMedicines();
                },

                async loadCategories() {
                    try {
                        const response = await fetch('/api/medicines/categories/list', {
                            headers: {
                                'Authorization': 'Bearer ' + localStorage.getItem('token')
                            }
                        });
                        const data = await response.json();
                        this.categories = data.categories;
                    } catch (error) {
                        console.error('Error loading categories:', error);
                    }
                },

                async loadMedicines() {
                    this.loading = true;
                    try {
                        let url = '/api/medicines/';
                        const params = new URLSearchParams();
                        
                        if (this.searchQuery) {
                            params.append('search', this.searchQuery);
                        }
                        if (this.selectedCategory) {
                            params.append('category', this.selectedCategory);
                        }
                        
                        if (params.toString()) {
                            url += '?' + params.toString();
                        }

                        const response = await fetch(url, {
                            headers: {
                                'Authorization': 'Bearer ' + localStorage.getItem('token')
                            }
                        });
                        const data = await response.json();
                        this.medicines = data.medicines;
                    } catch (error) {
                        console.error('Error loading medicines:', error);
                    } finally {
                        this.loading = false;
                    }
                },

                searchMedicines() {
                    // Debounce search
                    clearTimeout(this.searchTimeout);
                    this.searchTimeout = setTimeout(() => {
                        this.loadMedicines();
                    }, 300);
                },

                async deleteMedicine(id, name) {
                    if (!confirm(`هل تريد حذف "${name}"؟`)) {
                        return;
                    }

                    try {
                        const response = await fetch(`/api/medicines/${id}`, {
                            method: 'DELETE',
                            headers: {
                                'Authorization': 'Bearer ' + localStorage.getItem('token')
                            }
                        });
                        const data = await response.json();
                        
                        if (data.success) {
                            alert('تم الحذف بنجاح');
                            this.loadMedicines();
                        } else {
                            alert(data.message || 'لا يمكن الحذف');
                        }
                    } catch (error) {
                        alert('فشل في الاتصال بالسيرفر');
                    }
                }
            }
        }
    </script>
</body>
</html>
