<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <title>الأدوية - PharmaSUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ─── */
    .app-layout { display: flex; min-height: 100vh; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 248px; background: #fff; border-left: 1px solid #EEF2F6;
      display: flex; flex-direction: column; padding: 22px 16px;
      position: fixed; right: 0; top: 0; bottom: 0; z-index: 100;
    }
    .sidebar .brand { display: flex; align-items: center; gap: 11px; padding: 0 8px 22px; }
    .sidebar .brand .icon {
      width: 38px; height: 38px; border-radius: 11px;
      background: #1AA7EC; position: relative; flex-shrink: 0;
    }
    .sidebar .brand .icon::before, .sidebar .brand .icon::after {
      content: ''; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%); background: #fff; border-radius: 3px;
    }
    .sidebar .brand .icon::before { width: 18px; height: 5.5px; }
    .sidebar .brand .icon::after { width: 5.5px; height: 18px; }
    .sidebar .brand .name {
      font: 700 18px/1 'IBM Plex Sans Arabic', sans-serif; letter-spacing: -0.02em;
    }
    .sidebar .brand .name span { color: #1AA7EC; }
    .sidebar .nav-section {
      font: 600 11px/1 'IBM Plex Mono', monospace; letter-spacing: 0.1em;
      color: #CBD5E1; padding: 14px 10px 10px;
    }
    .sidebar .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 12px; border-radius: 11px;
      color: #475569; font-size: 14px; font-weight: 500;
      text-decoration: none; margin-bottom: 4px;
      transition: all 0.2s ease;
    }
    .sidebar .nav-item:hover { background: #F8FAFC; color: #0F172A; }
    .sidebar .nav-item.active {
      background: #1AA7EC; color: #fff;
      box-shadow: 0 8px 18px -8px rgba(26, 167, 236, 0.55);
    }
    .sidebar .nav-item svg { width: 19px; height: 19px; flex-shrink: 0; }
    .sidebar .nav-item .badge {
      margin-right: auto; background: #FEF2F2; color: #DC2626;
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    }
    .sidebar .user-card {
      margin-top: auto; display: flex; align-items: center; gap: 11px;
      padding: 11px; border: 1px solid #EEF2F6; border-radius: 13px; cursor: pointer;
    }
    .sidebar .user-avatar {
      width: 36px; height: 36px; border-radius: 10px; background: #1AA7EC;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .sidebar .user-name { font-size: 13.5px; font-weight: 600; }
    .sidebar .user-role { font-size: 11.5px; color: #94A3B8; }
    .sidebar .user-card svg { width: 16px; height: 16px; color: #CBD5E1; flex-shrink: 0; }

    /* ─── Topbar ─── */
    .topbar {
      height: 70px; background: #fff; border-bottom: 1px solid #EEF2F6;
      display: flex; align-items: center; padding: 0 28px; gap: 18px;
      position: fixed; top: 0; right: 248px; left: 0; z-index: 90;
    }
    .topbar .page-info h1 {
      font: 700 20px/1 'IBM Plex Sans Arabic', sans-serif; letter-spacing: -0.02em;
      margin: 0;
    }
    .topbar .page-info .subtitle {
      font-size: 12.5px; color: #64748B; margin-top: 3px;
    }
    .topbar .search-box {
      display: flex; align-items: center; gap: 10px; flex: 1; max-width: 380px;
      height: 42px; padding: 0 14px; border-radius: 11px; background: #F6F8FA;
      font-size: 14px;
    }
    .topbar .search-box input {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: inherit; font-size: 14px; color: #0F172A;
    }
    .topbar .search-box input::placeholder { color: #94A3B8; }
    .topbar .search-box svg { width: 18px; height: 18px; color: #94A3B8; flex-shrink: 0; }
    .topbar .search-box kbd {
      margin-right: auto; font: 500 11px 'IBM Plex Mono', monospace;
      color: #CBD5E1; border: 1px solid #E2E8F0; border-radius: 6px; padding: 2px 6px;
    }
    .topbar .actions { margin-right: auto; display: flex; align-items: center; gap: 12px; }
    .topbar .lang-toggle {
      display: flex; border: 1px solid #E2E8F0; border-radius: 9px;
      overflow: hidden; font-size: 13px; font-weight: 600;
    }
    .topbar .lang-toggle span { padding: 7px 12px; color: #64748B; }
    .topbar .lang-toggle span.active { background: #1AA7EC; color: #fff; }
    .topbar .icon-btn {
      width: 42px; height: 42px; border-radius: 11px; border: 1px solid #E2E8F0;
      display: flex; align-items: center; justify-content: center;
      color: #475569; background: transparent; cursor: pointer; position: relative;
      transition: all 0.2s ease;
    }
    .topbar .icon-btn:hover { background: #F8FAFC; }
    .topbar .icon-btn svg { width: 18px; height: 18px; }
    .topbar .icon-btn .dot {
      position: absolute; top: 9px; left: 11px; width: 8px; height: 8px;
      border-radius: 50%; background: #DC2626; border: 2px solid #fff;
    }
    .topbar .btn-add {
      display: flex; align-items: center; gap: 8px;
      height: 42px; padding: 0 18px; border-radius: 11px;
      background: #1AA7EC; color: #fff; border: none; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600;
      box-shadow: 0 10px 22px -8px rgba(26, 167, 236, 0.55);
      transition: all 0.2s ease; text-decoration: none;
    }
    .topbar .btn-add:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .topbar .btn-add svg { width: 17px; height: 17px; }

    /* ─── Main Content ─── */
    .main-content {
      margin-right: 248px; padding: calc(70px + 28px) 28px 28px; min-height: 100vh;
    }

    /* ─── Category Chips ─── */
    .chips-bar {
      display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto;
      padding-bottom: 4px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 999px;
      font-size: 13.5px; font-weight: 600; cursor: pointer;
      border: 1px solid #E2E8F0; background: #fff; color: #475569;
      transition: all 0.2s ease; white-space: nowrap;
    }
    .chip:hover { background: #F8FAFC; border-color: #CBD5E1; }
    .chip.active {
      background: #1AA7EC; color: #fff; border-color: #1AA7EC;
      box-shadow: 0 6px 14px -4px rgba(26, 167, 236, 0.45);
    }
    .chip svg { width: 14px; height: 14px; }

    /* ─── Medicines Grid ─── */
    .med-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;
    }

    /* ─── Medicine Card ─── */
    .med-card {
      background: #fff; border: 1px solid #EEF2F6; border-radius: 16px;
      overflow: hidden; transition: all 0.25s ease;
    }
    .med-card:hover {
      border-color: #CBD5E1; box-shadow: 0 8px 20px -6px rgba(15, 23, 42, 0.08);
      transform: translateY(-2px);
    }
    .med-card .card-img {
      height: 140px; background: #F6F8FA; display: flex;
      align-items: center; justify-content: center; position: relative;
      overflow: hidden;
    }
    .med-card .card-img img {
      width: 100%; height: 100%; object-fit: contain; padding: 12px;
    }
    .med-card .card-img .placeholder-icon {
      color: #CBD5E1; width: 48px; height: 48px;
    }
    .med-card .card-img .stock-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      backdrop-filter: blur(8px);
    }
    .med-card .card-img .stock-badge.available {
      background: rgba(22, 163, 74, 0.15); color: #16A34A;
    }
    .med-card .card-img .stock-badge.low {
      background: rgba(245, 158, 11, 0.15); color: #D97706;
    }
    .med-card .card-img .stock-badge.out {
      background: rgba(220, 38, 38, 0.15); color: #DC2626;
    }
    .med-card .card-body { padding: 16px 18px 18px; }
    .med-card .card-body .med-name {
      font: 700 15px/1.3 'IBM Plex Sans Arabic', sans-serif;
      color: #0F172A; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .med-card .card-body .med-category {
      font-size: 12.5px; color: #94A3B8; font-weight: 500;
      margin-bottom: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .med-card .card-body .med-stock {
      display: flex; align-items: baseline; gap: 4px;
      margin-bottom: 10px; font-size: 13px;
    }
    .med-card .card-body .med-stock .qty {
      font-weight: 700; color: #0F172A; font-size: 18px;
    }
    .med-card .card-body .med-stock .unit {
      color: #94A3B8; font-weight: 500;
    }
    .med-card .card-body .med-price {
      font: 700 17px/1 'IBM Plex Sans Arabic', sans-serif;
      color: #1AA7EC; margin-bottom: 14px;
    }
    .med-card .card-body .med-price .currency {
      font-size: 12px; color: #64748B; font-weight: 600; margin-right: 3px;
    }
    .med-card .card-body .card-actions {
      display: flex; gap: 8px;
    }
    .med-card .card-body .btn-edit {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      height: 36px; border-radius: 9px; font-size: 13px; font-weight: 600;
      border: 1px solid #E2E8F0; background: #fff; color: #334155;
      cursor: pointer; text-decoration: none;
      transition: all 0.2s ease;
    }
    .med-card .card-body .btn-edit:hover { background: #F8FAFC; border-color: #CBD5E1; }
    .med-card .card-body .btn-edit svg { width: 14px; height: 14px; }
    .med-card .card-body .btn-delete {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      height: 36px; padding: 0 12px; border-radius: 9px;
      font-size: 13px; font-weight: 600; border: none;
      background: #FEF2F2; color: #DC2626; cursor: pointer;
      transition: all 0.2s ease;
    }
    .med-card .card-body .btn-delete:hover { background: #FEE2E2; }
    .med-card .card-body .btn-delete svg { width: 14px; height: 14px; }

    /* ─── Empty & Loading States ─── */
    .state-container {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; text-align: center;
    }
    .state-container .state-icon {
      width: 64px; height: 64px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    .state-container .state-icon svg { width: 28px; height: 28px; }
    .state-container .state-icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .state-container .state-icon.gray { background: #F1F5F9; color: #94A3B8; }
    .state-container .state-title {
      font: 600 17px/1.3 'IBM Plex Sans Arabic', sans-serif;
      color: #0F172A; margin-bottom: 6px;
    }
    .state-container .state-desc {
      font-size: 14px; color: #94A3B8; max-width: 280px;
    }

    /* ─── Spinner ─── */
    .spinner {
      width: 40px; height: 40px; border: 3px solid #EEF2F6;
      border-top-color: #1AA7EC; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ─── */
    @media (max-width: 1280px) {
      .med-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 1024px) {
      .topbar { right: 0; }
      .main-content { margin-right: 0; }
      .med-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .med-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; gap: 10px; }
      .topbar .page-info { display: none; }
      .main-content { padding: calc(70px + 16px) 16px 16px; }
      .chips-bar { gap: 6px; }
    }

    /* ─── Dark Mode ─── */
    body.dark-mode body,     body.dark-mode .notif-dropdown { background: #1E293B; border-color: #334155; }
    body.dark-mode .notif-header { color: #E2E8F0; border-color: #334155; }
    body.dark-mode .notif-item { border-color: #1E293B; }
    body.dark-mode .notif-item:hover { background: #111C2E; }
    body.dark-mode .notif-title { color: #F1F5F9; }
    body.dark-mode .notif-desc { color: #94A3B8; }
    body.dark-mode .notif-time { color: #64748B; }
    body.dark-mode .notif-empty { color: #64748B; }
    body.dark-mode .main-content { background: #0F172A; color: #E2E8F0; }
    body.dark-mode .sidebar { background: #1E293B; border-color: #334155; }
    body.dark-mode .sidebar .nav-item { color: #94A3B8; }
    body.dark-mode .sidebar .nav-item:hover { background: #334155; color: #E2E8F0; }
    body.dark-mode .sidebar .user-card { border-color: #334155; }
    body.dark-mode .sidebar .user-role { color: #64748B; }
    body.dark-mode .topbar { background: #1E293B; border-color: #334155; }
    body.dark-mode .topbar .search-box { background: #334155; }
    body.dark-mode .topbar .search-box input { color: #E2E8F0; }
    body.dark-mode .topbar .icon-btn { border-color: #334155; color: #94A3B8; }
    body.dark-mode .topbar .icon-btn:hover { background: #334155; }
    body.dark-mode .topbar .lang-toggle { border-color: #334155; }
    body.dark-mode .topbar .lang-toggle span { color: #94A3B8; }
    body.dark-mode .chip { background: #1E293B; border-color: #334155; color: #94A3B8; }
    body.dark-mode .chip:hover { background: #334155; }
    body.dark-mode .med-card { background: #1E293B; border-color: #334155; }
    body.dark-mode .med-card:hover { border-color: #475569; box-shadow: 0 8px 20px -6px rgba(0,0,0,0.3); }
    body.dark-mode .med-card .card-img { background: #0F172A; }
    body.dark-mode .med-card .med-name { color: #E2E8F0; }
    body.dark-mode .med-card .med-stock .qty { color: #E2E8F0; }
    body.dark-mode .med-card .card-body .btn-edit { background: #334155; border-color: #475569; color: #CBD5E1; }
    body.dark-mode .med-card .card-body .btn-edit:hover { background: #475569; }
    body.dark-mode .med-card .card-body .btn-delete { background: rgba(220,38,38,0.15); color: #F87171; }
    body.dark-mode .med-card .card-body .btn-delete:hover { background: rgba(220,38,38,0.25); }
      .notif-dropdown {
      position: absolute; top: 64px; left: 0; width: 380px; max-height: 460px;
      background: #fff; border: 1px solid #E2E8F0; border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12); z-index: 200; overflow: hidden;
    }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #E2E8F0;
      font-weight: 700; font-size: 14px; color: #0F172A;
    }
    .notif-header a { font-size: 12px; color: #1AA7EC; text-decoration: none; }
    .notif-list { max-height: 340px; overflow-y: auto; }
    .notif-item {
      display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #F1F5F9;
      cursor: pointer; transition: background 0.15s;
    }
    .notif-item:hover { background: #F6F8FA; }
    .notif-item .notif-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .notif-icon.expiry { background: #FEF3C7; color: #D97706; }
    .notif-icon.stock { background: #FEE2E2; color: #DC2626; }
    .notif-icon.system { background: #DBEAFE; color: #2563EB; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 13px; font-weight: 600; color: #0F172A; }
    .notif-desc { font-size: 12px; color: #64748B; margin-top: 2px; }
    .notif-time { font-size: 11px; color: #94A3B8; margin-top: 3px; }
    .notif-empty { padding: 28px 16px; text-align: center; color: #94A3B8; font-size: 13px; }
    .notif-loading { padding: 16px; text-align: center; color: #64748B; font-size: 13px; }

  </style>
</head>
<body x-data="medicinesListApp()" x-init="init()">

  <div class="app-layout">

    <!-- ═══════ Sidebar ═══════ -->
    <aside class="sidebar">
      <div class="brand">
        <div class="icon"></div>
        <div class="name">Pharma<span>SUD</span></div>
      </div>
      <div class="nav-section">MENU</div>
      <a href="/dashboard" class="nav-item" id="nav-dashboard">
        <i data-lucide="layout-dashboard"></i><span>لوحة التحكم</span>
      </a>
      <a href="/pos" class="nav-item" id="nav-pos">
        <i data-lucide="scan-barcode"></i><span>نقطة البيع</span>
      </a>
      <a href="/medicines" class="nav-item active" id="nav-medicines">
        <i data-lucide="pill"></i><span>الأدوية</span>
      </a>
      <a href="/inventory" class="nav-item" id="nav-inventory">
        <i data-lucide="package"></i><span>المخزون</span>
      </a>
      <a href="/batch-receive" class="nav-item" id="nav-batches">
        <i data-lucide="calendar-clock"></i><span>الدفعات</span>
      </a>
      <a href="/reports-sales" class="nav-item" id="nav-reports">
        <i data-lucide="chart-line"></i><span>التقارير</span>
      </a>
      <a href="/employees" class="nav-item" id="nav-employees" x-show="isAdmin">
        <i data-lucide="users"></i><span>الموظفين</span>
      </a>
      <a href="/alerts" class="nav-item" id="nav-alerts">
        <i data-lucide="bell"></i><span>التنبيهات</span><span class="badge">7</span>
      </a>
      <a href="/settings" class="nav-item" id="nav-settings">
        <i data-lucide="settings"></i><span>الإعدادات</span>
      </a>
      <div class="user-card" @click="logout()">
        <div class="user-avatar" x-text="userInitials"></div>
        <div style="min-width:0;flex:1">
          <div class="user-name" x-text="userName || 'المستخدم'"></div>
          <div class="user-role" x-text="isAdmin ? 'مدير' : 'صيدلي'"></div>
        </div>
        <i data-lucide="chevron-left"></i>
      </div>
    </aside>

    <!-- ═══════ Topbar ═══════ -->
    <header class="topbar">
      <!-- Mobile Menu Button - FIRST (RTL: rightmost) -->
      <button class="mobile-menu-btn" @click="toggleMobileSidebar()" aria-label="فتح القائمة" title="القائمة">
        <i data-lucide="menu"></i>
      </button>
      <div class="page-info">
        <h1>الأدوية</h1>
        <div class="subtitle">إدارة وتتبع أدوية الصيدلية</div>
      </div>
      <div class="search-box">
        <i data-lucide="search"></i>
        <input type="text" x-model="searchQuery" @input="searchMedicines()" placeholder="ابحث بالاسم أو الباركود...">
        <kbd>/</kbd>
      </div>
      <div class="actions">
        <div class="lang-toggle">
          <span>EN</span>
          <span class="active">ع</span>
        </div>
        <button class="icon-btn" @click="toggleDarkMode()" title="الوضع الداكن">
          <i data-lucide="moon"></i>
        </button>
        <button class="icon-btn" @click="$window.location.href='/alerts'" title="التنبيهات">
          <i data-lucide="bell"></i>
          <span class="dot"></span>
        </button>
        <a href="/medicine-form" class="btn-add">
          <i data-lucide="plus"></i>
          <span>إضافة دواء</span>
        </a>
      </div>
    </header>

    <!-- ═══════ Main Content ═══════ -->
    <main class="main-content">

      <!-- Category Filter Chips -->
      <div class="chips-bar">
        <button class="chip" :class="{ 'active': selectedCategory === '' }"
                @click="selectedCategory = ''; searchMedicines()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
          الكل
        </button>
        <template x-for="category in categories" :key="category">
          <button class="chip" :class="{ 'active': selectedCategory === category }"
                  @click="selectedCategory = category; searchMedicines()"
                  x-text="category">
          </button>
        </template>
      </div>

      <!-- Loading State -->
      <div x-show="loading" class="state-container">
        <div class="spinner"></div>
        <p style="margin-top: 16px; color: #94A3B8; font-size: 14px;">جاري تحميل الأدوية...</p>
      </div>

      <!-- Empty State -->
      <div x-show="!loading && medicines.length === 0" class="state-container">
        <div class="state-icon gray">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
        </div>
        <div class="state-title">لا توجد أدوية</div>
        <div class="state-desc">لم يتم العثور على أدوية مطابقة. جرّب تغيير عامل التصفية أو أضف دواءً جديدًا.</div>
        <a href="/medicine-form" style="margin-top: 18px;" class="btn-add">
          <i data-lucide="plus"></i>
          <span>إضافة دواء</span>
        </a>
      </div>

      <!-- Medicines Grid -->
      <div x-show="!loading && medicines.length > 0" class="med-grid">
        <template x-for="medicine in medicines" :key="medicine.id">
          <div class="med-card">
            <!-- Image + Stock Badge -->
            <div class="card-img">
              <img x-show="medicine.image_url" :src="medicine.image_url" :alt="medicine.trade_name"
                   @error="$event.target.style.display='none'; $event.target.nextElementSibling.style.display='flex'">
              <div class="placeholder-icon" :style="medicine.image_url ? 'display:none' : 'display:flex'">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
              </div>
              <div class="stock-badge"
                   :class="{
                     'available': medicine.stock_status === 'available',
                     'low': medicine.stock_status === 'low',
                     'out': medicine.stock_status === 'out'
                   }"
                   x-text="medicine.stock_status === 'available' ? 'متوفر' :
                           medicine.stock_status === 'low' ? 'منخفض' : 'نفد'">
              </div>
            </div>
            <!-- Body -->
            <div class="card-body">
              <div class="med-name" x-text="medicine.trade_name" :title="medicine.trade_name"></div>
              <div class="med-category" x-text="medicine.category || medicine.scientific_name || ''"></div>
              <div class="med-stock">
                <span class="qty" x-text="medicine.total_stock"></span>
                <span class="unit" x-text="medicine.base_unit"></span>
              </div>
              <div class="med-price">
                <span class="currency">ج.س</span>
                <span x-text="medicine.sale_price"></span>
              </div>
              <div class="card-actions">
                <a :href="'/medicine-form?id=' + medicine.id" class="btn-edit">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                  تعديل
                </a>
                <button x-show="isAdmin"
                        @click="deleteMedicine(medicine.id, medicine.trade_name)"
                        class="btn-delete">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                  حذف
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>

    </main>
  </div>

  <!-- ═══════ Alpine.js App ═══════ -->
  <script>
    function medicinesListApp() {
      return {
        medicines: [],
        categories: [],
        searchQuery: '',
        selectedCategory: '',
        loading: true,
        isAdmin: false,
        userName: localStorage.getItem('userName') || 'المستخدم',
        userInitials: '',

        async init() {
          this.isAdmin = localStorage.getItem('role') === 'admin';
          const name = this.userName;
          this.userInitials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
          await this.loadCategories();
          await this.loadMedicines();
        },

        async loadCategories() {
          try {
            const response = await fetch('/api/medicines/categories/list', {
              headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
              }
            });
            const data = await response.json();
            this.categories = data.categories;
          } catch (error) {
            console.error('Error loading categories:', error);
          }
        },

        async loadMedicines() {
          this.loading = true;
          try {
            let url = '/api/medicines/';
            const params = new URLSearchParams();

            if (this.searchQuery) {
              params.append('search', this.searchQuery);
            }
            if (this.selectedCategory) {
              params.append('category', this.selectedCategory);
            }

            if (params.toString()) {
              url += '?' + params.toString();
            }

            const response = await fetch(url, {
              headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
              }
            });
            const data = await response.json();
            this.medicines = data.medicines;
          } catch (error) {
            console.error('Error loading medicines:', error);
          } finally {
            this.loading = false;
          }
        },

        searchMedicines() {
          clearTimeout(this.searchTimeout);
          this.searchTimeout = setTimeout(() => {
            this.loadMedicines();
          }, 300);
        },

        async deleteMedicine(id, name) {
          if (!confirm(`هل تريد حذف "${name}"؟`)) {
            return;
          }

          try {
            const response = await fetch(`/api/medicines/${id}`, {
              method: 'DELETE',
              headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token')
              }
            });
            const data = await response.json();

            if (data.success) {
              alert('تم الحذف بنجاح');
              this.loadMedicines();
            } else {
              alert(data.message || 'لا يمكن الحذف');
            }
          } catch (error) {
            alert('فشل في الاتصال بالسيرفر');
          }
        },

        toggleDarkMode() {
          document.body.classList.toggle('dark-mode');
          localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        },

        logout() {
          localStorage.clear();
          window.location.href = '/login';
        }
      
        ,async loadNotifications() {
          this.notificationsLoading = true;
          try {
            const token = localStorage.getItem('token');
            const r = await fetch('/api/alerts/count', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (r.ok) {
              const data = await r.json();
              this.notifications = [];
              // Build notification items from count data
              if (data.total_count > 0 || data.expiry_count > 0 || data.low_stock_count > 0) {
                if (data.expiry_count > 0) {
                  this.notifications.push({
                    id: 'expiry', type: 'expiry',
                    title: 'تنبيهات الصلاحية',
                    message: data.expiry_count + ' دووان قاربت على الانتهاء',
                    time: 'الآن',
                    href: '/alerts'
                  });
                }
                if (data.low_stock_count > 0) {
                  this.notifications.push({
                    id: 'stock', type: 'low_stock',
                    title: 'تنبيهات المخزون',
                    message: data.low_stock_count + ' دووان مخزونها منخفض',
                    time: 'الآن',
                    href: '/medicines'
                  });
                }
              }
            }
          } catch (e) { /* silent */ }
          this.notificationsLoading = false;
        },

        toggleMobileSidebar() {
          const sidebar = document.querySelector('.sidebar');
          const overlay = document.querySelector('.sidebar-overlay');
          const btn = document.querySelector('.mobile-menu-btn');

          if (!sidebar) return;

          const isOpen = sidebar.classList.toggle('open');

          if (!overlay) {
            const newOverlay = document.createElement('div');
            newOverlay.className = 'sidebar-overlay';
            document.body.appendChild(newOverlay);
            newOverlay.addEventListener('click', () => this.closeMobileSidebar());
          }

          const finalOverlay = document.querySelector('.sidebar-overlay');
          if (isOpen) {
            finalOverlay.classList.add('visible');
            if (btn) btn.classList.add('active');
            document.body.style.overflow = 'hidden';
            this._escHandler = this._escHandler || this.handleEscKey.bind(this);
            document.addEventListener('keydown', this._escHandler);
          } else {
            finalOverlay.classList.remove('visible');
            if (btn) btn.classList.remove('active');
            document.body.style.overflow = '';
            if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
          }
        },

        handleEscKey(e) {
          if (e.key === 'Escape') {
            this.closeMobileSidebar();
          }
        },

        closeMobileSidebar() {
          const sidebar = document.querySelector('.sidebar');
          const overlay = document.querySelector('.sidebar-overlay');
          const btn = document.querySelector('.mobile-menu-btn');

          if (sidebar) sidebar.classList.remove('open');
          if (overlay) overlay.classList.remove('visible');
          if (btn) btn.classList.remove('active');
          document.body.style.overflow = '';
          if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
        },
      }    }

    // Initialize Lucide icons
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      // Restore dark mode preference
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
      }
    });

        
  </script>

</body>
