<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج الدواء - صيدلية الزاريات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-[#0F172A] text-white min-h-screen">
    <div x-data="medicineFormApp()" x-init="init()">
        <!-- Header -->
        <header class="bg-[#1E293B] border-b border-gray-700">
            <div class="max-w-3xl mx-auto px-4 py-4">
                <div class="flex justify-between items-center">
                    <h1 class="text-xl font-bold" x-text="isEdit ? 'تعديل دواء' : 'إضافة دواء جديد'">إضافة دواء جديد</h1>
                    <a href="/medicines" class="text-gray-400 hover:text-white flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                        الرجوع
                    </a>
                </div>
            </div>
        </header>
        <!-- Form -->
        <div class="max-w-3xl mx-auto px-4 py-8">
            <form @submit.prevent="saveMedicine()" class="bg-[#1E293B] rounded-lg p-6 space-y-6">
                <!-- Image Upload -->
                <div class="flex flex-col items-center">
                    <div class="relative w-48 h-48 bg-[#0F172A] rounded-lg overflow-hidden border-2 border-dashed border-gray-600">
                        <img :src="previewImage || '/static/images/default-medicine.svg'" class="w-full h-full object-contain p-4" alt="">
                        <input 
                            type="file" 
                            @change="handleImageUpload($event)"
                            accept="image/*"
                            class="absolute inset-0 opacity-0 cursor-pointer"
                        >
                    </div>
                    <p class="text-gray-400 text-sm mt-2">اضغط لرفع صورة (اختياري)</p>
                </div>
                <!-- Barcode -->
                <div>
                    <label class="block text-sm font-medium mb-2">الباركود</label>
                    <div class="flex gap-2">
                        <input 
                            type="text" 
                            x-model="form.barcode"
                            placeholder="امسح أو أدخل الباركود"
                            class="flex-1 bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
                        >
                        <button 
                            type="button"
                            @click="openBarcodeScanner()"
                            class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- Trade Name -->
                <div>
                    <label class="block text-sm font-medium mb-2">الاسم التجاري *</label>
                    <input 
                        type="text" 
                        x-model="form.trade_name"
                        placeholder="مثال: بانادول أزرق"
                        class="w-full bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
                        :class="{'border-red-500': errors.trade_name}"
                    >
                    <p x-show="errors.trade_name" class="text-red-400 text-xs mt-1" x-text="errors.trade_name"></p>
                </div>
                <!-- Scientific Name -->
                <div>
                    <label class="block text-sm font-medium mb-2">الاسم العلمي</label>
                    <input 
                        type="text" 
                        x-model="form.scientific_name"
                        placeholder="مثال: Paracetamol"
                        class="w-full bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
                    >
                </div>
                <!-- Category -->
                <div>
                    <label class="block text-sm font-medium mb-2">التصنيف *</label>
                    <select 
                        x-model="form.category"
                        class="w-full bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"
                    >
                        <option value="">اختر التصنيف</option>
                        <template x-for="cat in categories" :key="cat">
                            <option :value="cat" x-text="cat"></option>
                        </template>
                    </select>
                </div>
                <!-- Prices & Unit -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">سعر البيع *</label>
                        <input 
                            type="number" 
                            x-model="form.sale_price"
                            step="0.01"
                            min="0"
                            placeholder="سعر البيع للجمهور"
                            class="w-full bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">سعر الشراء</label>
                        <input 
                            type="number" 
                            x-model="form.purchase_price"
                            step="0.01"
                            min="0"
                            placeholder="سعر الشراء"
                            class="w-full bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">الحد الأدنى</label>
                        <input 
                            type="number" 
                            x-model="form.min_stock"
                            min="1"
                            placeholder="الحد الأدنى للمخزون"
                            class="w-full bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500"
                        >
                    </div>
                </div>
                <!-- Base Unit -->
                <div>
                    <label class="block text-sm font-medium mb-2">الوحدة الأساسية</label>
                    <select 
                        x-model="form.base_unit"
                        class="w-full bg-[#0F172A] border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"
                    >
                        <option value="strip">شريط</option>
                        <option value="bottle">زجاجة</option>
                        <option value="box">علبة</option>
                        <option value="vial">أمبولة</option>
                        <option value="tube">أنبوب</option>
                        <option value="sachet">ظرف</option>
                        <option value="spray">بخاخ</option>
                        <option value="piece">قطعة</option>
                        <option value="ml">مل</option>
                        <option value="g">جم</option>
                        <option value="other">أخرى</option>
                    </select>
                </div>
                <!-- Submit -->
                <div>
                    <button 
                        type="submit"
                        :disabled="saving"
                        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-800 py-3 rounded-lg font-bold text-lg"
                    >
                        <span x-show="!saving" x-text="isEdit ? 'حفظ التعديلات' : 'إضافة الدواء'"></span>
                        <span x-show="saving">جاري الحفظ...</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- ====== Barcode Scanner Modal ====== -->
        <div x-show="showScanner" class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
            <div class="bg-[#1E293B] rounded-lg w-full max-w-lg p-4 relative">
                <!-- زر إغلاق -->
                <button @click="closeScanner()" class="absolute top-2 left-2 z-10 bg-black bg-opacity-50 rounded-full p-1 text-white hover:bg-opacity-70">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
                <h3 class="text-lg font-bold mb-3 text-center">مسح الباركود</h3>
                <!-- كاميرا مباشرة -->
                <div class="relative">
                    <video id="scanner-video" autoplay playsinline class="w-full h-64 bg-black rounded-lg object-cover"></video>
                    <!-- إطار توجيه -->
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div class="border-2 border-green-400 rounded-lg w-3/4 h-2/5 opacity-70"></div>
                    </div>
                </div>
                <p class="text-center text-gray-400 text-sm mt-2">وجّه الكاميرا نحو الباركود ثم اضغط الزر</p>
                <!-- زر التصوير -->
                <button @click="captureBarcode()" :disabled="scanning" class="w-full mt-3 bg-green-600 hover:bg-green-700 disabled:bg-green-800 py-3 rounded-lg font-bold text-lg flex items-center justify-center gap-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span x-text="scanning ? 'جاري المسح...' : '📷 تصوير الباركود'"></span>
                </button>
                <canvas id="scanner-canvas" class="hidden"></canvas>
                <!-- حقل إدخال يدوي (احتياطي) -->
                <div class="mt-4 pt-3 border-t border-gray-600">
                    <p class="text-xs text-gray-400 mb-2">أو أدخل الرقم يدوياً:</p>
                    <div class="flex gap-2">
                        <input type="text" x-model="manualBarcode" placeholder="رقم الباركود"
                            class="flex-1 bg-[#0F172A] border border-gray-600 rounded-lg px-3 py-2 text-white text-sm placeholder-gray-400 focus:outline-none focus:border-blue-500"
                            @keyup.enter="useManualBarcode()">
                        <button @click="useManualBarcode()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-lg text-sm">تأكيد</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        function medicineFormApp() {
            return {
                isEdit: false,
                isAdmin: false,
                saving: false,
                showScanner: false,
                scanning: false,
                manualBarcode: '',
                categories: [],
                previewImage: null,
                mediaStream: null,
                form: {
                    trade_name: '',
                    scientific_name: '',
                    category: '',
                    barcode: '',
                    sale_price: '',
                    purchase_price: '',
                    base_unit: 'strip',
                    min_stock: 10,
                    image_path: '',
                },
                errors: {},
                async init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const medicineId = urlParams.get('id');
                    // Check if admin from stored role
                    this.isAdmin = localStorage.getItem('role') === 'admin';

                    // Redirect non-admin
                    if (!this.isAdmin) {
                        alert('هذه الصفحة للمدير فقط');
                        window.location.href = '/dashboard';
                        return;
                    }

                    const barcode = urlParams.get('barcode');
                    await this.loadCategories();
                    if (medicineId) {
                        this.isEdit = true;
                        await this.loadMedicine(medicineId);
                    } else if (barcode) {
                        this.form.barcode = barcode;
                    }
                },
                async loadCategories() {
                    try {
                        const response = await fetch('/api/medicines/categories/list', {
                            headers: {
                                'Authorization': 'Bearer ' + localStorage.getItem('token')
                            }
                        });
                        const data = await response.json();
                        this.categories = data.categories;
                    } catch (error) {
                        console.error('Error loading categories:', error);
                    }
                },
                async loadMedicine(id) {
                    try {
                        const response = await fetch(`/api/medicines/${id}`, {
                            headers: {
                                'Authorization': 'Bearer ' + localStorage.getItem('token')
                            }
                        });
                        const data = await response.json();
                        this.form = {
                            trade_name: data.trade_name,
                            scientific_name: data.scientific_name || '',
                            category: data.category,
                            barcode: data.barcode || '',
                            sale_price: data.sale_price,
                            purchase_price: data.purchase_price || '',
                            base_unit: data.base_unit,
                            min_stock: data.min_stock,
                            image_path: data.image_url || '',
                        };
                        if (data.image_url && !data.image_url.includes('default')) {
                            this.previewImage = data.image_url;
                        }
                    } catch (error) {
                        console.error('Error loading medicine:', error);
                    }
                },
                async handleImageUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const formData = new FormData();
                    formData.append('file', file);
                    try {
                        const response = await fetch('/api/medicines/upload-image', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + localStorage.getItem('token')
                            },
                            body: formData
                        });
                        const data = await response.json();
                        if (data.success) {
                            this.form.image_path = data.image_url;
                            this.previewImage = data.image_url;
                        }
                    } catch (error) {
                        alert('فشل في رفع الصورة');
                    }
                },
                async saveMedicine() {
                    this.saving = true;
                    const urlParams = new URLSearchParams(window.location.search);
                    const medicineId = urlParams.get('id');
                    const url = medicineId ? `/api/medicines/${medicineId}` : '/api/medicines/';
                    const method = medicineId ? 'PUT' : 'POST';
                    // تحويل الأسعار لأرقام لتجنب أخطاء الـ API
                    const formData = {
                        ...this.form,
                        sale_price: parseFloat(this.form.sale_price) || 0,
                        purchase_price: parseFloat(this.form.purchase_price) || 0,
                        min_stock: parseInt(this.form.min_stock) || 10
                    };
                    // التحقق من البيانات قبل الإرسال
                    if (!formData.trade_name || formData.trade_name.trim() === '') {
                        alert('الاسم التجاري مطلوب');
                        this.saving = false;
                        return;
                    }
                    if (!formData.category) {
                        alert('التصنيف مطلوب');
                        this.saving = false;
                        return;
                    }
                    if (formData.sale_price <= 0) {
                        alert('سعر البيع يجب أن يكون أكبر من صفر');
                        this.saving = false;
                        return;
                    }
                    if (formData.purchase_price <= 0) {
                        alert('سعر الشراء يجب أن يكون أكبر من صفر');
                        this.saving = false;
                        return;
                    }
                    try {
                        const response = await fetch(url, {
                            method: method,
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + localStorage.getItem('token')
                            },
                            body: JSON.stringify(formData)
                        });
                        const data = await response.json();
                        if (data.success) {
                            alert(medicineId ? 'تم تحديث الدواء بنجاح' : 'تم إضافة الدواء بنجاح');
                            window.location.href = '/medicines';
                        } else {
                            alert(data.detail || data.message || 'حدث خطأ في حفظ الدواء');
                        }
                    } catch (error) {
                        alert('فشل في الاتصال بالسيرفر: ' + error.message);
                    } finally {
                        this.saving = false;
                    }
                },
                // ===== Scanner Methods =====
                openBarcodeScanner() {
                    this.showScanner = true;
                    this.manualBarcode = '';
                    // ننتظر حتى يتحدّث DOM من Alpine.js قبل بدء الكاميرا
                    setTimeout(() => this.startCamera(), 300);
                },
                async startCamera() {
                    try {
                        this.mediaStream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }
                        });
                        const video = document.getElementById('scanner-video');
                        video.srcObject = this.mediaStream;
                    } catch (err) {
                        console.error('Camera error:', err);
                        alert('لا يمكن الوصول للكاميرا.\n\n' +
                            'iPhone: استخدم Safari (Chrome ما يدعم الكاميرا في iOS)\n' +
                            'Android: Chrome أو أي متصفح\n' +
                            'تأكد من إعطاء صلاحية الكاميرا للموقع\n\n' +
                            'أو أدخل رقم الباركود يدوياً');
                        this.showScanner = false;
                    }
                },
                closeScanner() {
                    this.showScanner = false;
                    this.scanning = false;
                    if (this.mediaStream) {
                        this.mediaStream.getTracks().forEach(track => track.stop());
                        this.mediaStream = null;
                    }
                },
                useManualBarcode() {
                    if (this.manualBarcode && this.manualBarcode.trim()) {
                        this.form.barcode = this.manualBarcode.trim();
                        this.closeScanner();
                        alert('تم إدخال الباركود: ' + this.form.barcode);
                    }
                },
                async captureBarcode() {
                    if (this.scanning) return;
                    this.scanning = true;

                    const video = document.getElementById('scanner-video');
                    const canvas = document.getElementById('scanner-canvas');

                    // تشغيل فلاش أبيض (تأثير تصوير)
                    video.style.filter = 'brightness(2)';
                    setTimeout(() => video.style.filter = '', 100);

                    // رسم الإطار الحالي من الفيديو على الكانفاس
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // محاولة قراءة الباركود
                    try {
                        const barcode = await this.detectBarcode(canvas);
                        if (barcode) {
                            this.form.barcode = barcode;
                            this.closeScanner();
                            alert('✅ تم قراءة الباركود: ' + barcode);
                        } else {
                            // المحاولة الثانية: قلب الألوان (للباركود الأبيض على خلفية سوداء)
                            ctx.filter = 'invert(1)';
                            ctx.drawImage(canvas, 0, 0);
                            ctx.filter = 'none';
                            const barcode2 = await this.detectBarcode(canvas);
                            if (barcode2) {
                                this.form.barcode = barcode2;
                                this.closeScanner();
                                alert('✅ تم قراءة الباركود: ' + barcode2);
                            } else {
                                this.scanning = false;
                                alert('❌ لم يتم التعرف على الباركود.\n\n' +
                                    'تأكد من:\n' +
                                    '1. الباركود واضح ومضاء جيداً\n' +
                                    '2. الكاميرا مركزة على الباركود\n' +
                                    '3. الباركود غير تالف أو مشوه\n\n' +
                                    'أو أدخل الرقم يدوياً في الحقل أسفل');
                            }
                        }
                    } catch (err) {
                        console.error('Detection error:', err);
                        this.scanning = false;
                        alert('❌ حدث خطأ في قراءة الباركود.\nأدخلي الرقم يدوياً في الحقل أسفل.');
                    }
                },
                async detectBarcode(canvas) {
                    // الطريقة 1: استخدام BarcodeDetector API (الأفضل - يدعمه Chrome وسفاري الحديث)
                    if ('BarcodeDetector' in window) {
                        try {
                            const formats = ['ean_13', 'ean_8', 'upc_a', 'upc_e',
                                'code_128', 'code_39', 'code_93', 'codabar',
                                'itf', 'qr_code', 'data_matrix', 'aztec', 'pdf417'
                            ];
                            const detector = new BarcodeDetector({ formats });
                            const barcodes = await detector.detect(canvas);
                            if (barcodes.length > 0) {
                                console.log('Native BarcodeDetector:', barcodes[0].rawValue);
                                return barcodes[0].rawValue;
                            }
                        } catch (e) {
                            console.warn('BarcodeDetector error:', e);
                        }
                    }

                    // الطريقة 2: استخدام Html5Qrcode (احتياطي)
                    try {
                        const result = await this.decodeWithHtml5Qr(canvas);
                        if (result) return result;
                    } catch (e) {
                        console.warn('Html5Qr fallback failed:', e);
                    }

                    return null;
                },
                decodeWithHtml5Qr(canvas) {
                    return new Promise((resolve) => {
                        try {
                            const img = new Image();
                            img.onload = () => {
                                try {
                                    const scanner = new Html5Qrcode();
                                    // بعض إصدارات المكتبة تدعم decodeFromImage مباشرة
                                    if (typeof scanner.decodeFromImage === 'function') {
                                        scanner.decodeFromImage(img)
                                            .then(result => resolve(result))
                                            .catch(() => resolve(null));
                                    } else {
                                        resolve(null);
                                    }
                                } catch (e) {
                                    resolve(null);
                                }
                            };
                            img.onerror = () => resolve(null);
                            img.src = canvas.toDataURL('image/jpeg', 0.9);
                        } catch (e) {
                            resolve(null);
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
