<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <title>لوحة التحكم - PharmaSUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ─── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 248px;
      background: #fff;
      border-left: 1px solid #EEF2F6;
      display: flex;
      flex-direction: column;
      padding: 22px 16px;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
    }
    .sidebar .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 8px 22px;
    }
    .sidebar .brand .icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: #1AA7EC;
      position: relative;
      flex-shrink: 0;
    }
    .sidebar .brand .icon::before,
    .sidebar .brand .icon::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 3px;
    }
    .sidebar .brand .icon::before {
      width: 18px;
      height: 5.5px;
    }
    .sidebar .brand .icon::after {
      width: 5.5px;
      height: 18px;
    }
    .sidebar .brand .name {
      font: 700 18px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .sidebar .brand .name span {
      color: #1AA7EC;
    }
    .sidebar .nav-section {
      font: 600 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.1em;
      color: #CBD5E1;
      padding: 14px 10px 10px;
    }
    .sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      color: #475569;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 4px;
      transition: all 0.2s ease;
    }
    .sidebar .nav-item:hover {
      background: #F8FAFC;
      color: #0F172A;
    }
    .sidebar .nav-item.active {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 8px 18px -8px rgba(26, 167, 236, 0.55);
    }
    .sidebar .nav-item svg {
      width: 19px;
      height: 19px;
      flex-shrink: 0;
    }
    .sidebar .nav-item .badge {
      margin-right: auto;
      background: #FEF2F2;
      color: #DC2626;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .sidebar .user-card {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px;
      border: 1px solid #EEF2F6;
      border-radius: 13px;
      margin-top: 20px;
    }
    .sidebar .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1AA7EC;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sidebar .user-info {
      min-width: 0;
      flex: 1;
    }
    .sidebar .user-name {
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .user-role {
      font-size: 11.5px;
      color: #94A3B8;
    }
    .sidebar .user-card svg {
      width: 16px;
      height: 16px;
      color: #CBD5E1;
      flex-shrink: 0;
    }

    /* ─── Topbar ─── */
    .topbar {
      height: 70px;
      background: #fff;
      border-bottom: 1px solid #EEF2F6;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 18px;
      position: fixed;
      top: 0;
      right: 248px;
      left: 0;
      z-index: 90;
    }
    .topbar .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 380px;
      height: 42px;
      padding: 0 14px;
      border-radius: 11px;
      background: #F6F8FA;
      color: #94A3B8;
      font-size: 14px;
    }
    .topbar .search-box svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .topbar .search-box kbd {
      margin-right: auto;
      font: 500 11px 'IBM Plex Mono', monospace;
      color: #CBD5E1;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      padding: 2px 6px;
    }
    .topbar .actions {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar .lang-toggle {
      display: flex;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      overflow: hidden;
      font-size: 13px;
      font-weight: 600;
    }
    .topbar .lang-toggle span {
      padding: 7px 12px;
      color: #64748B;
    }
    .topbar .lang-toggle span.active {
      background: #1AA7EC;
      color: #fff;
    }
    .topbar .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      border: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      background: transparent;
      cursor: pointer;
      position: relative;
    }
    .topbar .icon-btn svg {
      width: 18px;
      height: 18px;
    }
    .topbar .icon-btn .dot {
      position: absolute;
      top: 9px;
      left: 11px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #DC2626;
      border: 2px solid #fff;
    }

    /* ─── Main Content ─── */
    .main-content {
      margin-right: 248px;
      padding: calc(70px + 28px) 28px 28px;
      min-height: 100vh;
    }

    /* ─── Page Header ─── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-header h1 {
      margin: 0 0 6px;
      font: 700 26px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .page-header .subtitle {
      margin: 0;
      color: #64748B;
      font-size: 14.5px;
    }
    .page-header .actions {
      display: flex;
      gap: 10px;
    }
    .page-header .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 16px;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    .page-header .btn-secondary {
      background: #fff;
      color: #334155;
      border: 1px solid #E2E8F0;
    }
    .page-header .btn-secondary:hover {
      background: #F8FAFC;
    }
    .page-header .btn-primary {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 10px 20px -8px rgba(26, 167, 236, 0.55);
    }
    .page-header .btn-primary:hover {
      filter: brightness(1.05);
    }
    .page-header .btn svg {
      width: 17px;
      height: 17px;
    }

    /* ─── Metric Cards ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }
    .metric-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
    }
    .metric-card .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .metric-card .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .metric-card .icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .metric-card .icon.cyan { background: #E0F2FE; color: #0284C7; }
    .metric-card .icon.yellow { background: #FEF3C7; color: #D97706; }
    .metric-card .icon.red { background: #FEE2E2; color: #DC2626; }
    .metric-card .icon svg {
      width: 20px;
      height: 20px;
    }
    .metric-card .badge {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .metric-card .badge.success {
      color: #16A34A;
      background: #ECFDF5;
    }
    .metric-card .badge.warning {
      color: #D97706;
      background: #FFFbeb;
    }
    .metric-card .badge.danger {
      color: #DC2626;
      background: #FEF2F2;
    }
    .metric-card .label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .metric-card .value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .metric-card .value .unit {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 600;
    }

    /* ─── Two Column Layout ─── */
    .two-col {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .panel {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 22px 24px;
    }
    .panel .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .panel .panel-title {
      font-size: 15px;
      font-weight: 600;
    }
    .panel .panel-subtitle {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 3px;
    }
    .panel .panel-action {
      font-size: 13px;
      font-weight: 600;
      color: #1AA7EC;
      cursor: pointer;
    }

    /* ─── Chart Bars ─── */
    .chart-bars {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      height: 170px;
    }
    .chart-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      height: 100%;
      justify-content: flex-end;
    }
    .chart-bar .bar {
      width: 100%;
      max-width: 40px;
      border-radius: 8px 8px 4px 4px;
      background: #E2E8F0;
      position: relative;
      transition: height 0.5s ease;
    }
    .chart-bar .bar.active {
      background: #1AA7EC;
    }
    .chart-bar .bar.secondary {
      background: #DBEAFE;
    }
    .chart-bar .bar-label {
      font-size: 11.5px;
      color: #94A3B8;
      font-weight: 500;
    }
    .chart-bar .bar-label.active {
      color: #1AA7EC;
      font-weight: 700;
    }

    /* ─── Top Selling List ─── */
    .top-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .top-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .top-item .icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .top-item .icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .top-item .icon.cyan { background: #E0F2FE; color: #0284C7; }
    .top-item .icon.yellow { background: #FEF3C7; color: #D97706; }
    .top-item .icon.purple { background: #EDE9FE; color: #7C3AED; }
    .top-item .icon svg {
      width: 17px;
      height: 17px;
    }
    .top-item .info {
      flex: 1;
      min-width: 0;
    }
    .top-item .name {
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-item .meta {
      font-size: 11.5px;
      color: #94A3B8;
    }
    .top-item .change {
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .top-item .change.up { color: #1AA7EC; }
    .top-item .change.down { color: #16A34A; }

    /* ─── Table ─── */
    .data-table {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .data-table .table-header {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 8px;
      font: 600 11px 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      padding-bottom: 12px;
      border-bottom: 1px solid #F1F5F9;
    }
    .data-table .table-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid #F6F8FA;
    }
    .data-table .table-row:last-child {
      border-bottom: none;
    }
    .data-table .cell-primary {
      font-size: 13.5px;
      font-weight: 600;
    }
    .data-table .cell-secondary {
      font-size: 13px;
      color: #64748B;
    }
    .data-table .cell-number {
      text-align: left;
      font-size: 13.5px;
      font-weight: 700;
    }
    .data-table .cell-time {
      text-align: left;
      width: 64px;
      font-size: 12px;
      color: #94A3B8;
    }

    /* ─── Expiring Items ─── */
    .expiry-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .expiry-item .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .expiry-item .name {
      font-size: 13.5px;
      font-weight: 600;
    }
    .expiry-item .days {
      font-size: 12px;
      font-weight: 700;
    }
    .expiry-item .days.danger { color: #DC2626; }
    .expiry-item .days.warning { color: #D97706; }
    .expiry-item .days.success { color: #16A34A; }
    .expiry-item .bar-track {
      height: 6px;
      border-radius: 3px;
      background: #F1F5F9;
      overflow: hidden;
    }
    .expiry-item .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .expiry-item .bar-fill.danger { background: #DC2626; }
    .expiry-item .bar-fill.warning { background: #F59E0B; }
    .expiry-item .bar-fill.success { background: #16A34A; }
    .expiry-item .meta {
      font-size: 11px;
      color: #94A3B8;
      margin-top: 5px;
    }

    /* ─── FEFO Badge ─── */
    .fefo-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 600;
      color: #DC2626;
      background: #FEF2F2;
      padding: 4px 9px;
      border-radius: 999px;
    }
    .fefo-badge svg {
      width: 13px;
      height: 13px;
    }

    /* ─── Loading & Error ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #DC2626;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .topbar { right: 0; }
      .main-content { margin-right: 0; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .metrics-grid { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
      .notif-dropdown {
      position: absolute; top: 64px; left: 0; width: 380px; max-height: 460px;
      background: #fff; border: 1px solid #E2E8F0; border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12); z-index: 200; overflow: hidden;
    }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #E2E8F0;
      font-weight: 700; font-size: 14px; color: #0F172A;
    }
    .notif-header a { font-size: 12px; color: #1AA7EC; text-decoration: none; }
    .notif-list { max-height: 340px; overflow-y: auto; }
    .notif-item {
      display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #F1F5F9;
      cursor: pointer; transition: background 0.15s;
    }
    .notif-item:hover { background: #F6F8FA; }
    .notif-item .notif-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .notif-icon.expiry { background: #FEF3C7; color: #D97706; }
    .notif-icon.stock { background: #FEE2E2; color: #DC2626; }
    .notif-icon.system { background: #DBEAFE; color: #2563EB; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 13px; font-weight: 600; color: #0F172A; }
    .notif-desc { font-size: 12px; color: #64748B; margin-top: 2px; }
    .notif-time { font-size: 11px; color: #94A3B8; margin-top: 3px; }
    .notif-empty { padding: 28px 16px; text-align: center; color: #94A3B8; font-size: 13px; }
    .notif-loading { padding: 16px; text-align: center; color: #64748B; font-size: 13px; }

  </style>
</head>
<body class="show">

<div x-data="dashboardApp()" x-init="init()" class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="icon"></div>
        <div class="name">Pharma<span>SUD</span></div>
      </div>

      <div class="nav-section">MENU</div>
      <a href="/dashboard" class="nav-item">
        <i data-lucide="layout-dashboard"></i>
        <span>لوحة التحكم</span>
      </a>
      <a href="/pos" class="nav-item">
        <i data-lucide="scan-barcode"></i>
        <span>نقطة البيع</span>
      </a>
      <a href="/medicines" class="nav-item">
        <i data-lucide="pill"></i>
        <span>الأدوية</span>
      </a>
      <a href="/inventory" class="nav-item">
        <i data-lucide="package"></i>
        <span>المخزون</span>
      </a>
      <a href="/batch-receive" class="nav-item">
        <i data-lucide="calendar-clock"></i>
        <span>الدفعات</span>
      </a>
      <a href="/reports-sales" class="nav-item">
        <i data-lucide="chart-line"></i>
        <span>التقارير</span>
      </a>
      <a href="/employees" class="nav-item" x-show="isAdmin">
        <i data-lucide="users"></i>
        <span>الموظفين</span>
      </a>
      <a href="/alerts" class="nav-item">
        <i data-lucide="bell"></i>
        <span>التنبيهات</span>
        <span class="badge">7</span>
      </a>
      <a href="/settings" class="nav-item">
        <i data-lucide="settings"></i>
        <span>الإعدادات</span>
      </a>

      <div class="user-card" @click="logout()">
        <div class="user-avatar" x-text="userInitials"></div>
        <div class="user-info">
          <div class="user-name" x-text="userName || 'المستخدم'"></div>
          <div class="user-role" x-text="isAdmin ? 'مدير' : 'صيدلي'"></div>
        </div>
        <i data-lucide="chevron-left"></i>
      </div>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
      <!-- Mobile Menu Button - FIRST (RTL: rightmost) -->
      <button class="mobile-menu-btn" @click="toggleMobileSidebar()" aria-label="فتح القائمة" title="القائمة">
        <i data-lucide="menu"></i>
      </button>
      <div class="search-box">
        <i data-lucide="search"></i>
        <span>البحث في الأدوية، المبيعات، الدفعات...</span>
        <kbd>⌘K</kbd>
      </div>
      <div class="actions">
        <div class="lang-toggle">
          <span>EN</span>
          <span class="active">ع</span>
        </div>
        <button class="icon-btn" @click="toggleTheme()">
          <i data-lucide="moon"></i>
        </button>
        <button class="icon-btn" @click="showNotifications = !showNotifications">
          <i data-lucide="bell"></i>
          <span class="dot"></span>
        </button>
        <!-- Notification Dropdown -->
        <div x-show="showNotifications" x-cloak
             style="position:absolute;top:60px;left:28px;width:340px;background:#fff;border:1px solid #EEF2F6;border-radius:12px;box-shadow:0 10px 25px -5px rgba(15,23,42,0.1);z-index:200;">
          <div style="padding:14px 16px;border-bottom:1px solid #EEF2F6;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;font-size:15px;">التنبيهات</span>
            <button @click="showNotifications=false" style="background:none;border:none;cursor:pointer;color:#94A3B8;font-size:18px;">×</button>
          </div>
          <div x-show="notifications.length === 0" style="padding:40px 20px;text-align:center;color:#94A3B8;">
            <i data-lucide="bell-off" style="width:32px;height:32px;margin-bottom:8px;opacity:.5"></i>
            <p style="font-size:13px;">لا توجد تنبيهات جديدة</p>
          </div>
          <template x-for="n in notifications" :key="n.id">
            <div style="padding:12px 16px;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background .15s;"
                 @mouseenter="this.style.background='#F8FAFC'" @mouseleave="this.style.background='#fff'">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <span x-show="n.type==='expiry'" style="width:8px;height:8px;border-radius:50%;background:#F59E0B;flex-shrink:0;"></span>
                <span x-show="n.type==='low_stock'" style="width:8px;height:8px;border-radius:50%;background:#DC2626;flex-shrink:0;"></span>
                <span x-show="n.type==='system'" style="width:8px;height:8px;border-radius:50%;background:#1AA7EC;flex-shrink:0;"></span>
                <span style="font-weight:600;font-size:13px;" x-text="n.title"></span>
              </div>
              <p style="font-size:12.5px;color:#64748B;margin:0;" x-text="n.message"></p>
            </div>
          </template>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Loading -->
      <template x-if="loading">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>جاري تحميل البيانات...</span>
        </div>
      </template>

      <!-- Error -->
      <template x-if="error">
        <div class="error-state">
          <i data-lucide="triangle-alert" style="width:48px;height:48px"></i>
          <span x-text="errorMessage"></span>
          <button class="btn btn-secondary" @click="loadData()">إعادة المحاولة</button>
        </div>
      </template>

      <!-- Content -->
      <template x-if="!loading && !error">
        <div>
          <!-- Page Header -->
          <div class="page-header">
            <div>
              <h1>صباح الخير، <span x-text="userName || 'Ahmed'"></span></h1>
              <p class="subtitle" x-text="pharmacyName + ' · ' + currentDate"></p>
            </div>
            <div class="actions">
              <button class="btn btn-secondary">
                <i data-lucide="calendar"></i>
                <span>اليوم</span>
              </button>
              <button class="btn btn-primary" onclick="window.location.href='/pos'">
                <i data-lucide="scan-barcode"></i>
                <span>بيع جديد</span>
              </button>
            </div>
          </div>

          <!-- Metrics -->
          <div class="metrics-grid">
            <div class="metric-card">
              <div class="header">
                <div class="icon blue"><i data-lucide="banknote"></i></div>
                <div class="badge success"><i data-lucide="trending-up" style="width:13px;height:13px"></i>12.4%</div>
              </div>
              <div class="label">إيرادات اليوم</div>
              <div class="value" x-text="data.today.revenue + ' '"><span class="unit">SDG</span></div>
            </div>
            <div class="metric-card">
              <div class="header">
                <div class="icon cyan"><i data-lucide="receipt"></i></div>
                <div class="badge success"><i data-lucide="trending-up" style="width:13px;height:13px"></i>8.1%</div>
              </div>
              <div class="label">المعاملات</div>
              <div class="value" x-text="data.today.invoices_count"></div>
            </div>
            <div class="metric-card">
              <div class="header">
                <div class="icon yellow"><i data-lucide="package-minus"></i></div>
                <div class="badge warning">إعادة طلب</div>
              </div>
              <div class="label">أدوية منخفضة</div>
              <div class="value" x-text="data.inventory_summary.low_stock_count"></div>
            </div>
            <div class="metric-card">
              <div class="header">
                <div class="icon red"><i data-lucide="calendar-x"></i></div>
                <div class="badge danger">≤ 30 يوم</div>
              </div>
              <div class="label">تنتهي قريباً</div>
              <div class="value"><span x-text="data.inventory_summary.expiring_soon_count"></span> <span class="unit">دفعة</span></div>
            </div>
          </div>

          <!-- Chart + Top Selling -->
          <div class="two-col">
            <div class="panel">
              <div class="panel-header">
                <div>
                  <div class="panel-title">مبيعات هذا الأسبوع</div>
                  <div class="panel-subtitle" x-text="weeklyTotal + ' SDG · 7 أيام'"></div>
                </div>
                <div style="display:flex;gap:6px">
                  <span style="font-size:12px;font-weight:600;color:#1AA7EC;background:#DBEAFE;padding:5px 11px;border-radius:8px">أسبوع</span>
                  <span style="font-size:12px;font-weight:500;color:#94A3B8;padding:5px 11px">شهر</span>
                </div>
              </div>
              <div class="chart-bars">
                <template x-for="(day, idx) in weeklyData" :key="idx">
                  <div class="chart-bar">
                    <div class="bar" :class="{ 'active': day.isToday, 'secondary': day.isYesterday }" :style="'height: ' + day.height + '%'"></div>
                    <span class="bar-label" :class="{ 'active': day.isToday }" x-text="day.day_name"></span>
                  </div>
                </template>
              </div>
            </div>

            <div class="panel">
              <div class="panel-title" style="margin-bottom:18px">الأكثر مبيعاً</div>
              <div class="top-list">
                <template x-for="(med, idx) in topMedicines" :key="idx">
                  <div class="top-item">
                    <div class="icon" :class="['blue','cyan','yellow','purple'][idx % 4]">
                      <i data-lucide="pill"></i>
                    </div>
                    <div class="info">
                      <div class="name" x-text="med.name"></div>
                      <div class="meta"><span x-text="med.sold"></span> وحدة</div>
                    </div>
                    <span class="change up" x-text="'+' + med.growth + '%'"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- Recent Sales + Expiring -->
          <div class="two-col">
            <div class="panel">
              <div class="panel-header">
                <div class="panel-title">المبيعات الأخيرة</div>
                <span class="panel-action">عرض الكل</span>
              </div>
              <div class="data-table">
                <div class="table-header">
                  <span>الفاتورة</span>
                  <span>الكاشير</span>
                  <span style="text-align:left">المجموع</span>
                  <span style="text-align:left;width:64px">الوقت</span>
                </div>
                <template x-for="(sale, idx) in recentSales" :key="idx">
                  <div class="table-row">
                    <span class="cell-primary" x-text="'#INV-' + sale.id"></span>
                    <span class="cell-secondary" x-text="sale.cashier"></span>
                    <span class="cell-number" x-text="sale.total.toLocaleString()"></span>
                    <span class="cell-time" x-text="sale.time"></span>
                  </div>
                </template>
              </div>
            </div>

            <div class="panel">
              <div class="panel-header">
                <div class="panel-title">تنتهي قريباً</div>
                <span class="fefo-badge">
                  <i data-lucide="calendar-clock"></i>
                  FEFO
                </span>
              </div>
              <div class="expiry-list">
                <template x-for="(item, idx) in expiringItems" :key="idx">
                  <div class="expiry-item">
                    <div class="header">
                      <span class="name" x-text="item.name"></span>
                      <span class="days" :class="item.status" x-text="item.days + ' يوم'"></span>
                    </div>
                    <div class="bar-track">
                      <div class="bar-fill" :class="item.status" :style="'width: ' + item.percent + '%'"></div>
                    </div>
                    <div class="meta" x-text="'دفعة #' + item.batch + ' · ' + item.units + ' وحدة'"></div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });

    function dashboardApp() {
      return {
        loading: true,
        error: false,
        errorMessage: '',
        currentDate: '',
        userName: '',
        userInitials: '',
        pharmacyName: '',
        isAdmin: false,
        isDark: localStorage.getItem('darkMode') === 'true',
        showNotifications: false,
        notifications: [],
        notificationsLoading: false,
        weeklyTotal: '1.42M',
        data: {
          today: { revenue: '0.00', invoices_count: 0, profit: '0.00', top_medicines: [] },
          inventory_summary: { total_medicines: 0, low_stock_count: 0, expiring_soon_count: 0 }
        },
        weeklyData: [
          { day_name: 'الإثنين', height: 54 },
          { day_name: 'الثلاثاء', height: 71 },
          { day_name: 'الأربعاء', height: 48 },
          { day_name: 'الخميس', height: 82 },
          { day_name: 'الجمعة', height: 64 },
          { day_name: 'السبت', height: 100, isToday: true },
          { day_name: 'الأحد', height: 76, isYesterday: true }
        ],
        topMedicines: [
          { name: 'Paracetamol 500mg', sold: 312, growth: 18 },
          { name: 'Amoxicillin 250mg', sold: 241, growth: 11 },
          { name: 'Ibuprofen 400mg', sold: 198, growth: 6 },
          { name: 'Vitamin C 1000mg', sold: 156, growth: 4 }
        ],
        recentSales: [
          { id: '2841', cashier: 'سارة م.', total: 4200, time: '10:24' },
          { id: '2840', cashier: 'أحمد ح.', total: 12800, time: '10:11' },
          { id: '2839', cashier: 'سارة م.', total: 2650, time: '09:58' },
          { id: '2838', cashier: 'خالد ع.', total: 8400, time: '09:42' },
          { id: '2837', cashier: 'سارة م.', total: 1950, time: '09:30' }
        ],
        expiringItems: [
          { name: 'Augmentin 625mg', days: 9, status: 'danger', percent: 18, batch: 'B-1042', units: 40 },
          { name: 'Insulin Glargine', days: 17, status: 'warning', percent: 34, batch: 'B-0987', units: 12 },
          { name: 'Ventolin Inhaler', days: 23, status: 'warning', percent: 46, batch: 'B-1101', units: 8 },
          { name: 'Metformin 850mg', days: 28, status: 'success', percent: 56, batch: 'B-1055', units: 60 }
        ],

        async init() {
          // Auth check
          const token = localStorage.getItem('token');
          if (!token) {
            window.location.href = '/login';
            return;
          }

          this.userName = localStorage.getItem('userName') || 'Ahmed';
          this.pharmacyName = localStorage.getItem('pharmacyName') || 'صيدلية الشفاء';
          this.isAdmin = localStorage.getItem('role') === 'admin';
          this.userInitials = this.userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

          // Dark mode init
          if(this.isDark) document.body.classList.add('dark-mode');

          // Set date
          const now = new Date();
          const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
          const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
          this.currentDate = days[now.getDay()] + '، ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

          await this.loadData();
        },

        async loadData() {
          this.loading = true;
          this.error = false;
          try {
            const res = await fetch('/api/reports/dashboard', {
              headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            if (!res.ok) throw new Error('Failed to load');
            const result = await res.json();
            this.data.today = result.today || this.data.today;
            this.data.inventory_summary = result.inventory_summary || this.data.inventory_summary;
            if (result.weekly_chart) {
              // Map API data to chart format
            }
          } catch (e) {
            console.warn('API error, using defaults');
          } finally {
            this.loading = false;
          }
        },

        logout() {
          localStorage.clear();
          window.location.href = '/login';
        },

        toggleTheme() {
          this.isDark = !this.isDark;
          localStorage.setItem("darkMode", this.isDark);
          document.body.classList.toggle("dark-mode", this.isDark);
        },

        async loadNotifications() {
          this.notificationsLoading = true;
          try {
            const token = localStorage.getItem('token');
            const r = await fetch('/api/alerts/count', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (r.ok) {
              const data = await r.json();
              this.notifications = [];
              if (data.total_count > 0 || data.expiry_count > 0 || data.low_stock_count > 0) {
                if (data.expiry_count > 0) {
                  this.notifications.push({
                    id: 'expiry', type: 'expiry',
                    title: 'تنبيهات الصلاحية',
                    message: data.expiry_count + ' دووان قاربت على الانتهاء',
                    time: 'الآن', href: '/alerts'
                  });
                }
                if (data.low_stock_count > 0) {
                  this.notifications.push({
                    id: 'stock', type: 'low_stock',
                    title: 'تنبيهات المخزون',
                    message: data.low_stock_count + ' دووان مخزونها منخفض',
                    time: 'الآن', href: '/medicines'
                  });
                }
              }
            }
          } catch (e) { /* silent */ }
          this.notificationsLoading = false;
        },

        toggleMobileSidebar() {
          const sidebar = document.querySelector('.sidebar');
          const overlay = document.querySelector('.sidebar-overlay');
          const btn = document.querySelector('.mobile-menu-btn');

          if (!sidebar) return;

          const isOpen = sidebar.classList.toggle('open');

          // Create overlay if not exists
          if (!overlay) {
            const newOverlay = document.createElement('div');
            newOverlay.className = 'sidebar-overlay';
            document.body.appendChild(newOverlay);
            newOverlay.addEventListener('click', () => this.closeMobileSidebar());
          }

          const finalOverlay = document.querySelector('.sidebar-overlay');
          if (isOpen) {
            finalOverlay.classList.add('visible');
            if (btn) btn.classList.add('active');
            document.body.style.overflow = 'hidden';
            // Use bound handler for stable reference
            this._escHandler = this._escHandler || this.handleEscKey.bind(this);
            document.addEventListener('keydown', this._escHandler);
          } else {
            finalOverlay.classList.remove('visible');
            if (btn) btn.classList.remove('active');
            document.body.style.overflow = '';
            if (this._escHandler) document.removeEventListener('keydown', this._escHandler);
          }
        },

        handleEscKey(e) {
          if (e.key === 'Escape') {
            this.closeMobileSidebar();
          }
        },

        closeMobileSidebar() {
          const sidebar = document.querySelector('.sidebar');
          const overlay = document.querySelector('.sidebar-overlay');
          const btn = document.querySelector('.mobile-menu-btn');

          if (sidebar) sidebar.classList.remove('open');
          if (overlay) overlay.classList.remove('visible');
          if (btn) btn.classList.remove('active');
          document.body.style.overflow = '';
        },
      }
    }
  </script>

</body>
</html>
