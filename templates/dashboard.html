<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/theme.css">
    <title>لوحة التحكم - PharmaSUD</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 220px;
            background: var(--surface);
            min-height: 100vh;
            padding: 24px 0;
            border-left: 1px solid var(--border);
            position: fixed;
            right: 0;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .sidebar .logo {
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .sidebar .logo h1 {
            font-size: 18px;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar .logo h1 svg { flex-shrink: 0; }
        .sidebar .logo p {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            margin-right: 30px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            border-right: 3px solid transparent;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--border);
            color: var(--text-primary);
            border-right-color: var(--primary-blue);
        }
        .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
        .nav-item .badge {
            background: var(--danger);
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            margin-right: auto;
        }
        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        .sidebar-footer .nav-item {
            border-right: none;
            color: var(--danger);
            padding: 12px 0;
        }
        .sidebar-footer .nav-item:hover {
            background: transparent;
            color: #FCA5A5;
        }

        /* ─── Mobile toggle ─── */
        .mobile-toggle {
            display: none;
            background: var(--border);
            border: none;
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-left: 12px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* ─── Main Content ─── */
        .main-content {
            margin-right: 220px;
            padding: 32px 40px;
            min-height: 100vh;
        }

        /* ─── Header ─── */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-right h2 { font-size: 22px; }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .header-left .date { direction: ltr; }
        .header-left .user-info { text-align: left; }
        .header-left .user-info .name { color: var(--text-primary); font-weight: 600; }
        .header-left .user-info .pharmacy { font-size: 12px; color: var(--text-secondary); }
        .notification-bell {
            position: relative;
            background: var(--border);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .notification-bell:hover { background: var(--text-secondary); color: var(--text-primary); }
        .notification-bell .count {
            position: absolute;
            top: -4px;
            left: -4px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            font-weight: 700;
        }

        /* ─── Summary Cards ─── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }
        .summary-card:hover { border-color: var(--text-secondary); }
        .summary-card .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .summary-card .card-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .summary-card .card-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .card-blue .card-icon { background: rgba(59,130,246,0.15); color: var(--primary-blue); }
        .card-green .card-icon { background: rgba(34,197,94,0.15); color: var(--success); }
        .card-yellow .card-icon { background: rgba(245,158,11,0.15); color: var(--warning); }
        .card-red .card-icon { background: rgba(239,68,68,0.15); color: var(--danger); }
        .card-purple .card-icon { background: rgba(168,85,247,0.15); color: #A855F7; }

        /* ─── Two Column Layout ─── */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        /* ─── Section Card ─── */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .section-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .section-card .card-header h3 {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-card .card-header .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .section-card .card-body { padding: 16px 20px; }

        /* ─── Top Selling Table ─── */
        .top-table {
            width: 100%;
            border-collapse: collapse;
        }
        .top-table th {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
            padding: 8px 4px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        .top-table td {
            font-size: 13px;
            padding: 10px 4px;
            border-bottom: 1px solid var(--surface);
        }
        .top-table tr:last-child td { border-bottom: none; }
        .top-table .rank {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }
        .rank-gold { background: rgba(245,158,11,0.2); color: var(--warning); }
        .rank-silver { background: rgba(148,163,184,0.2); color: var(--text-secondary); }
        .rank-bronze { background: rgba(205,127,50,0.2); color: #CD7F32; }
        .rank-default { background: rgba(59,130,246,0.15); color: var(--primary-blue); }

        /* ─── Alerts ─── */
        .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .alert-item:last-child { margin-bottom: 0; }
        .alert-item .alert-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }
        .alert-item .alert-info { flex: 1; }
        .alert-item .alert-info .alert-title { color: var(--text-primary); font-weight: 600; }
        .alert-item .alert-info .alert-desc { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }
        .alert-item .alert-severity {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .alert-high {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
        }
        .alert-high .alert-icon { background: rgba(239,68,68,0.15); color: var(--danger); }
        .alert-high .alert-severity { background: var(--danger); color: white; }
        .alert-medium {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
        }
        .alert-medium .alert-icon { background: rgba(245,158,11,0.15); color: var(--warning); }
        .alert-medium .alert-severity { background: var(--warning); color: var(--background); }
        .alert-low {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
        }
        .alert-low .alert-icon { background: rgba(59,130,246,0.15); color: var(--primary-blue); }
        .alert-low .alert-severity { background: var(--primary-blue); color: white; }

        /* ─── Weekly Chart ─── */
        .weekly-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 180px;
            padding: 16px 0 0;
        }
        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }
        .bar-value {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .bar {
            width: 100%;
            max-width: 48px;
            min-height: 4px;
            border-radius: 4px 4px 0 0;
            background: linear-gradient(180deg, var(--primary-blue) 0%, #1D4ED8 100%);
            transition: height 0.5s ease;
        }
        .bar-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }

        /* ─── Reports Grid ─── */
        .reports-section { margin-top: 28px; }
        .reports-section h3 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .report-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .report-card:hover {
            border-color: var(--primary-blue);
            background: #1E3A5F;
            transform: translateY(-2px);
        }
        .report-card .r-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .report-card .r-title { color: var(--text-primary); font-size: 14px; font-weight: 600; }
        .report-card .r-desc { color: var(--text-secondary); font-size: 12px; }
        .r-blue .r-icon { background: rgba(59,130,246,0.15); color: var(--primary-blue); }
        .r-green .r-icon { background: rgba(34,197,94,0.15); color: var(--success); }
        .r-yellow .r-icon { background: rgba(245,158,11,0.15); color: var(--warning); }
        .r-purple .r-icon { background: rgba(168,85,247,0.15); color: #A855F7; }

        /* ─── Loading & Error States ─── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-secondary); font-size: 14px; }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
        .error-state .err-icon { font-size: 48px; margin-bottom: 12px; }
        .error-state .err-msg { color: var(--danger); font-size: 16px; margin-bottom: 8px; }
        .error-state .err-detail { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
        .retry-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: #2563EB; }

        .no-data { text-align: center; padding: 30px 20px; color: var(--text-secondary); font-size: 14px; }

        /* ─── Responsive ─── */
        @media (max-width: 1200px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); }
            .reports-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 992px) {
            .two-col { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
            .main-content { padding: 24px 20px; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.mobile-open { display: flex; }
            .sidebar-overlay.mobile-open { display: block; }
            .main-content { margin-right: 0; padding: 16px; }
            .mobile-toggle { display: flex; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .reports-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .header-right h2 { font-size: 17px; }
            .header-left { gap: 8px; }
            .header-left .date { display: none; }
            .summary-card { padding: 14px; }
            .summary-card .card-value { font-size: 18px; }
            .weekly-chart { height: 140px; }
            .bar { max-width: 36px; }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .reports-grid { grid-template-columns: 1fr; }
            .summary-card .card-value { font-size: 16px; }
        }
    </style>
</head>
<body>

<div x-data="dashboardApp()" x-init="init()">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay"
         :class="{ 'mobile-open': sidebarOpen }"
         @click="sidebarOpen = false"></div>

    <!-- Sidebar -->
    <aside class="sidebar" :class="{ 'mobile-open': sidebarOpen }">
        <div class="logo">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                PharmaSUD
            </h1>
            <p>نظام إدارة الصيدلية</p>
        </div>

        <a href="/dashboard" class="nav-item active">
            <span class="icon">📊</span> لوحة التحكم
        </a>
        <a href="/medicines" class="nav-item">
            <span class="icon">💊</span> الأدوية
        </a>
        <a href="/inventory" class="nav-item">
            <span class="icon">📦</span> المخزون
        </a>
        <a x-show="isAdmin" href="/batch-receive" class="nav-item">
            <span class="icon">🚚</span> استلام دفعة
        </a>
        <a href="/pos" class="nav-item">
            <span class="icon">🛒</span> نقطة البيع
        </a>
        <a href="/sales-history" class="nav-item">
            <span class="icon">📋</span> سجل المبيعات
        </a>
        <a x-show="isAdmin" href="/settings" class="nav-item">
            <span class="icon">⚙️</span> الإعدادات
        </a>

        <div class="sidebar-footer">
            <a href="#" @click.prevent="logout()" class="nav-item">
                <span class="icon">🚪</span> تسجيل الخروج
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-right">
                <button class="mobile-toggle" @click="sidebarOpen = !sidebarOpen" aria-label="القائمة">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <h2>لوحة التحكم</h2>
            </div>
            <div class="header-left">
                <span class="date" x-text="currentDate"></span>
                <div class="user-info">
                    <div class="name" x-text="userName || 'مستخدم'"></div>
                    <div class="pharmacy" x-text="pharmacyName || 'الصيدلية'"></div>
                </div>
                <button class="notification-bell" @click="sidebarOpen = false" title="الإشعارات">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span class="count" x-text="alerts.length" x-show="alerts.length > 0"></span>
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <template x-if="loading">
            <div class="loading-state">
                <div class="spinner"></div>
                <div class="loading-text">جاري تحميل البيانات...</div>
            </div>
        </template>

        <!-- Error State -->
        <template x-if="error">
            <div class="error-state">
                <div class="err-icon">⚠️</div>
                <div class="err-msg">تعذر تحميل البيانات</div>
                <div class="err-detail" x-text="errorMessage"></div>
                <button class="retry-btn" @click="loadDashboard()">إعادة المحاولة</button>
            </div>
        </template>

        <!-- Dashboard Content -->
        <template x-if="!loading && !error">
            <div>
                <!-- Summary Cards -->
                <div class="cards-grid">
                    <div class="summary-card card-blue">
                        <div class="card-icon">💰</div>
                        <div class="card-label">إيرادات اليوم</div>
                        <div class="card-value" x-text="data.today.revenue"></div>
                    </div>
                    <div class="summary-card card-green">
                        <div class="card-icon">📄</div>
                        <div class="card-label">فواتير اليوم</div>
                        <div class="card-value" x-text="data.today.invoices_count"></div>
                    </div>
                    <div class="summary-card card-yellow">
                        <div class="card-icon">📈</div>
                        <div class="card-label">أرباح اليوم</div>
                        <div class="card-value" x-text="data.today.profit"></div>
                    </div>
                    <div class="summary-card card-red">
                        <div class="card-icon">⚠️</div>
                        <div class="card-label">مخزون منخفض</div>
                        <div class="card-value" x-text="data.inventory_summary.low_stock_count"></div>
                    </div>
                    <div class="summary-card card-purple">
                        <div class="card-icon">⏰</div>
                        <div class="card-label">قريب الانتهاء</div>
                        <div class="card-value" x-text="data.inventory_summary.expiring_soon_count"></div>
                    </div>
                </div>

                <!-- Two Column: Top Selling + Alerts -->
                <div class="two-col">
                    <!-- Top 5 Selling Medicines -->
                    <div class="section-card">
                        <div class="card-header">
                            <h3>🏆 أفضل الأدوية مبيعاً اليوم</h3>
                            <span class="subtitle">الأعلى مبيعاً</span>
                        </div>
                        <div class="card-body">
                            <template x-if="data.today.top_medicines && data.today.top_medicines.length > 0">
                                <table class="top-table">
                                    <thead>
                                        <tr>
                                            <th>الترتيب</th>
                                            <th>اسم الدواء</th>
                                            <th>الكمية</th>
                                            <th>الإيراد</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(med, index) in data.today.top_medicines" :key="index">
                                            <tr>
                                                <td>
                                                    <span class="rank"
                                                          :class="index === 0 ? 'rank-gold' : (index === 1 ? 'rank-silver' : (index === 2 ? 'rank-bronze' : 'rank-default'))"
                                                          x-text="index + 1"></span>
                                                </td>
                                                <td x-text="med.trade_name"></td>
                                                <td x-text="med.quantity_sold"></td>
                                                <td x-text="med.revenue"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </template>
                            <template x-if="!data.today.top_medicines || data.today.top_medicines.length === 0">
                                <div class="no-data">لا توجد مبيعات اليوم حتى الآن</div>
                            </template>
                        </div>
                    </div>

                    <!-- Alerts Section -->
                    <div class="section-card">
                        <div class="card-header">
                            <h3>🔔 التنبيهات</h3>
                            <span class="subtitle" x-text="alerts.length + ' تنبيه' + (alerts.length !== 1 ? 'ات' : '')"></span>
                        </div>
                        <div class="card-body">
                            <template x-if="alerts.length > 0">
                                <div>
                                    <template x-for="(alert, index) in alerts.slice(0, 6)" :key="index">
                                        <div class="alert-item"
                                             :class="alert.severity === 'high' ? 'alert-high' : (alert.severity === 'medium' ? 'alert-medium' : 'alert-low')">
                                            <div class="alert-icon" x-text="alert.type === 'expiry_warning' ? '⏳' : '📉'"></div>
                                            <div class="alert-info">
                                                <div class="alert-title" x-text="alert.medicine_name"></div>
                                                <div class="alert-desc" x-show="alert.type === 'expiry_warning'">
                                                    صلاحية <span x-text="alert.batch"></span> — متبقي <span x-text="alert.days_remaining"></span> يوم
                                                </div>
                                                <div class="alert-desc" x-show="alert.type === 'low_stock'">
                                                    المخزون: <span x-text="alert.current_stock"></span> (الحد الأدنى: <span x-text="alert.min_stock"></span>)
                                                </div>
                                            </div>
                                            <span class="alert-severity" x-text="alert.severity === 'high' ? 'عاجل' : (alert.severity === 'medium' ? 'متوسط' : 'منخفض')"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template x-if="alerts.length === 0">
                                <div class="no-data">✅ لا توجد تنبيهات — كل شيء على ما يرام</div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Weekly Chart -->
                <div class="section-card">
                    <div class="card-header">
                        <h3>📊 المبيعات آخر 7 أيام</h3>
                        <span class="subtitle">إيرادات الأسبوع</span>
                    </div>
                    <div class="card-body">
                        <template x-if="weeklyData.length > 0">
                            <div>
                                <!-- Find max revenue for bar scaling -->
                                <div class="weekly-chart" x-init="
                                    $el.querySelectorAll('.bar').forEach(bar => {
                                        const val = parseFloat(bar.dataset.value || '0');
                                        const max = parseFloat(bar.dataset.max || '1');
                                        bar.style.height = Math.max((val / max) * 100, 4) + '%';
                                    });
                                ">
                                    <template x-for="(day, idx) in weeklyData" :key="idx">
                                        <div class="bar-wrapper">
                                            <div class="bar-value" x-text="day.revenue"></div>
                                            <div class="bar"
                                                 :data-value="day.revenue"
                                                 :data-max="maxWeeklyRevenue"
                                                 :style="'height: ' + Math.max((parseFloat(day.revenue) / Math.max(maxWeeklyRevenue, 1)) * 100, 4) + '%'">
                                            </div>
                                            <div class="bar-label" x-text="day.day_name"></div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template x-if="weeklyData.length === 0">
                            <div class="no-data">لا توجد بيانات مبيعات للأسبوع الحالي</div>
                        </template>
                    </div>
                </div>

                <!-- Reports Section -->
                <div class="reports-section">
                    <h3>📋 التقارير</h3>
                    <div class="reports-grid">
                        <a href="/reports-sales" class="report-card r-blue">
                            <div class="r-icon">📊</div>
                            <div class="r-title">تقرير المبيعات</div>
                            <div class="r-desc">تحليل المبيعات اليومية والشهرية</div>
                        </a>
                        <a x-show="isAdmin" href="/reports-profits" class="report-card r-green">
                            <div class="r-icon">📈</div>
                            <div class="r-title">تقرير الأرباح</div>
                            <div class="r-desc">تحليل الأرباح والهوامش</div>
                        </a>
                        <a href="/reports-slow-moving" class="report-card r-yellow">
                            <div class="r-icon">🐢</div>
                            <div class="r-title">الأدوية بطيئة الحركة</div>
                            <div class="r-desc">الأدوية الأقل مبيعاً</div>
                        </a>
                        <a x-show="isAdmin" href="/reports-purchase-forecast" class="report-card r-purple">
                            <div class="r-icon">🔮</div>
                            <div class="r-title">توقعات الشراء</div>
                            <div class="r-desc">التنبؤ باحتياجات المخزون</div>
                        </a>
                    </div>
                </div>
            </div>
        </template>
    </main>
</div>

<script>
function dashboardApp() {
    return {
        loading: true,
        error: false,
        errorMessage: '',
        sidebarOpen: false,
        currentDate: '',
        userName: '',
        pharmacyName: '',
        isAdmin: false,
        data: {
            today: {
                revenue: '0.00',
                invoices_count: 0,
                profit: '0.00',
                top_medicines: []
            },
            inventory_summary: {
                total_medicines: 0,
                low_stock_count: 0,
                expiring_soon_count: 0
            }
        },
        alerts: [],
        weeklyData: [],
        maxWeeklyRevenue: 0,

        init() {
            this.formatDate();
            this.loadUserInfo();
            this.loadDashboard();
        },

        formatDate() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            this.currentDate = now.toLocaleDateString('ar-SA', options);
        },

        loadUserInfo() {
            try {
                const token = localStorage.getItem('token');
                if (token) {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    this.userName = payload.username || payload.sub || 'مستخدم';
                    this.pharmacyName = payload.pharmacy_name || 'صيدلية الزاريات';
                    this.isAdmin = payload.role === 'admin';
                } else {
                    this.userName = 'مستخدم';
                    this.pharmacyName = 'صيدلية الزاريات';
                }
            } catch (e) {
                this.userName = 'مستخدم';
                this.pharmacyName = 'صيدلية الزاريات';
            }
        },

        async loadDashboard() {
            this.loading = true;
            this.error = false;
            this.errorMessage = '';
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/reports/dashboard', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + (token || ''),
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/login';
                        return;
                    }
                    throw new Error('فشل تحميل البيانات (' + response.status + ')');
                }
                const result = await response.json();
                this.data = result;
                this.alerts = result.alerts || [];
                this.weeklyData = result.weekly_chart || [];

                // Calculate max revenue for chart scaling
                if (this.weeklyData.length > 0) {
                    let maxVal = 0;
                    this.weeklyData.forEach(d => {
                        const val = parseFloat(d.revenue) || 0;
                        if (val > maxVal) maxVal = val;
                    });
                    this.maxWeeklyRevenue = maxVal;
                }
            } catch (e) {
                this.error = true;
                this.errorMessage = e.message || 'حدث خطأ غير متوقع';
            } finally {
                this.loading = false;
            }
        },

        logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            window.location.href = '/login';
        }
    };
}
</script>

</body>
</html>
