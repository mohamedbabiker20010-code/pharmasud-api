<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/static/css/theme.css">
<title>تشخيص الباركود - PharmaSUD</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--background); color:var(--text-primary); font-family:sans-serif; padding:10px; }
  h2 { text-align:center; margin-bottom:8px; font-size:18px; }
  .btn-row { display:flex; gap:8px; }
  button {
    flex:1; padding:14px; border:none; border-radius:8px; font-size:16px;
    cursor:pointer; font-weight:600;
  }
  #start-btn { background:var(--success); color:var(--text-primary); }
  #stop-btn { background:var(--danger); color:#fff; }
  #video-container { position:relative; width:100%; max-width:500px; margin:8px auto; }
  video { width:100%; border-radius:8px; background:#000; display:block; }
  #debug-panel {
    background:var(--surface); padding:10px; margin-top:8px; border-radius:8px;
    font-family:'Cascadia Code','Fira Code',monospace; font-size:12px;
    direction:ltr; text-align:left; white-space:pre-wrap;
    max-height:50vh; overflow-y:auto; line-height:1.6;
  }
  .row { margin-bottom:2px; word-break:break-all; }
  .ok { color:var(--success); }
  .err { color:var(--danger); font-weight:bold; }
  .warn { color:var(--warning); }
  .info { color:#4ADEDE; }
  .success { color:var(--success); font-weight:bold; font-size:15px; }
  .sep { color:var(--border); text-align:center; margin:6px 0; }
</style>

  <style>
    .sidebar { width:248px; background:#fff; border-left:1px solid #EEF2F6; display:flex; flex-direction:column; padding:22px 16px; position:fixed; right:0; top:0; bottom:0; z-index:100; font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif; }
    .sidebar .brand { display:flex; align-items:center; gap:11px; padding:0 8px 22px; }
    .sidebar .brand .icon { width:38px; height:38px; border-radius:11px; background:#1AA7EC; position:relative; flex-shrink:0; }
    .sidebar .brand .icon::before,.sidebar .brand .icon::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; border-radius:3px; }
    .sidebar .brand .icon::before { width:18px; height:5.5px; }
    .sidebar .brand .icon::after { width:5.5px; height:18px; }
    .sidebar .brand .name { font:700 18px/1 'IBM Plex Sans Arabic',sans-serif; letter-spacing:-0.02em; }
    .sidebar .brand .name span { color:#1AA7EC; }
    .sidebar .nav-section { font:600 11px/1 'IBM Plex Mono',monospace; letter-spacing:0.1em; color:#CBD5E1; padding:14px 10px 10px; }
    .sidebar .nav-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; color:#475569; font-size:14px; font-weight:500; text-decoration:none; margin-bottom:4px; transition:all 0.2s ease; }
    .sidebar .nav-item:hover { background:#F8FAFC; color:#0F172A; }
    .sidebar .nav-item.active { background:#1AA7EC; color:#fff; box-shadow:0 8px 18px -8px rgba(26,167,236,0.55); }
    .sidebar .nav-item svg { width:19px; height:19px; flex-shrink:0; }
    .sidebar .nav-item .badge { margin-right:auto; background:#FEF2F2; color:#DC2626; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .sidebar .user-card { margin-top:auto; display:flex; align-items:center; gap:11px; padding:11px; border:1px solid #EEF2F6; border-radius:13px; cursor:pointer; }
    .sidebar .user-avatar { width:36px; height:36px; border-radius:10px; background:#1AA7EC; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .sidebar .user-name { font-size:13.5px; font-weight:600; }
    .sidebar .user-role { font-size:11.5px; color:#94A3B8; }
    .sidebar .user-card svg { width:16px; height:16px; color:#CBD5E1; flex-shrink:0; margin-right:auto; }
    .main-wrap { margin-right:248px; min-height:100vh; }
    @media(max-width:1024px){ .sidebar{display:none;} .main-wrap{margin-right:0;} }
  </style>

</head>
<body>

  <!-- Cloud Design Sidebar -->
  <aside class="sidebar" id="cloud-sidebar">
    <div class="brand">
      <div class="icon"></div>
      <div class="name">Pharma<span>SUD</span></div>
    </div>
    <div class="nav-section">MENU</div>
    <a href="/dashboard" class="nav-item" id="nav-dashboard"><i data-lucide="layout-dashboard"></i><span>لوحة التحكم</span></a>
    <a href="/pos" class="nav-item" id="nav-pos"><i data-lucide="scan-barcode"></i><span>نقطة البيع</span></a>
    <a href="/medicines" class="nav-item" id="nav-medicines"><i data-lucide="pill"></i><span>الأدوية</span></a>
    <a href="/inventory" class="nav-item" id="nav-inventory"><i data-lucide="package"></i><span>المخزون</span></a>
    <a href="/batches" class="nav-item" id="nav-batches"><i data-lucide="calendar-clock"></i><span>الدفعات</span></a>
    <a href="/reports-sales" class="nav-item" id="nav-reports"><i data-lucide="chart-line"></i><span>التقارير</span></a>
    <a href="/employees" class="nav-item" id="nav-employees" style="display:none"><i data-lucide="users"></i><span>الموظفين</span></a>
    <a href="/alerts" class="nav-item" id="nav-alerts"><i data-lucide="bell"></i><span>التنبيهات</span><span class="badge">7</span></a>
    <a href="/settings" class="nav-item" id="nav-settings"><i data-lucide="settings"></i><span>الإعدادات</span></a>
    <div class="user-card" onclick="logout()">
      <div class="user-avatar" id="user-initials">U</div>
      <div style="min-width:0;flex:1">
        <div class="user-name" id="user-name">المستخدم</div>
        <div class="user-role" id="user-role">صيدلي</div>
      </div>
      <i data-lucide="chevron-left"></i>
    </div>
  </aside>
  <script>
    function logout() { localStorage.clear(); window.location.href='/login'; }
    document.addEventListener('DOMContentLoaded', function() {
      const name = localStorage.getItem('userName') || 'المستخدم';
      const role = localStorage.getItem('role') || 'pharmacist';
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-role').textContent = role === 'admin' ? 'مدير' : 'صيدلي';
      document.getElementById('user-initials').textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      if(role === 'admin') document.getElementById('nav-employees').style.display='flex';
    });
  </script>

  <h2>🔬 تشخيص محرك الباركود</h2>
  <p style="text-align:center;font-size:12px;color:var(--text-secondary);margin-bottom:8px;">
    Android Chrome → BarcodeDetector (native) ← iOS Safari → zxing-wasm (fallback)
  </p>

  <div class="btn-row">
    <button id="start-btn" onclick="startTest()">▶️ ابدأ الاختبار</button>
    <button id="stop-btn" onclick="stopTest()">⏹️ إيقاف</button>
  </div>

  <div id="video-container">
    <video id="video" playsinline muted></video>
  </div>

  <div id="debug-panel">
    <div class="row info">▲ اضغط "ابدأ الاختبار" ووجّه الكاميرا لباركود دواء حقيقي</div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════
// صفحة تشخيص الباركود — كل شيء يظهر على الشاشة
// ═══════════════════════════════════════════════════════════════
// لا يوجد .catch(() => {}) — كل خطأ يُسجّل على الشاشة
// ═══════════════════════════════════════════════════════════════

const debugPanel = document.getElementById('debug-panel');
const videoEl = document.getElementById('video');
let running = false;
let currentStream = null;
let attemptCount = 0;
let lastLoggedSecond = 0;

function log(msg, type) {
  const time = new Date().toLocaleTimeString('en-GB');
  const cls = type ? (' ' + type) : '';
  const line = document.createElement('div');
  line.className = 'row' + cls;
  line.textContent = '[' + time + '] ' + msg;
  debugPanel.appendChild(line);
  if (debugPanel.children.length > 80) {
    debugPanel.removeChild(debugPanel.firstChild);
  }
  debugPanel.scrollTop = debugPanel.scrollHeight;
}

function logSep() {
  const line = document.createElement('div');
  line.className = 'row sep';
  line.textContent = '─────────────────────';
  debugPanel.appendChild(line);
  debugPanel.scrollTop = debugPanel.scrollHeight;
}

function clearLog() {
  debugPanel.innerHTML = '';
}

async function stopTest() {
  running = false;
  if (currentStream) {
    try {
      currentStream.getTracks().forEach(function(t) { t.stop(); });
    } catch(e) {
      log('خطأ في إيقاف الكاميرا: ' + e.message, 'err');
    }
    currentStream = null;
  }
  log('⏹️ تم الإيقاف', 'warn');
}

async function startTest() {
  clearLog();
  running = true;
  attemptCount = 0;
  lastLoggedSecond = 0;

  logSep();
  log('🚀 بدء تشخيص الباركود', 'info');
  log('الجهاز: ' + navigator.userAgent, 'info');
  log('HTTPS (secure context): ' + window.isSecureContext, window.isSecureContext ? 'ok' : 'err');
  log('BarcodeDetector API: ' + ('BarcodeDetector' in window), ('BarcodeDetector' in window) ? 'ok' : 'warn');
  logSep();

  // ──── 1. الكاميرا ────
  log('📷 الخطوة 1: فتح الكاميرا...', 'info');

  var stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    currentStream = stream;
    log('✅ getUserMedia نجح', 'ok');
  } catch (e) {
    log('❌ getUserMedia فشل', 'err');
    log('   الاسم: ' + e.name, 'err');
    log('   الرسالة: ' + e.message, 'err');
    if (e.name === 'NotAllowedError') {
      log('🔒 السبب: الإذن مرفوض. افتح في Safari/Chrome مباشرة (ليس Telegram)', 'err');
    } else if (e.name === 'NotFoundError') {
      log('📷 السبب: ما في كاميرا متاحة على هذا الجهاز', 'err');
    } else if (e.name === 'NotReadableError') {
      log('🔒 السبب: الكاميرا مشغولة بتطبيق آخر', 'err');
    } else if (e.name === 'TypeError') {
      log('⚠️ السبب: navigator.mediaDevices غير موجود (متصفح تطبيقات)', 'err');
    }
    running = false;
    return;
  }

  // ──── 2. الفيديو ────
  log('📹 الخطوة 2: ربط الفيديو...', 'info');

  videoEl.srcObject = stream;

  // ننتظر تحميل metadata
  try {
    await new Promise(function(resolve, reject) {
      if (videoEl.readyState >= 2) { resolve(); return; }
      videoEl.onloadedmetadata = function() { resolve(); };
      videoEl.onerror = function() {
        reject(new Error('فيديو error: ' + (videoEl.error ? videoEl.error.message : 'unknown')));
      };
      // Timeout 5 ثوان
      setTimeout(function() { reject(new Error('Timeout - الفيديو ما جهز خلال 5 ثوان')); }, 5000);
    });
  } catch (e) {
    log('❌ الفيديو فشل: ' + e.message, 'err');
    running = false;
    return;
  }

  try {
    await videoEl.play();
    log('✅ video.play() نجح', 'ok');
  } catch (e) {
    log('❌ video.play() فشل: ' + e.message, 'err');
    running = false;
    return;
  }

  var vw = videoEl.videoWidth;
  var vh = videoEl.videoHeight;
  var track = stream.getVideoTracks()[0];
  var settings = {};
  try { settings = track.getSettings(); } catch (_) {}

  log('Video readyState: ' + videoEl.readyState, 'info');
  log('Video أبعاد: ' + vw + 'x' + vh, (vw > 0 && vh > 0) ? 'ok' : 'err');
  log('Camera label: ' + (track.label || 'غير معروف'), 'info');
  log('Camera resolution: ' + (settings.width || '?') + 'x' + (settings.height || '?'), 'info');

  if (vw === 0 || vh === 0) {
    log('🛑 توقف: الفيديو بأبعاد صفرية — هذا قد يكون السبب الجذري', 'err');
    running = false;
    return;
  }

  // ──── 3. تركيز مستمر ────
  try {
    await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
    log('✅ focusMode: continuous تم تفعيله', 'ok');
  } catch (e) {
    log('ℹ️ focusMode غير مدعوم: ' + e.message, 'warn');
  }

  // ──── 4. الفلاش ────
  var caps = {};
  try { caps = track.getCapabilities(); } catch (_) {}
  if (caps && caps.torch) {
    log('✅ الفلاش (Torch) مدعوم', 'ok');
  } else {
    log('ℹ️ الفلاش غير مدعوم على هذا الجهاز', 'warn');
  }

  logSep();
  log('🔧 الخطوة 3: تهيئة المحرك...', 'info');

  // ──── 5. المحرك ────
  var detector = null;
  var zxingMod = null;
  var engineName = '';

  // المحاولة الأولى: BarcodeDetector (أندرويد Chrome)
  if ('BarcodeDetector' in window) {
    try {
      var wanted = ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128', 'code_39'];
      var supported = await BarcodeDetector.getSupportedFormats();
      log('📋 Supported formats: ' + supported.join(', '), 'info');

      var usable = wanted.filter(function(f) { return supported.indexOf(f) >= 0; });
      log('📋 usable (من الـ 6 المطلوبة): ' + usable.join(', '), 'info');

      if (usable.length === 0) {
        log('⚠️ الصيغ المطلوبة غير مدعومة — سينتقل إلى zxing-wasm', 'warn');
      } else {
        detector = new BarcodeDetector({ formats: usable });
        engineName = 'BarcodeDetector (native)';
        log('✅ ✅ المحرك: BarcodeDetector — الصيغ: ' + usable.join(', '), 'success');
      }
    } catch (e) {
      log('❌ BarcodeDetector فشل: ' + e.name + ' — ' + e.message, 'err');
    }
  }

  // المحاولة الثانية: zxing-wasm (iOS Safari)
  if (!detector) {
    log('⏳ تحميل zxing-wasm@2 من esm.sh...', 'info');
    try {
      var startTime = Date.now();
      zxingMod = await import('https://esm.sh/zxing-wasm@2/reader');
      var loadTime = Date.now() - startTime;
      log('✅ zxing-wasm@2 تحمّل في ' + loadTime + 'ms', 'ok');
      log('📦 الوظائف المتاحة: readBarcodesFromImageData', 'info');
      engineName = 'zxing-wasm@2 (fallback)';
      log('✅ ✅ المحرك: zxing-wasm@2', 'success');
    } catch (e) {
      log('❌ zxing-wasm@2 فشل التحميل', 'err');
      log('   الاسم: ' + e.name, 'err');
      log('   الرسالة: ' + e.message, 'err');
      log('🛑 توقف: لا يوجد محرك يعمل — استخدم الإدخال اليدوي', 'err');
      running = false;
      return;
    }
  }

  logSep();
  log('🔄 الخطوة 4: بدء حلقة المسح...', 'info');
  log('المحرك النهائي: ' + engineName, 'success');
  log('سنحاول ~8 مرات/ثانية. وجه الباركود داخل الكاميرا.', 'info');
  logSep();

  // ──── 6. حلقة المسح ────
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d', { willReadFrequently: true });

  async function scanLoop() {
    if (!running) return;

    if (videoEl.readyState < 2 || videoEl.videoWidth === 0) {
      requestAnimationFrame(scanLoop);
      return;
    }

    // نحاول بالـ ROI أولاً (40% وسط)
    var w = videoEl.videoWidth;
    var h = videoEl.videoHeight;
    var roiH = Math.round(h * 0.40);
    var roiY = Math.round((h - roiH) / 2);

    canvas.width = w;
    canvas.height = roiH;

    try {
      ctx.drawImage(videoEl, 0, roiY, w, roiH, 0, 0, w, roiH);
    } catch (e) {
      log('❌ drawImage فشل: ' + e.message, 'err');
      setTimeout(function() { requestAnimationFrame(scanLoop); }, 120);
      return;
    }

    attemptCount++;
    var nowSec = Math.floor(Date.now() / 1000);
    if (nowSec !== lastLoggedSecond) {
      lastLoggedSecond = nowSec;
      log('📡 محاولة #' + attemptCount + ' | canvas: ' + w + 'x' + roiH + ' | ' + engineName, 'info');
    }

    try {
      var results = [];

      if (detector) {
        // BarcodeDetector يقبل canvas مباشرة
        var codes = await detector.detect(canvas);
        for (var i = 0; i < codes.length; i++) {
          results.push({ text: codes[i].rawValue, format: codes[i].format });
        }
      } else if (zxingMod) {
        // zxing-wasm يحتاج ImageData
        var imageData = ctx.getImageData(0, 0, w, roiH);
        var zxResults = await zxingMod.readBarcodesFromImageData(imageData, {
          tryHarder: true,
          formats: ['EAN-13', 'EAN-8', 'UPC-A', 'UPC-E', 'Code-128', 'Code-39'],
          maxNumberOfSymbols: 1
        });
        if (zxResults && zxResults.length > 0) {
          for (var j = 0; j < zxResults.length; j++) {
            results.push({ text: zxResults[j].text, format: zxResults[j].format });
          }
        }
      }

      if (results.length > 0) {
        var code = results[0].text;
        var fmt = results[0].format;
        log('🎉🎉🎉 نجح المسح!', 'success');
        log('الكود: ' + code, 'success');
        log('النوع: ' + fmt, 'success');
        log('المحاولة #' + attemptCount, 'success');

        if (navigator.vibrate) {
          navigator.vibrate(120);
          log('📳 اهتزاز', 'ok');
        }

        // تجربة البحث في قاعدة البيانات
        logSep();
        log('🔍 الخطوة 5: البحث في قاعدة البيانات...', 'info');
        try {
          var resp = await fetch('/api/sales/pos/barcode/' + encodeURIComponent(code));
          var data = await resp.json();
          if (data.found && data.medicine) {
            log('✅ الدواء موجود: ' + (data.medicine.trade_name || 'غير معروف'), 'success');
            log('   السعر: ' + (data.medicine.sale_price || '?'), 'ok');
          } else {
            log('⚠️ الباركود غير موجود في قاعدة البيانات', 'warn');
          }
        } catch (e) {
          log('❌ فشل البحث في قاعدة البيانات: ' + e.message, 'err');
        }
      }
    } catch (e) {
      // لا يوجد .catch صامت — كل خطأ يُسجّل
      log('❌ decode error: ' + e.name + ' — ' + e.message, 'err');
      if (e.stack) {
        log('   stack: ' + e.stack.split('\n')[1].trim(), 'err');
      }
    }

    setTimeout(function() { requestAnimationFrame(scanLoop); }, 120);
  }

  scanLoop();
}
</script>
</body>
</html>
<!-- ✅ scanner_debug.html - تشخيص الباركود - بدون .catch(() => {}) -->
