<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 إدارة الموظفين - PharmaSUD</title>
    <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        light: { bg: "#F6F8FA", card: "#FFFFFF", border: "#EEF2F6", text: "#0F172A", muted: "#64748B" }
                    }
                }
            }
        }
    </script>

  <style>
    .sidebar { width:248px; background:#fff; border-left:1px solid #EEF2F6; display:flex; flex-direction:column; padding:22px 16px; position:fixed; right:0; top:0; bottom:0; z-index:100; font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif; }
    .sidebar .brand { display:flex; align-items:center; gap:11px; padding:0 8px 22px; }
    .sidebar .brand .icon { width:38px; height:38px; border-radius:11px; background:#1AA7EC; position:relative; flex-shrink:0; }
    .sidebar .brand .icon::before,.sidebar .brand .icon::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; border-radius:3px; }
    .sidebar .brand .icon::before { width:18px; height:5.5px; }
    .sidebar .brand .icon::after { width:5.5px; height:18px; }
    .sidebar .brand .name { font:700 18px/1 'IBM Plex Sans Arabic',sans-serif; letter-spacing:-0.02em; }
    .sidebar .brand .name span { color:#1AA7EC; }
    .sidebar .nav-section { font:600 11px/1 'IBM Plex Mono',monospace; letter-spacing:0.1em; color:#CBD5E1; padding:14px 10px 10px; }
    .sidebar .nav-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; color:#475569; font-size:14px; font-weight:500; text-decoration:none; margin-bottom:4px; transition:all 0.2s ease; }
    .sidebar .nav-item:hover { background:#F8FAFC; color:#0F172A; }
    .sidebar .nav-item.active { background:#1AA7EC; color:#fff; box-shadow:0 8px 18px -8px rgba(26,167,236,0.55); }
    .sidebar .nav-item svg { width:19px; height:19px; flex-shrink:0; }
    .sidebar .nav-item .badge { margin-right:auto; background:#FEF2F2; color:#DC2626; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .sidebar .user-card { margin-top:auto; display:flex; align-items:center; gap:11px; padding:11px; border:1px solid #EEF2F6; border-radius:13px; cursor:pointer; }
    .sidebar .user-avatar { width:36px; height:36px; border-radius:10px; background:#1AA7EC; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .sidebar .user-name { font-size:13.5px; font-weight:600; }
    .sidebar .user-role { font-size:11.5px; color:#94A3B8; }
    .sidebar .user-card svg { width:16px; height:16px; color:#CBD5E1; flex-shrink:0; margin-right:auto; }
    .main-wrap { margin-right:248px; min-height:100vh; }
    @media(max-width:1024px){ .sidebar{display:none;} .main-wrap{margin-right:0;} }
  </style>

</head>
<body class="bg-light-bg text-light-text font-sans min-h-screen">

  <!-- Cloud Design Sidebar -->
  <aside class="sidebar" id="cloud-sidebar">
    <div class="brand">
      <div class="icon"></div>
      <div class="name">Pharma<span>SUD</span></div>
    </div>
    <div class="nav-section">MENU</div>
    <a href="/dashboard" class="nav-item" id="nav-dashboard"><i data-lucide="layout-dashboard"></i><span>لوحة التحكم</span></a>
    <a href="/pos" class="nav-item" id="nav-pos"><i data-lucide="scan-barcode"></i><span>نقطة البيع</span></a>
    <a href="/medicines" class="nav-item" id="nav-medicines"><i data-lucide="pill"></i><span>الأدوية</span></a>
    <a href="/inventory" class="nav-item" id="nav-inventory"><i data-lucide="package"></i><span>المخزون</span></a>
    <a href="/batches" class="nav-item" id="nav-batches"><i data-lucide="calendar-clock"></i><span>الدفعات</span></a>
    <a href="/reports-sales" class="nav-item" id="nav-reports"><i data-lucide="chart-line"></i><span>التقارير</span></a>
    <a href="/employees" class="nav-item active" id="nav-employees" style="display:none"><i data-lucide="users"></i><span>الموظفين</span></a>
    <a href="/alerts" class="nav-item" id="nav-alerts"><i data-lucide="bell"></i><span>التنبيهات</span><span class="badge">7</span></a>
    <a href="/settings" class="nav-item" id="nav-settings"><i data-lucide="settings"></i><span>الإعدادات</span></a>
    <div class="user-card" onclick="logout()">
      <div class="user-avatar" id="user-initials">U</div>
      <div style="min-width:0;flex:1">
        <div class="user-name" id="user-name">المستخدم</div>
        <div class="user-role" id="user-role">صيدلي</div>
      </div>
      <i data-lucide="chevron-left"></i>
    </div>
  </aside>
  <script>
    function logout() { localStorage.clear(); window.location.href='/login'; }
    document.addEventListener('DOMContentLoaded', function() {
      const name = localStorage.getItem('userName') || 'المستخدم';
      const role = localStorage.getItem('role') || 'pharmacist';
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-role').textContent = role === 'admin' ? 'مدير' : 'صيدلي';
      document.getElementById('user-initials').textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      if(role === 'admin') document.getElementById('nav-employees').style.display='flex';
    });
  </script>

    <div class="max-w-3xl mx-auto p-4">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">👥 إدارة الموظفين</h1>
            <a href="/dashboard" class="text-[#1AA7EC] hover:text-blue-300 text-sm">← العودة للرئيسية</a>
        </div>

        <!-- Error / Success messages -->
        <div id="error" class="hidden bg-red-900/50 border border-red-700 rounded-lg p-4 mb-4 text-center"></div>
        <div id="success" class="hidden bg-green-900/50 border border-green-700 rounded-lg p-4 mb-4 text-center"></div>

        <!-- Add Employee Button -->
        <button onclick="showAddModal()" class="w-full bg-[#1AA7EC] hover:bg-blue-700 text-[#0F172A] rounded-xl py-3 mb-6 font-bold transition">
            + إضافة موظف جديد
        </button>

        <!-- Employees List -->
        <div id="loading" class="text-center py-12 text-light-muted">جاري تحميل الموظفين...</div>
        <div id="employees-list" class="space-y-3 hidden"></div>
    </div>

    <!-- Add Employee Modal -->
    <div id="addModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4" onclick="closeModal(event)">
        <div class="bg-dark-card rounded-2xl p-6 w-full max-w-md border border-dark-border" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold mb-4">➕ إضافة موظف جديد</h2>
            <div class="space-y-4">
                <input id="new-full-name" type="text" placeholder="الاسم الكامل" class="w-full bg-light-bg border border-dark-border rounded-xl p-3 text-right">
                <input id="new-username" type="text" placeholder="اسم المستخدم" class="w-full bg-light-bg border border-dark-border rounded-xl p-3 text-right">
                <input id="new-password" type="password" placeholder="كلمة المرور (6 أحرف على الأقل)" class="w-full bg-light-bg border border-dark-border rounded-xl p-3 text-right">
                <input id="new-phone" type="text" placeholder="رقم الهاتف (اختياري)" class="w-full bg-light-bg border border-dark-border rounded-xl p-3 text-right">
                <button onclick="addEmployee()" class="w-full bg-green-600 hover:bg-green-700 text-[#0F172A] rounded-xl py-3 font-bold transition">
                    💾 حفظ
                </button>
                <button onclick="hideAddModal()" class="w-full bg-dark-border text-light-muted rounded-xl py-2 transition">
                    إلغاء
                </button>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4" onclick="closeModal(event)">
        <div class="bg-dark-card rounded-2xl p-6 w-full max-w-md border border-dark-border" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold mb-4">🔑 إعادة تعيين كلمة المرور</h2>
            <p id="reset-user-name" class="text-light-muted mb-4"></p>
            <input id="reset-password" type="password" placeholder="كلمة المرور الجديدة" class="w-full bg-light-bg border border-dark-border rounded-xl p-3 text-right mb-4">
            <button onclick="resetPassword()" class="w-full bg-[#1AA7EC] hover:bg-blue-700 text-[#0F172A] rounded-xl py-3 font-bold transition">
                🔄 تأكيد
            </button>
            <button onclick="hideResetModal()" class="w-full bg-dark-border text-light-muted rounded-xl py-2 mt-2 transition">
                إلغاء
            </button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; }

        let employees = [];
        let resetTargetId = null;

        async function loadEmployees() {
            const loading = document.getElementById('loading');
            const list = document.getElementById('employees-list');
            const error = document.getElementById('error');

            try {
                const res = await fetch('/api/employees/', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) { throw new Error('HTTP ' + res.status); }
                const data = await res.json();
                employees = data.employees || [];

                loading.classList.add('hidden');
                list.classList.remove('hidden');

                if (employees.length === 0) {
                    list.innerHTML = '<div class="text-center text-light-muted py-8">لا يوجد موظفون بعد</div>';
                    return;
                }

                list.innerHTML = employees.map(emp => `
                    <div class="bg-dark-card rounded-xl p-4 border border-dark-border">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="font-bold text-lg">${emp.full_name || emp.username}</span>
                                <span class="${emp.is_active ? 'text-green-400' : 'text-red-400'} text-sm mr-2">${emp.is_active ? '✅ نشط' : '🔴 معطّل'}</span>
                            </div>
                        </div>
                        <div class="text-light-muted text-sm mt-1 flex gap-4">
                            <span>👤 ${emp.username}</span>
                            <span>📞 ${emp.phone || '—'}</span>
                            <span>🕐 ${emp.created_at ? emp.created_at.slice(0, 10) : ''}</span>
                        </div>
                        <div class="flex gap-2 mt-3">
                            <button onclick="toggleEmployee('${emp.id}')" class="px-4 py-1.5 rounded-lg text-sm font-medium transition ${emp.is_active ? 'bg-red-900/50 text-red-400 hover:bg-red-800' : 'bg-green-900/50 text-green-400 hover:bg-green-800'}">
                                ${emp.is_active ? 'تعطيل' : 'تفعيل'}
                            </button>
                            <button onclick="showResetModal('${emp.id}', '${emp.full_name || emp.username}')" class="px-4 py-1.5 rounded-lg text-sm font-medium bg-yellow-900/50 text-yellow-400 hover:bg-yellow-800 transition">
                                🔑 إعادة كلمة المرور
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                loading.classList.add('hidden');
                error.classList.remove('hidden');
                error.textContent = '❌ فشل تحميل الموظفين: ' + e.message;
            }
        }

        function showAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('addModal').classList.add('flex');
        }

        function hideAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('addModal').classList.remove('flex');
        }

        async function addEmployee() {
            const fullName = document.getElementById('new-full-name').value.trim();
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value;
            const phone = document.getElementById('new-phone').value.trim();

            if (!fullName || !username || !password) {
                document.getElementById('error').textContent = '❌ الاسم واسم المستخدم وكلمة المرور مطلوبة';
                document.getElementById('error').classList.remove('hidden');
                return;
            }
            if (password.length < 6) {
                document.getElementById('error').textContent = '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                document.getElementById('error').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/api/employees/', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, username, password, phone })
                });
                const data = await res.json();
                if (!res.ok) { throw new Error(data.detail || 'فشل الإضافة'); }

                hideAddModal();
                document.getElementById('success').textContent = '✅ ' + data.message;
                document.getElementById('success').classList.remove('hidden');
                setTimeout(() => document.getElementById('success').classList.add('hidden'), 3000);
                loadEmployees();
            } catch (e) {
                document.getElementById('error').textContent = '❌ ' + e.message;
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function closeModal(e) {
            if (e.target === e.currentTarget) {
                hideAddModal();
                hideResetModal();
            }
        }

        async function toggleEmployee(id) {
            try {
                const res = await fetch('/api/employees/' + id + '/toggle', {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) { throw new Error(data.detail || 'فشل التبديل'); }

                document.getElementById('success').textContent = '✅ ' + data.message;
                document.getElementById('success').classList.remove('hidden');
                setTimeout(() => document.getElementById('success').classList.add('hidden'), 3000);
                loadEmployees();
            } catch (e) {
                document.getElementById('error').textContent = '❌ ' + e.message;
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function showResetModal(id, name) {
            resetTargetId = id;
            document.getElementById('reset-user-name').textContent = 'الموظف: ' + name;
            document.getElementById('resetModal').classList.remove('hidden');
            document.getElementById('resetModal').classList.add('flex');
        }

        function hideResetModal() {
            resetTargetId = null;
            document.getElementById('resetModal').classList.add('hidden');
            document.getElementById('resetModal').classList.remove('flex');
        }

        async function resetPassword() {
            const newPass = document.getElementById('reset-password').value;
            if (!newPass || newPass.length < 6) {
                document.getElementById('error').textContent = '❌ كلمة المرور الجديدة يجب أن تكون 6 أحرف';
                document.getElementById('error').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('/api/employees/' + resetTargetId + '/reset-password', {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password: newPass })
                });
                const data = await res.json();
                if (!res.ok) { throw new Error(data.detail || 'فشل إعادة التعيين'); }

                hideResetModal();
                document.getElementById('success').textContent = '✅ ' + data.message;
                document.getElementById('success').classList.remove('hidden');
                setTimeout(() => document.getElementById('success').classList.add('hidden'), 3000);
                document.getElementById('reset-password').value = '';
            } catch (e) {
                document.getElementById('error').textContent = '❌ ' + e.message;
                document.getElementById('error').classList.remove('hidden');
            }
        }

        loadEmployees();
    </script>
</body>
</html>
