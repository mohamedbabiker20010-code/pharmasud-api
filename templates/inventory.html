{% extends 'shared_layout.html' %}

{% set active_page = 'inventory' %}
{% set page_title = 'المخزون' %}

{% block extra_css %}
<style>
    /* ─── Page Content Wrapper ─── */
    .page-content {
      padding: 24px 28px;
    }

    /* ─── Stats Cards Row ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 16px;
      padding: 20px;
    }
    .stat-card .stat-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stat-card .stat-icon svg {
      width: 20px;
      height: 20px;
    }
    .stat-card .stat-icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .stat-card .stat-icon.cyan { background: #E0F2FE; color: #0284C7; }
    .stat-card .stat-icon.yellow { background: #FEF3C7; color: #D97706; }
    .stat-card .stat-icon.red { background: #FEE2E2; color: #DC2626; }
    .stat-card .stat-icon.orange { background: #FFEDD5; color: #EA580C; }
    .stat-card .stat-label {
      font-size: 13px;
      color: #94A3B8;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .stat-card .stat-value {
      font: 700 25px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }

    /* ─── Expired Alert Section ─── */
    .expired-alert {
      background: #fff;
      border: 1px solid #DC2626;
      border-radius: 14px;
      margin-bottom: 22px;
      overflow: hidden;
    }
    .expired-alert-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      background: rgba(239, 68, 68, 0.04);
      transition: background 0.2s ease;
    }
    .expired-alert-header:hover {
      background: rgba(239, 68, 68, 0.07);
    }
    .expired-alert-header .alert-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #DC2626;
    }
    .expired-alert-header .alert-title svg {
      width: 18px;
      height: 18px;
    }
    .expired-alert-header .alert-count {
      background: #DC2626;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 999px;
    }
    .expired-alert-header .alert-toggle {
      color: #94A3B8;
      transition: transform 0.2s ease;
    }
    .expired-alert-header .alert-toggle svg {
      width: 18px;
      height: 18px;
    }
    .expired-alert-body {
      max-height: 300px;
      overflow-y: auto;
    }
    .expired-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(239, 68, 68, 0.06);
      font-size: 13.5px;
    }
    .expired-row:last-child {
      border-bottom: none;
    }
    .expired-row .expired-med {
      font-weight: 600;
      color: #0F172A;
    }
    .expired-row .expired-batch {
      color: #64748B;
      font-size: 12.5px;
      margin-right: 8px;
    }
    .expired-row .expired-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748B;
      font-size: 13px;
    }
    .expired-row .expired-days {
      font-weight: 700;
      color: #DC2626;
      font-size: 12px;
      background: #FEF2F2;
      padding: 2px 8px;
      border-radius: 6px;
    }

    /* ─── Medicine Cards (List Format) ─── */
    .medicine-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .medicine-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 14px;
      padding: 18px 20px;
      transition: all 0.2s ease;
    }
    .medicine-card:hover {
      border-color: #E2E8F0;
      box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.06);
    }
    .medicine-card.expiry-critical {
      border-right: 4px solid #DC2626;
    }
    .medicine-card.expiry-warning {
      border-right: 4px solid #D97706;
    }
    .medicine-card.expiry-caution {
      border-right: 4px solid #EAB308;
    }
    .medicine-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }
    .medicine-card-header .med-thumb {
      width: 50px;
      height: 50px;
      border-radius: 11px;
      object-fit: cover;
      background: #F6F8FA;
      flex-shrink: 0;
      border: 1px solid #EEF2F6;
    }
    .medicine-card-header .med-info {
      flex: 1;
      min-width: 0;
    }
    .medicine-card-header .med-name {
      font-size: 15px;
      font-weight: 600;
      color: #0F172A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .medicine-card-header .med-category {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 2px;
    }
    .medicine-card-header .med-stock {
      text-align: center;
      min-width: 80px;
    }
    .medicine-card-header .med-stock .stock-qty {
      font: 700 22px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .medicine-card-header .med-stock .stock-unit {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 1px;
    }
    .medicine-card-header .med-stock .stock-status {
      font-size: 12px;
      font-weight: 600;
      margin-top: 4px;
    }
    .stock-status.available { color: #16A34A; }
    .stock-status.low { color: #D97706; }
    .stock-status.out { color: #DC2626; }

    /* ─── Expiry Badge ─── */
    .expiry-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
      white-space: nowrap;
      margin: 0 8px;
    }
    .expiry-badge.healthy { background: #ECFDF5; color: #16A34A; }
    .expiry-badge.caution { background: #FFFbeb; color: #D97706; }
    .expiry-badge.warning { background: #FEF3C7; color: #B45309; }
    .expiry-badge.critical { background: #FEF2F2; color: #DC2626; }
    .expiry-badge.none { background: #F1F5F9; color: #94A3B8; }

    /* ─── Expand Button ─── */
    .expand-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #F6F8FA;
      border: 1px solid #EEF2F6;
      color: #475569;
      padding: 7px 14px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .expand-btn:hover {
      background: #EEF2F6;
      color: #0F172A;
    }
    .expand-btn svg {
      width: 15px;
      height: 15px;
      transition: transform 0.2s ease;
    }
    .expand-btn.open svg {
      transform: rotate(180deg);
    }

    /* ─── Batches Section ─── */
    .batches-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #F1F5F9;
    }
    .batches-table-header {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr;
      gap: 8px;
      font: 600 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      padding: 0 14px 10px;
    }
    .batch-row {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr;
      gap: 8px;
      align-items: center;
      padding: 12px 14px;
      background: #F8FAFC;
      border-radius: 10px;
      margin-bottom: 6px;
      transition: background 0.15s ease;
    }
    .batch-row:last-child { margin-bottom: 0; }
    .batch-row:hover { background: #F1F5F9; }
    .batch-row .batch-num {
      font-size: 13.5px;
      font-weight: 600;
      color: #0F172A;
    }
    .batch-row .batch-supplier {
      font-size: 13px;
      color: #64748B;
    }
    .batch-row .batch-qty {
      font-size: 14px;
      font-weight: 700;
      color: #0F172A;
    }
    .batch-row .batch-expiry-date {
      font-size: 13px;
      color: #475569;
    }
    .batch-row .batch-expiry-status {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      text-align: center;
    }
    .batch-expiry-status.healthy { background: #ECFDF5; color: #16A34A; }
    .batch-expiry-status.caution { background: #FFFbeb; color: #D97706; }
    .batch-expiry-status.warning { background: #FEF3C7; color: #B45309; }
    .batch-expiry-status.critical { background: #FEF2F2; color: #DC2626; }

    .no-batches {
      text-align: center;
      padding: 16px;
      color: #94A3B8;
      font-size: 13px;
    }

    /* ─── Loading State ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ─── Empty State ─── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #94A3B8;
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }
    .empty-state .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: #64748B;
      margin-bottom: 4px;
    }
    .empty-state .empty-sub {
      font-size: 14px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .medicine-card-header { flex-wrap: wrap; }
      .batches-table-header,
      .batch-row { grid-template-columns: 1fr 1fr 1fr 1fr; }
      .batches-table-header > :nth-child(2),
      .batch-row > :nth-child(2) { display: none; }
    }
    @media (max-width: 768px) {
      .batches-table-header,
      .batch-row { grid-template-columns: 1fr 1fr 60px 80px; }
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .batch-row { grid-template-columns: 1fr 60px 80px; }
      .batches-table-header { grid-template-columns: 1fr 60px 80px; }
      .batches-table-header > :nth-child(4),
      .batch-row > :nth-child(4) { display: none; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
</style>
{% endblock %}

{% block content %}
<div x-data="inventoryApp()" x-init="loadInventory()" class="page-content">

      <!-- Loading State -->
      <template x-if="loading">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>جاري تحميل المخزون...</span>
        </div>
      </template>

      <!-- Content -->
      <template x-if="!loading">
        <div>
          <!-- Stats Grid -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon blue">
                <i data-lucide="pill"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.totalMedicines">0</div>
                <div class="stat-label">إجمالي الأدوية</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon cyan">
                <i data-lucide="package"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.totalStock">0</div>
                <div class="stat-label">إجمالي المخزون</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon yellow">
                <i data-lucide="package-minus"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.lowStock">0</div>
                <div class="stat-label">منخفض</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon red">
                <i data-lucide="package-x"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.outOfStock">0</div>
                <div class="stat-label">نفد</div>
              </div>
            </div>
          </div>

          <!-- Expired Alert Section -->
          <template x-if="expiredMedicines.length > 0">
            <div class="expired-alert">
              <div class="expired-alert-header" @click="toggleExpiredAlert()">
                <div class="alert-title">
                  <i data-lucide="alert-circle"></i>
                  <span>أدوية منتهية الصلاحية</span>
                </div>
                <div class="alert-count" x-text="expiredMedicines.length"></div>
                <div class="alert-toggle" :style="{ transform: expandedExpired ? 'rotate(180deg)' : 'rotate(0deg)' }">
                  <i data-lucide="chevron-down"></i>
                </div>
              </div>
              <div class="expired-alert-body" x-show="expandedExpired">
                <template x-for="med in expiredMedicines" :key="med.medicine_id">
                  <div class="expired-row">
                    <div class="expired-med" x-text="med.medicine_name"></div>
                    <div class="expired-batch" x-text="med.batch_number"></div>
                    <div class="expired-detail">
                      <i data-lucide="calendar" style="width:14px;height:14px"></i>
                      <span x-text="med.expiry_date"></span>
                    </div>
                    <div class="expired-days" x-text="'منتهي قبل ' + med.days_expired + ' أيام'"></div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Search + Filter Bar -->
          <div style="display:flex; gap:12px; margin-bottom:18px; align-items:center">
            <div class="search-box" style="flex:1; max-width:380px">
              <i data-lucide="search" style="width:18px;height:18px"></i>
              <input type="text" placeholder="بحث بالدواء أو الشركة..." x-model="searchQuery" @input.debounce.300ms="applyFilters()">
            </div>
            <div class="filter-dropdown" style="position:relative">
              <select x-model="statusFilter" @change="applyFilters()" style="appearance:none; padding:0 40px 0 16px; height:42px; border-radius:11px; border:1px solid #E2E8F0; background:#fff; font-size:14px; color:#0F172A; cursor:pointer; min-width:140px">
                <option value="all">كل الحالات</option>
                <option value="available">متوفر</option>
                <option value="low">منخفض</option>
                <option value="out">نفد</option>
              </select>
              <i data-lucide="chevron-down" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:#94A3B8; pointer-events:none"></i>
            </div>
          </div>

          <!-- Medicine List -->
          <div class="medicine-list">
            <template x-for="item in filteredMedicines" :key="item.medicine_id">
              <div class="medicine-card" :class="{
                'expiry-critical': item.has_expired_batch,
                'expiry-warning': item.has_warning_batch && !item.has_expired_batch,
                'expiry-caution': item.has_caution_batch && !item.has_expired_batch && !item.has_warning_batch
              }">
                <div class="medicine-card-header">
                  <img :src="item.image || '/static/images/placeholder.png'" class="med-thumb" alt="">
                  <div class="med-info">
                    <div class="med-name" x-text="item.medicine_name"></div>
                    <div class="med-category" x-text="item.category || 'فئة غير محددة'"></div>
                  </div>
                  <div class="med-stock">
                    <div class="stock-qty" x-text="item.total_quantity"></div>
                    <div class="stock-unit">علبة</div>
                    <div class="stock-status" :class="item.status_class" x-text="item.status_text"></div>
                  </div>
                  <span class="expiry-badge" :class="item.expiry_status_class" x-text="item.expiry_status_text"></span>
                  <button class="expand-btn" :class="{open: batchesData[item.medicine_id]}" @click="toggleBatches(item.medicine_id)">
                    <span>الشحنات</span>
                    <i data-lucide="chevron-down"></i>
                    <span x-text="batchesData[item.medicine_id] ? batchesData[item.medicine_id].length : item.batches_count"></span>
                  </button>
                </div>

                <!-- Batches Table -->
                <template x-if="batchesData[item.medicine_id]">
                  <div class="batches-section">
                    <div class="batches-table-header">
                      <span>رقم الشحنة</span>
                      <span>المورد</span>
                      <span>الكمية</span>
                      <span>تاريخ الانتهاء</span>
                      <span>الحالة</span>
                    </div>
                    <template x-for="batch in batchesData[item.medicine_id]" :key="batch.batch_id">
                      <div class="batch-row">
                        <div class="batch-num" x-text="batch.batch_number"></div>
                        <div class="batch-supplier" x-text="batch.supplier_name || 'غير معروف'"></div>
                        <div class="batch-qty" x-text="batch.quantity"></div>
                        <div class="batch-expiry-date" x-text="batch.expiry_date"></div>
                        <div class="batch-expiry-status"
                             :class="{
                               'healthy': batch.expiry_status === 'سليم',
                               'caution': batch.expiry_status === 'تحذير',
                               'warning': batch.expiry_status === 'ينتهي قريباً',
                               'critical': batch.expiry_status === 'منتهي'
                             }"
                             x-text="batch.expiry_status">
                        </div>
                      </div>
                    </template>
                  </div>
                </template>

                <div x-show="batchesData[item.medicine_id] && batchesData[item.medicine_id].length === 0 && !loadingBatches[item.medicine_id]"
                     class="no-batches">
                  لا توجد شحنات لهذا الدواء
                </div>

              </div>
            </template>
          </div>

          <!-- Empty State -->
          <template x-if="filteredMedicines.length === 0 && !loading">
            <div class="empty-state">
              <div style="width:64px;height:64px;border-radius:16px;background:#DBEAFE;color:#1AA7EC;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
                <i data-lucide="package" style="width:32px;height:32px"></i>
              </div>
              <div class="empty-title">لا توجد نتائج</div>
              <div class="empty-sub">لا توجد أدوية تطابق بحثك أو الفلتر المحدد</div>
            </div>
          </template>
        </div>
      </template>
    </div>
{% endblock %}

{% block extra_js %}
<script>

    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });

    function inventoryApp() {
      return {
        // State
        loading: true,
        searchQuery: '',
        statusFilter: 'all',
        allMedicines: [],
        filteredMedicines: [],
        expiredMedicines: [],
        expandedExpired: true,
        batchesData: {},
        loadingBatches: {},

        // Stats
        stats: {
          totalMedicines: 0,
          totalStock: 0,
          lowStock: 0,
          outOfStock: 0
        },

        // Init
        async loadInventory() {
          try {
            const res = await fetch('/api/inventory');
            const data = await res.json();

            this.allMedicines = data.medicines || [];
            this.filteredMedicines = [...this.allMedicines];

            this.stats.totalMedicines = data.total_medicines || 0;
            this.stats.totalStock = data.total_stock || 0;
            this.stats.lowStock = data.low_stock || 0;
            this.stats.outOfStock = data.out_of_stock || 0;

            this.expiredMedicines = data.expired_medicines || [];

            this.loading = false;

            // Initialize Lucide icons
            lucide.createIcons();
          } catch (e) {
            this.loading = false;
          }
        },

        // Filters
        applyFilters() {
          let result = [...this.allMedicines];

          if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            result = result.filter(m =>
              (m.medicine_name || '').toLowerCase().includes(q) ||
              (m.company || '').toLowerCase().includes(q)
            );
          }

          if (this.statusFilter !== 'all') {
            result = result.filter(m => m.status === this.statusFilter);
          }

          this.filteredMedicines = result;
        },

        // Batches
        async toggleBatches(medicineId) {
          if (this.batchesData[medicineId]) {
            delete this.batchesData[medicineId];
            return;
          }

          this.loadingBatches[medicineId] = true;
          this.batchesData[medicineId] = [];

          try {
            const res = await fetch(`/api/inventory/batches/${medicineId}`);
            const batches = await res.json();
            this.batchesData[medicineId] = batches || [];
          } catch (e) {
            this.batchesData[medicineId] = [];
          }

          this.loadingBatches[medicineId] = false;
          this.$nextTick(() => lucide.createIcons());
        },

        // Expired Alert
        toggleExpiredAlert() {
          this.expandedExpired = !this.expandedExpired;
        }
      };
    }
</script>
{% endblock %}
