<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/theme.css?v7.2.0">
  <title>المخزون - PharmaSUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
      background: #F6F8FA;
      color: #0F172A;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ─── */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 248px;
      background: #fff;
      border-left: 1px solid #EEF2F6;
      display: flex;
      flex-direction: column;
      padding: 22px 16px;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 100;
    }
    .sidebar .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 8px 22px;
    }
    .sidebar .brand .icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: #1AA7EC;
      position: relative;
      flex-shrink: 0;
    }
    .sidebar .brand .icon::before,
    .sidebar .brand .icon::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 3px;
    }
    .sidebar .brand .icon::before { width: 18px; height: 5.5px; }
    .sidebar .brand .icon::after { width: 5.5px; height: 18px; }
    .sidebar .brand .name {
      font: 700 18px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .sidebar .brand .name span { color: #1AA7EC; }
    .sidebar .nav-section {
      font: 600 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.1em;
      color: #CBD5E1;
      padding: 14px 10px 10px;
    }
    .sidebar .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 11px;
      color: #475569;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 4px;
      transition: all 0.2s ease;
    }
    .sidebar .nav-item:hover {
      background: #F8FAFC;
      color: #0F172A;
    }
    .sidebar .nav-item.active {
      background: #1AA7EC;
      color: #fff;
      box-shadow: 0 8px 18px -8px rgba(26, 167, 236, 0.55);
    }
    .sidebar .nav-item svg {
      width: 19px;
      height: 19px;
      flex-shrink: 0;
    }
    .sidebar .nav-item .badge {
      margin-right: auto;
      background: #FEF2F2;
      color: #DC2626;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .sidebar .user-card {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px;
      border: 1px solid #EEF2F6;
      border-radius: 13px;
      cursor: pointer;
      margin-top: 20px;
    }
    .sidebar .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #1AA7EC;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    .sidebar .user-info {
      min-width: 0;
      flex: 1;
    }
    .sidebar .user-name {
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar .user-role {
      font-size: 11.5px;
      color: #94A3B8;
    }
    .sidebar .user-card svg {
      width: 16px;
      height: 16px;
      color: #CBD5E1;
      flex-shrink: 0;
    }

    /* ─── Topbar ─── */
    .topbar {
      height: 70px;
      background: #fff;
      border-bottom: 1px solid #EEF2F6;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 18px;
      position: fixed;
      top: 0;
      right: 248px;
      left: 0;
      z-index: 90;
    }
    .topbar .topbar-title {
      min-width: 0;
    }
    .topbar .topbar-title h1 {
      margin: 0;
      font: 700 18px/1.1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
    }
    .topbar .topbar-title .subtitle {
      margin: 2px 0 0;
      color: #64748B;
      font-size: 12.5px;
    }
    .topbar .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 340px;
      height: 42px;
      padding: 0 14px;
      border-radius: 11px;
      background: #F6F8FA;
      color: #94A3B8;
      font-size: 14px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }
    .topbar .search-box:focus-within {
      border-color: #1AA7EC;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.1);
    }
    .topbar .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      color: #0F172A;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .topbar .search-box input::placeholder {
      color: #94A3B8;
    }
    .topbar .search-box svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: #94A3B8;
    }
    .topbar .filter-select {
      height: 42px;
      padding: 0 14px;
      border-radius: 11px;
      border: 1px solid #E2E8F0;
      background: #fff;
      color: #334155;
      font-size: 13.5px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
      min-width: 140px;
    }
    .topbar .filter-select:focus {
      border-color: #1AA7EC;
      box-shadow: 0 0 0 3px rgba(26, 167, 236, 0.1);
    }
    .topbar .filter-select option {
      background: #fff;
    }
    .topbar .actions {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar .lang-toggle {
      display: flex;
      border: 1px solid #E2E8F0;
      border-radius: 9px;
      overflow: hidden;
      font-size: 13px;
      font-weight: 600;
    }
    .topbar .lang-toggle span {
      padding: 7px 12px;
      color: #64748B;
    }
    .topbar .lang-toggle span.active {
      background: #1AA7EC;
      color: #fff;
    }
    .topbar .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      border: 1px solid #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }
    .topbar .icon-btn:hover {
      background: #F8FAFC;
      border-color: #CBD5E1;
    }
    .topbar .icon-btn svg {
      width: 18px;
      height: 18px;
    }
    .topbar .icon-btn .dot {
      position: absolute;
      top: 9px;
      left: 11px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #DC2626;
      border: 2px solid #fff;
    }

    /* ─── Main Content ─── */
    .main-content {
      margin-right: 248px;
      padding: calc(70px + 28px) 28px 28px;
      min-height: 100vh;
    }

    /* ─── Stats Cards Row ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-card .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .stat-card .stat-icon svg {
      width: 20px;
      height: 20px;
    }
    .stat-card .stat-icon.blue { background: #DBEAFE; color: #1AA7EC; }
    .stat-card .stat-icon.cyan { background: #E0F2FE; color: #0284C7; }
    .stat-card .stat-icon.yellow { background: #FEF3C7; color: #D97706; }
    .stat-card .stat-icon.red { background: #FEE2E2; color: #DC2626; }
    .stat-card .stat-icon.orange { background: #FFEDD5; color: #EA580C; }
    .stat-card .stat-value {
      font: 700 22px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .stat-card .stat-label {
      font-size: 12.5px;
      color: #94A3B8;
      font-weight: 500;
      margin-top: 3px;
    }

    /* ─── Expired Alert Section ─── */
    .expired-alert {
      background: #fff;
      border: 1px solid #DC2626;
      border-radius: 14px;
      margin-bottom: 22px;
      overflow: hidden;
    }
    .expired-alert-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      background: rgba(239, 68, 68, 0.04);
      transition: background 0.2s ease;
    }
    .expired-alert-header:hover {
      background: rgba(239, 68, 68, 0.07);
    }
    .expired-alert-header .alert-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #DC2626;
    }
    .expired-alert-header .alert-title svg {
      width: 18px;
      height: 18px;
    }
    .expired-alert-header .alert-count {
      background: #DC2626;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 999px;
    }
    .expired-alert-header .alert-toggle {
      color: #94A3B8;
      transition: transform 0.2s ease;
    }
    .expired-alert-header .alert-toggle svg {
      width: 18px;
      height: 18px;
    }
    .expired-alert-body {
      border-top: 1px solid rgba(239, 68, 68, 0.12);
    }
    .expired-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(239, 68, 68, 0.06);
      font-size: 13.5px;
    }
    .expired-row:last-child {
      border-bottom: none;
    }
    .expired-row .expired-med {
      font-weight: 600;
      color: #0F172A;
    }
    .expired-row .expired-batch {
      color: #64748B;
      font-size: 12.5px;
      margin-right: 8px;
    }
    .expired-row .expired-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748B;
      font-size: 13px;
    }
    .expired-row .expired-days {
      font-weight: 700;
      color: #DC2626;
      font-size: 12px;
      background: #FEF2F2;
      padding: 2px 8px;
      border-radius: 6px;
    }

    /* ─── Medicine Cards (List Format) ─── */
    .medicine-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .medicine-card {
      background: #fff;
      border: 1px solid #EEF2F6;
      border-radius: 14px;
      padding: 18px 20px;
      transition: all 0.2s ease;
    }
    .medicine-card:hover {
      border-color: #E2E8F0;
      box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.06);
    }
    .medicine-card.expiry-critical {
      border-right: 4px solid #DC2626;
    }
    .medicine-card.expiry-warning {
      border-right: 4px solid #D97706;
    }
    .medicine-card.expiry-caution {
      border-right: 4px solid #EAB308;
    }
    .medicine-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }
    .medicine-card-header .med-thumb {
      width: 50px;
      height: 50px;
      border-radius: 11px;
      object-fit: cover;
      background: #F6F8FA;
      flex-shrink: 0;
      border: 1px solid #EEF2F6;
    }
    .medicine-card-header .med-info {
      flex: 1;
      min-width: 0;
    }
    .medicine-card-header .med-name {
      font-size: 15px;
      font-weight: 600;
      color: #0F172A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .medicine-card-header .med-category {
      font-size: 12.5px;
      color: #94A3B8;
      margin-top: 2px;
    }
    .medicine-card-header .med-stock {
      text-align: center;
      min-width: 80px;
    }
    .medicine-card-header .med-stock .stock-qty {
      font: 700 22px/1 'IBM Plex Sans Arabic', sans-serif;
      letter-spacing: -0.02em;
      color: #0F172A;
    }
    .medicine-card-header .med-stock .stock-unit {
      font-size: 12px;
      color: #94A3B8;
      margin-top: 1px;
    }
    .medicine-card-header .med-stock .stock-status {
      font-size: 12px;
      font-weight: 600;
      margin-top: 4px;
    }
    .stock-status.available { color: #16A34A; }
    .stock-status.low { color: #D97706; }
    .stock-status.out { color: #DC2626; }

    /* ─── Expiry Badge ─── */
    .expiry-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 8px;
      white-space: nowrap;
      margin: 0 8px;
    }
    .expiry-badge.healthy { background: #ECFDF5; color: #16A34A; }
    .expiry-badge.caution { background: #FFFbeb; color: #D97706; }
    .expiry-badge.warning { background: #FEF3C7; color: #B45309; }
    .expiry-badge.critical { background: #FEF2F2; color: #DC2626; }
    .expiry-badge.none { background: #F1F5F9; color: #94A3B8; }

    /* ─── Expand Button ─── */
    .expand-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #F6F8FA;
      border: 1px solid #EEF2F6;
      color: #475569;
      padding: 7px 14px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .expand-btn:hover {
      background: #EEF2F6;
      color: #0F172A;
    }
    .expand-btn svg {
      width: 15px;
      height: 15px;
      transition: transform 0.2s ease;
    }
    .expand-btn.open svg {
      transform: rotate(180deg);
    }

    /* ─── Batches Section ─── */
    .batches-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #F1F5F9;
    }
    .batches-table-header {
      display: grid;
      grid-template-columns: 1.2fr 1fr 80px 100px 90px;
      gap: 8px;
      font: 600 11px/1 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      color: #CBD5E1;
      padding: 0 14px 10px;
    }
    .batch-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 80px 100px 90px;
      gap: 8px;
      align-items: center;
      padding: 12px 14px;
      background: #F8FAFC;
      border-radius: 10px;
      margin-bottom: 6px;
      transition: background 0.15s ease;
    }
    .batch-row:last-child { margin-bottom: 0; }
    .batch-row:hover { background: #F1F5F9; }
    .batch-row .batch-num {
      font-size: 13.5px;
      font-weight: 600;
      color: #0F172A;
    }
    .batch-row .batch-supplier {
      font-size: 13px;
      color: #64748B;
    }
    .batch-row .batch-qty {
      font-size: 14px;
      font-weight: 700;
      color: #0F172A;
    }
    .batch-row .batch-expiry-date {
      font-size: 13px;
      color: #475569;
    }
    .batch-row .batch-expiry-status {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      text-align: center;
    }
    .batch-expiry-status.healthy { background: #ECFDF5; color: #16A34A; }
    .batch-expiry-status.caution { background: #FFFbeb; color: #D97706; }
    .batch-expiry-status.warning { background: #FEF3C7; color: #B45309; }
    .batch-expiry-status.critical { background: #FEF2F2; color: #DC2626; }

    .no-batches {
      text-align: center;
      padding: 16px;
      color: #94A3B8;
      font-size: 13px;
    }

    /* ─── Loading State ─── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      gap: 16px;
      color: #94A3B8;
    }
    .loading-state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E2E8F0;
      border-top-color: #1AA7EC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ─── Empty State ─── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #94A3B8;
    }
    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }
    .empty-state .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: #64748B;
      margin-bottom: 4px;
    }
    .empty-state .empty-sub {
      font-size: 14px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .topbar { right: 0; }
      .main-content { margin-right: 0; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .topbar { padding: 0 16px; gap: 10px; }
      .main-content { padding: calc(70px + 16px) 16px 16px; }
      .medicine-card-header { flex-wrap: wrap; }
      .batches-table-header,
      .batch-row { grid-template-columns: 1fr 1fr 60px 80px; }
      .batches-table-header > :nth-child(2),
      .batch-row > :nth-child(2) { display: none; }
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .topbar .topbar-title { display: none; }
      .batch-row { grid-template-columns: 1fr 60px 80px; }
      .batches-table-header { grid-template-columns: 1fr 60px 80px; }
      .batches-table-header > :nth-child(4),
      .batch-row > :nth-child(4) { display: none; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
      .notif-dropdown {
      position: absolute; top: 64px; left: 0; width: 380px; max-height: 460px;
      background: #fff; border: 1px solid #E2E8F0; border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12); z-index: 200; overflow: hidden;
    }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #E2E8F0;
      font-weight: 700; font-size: 14px; color: #0F172A;
    }
    .notif-header a { font-size: 12px; color: #1AA7EC; text-decoration: none; }
    .notif-list { max-height: 340px; overflow-y: auto; }
    .notif-item {
      display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #F1F5F9;
      cursor: pointer; transition: background 0.15s;
    }
    .notif-item:hover { background: #F6F8FA; }
    .notif-item .notif-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .notif-icon.expiry { background: #FEF3C7; color: #D97706; }
    .notif-icon.stock { background: #FEE2E2; color: #DC2626; }
    .notif-icon.system { background: #DBEAFE; color: #2563EB; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 13px; font-weight: 600; color: #0F172A; }
    .notif-desc { font-size: 12px; color: #64748B; margin-top: 2px; }
    .notif-time { font-size: 11px; color: #94A3B8; margin-top: 3px; }
    .notif-empty { padding: 28px 16px; text-align: center; color: #94A3B8; font-size: 13px; }
    .notif-loading { padding: 16px; text-align: center; color: #64748B; font-size: 13px; }

  </style>
</head>
<body x-data="inventoryApp()" x-init="loadInventory()">

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="icon"></div>
        <div class="name">Pharma<span>SUD</span></div>
      </div>

      <div class="nav-section">MENU</div>
      <a href="/dashboard" class="nav-item" id="nav-dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>لوحة التحكم</span>
      </a>
      <a href="/pos" class="nav-item" id="nav-pos">
        <i data-lucide="scan-barcode"></i>
        <span>نقطة البيع</span>
      </a>
      <a href="/medicines" class="nav-item" id="nav-medicines">
        <i data-lucide="pill"></i>
        <span>الأدوية</span>
      </a>
      <a href="/inventory" class="nav-item active" id="nav-inventory">
        <i data-lucide="package"></i>
        <span>المخزون</span>
      </a>
      <a href="/batches" class="nav-item" id="nav-batches">
        <i data-lucide="calendar-clock"></i>
        <span>الدفعات</span>
      </a>
      <a href="/reports-sales" class="nav-item" id="nav-reports">
        <i data-lucide="chart-line"></i>
        <span>التقارير</span>
      </a>
      <a href="/employees" class="nav-item" id="nav-employees" x-show="isAdmin">
        <i data-lucide="users"></i>
        <span>الموظفين</span>
      </a>
      <a href="/alerts" class="nav-item" id="nav-alerts">
        <i data-lucide="bell"></i>
        <span>التنبيهات</span>
        <span class="badge">7</span>
      </a>
      <a href="/settings" class="nav-item" id="nav-settings">
        <i data-lucide="settings"></i>
        <span>الإعدادات</span>
      </a>

      <div class="user-card" @click="logout()">
        <div class="user-avatar" x-text="userInitials"></div>
        <div class="user-info">
          <div class="user-name" x-text="userName || 'المستخدم'"></div>
          <div class="user-role" x-text="isAdmin ? 'مدير' : 'صيدلي'"></div>
        </div>
        <i data-lucide="chevron-left"></i>
      </div>
    </aside>

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title">
        <h1>المخزون</h1>
        <p class="subtitle">إدارة المخزون والشحنات</p>
      </div>

      <div class="search-box">
        <i data-lucide="search"></i>
        <input type="text" x-model="searchQuery" placeholder="ابحث باسم الدواء...">
      </div>

      <select class="filter-select" x-model="statusFilter" @change="applyFilters()">
        <option value="all">كل الأدوية</option>
        <option value="available">متوفر</option>
        <option value="low">منخفض</option>
        <option value="out">نفد</option>
        <option value="expiry_warning">تحذير صلاحية</option>
      </select>

      <div class="actions">
        <div class="lang-toggle">
          <span>EN</span>
          <span class="active">ع</span>
        </div>
        <button class="icon-btn" @click="toggleTheme()">
          <i data-lucide="moon"></i>
        </button>
        <button class="icon-btn" @click="showNotifications = !showNotifications">
          <i data-lucide="bell"></i>
          <span class="dot"></span>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Loading State -->
      <template x-if="loading">
        <div class="loading-state">
          <div class="spinner"></div>
          <span>جاري تحميل المخزون...</span>
        </div>
      </template>

      <!-- Content -->
      <template x-if="!loading">
        <div>
          <!-- Stats Grid -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon blue">
                <i data-lucide="pill"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.totalMedicines">0</div>
                <div class="stat-label">إجمالي الأدوية</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon cyan">
                <i data-lucide="package"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.totalStock">0</div>
                <div class="stat-label">إجمالي المخزون</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon yellow">
                <i data-lucide="package-minus"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.lowStock">0</div>
                <div class="stat-label">منخفض</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon red">
                <i data-lucide="package-x"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.outOfStock">0</div>
                <div class="stat-label">نفد</div>
              </div>
            </div>
            <div class="stat-card" x-show="stats.expiredCount > 0">
              <div class="stat-icon orange">
                <i data-lucide="calendar-x"></i>
              </div>
              <div>
                <div class="stat-value" x-text="stats.expiredCount">0</div>
                <div class="stat-label">منتهي</div>
              </div>
            </div>
          </div>

          <!-- Expired Alert Section -->
          <div class="expired-alert" x-show="expiredItems.length > 0" x-transition>
            <div class="expired-alert-header" @click="showExpired = !showExpired">
              <div class="alert-title">
                <i data-lucide="triangle-alert"></i>
                <span>أدوية منتهية الصلاحية</span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <span class="alert-count" x-text="expiredItems.length + ' شحنة'"></span>
                <span class="alert-toggle">
                  <i data-lucide="chevron-down"></i>
                </span>
              </div>
            </div>
            <div class="expired-alert-body" x-show="showExpired" x-transition>
              <template x-for="item in expiredItems" :key="item.batch_number">
                <div class="expired-row">
                  <div>
                    <span class="expired-med" x-text="item.medicine_name"></span>
                    <span class="expired-batch" x-text="'#' + item.batch_number"></span>
                  </div>
                  <div class="expired-detail">
                    <span><span x-text="item.quantity"></span> وحدة</span>
                    <span class="expired-days" x-text="item.days_expired + ' يوم'"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Medicine List -->
          <div class="medicine-list">
            <template x-for="item in filteredMedicines" :key="item.medicine_id">
              <div class="medicine-card"
                   :class="{
                     'expiry-critical': item.nearest_expiry_status === 'ينتهي قريباً',
                     'expiry-warning': item.nearest_expiry_status === 'تحذير',
                     'expiry-caution': item.stock_status === 'low'
                   }">
                <div class="medicine-card-header" @click="toggleBatches(item.medicine_id)">
                  <img class="med-thumb" :src="item.image_url" :alt="item.trade_name">

                  <div class="med-info">
                    <div class="med-name" x-text="item.trade_name"></div>
                    <div class="med-category" x-text="item.category"></div>
                  </div>

                  <div class="med-stock">
                    <div class="stock-qty" x-text="item.total_stock"></div>
                    <div class="stock-unit" x-text="item.base_unit"></div>
                    <div class="stock-status"
                         :class="{
                           'available': item.stock_status === 'available',
                           'low': item.stock_status === 'low',
                           'out': item.stock_status === 'out'
                         }"
                         x-text="item.stock_status === 'available' ? 'متوفر' :
                                  item.stock_status === 'low' ? 'منخفض' : 'نفد'">
                    </div>
                  </div>

                  <div class="expiry-badge"
                       :class="{
                         'healthy': item.nearest_expiry_status === 'سليم',
                         'caution': item.nearest_expiry_status === 'تحذير',
                         'warning': item.nearest_expiry_status === 'ينتهي قريباً',
                         'critical': item.nearest_expiry_status === 'منتهي',
                         'none': !item.nearest_expiry_status
                       }"
                       x-text="item.nearest_expiry || 'لا توجد شحنات'">
                  </div>

                  <button class="expand-btn" :class="{ 'open': batchesOpen[item.medicine_id] }">
                    <i data-lucide="chevron-down"></i>
                    <span x-text="batchesOpen[item.medicine_id] ? 'إخفاء' : 'الشحنات'"></span>
                  </button>
                </div>

                <!-- Batches Detail -->
                <div class="batches-section" x-show="batchesOpen[item.medicine_id]" x-transition>
                  <div x-show="loadingBatches[item.medicine_id]"
                       style="text-align:center;padding:16px;color:#94A3B8;font-size:13px;">
                    <div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0 auto 8px;display:inline-block;vertical-align:middle;"></div>
                    جاري تحميل الشحنات...
                  </div>

                  <template x-if="!loadingBatches[item.medicine_id] && batchesData[item.medicine_id] && batchesData[item.medicine_id].length > 0">
                    <div>
                      <div class="batches-table-header">
                        <span>رقم الشحنة</span>
                        <span>المورد</span>
                        <span>الكمية</span>
                        <span>تاريخ الانتهاء</span>
                        <span>الحالة</span>
                      </div>
                      <template x-for="batch in batchesData[item.medicine_id]" :key="batch.batch_id">
                        <div class="batch-row">
                          <div class="batch-num" x-text="batch.batch_number"></div>
                          <div class="batch-supplier" x-text="batch.supplier_name || 'غير معروف'"></div>
                          <div class="batch-qty" x-text="batch.quantity"></div>
                          <div class="batch-expiry-date" x-text="batch.expiry_date"></div>
                          <div class="batch-expiry-status"
                               :class="{
                                 'healthy': batch.expiry_status === 'سليم',
                                 'caution': batch.expiry_status === 'تحذير',
                                 'warning': batch.expiry_status === 'ينتهي قريباً',
                                 'critical': batch.expiry_status === 'منتهي'
                               }"
                               x-text="batch.expiry_status">
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>

                  <div x-show="batchesData[item.medicine_id] && batchesData[item.medicine_id].length === 0 && !loadingBatches[item.medicine_id]"
                       class="no-batches">
                    لا توجد شحنات لهذا الدواء
                  </div>
                </div>
              </div>
            </template>

            <!-- Empty State -->
            <template x-if="filteredMedicines.length === 0">
              <div class="empty-state">
                <i data-lucide="package-open"></i>
                <div class="empty-title">لا توجد نتائج</div>
                <div class="empty-sub">لا توجد أدوية تطابق بحثك أو الفلتر المحدد</div>
              </div>
            </template>
          </div>

        </div>
      </template>

    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });

    function inventoryApp() {
      return {
        // State
        loading: true,
        searchQuery: '',
        statusFilter: 'all',
        allMedicines: [],
        expiredItems: [],
        batchesOpen: {},
        batchesData: {},
        loadingBatches: {},
        showExpired: true,

        // User
        userName: '',
        userInitials: '',
        isAdmin: false,

        // Stats
        stats: {
          totalMedicines: 0,
          totalStock: 0,
          lowStock: 0,
          outOfStock: 0,
          expiredCount: 0
        },

        // Computed
        get filteredMedicines() {
          let items = this.allMedicines;
          const query = this.searchQuery.trim().toLowerCase();

          if (query) {
            items = items.filter(m =>
              m.trade_name.toLowerCase().includes(query) ||
              (m.scientific_name && m.scientific_name.toLowerCase().includes(query))
            );
          }

          if (this.statusFilter === 'available') {
            items = items.filter(m => m.stock_status === 'available');
          } else if (this.statusFilter === 'low') {
            items = items.filter(m => m.stock_status === 'low');
          } else if (this.statusFilter === 'out') {
            items = items.filter(m => m.stock_status === 'out');
          } else if (this.statusFilter === 'expiry_warning') {
            items = items.filter(m =>
              m.nearest_expiry_status === 'تحذير' ||
              m.nearest_expiry_status === 'ينتهي قريباً'
            );
          }

          return items;
        },

        // Methods
        applyFilters() {
          // Alpine reactivity handles this automatically via filteredMedicines
        },

        toggleTheme() {
          document.body.classList.toggle('dark-mode');
        },

        logout() {
          localStorage.clear();
          window.location.href = '/login';
        },

        async loadInventory() {
          this.loading = true;

          // Set user info
          this.userName = localStorage.getItem('userName') || 'المستخدم';
          this.isAdmin = localStorage.getItem('role') === 'admin';
          this.userInitials = this.userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

          try {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }

            // Load inventory
            const invResp = await fetch('/api/inventory/', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            const invData = await invResp.json();
            this.allMedicines = invData.medicines || [];
            this.stats.totalMedicines = invData.total || 0;

            // Calculate stats
            let totalStock = 0, lowStock = 0, outOfStock = 0;
            for (const med of this.allMedicines) {
              totalStock += med.total_stock;
              if (med.stock_status === 'low') lowStock++;
              else if (med.stock_status === 'out') outOfStock++;
            }
            this.stats.totalStock = totalStock;
            this.stats.lowStock = lowStock;
            this.stats.outOfStock = outOfStock;

            // Load expired items
            try {
              const expResp = await fetch('/api/inventory/expired', {
                headers: { 'Authorization': 'Bearer ' + token }
              });
              const expData = await expResp.json();
              this.expiredItems = expData.expired || [];
              this.stats.expiredCount = expData.total_expired_items || 0;
            } catch (e) {
              console.error('Failed to load expired:', e);
            }

          } catch (err) {
            console.error('Failed to load inventory:', err);
          } finally {
            this.loading = false;
            // Re-init lucide icons after Alpine renders
            this.$nextTick(() => {
              if (window.lucide) lucide.createIcons();
            });
          }
        },

        async toggleBatches(medicineId) {
          if (this.batchesOpen[medicineId]) {
            this.batchesOpen[medicineId] = false;
            return;
          }

          this.batchesOpen[medicineId] = true;
          this.loadingBatches[medicineId] = true;

          try {
            const token = localStorage.getItem('token');
            const resp = await fetch(`/api/inventory/${medicineId}/batches`, {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await resp.json();
            this.batchesData[medicineId] = data.batches || [];
          } catch (err) {
            console.error('Failed to load batches:', err);
            this.batchesData[medicineId] = [];
          } finally {
            this.loadingBatches[medicineId] = false;
            this.$nextTick(() => {
              if (window.lucide) lucide.createIcons();
            });
          }
        },
        async loadNotifications() {
          this.notificationsLoading = true;
          try {
            const token = localStorage.getItem('token');
            const r = await fetch('/api/alerts/count', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (r.ok) {
              const data = await r.json();
              this.notifications = [];
              if (data.total_count > 0 || data.expiry_count > 0 || data.low_stock_count > 0) {
                if (data.expiry_count > 0) {
                  this.notifications.push({
                    id: 'expiry', type: 'expiry',
                    title: 'تنبيهات الصلاحية',
                    message: data.expiry_count + ' دووان قاربت على الانتهاء',
                    time: 'الآن', href: '/alerts'
                  });
                }
                if (data.low_stock_count > 0) {
                  this.notifications.push({
                    id: 'stock', type: 'low_stock',
                    title: 'تنبيهات المخزون',
                    message: data.low_stock_count + ' دووان مخزونها منخفض',
                    time: 'الآن', href: '/medicines'
                  });
                }
              }
            }
          } catch (e) { /* silent */ }
          this.notificationsLoading = false;
        },
      };
    }
        
  </script>
</body>
</html>
