<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔔 التنبيهات - PharmaSUD</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        light: { bg: "#F6F8FA", card: "#FFFFFF", border: "#EEF2F6", text: "#0F172A", muted: "#64748B" }
                    }
                }
            }
        }
    </script>

  <style>
    .sidebar { width:248px; background:#fff; border-left:1px solid #EEF2F6; display:flex; flex-direction:column; padding:22px 16px; position:fixed; right:0; top:0; bottom:0; z-index:100; font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif; }
    .sidebar .brand { display:flex; align-items:center; gap:11px; padding:0 8px 22px; }
    .sidebar .brand .icon { width:38px; height:38px; border-radius:11px; background:#1AA7EC; position:relative; flex-shrink:0; }
    .sidebar .brand .icon::before,.sidebar .brand .icon::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; border-radius:3px; }
    .sidebar .brand .icon::before { width:18px; height:5.5px; }
    .sidebar .brand .icon::after { width:5.5px; height:18px; }
    .sidebar .brand .name { font:700 18px/1 'IBM Plex Sans Arabic',sans-serif; letter-spacing:-0.02em; }
    .sidebar .brand .name span { color:#1AA7EC; }
    .sidebar .nav-section { font:600 11px/1 'IBM Plex Mono',monospace; letter-spacing:0.1em; color:#CBD5E1; padding:14px 10px 10px; }
    .sidebar .nav-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; color:#475569; font-size:14px; font-weight:500; text-decoration:none; margin-bottom:4px; transition:all 0.2s ease; }
    .sidebar .nav-item:hover { background:#F8FAFC; color:#0F172A; }
    .sidebar .nav-item.active { background:#1AA7EC; color:#fff; box-shadow:0 8px 18px -8px rgba(26,167,236,0.55); }
    .sidebar .nav-item svg { width:19px; height:19px; flex-shrink:0; }
    .sidebar .nav-item .badge { margin-right:auto; background:#FEF2F2; color:#DC2626; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .sidebar .user-card { margin-top:auto; display:flex; align-items:center; gap:11px; padding:11px; border:1px solid #EEF2F6; border-radius:13px; cursor:pointer; }
    .sidebar .user-avatar { width:36px; height:36px; border-radius:10px; background:#1AA7EC; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .sidebar .user-name { font-size:13.5px; font-weight:600; }
    .sidebar .user-role { font-size:11.5px; color:#94A3B8; }
    .sidebar .user-card svg { width:16px; height:16px; color:#CBD5E1; flex-shrink:0; margin-right:auto; }
    .main-wrap { margin-right:248px; min-height:100vh; }
    @media(max-width:1024px){ .sidebar{display:none;} .main-wrap{margin-right:0;} }
  </style>

</head>
<body class="bg-light-bg text-light-text font-sans min-h-screen">

  <!-- Cloud Design Sidebar -->
  <aside class="sidebar" id="cloud-sidebar">
    <div class="brand">
      <div class="icon"></div>
      <div class="name">Pharma<span>SUD</span></div>
    </div>
    <div class="nav-section">MENU</div>
    <a href="/dashboard" class="nav-item" id="nav-dashboard"><i data-lucide="layout-dashboard"></i><span>لوحة التحكم</span></a>
    <a href="/pos" class="nav-item" id="nav-pos"><i data-lucide="scan-barcode"></i><span>نقطة البيع</span></a>
    <a href="/medicines" class="nav-item" id="nav-medicines"><i data-lucide="pill"></i><span>الأدوية</span></a>
    <a href="/inventory" class="nav-item" id="nav-inventory"><i data-lucide="package"></i><span>المخزون</span></a>
    <a href="/batches" class="nav-item" id="nav-batches"><i data-lucide="calendar-clock"></i><span>الدفعات</span></a>
    <a href="/reports-sales" class="nav-item" id="nav-reports"><i data-lucide="chart-line"></i><span>التقارير</span></a>
    <a href="/employees" class="nav-item" id="nav-employees" style="display:none"><i data-lucide="users"></i><span>الموظفين</span></a>
    <a href="/alerts" class="nav-item active" id="nav-alerts"><i data-lucide="bell"></i><span>التنبيهات</span><span class="badge">7</span></a>
    <a href="/settings" class="nav-item" id="nav-settings"><i data-lucide="settings"></i><span>الإعدادات</span></a>
    <div class="user-card" onclick="logout()">
      <div class="user-avatar" id="user-initials">U</div>
      <div style="min-width:0;flex:1">
        <div class="user-name" id="user-name">المستخدم</div>
        <div class="user-role" id="user-role">صيدلي</div>
      </div>
      <i data-lucide="chevron-left"></i>
    </div>
  </aside>
  <script>
    function logout() { localStorage.clear(); window.location.href='/login'; }
    document.addEventListener('DOMContentLoaded', function() {
      const name = localStorage.getItem('userName') || 'المستخدم';
      const role = localStorage.getItem('role') || 'pharmacist';
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-role').textContent = role === 'admin' ? 'مدير' : 'صيدلي';
      document.getElementById('user-initials').textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      if(role === 'admin') document.getElementById('nav-employees').style.display='flex';
    });
  </script>

    <div class="max-w-2xl mx-auto p-4">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">🔔 التنبيهات</h1>
            <a href="/dashboard" class="text-[#1AA7EC] hover:text-blue-300 text-sm">← العودة للرئيسية</a>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-12 text-light-muted">جاري تحميل التنبيهات...</div>

        <!-- Error -->
        <div id="error" class="hidden bg-red-900/50 border border-red-700 rounded-lg p-4 mb-4 text-center"></div>

        <!-- Content -->
        <div id="content" class="hidden space-y-6"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; }

        async function loadAlerts() {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            const error = document.getElementById('error');

            try {
                const res = await fetch('/api/alerts/', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) { throw new Error('HTTP ' + res.status); }
                const data = await res.json();

                loading.classList.add('hidden');
                content.classList.remove('hidden');

                let html = '';

                // Expiry critical alerts
                const critical = data.expiry_alerts.filter(a => a.severity === 'critical');
                if (critical.length > 0) {
                    html += `
                        <div class="bg-dark-card border border-red-800 rounded-xl p-4">
                            <h2 class="text-lg font-bold text-red-400 mb-3">🔴 صلاحية عاجلة (${critical.length})</h2>
                            ${critical.map(a => `
                                <div class="flex items-center justify-between py-2 border-b border-dark-border last:border-0">
                                    <div>
                                        <span class="font-medium">${a.trade_name}</span>
                                        <span class="text-light-muted text-sm mr-2">${a.batch_number}</span>
                                    </div>
                                    <span class="text-red-400 text-sm font-bold" dir="ltr">${a.days_remaining} يوم</span>
                                </div>
                            `).join('')}
                        </div>`;
                }

                // Expiry warning alerts
                const warning = data.expiry_alerts.filter(a => a.severity === 'warning');
                if (warning.length > 0) {
                    html += `
                        <div class="bg-dark-card border border-yellow-800 rounded-xl p-4">
                            <h2 class="text-lg font-bold text-yellow-400 mb-3">🟡 صلاحية تحذير (${warning.length})</h2>
                            ${warning.map(a => `
                                <div class="flex items-center justify-between py-2 border-b border-dark-border last:border-0">
                                    <div>
                                        <span class="font-medium">${a.trade_name}</span>
                                        <span class="text-light-muted text-sm mr-2">${a.batch_number}</span>
                                    </div>
                                    <span class="text-yellow-400 text-sm font-bold" dir="ltr">${a.days_remaining} يوم</span>
                                </div>
                            `).join('')}
                        </div>`;
                }

                // Low stock alerts
                if (data.low_stock_alerts.length > 0) {
                    html += `
                        <div class="bg-dark-card border border-orange-800 rounded-xl p-4">
                            <h2 class="text-lg font-bold text-orange-400 mb-3">📉 مخزون منخفض (${data.low_stock_alerts.length})</h2>
                            ${data.low_stock_alerts.map(a => `
                                <div class="flex items-center justify-between py-2 border-b border-dark-border last:border-0">
                                    <div>
                                        <span class="font-medium">${a.trade_name}</span>
                                        <span class="text-light-muted text-sm mr-2">${a.base_unit}</span>
                                    </div>
                                    <span class="text-orange-400 text-sm">${a.current_stock} ${a.base_unit} (الحد: ${a.min_stock})</span>
                                </div>
                            `).join('')}
                        </div>`;
                }

                // No alerts message
                if (critical.length === 0 && warning.length === 0 && data.low_stock_alerts.length === 0) {
                    html = `
                        <div class="bg-dark-card rounded-xl p-8 text-center">
                            <div class="text-4xl mb-4">✅</div>
                            <h2 class="text-xl font-bold text-green-400">لا توجد تنبيهات</h2>
                            <p class="text-light-muted mt-2">كل الأدوية في حالتها الطبيعية</p>
                        </div>`;
                }

                content.innerHTML = html;

            } catch (e) {
                loading.classList.add('hidden');
                error.classList.remove('hidden');
                error.textContent = '❌ فشل تحميل التنبيهات: ' + e.message;
            }
        }

        loadAlerts();
    </script>
</body>
</html>
