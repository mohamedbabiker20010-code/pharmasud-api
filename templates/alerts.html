{% extends 'shared_layout.html' %}

{% set active_page = 'alerts' %}
{% set page_title = 'التنبيهات' %}

{% block extra_css %}
<style>
    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      .page-header { flex-direction: column; align-items: flex-start; gap: 14px; }
      .page-header .header-actions { width: 100%; }
      .alert-card { flex-direction: column; }
      .alert-actions { flex-direction: row; align-items: stretch; }
      .alert-action-btn { flex: 1; justify-content: center; }
      .filter-chips { gap: 6px; }
      .filter-chip { padding: 6px 12px; font-size: 12.5px; }
    }
</style>
{% endblock %}

{% block content %}
    <!-- ═══════ Main Content ═══════ -->
    <div x-data="alertsApp()" x-init="init()">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1>التنبيهات والإشعارات</h1>
          <p class="subtitle">
            <span x-text="totalCount"></span> تنبيه يحتاج انتباهك
          </p>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" @click="markAllRead()" :disabled="totalCount === 0">
            <i data-lucide="check-check"></i>
            تحديد الكل كمقروء
          </button>
        </div>
      </div>

      <!-- Filter Chips -->
      <div class="filter-chips">
        <button class="filter-chip" :class="{ 'active': activeFilter === 'all' }" @click="setFilter('all')">
          الكل
          <span class="chip-count" x-text="totalCount"></span>
        </button>
        <button class="filter-chip" :class="{ 'active': activeFilter === 'low_stock' }" @click="setFilter('low_stock')">
          مخزون منخفض
          <span class="chip-count" x-text="lowStockCount"></span>
        </button>
        <button class="filter-chip" :class="{ 'active': activeFilter === 'expiry' }" @click="setFilter('expiry')">
          انتهاء الصلاحية
          <span class="chip-count" x-text="expiryCount"></span>
        </button>
        <button class="filter-chip" :class="{ 'active': activeFilter === 'system' }" @click="setFilter('system')">
          النظام
          <span class="chip-count">0</span>
        </button>
      </div>

      <!-- Loading State -->
      <template x-if="loading">
        <div>
          <div class="skeleton-card"><div class="skeleton-circle"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-circle"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-circle"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
          <div class="skeleton-card"><div class="skeleton-circle"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
        </div>
      </template>

      <!-- Error State -->
      <template x-if="error">
        <div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;padding:24px;text-align:center;color:#DC2626;">
          <div style="font-size:18px;font-weight:700;margin-bottom:8px;">فشل تحميل التنبيهات</div>
          <p style="font-size:14px;color:#64748B;margin-bottom:14px;" x-text="errorMsg"></p>
          <button class="btn btn-secondary" @click="loadAlerts()" style="display:inline-flex;">
            <i data-lucide="refresh-cw"></i> إعادة المحاولة
          </button>
        </div>
      </template>

      <!-- Content -->
      <template x-if="!loading && !error">
        <div>
          <!-- Empty State -->
          <template x-if="filteredAlerts.length === 0">
            <div class="empty-state">
              <div class="empty-icon">
                <i data-lucide="check-circle-2"></i>
              </div>
              <h3 x-text="activeFilter === 'all' ? 'لا توجد تنبيهات' : 'لا توجد تنبيهات في هذا التصنيف'"></h3>
              <p x-text="activeFilter === 'all' ? 'كل الأدوية في حالتها الطبيعية' : 'لا توجد تنبيهات تطابق الفلتر المحدد'"></p>
            </div>
          </template>

          <!-- Today's Alerts -->
          <template x-if="todayAlerts.length > 0">
            <div>
              <div class="section-header">اليوم</div>
              <template x-for="alert in todayAlerts" :key="alert.id">
                <div class="alert-card" :class="'severity-' + alert.severity">
                  <!-- Icon -->
                  <div class="alert-icon" :class="alert.iconClass">
                    <i :data-lucide="alert.icon"></i>
                  </div>
                  <!-- Body -->
                  <div class="alert-body">
                    <div class="alert-title" x-text="alert.title"></div>
                    <div class="alert-desc" x-text="alert.description"></div>
                    <div class="alert-meta">
                      <span class="alert-time">
                        <i data-lucide="clock"></i>
                        <span x-text="alert.time"></span>
                      </span>
                      <span class="alert-severity-badge" :class="alert.severity" x-text="alert.severityLabel"></span>
                    </div>
                  </div>
                  <!-- Actions -->
                  <div class="alert-actions">
                    <template x-if="alert.actionType === 'view_batch'">
                      <button class="alert-action-btn red" @click="handleAction(alert, 'view')">
                        <i data-lucide="eye"></i>
                        عرض الدفعة
                      </button>
                    </template>
                    <template x-if="alert.actionType === 'reorder'">
                      <button class="alert-action-btn blue" @click="handleAction(alert, 'reorder')">
                        <i data-lucide="shopping-cart"></i>
                        إعادة طلب
                      </button>
                    </template>
                    <button class="alert-action-btn gray" @click="dismissAlert(alert)">
                      <i data-lucide="x"></i>
                      تجاهل
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Previous Alerts -->
          <template x-if="previousAlerts.length > 0">
            <div>
              <div class="section-header">سابقاً</div>
              <template x-for="alert in previousAlerts" :key="alert.id">
                <div class="alert-card" :class="'severity-' + alert.severity">
                  <!-- Icon -->
                  <div class="alert-icon" :class="alert.iconClass">
                    <i :data-lucide="alert.icon"></i>
                  </div>
                  <!-- Body -->
                  <div class="alert-body">
                    <div class="alert-title" x-text="alert.title"></div>
                    <div class="alert-desc" x-text="alert.description"></div>
                    <div class="alert-meta">
                      <span class="alert-time">
                        <i data-lucide="clock"></i>
                        <span x-text="alert.time"></span>
                      </span>
                      <span class="alert-severity-badge" :class="alert.severity" x-text="alert.severityLabel"></span>
                    </div>
                  </div>
                  <!-- Actions -->
                  <div class="alert-actions">
                    <template x-if="alert.actionType === 'view_batch'">
                      <button class="alert-action-btn red" @click="handleAction(alert, 'view')">
                        <i data-lucide="eye"></i>
                        عرض الدفعة
                      </button>
                    </template>
                    <template x-if="alert.actionType === 'reorder'">
                      <button class="alert-action-btn blue" @click="handleAction(alert, 'reorder')">
                        <i data-lucide="shopping-cart"></i>
                        إعادة طلب
                      </button>
                    </template>
                    <button class="alert-action-btn gray" @click="dismissAlert(alert)">
                      <i data-lucide="x"></i>
                      تجاهل
                    </button>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Toast -->
      <div class="toast success" x-show="showToast" x-transition style="display:none;" x-cloak>
        <i data-lucide="check-circle-2"></i>
        <span x-text="toastMsg"></span>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
    });

    function alertsApp() {
      return {
        // Auth
        userName: localStorage.getItem('userName') || 'المستخدم',
        isAdmin: localStorage.getItem('role') === 'admin',
        userInitials: '',

        // State
        loading: true,
        error: false,
        errorMsg: '',
        activeFilter: 'all',
        allAlerts: [],
        showToast: false,
        toastMsg: '',
        totalCount: 0,
        isDark: localStorage.getItem('darkMode') === 'true',

        // Computed counts
        get expiryCount() {
          return this.allAlerts.filter(a => a.type === 'expiry').length;
        },
        get lowStockCount() {
          return this.allAlerts.filter(a => a.type === 'low_stock').length;
        },
        get filteredAlerts() {
          if (this.activeFilter === 'all') return this.allAlerts;
          if (this.activeFilter === 'expiry') return this.allAlerts.filter(a => a.type === 'expiry');
          if (this.activeFilter === 'low_stock') return this.allAlerts.filter(a => a.type === 'low_stock');
          if (this.activeFilter === 'system') return this.allAlerts.filter(a => a.type === 'system');
          return this.allAlerts;
        },
        get todayAlerts() {
          return this.filteredAlerts.filter(a => a.isToday);
        },
        get previousAlerts() {
          return this.filteredAlerts.filter(a => !a.isToday);
        },

        init() {
          const token = localStorage.getItem('token');
          if (!token) {
            window.location.href = '/login';
            return;
          }
          if (this.isDark) document.body.classList.add('dark-mode');
          const name = this.userName;
          this.userInitials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
          this.loadAlerts();
        },

        async loadAlerts() {
          this.loading = true;
          this.error = false;
          const token = localStorage.getItem('token');
          if (!token) { window.location.href = '/login'; return; }

          try {
            const res = await fetch('/api/alerts/', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            const now = new Date();
            const alerts = [];
            let idCounter = 0;

            // Process expiry alerts
            if (data.expiry_alerts && data.expiry_alerts.length > 0) {
              data.expiry_alerts.forEach(a => {
                const isCritical = a.severity === 'critical';
                const daysLeft = a.days_remaining;
                const isToday = daysLeft <= 1;
                const expiryDate = a.expiry_date ? new Date(a.expiry_date) : null;
                const daysDiff = expiryDate ? Math.floor((now - expiryDate) / (1000*60*60*24)) : 999;
                const isPrevious = daysDiff > 0;

                alerts.push({
                  id: 'exp-' + (idCounter++),
                  type: 'expiry',
                  severity: isCritical ? 'critical' : 'warning',
                  iconClass: isCritical ? 'critical' : 'warning',
                  icon: isCritical ? 'alert-triangle' : 'clock',
                  title: isCritical
                    ? 'صلاحية عاجلة: ' + a.trade_name
                    : 'تنبيه صلاحية: ' + a.trade_name,
                  description: 'الدفعة ' + a.batch_number + ' — متبقي ' + daysLeft + ' يوم على الانتهاء',
                  time: isToday ? 'اليوم' : (isPrevious ? 'قبل ' + Math.abs(daysDiff) + ' يوم' : 'متبقي ' + daysLeft + ' يوم'),
                  isToday: isToday && !isPrevious,
                  actionType: 'view_batch',
                  severityLabel: isCritical ? 'عاجل' : 'تحذير',
                  batchNumber: a.batch_number,
                  medicineName: a.trade_name,
                  rawAlert: a
                });
              });
            }

            // Process low stock alerts
            if (data.low_stock_alerts && data.low_stock_alerts.length > 0) {
              data.low_stock_alerts.forEach(a => {
                alerts.push({
                  id: 'stk-' + (idCounter++),
                  type: 'low_stock',
                  severity: 'low-stock',
                  iconClass: 'low-stock',
                  icon: 'package-open',
                  title: 'مخزون منخفض: ' + a.trade_name,
                  description: 'المخزون الحالي ' + a.current_stock + ' ' + (a.base_unit || 'وحدة') + ' — الحد الأدنى: ' + a.min_stock,
                  time: 'اليوم',
                  isToday: true,
                  actionType: 'reorder',
                  severityLabel: 'منخفض',
                  medicineName: a.trade_name,
                  rawAlert: a
                });
              });
            }

            // Sort: critical first, then warning, then low-stock
            const severityOrder = { critical: 0, warning: 1, 'low-stock': 2, info: 3 };
            alerts.sort((a, b) => (severityOrder[a.severity] || 99) - (severityOrder[b.severity] || 99));

            this.allAlerts = alerts;
            this.totalCount = alerts.length;
            this.loading = false;

            // Re-render Lucide icons after DOM update
            this.$nextTick(() => {
              if (window.lucide) lucide.createIcons();
            });

          } catch (e) {
            this.loading = false;
            this.error = true;
            this.errorMsg = e.message || 'حدث خطأ أثناء تحميل التنبيهات';
          }
        },

        setFilter(filter) {
          this.activeFilter = filter;
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
        },

        async markAllRead() {
          const token = localStorage.getItem('token');
          try {
            // Try to call mark-read API if available
            await fetch('/api/alerts/mark-read', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
              }
            });
          } catch (e) {
            // API may not exist yet; still clear locally
          }
          this.allAlerts = [];
          this.totalCount = 0;
          this.toast('تم تحديد جميع التنبيهات كمقروءة');
        },

        dismissAlert(alert) {
          this.allAlerts = this.allAlerts.filter(a => a.id !== alert.id);
          this.totalCount = this.allAlerts.length;
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
          this.toast('تم تجاهل التنبيه');
        },

        handleAction(alert, action) {
          if (action === 'view' && alert.type === 'expiry') {
            window.location.href = '/batches?batch=' + encodeURIComponent(alert.batchNumber);
          } else if (action === 'reorder' && alert.type === 'low_stock') {
            window.location.href = '/medicines?reorder=' + encodeURIComponent(alert.medicineName);
          }
        },

        toggleDark() {
          this.isDark = !this.isDark;
          localStorage.setItem('darkMode', this.isDark);
          document.body.classList.toggle('dark-mode', this.isDark);
        },

        logout() {
          localStorage.clear();
          window.location.href = '/login';
        },

        toast(msg) {
          this.toastMsg = msg;
          this.showToast = true;
          this.$nextTick(() => {
            if (window.lucide) lucide.createIcons();
          });
          setTimeout(() => { this.showToast = false; }, 3000);
        }
      
        ,async loadNotifications() {
          this.notificationsLoading = true;
          try {
            const token = localStorage.getItem('token');
            const r = await fetch('/api/alerts/count', {
              headers: { 'Authorization': 'Bearer ' + token }
            });
            if (r.ok) {
              const data = await r.json();
              this.notifications = [];
              // Build notification items from count data
              if (data.total_count > 0 || data.expiry_count > 0 || data.low_stock_count > 0) {
                if (data.expiry_count > 0) {
                  this.notifications.push({
                    id: 'expiry', type: 'expiry',
                    title: 'تنبيهات الصلاحية',
                    message: data.expiry_count + ' دووان قاربت على الانتهاء',
                    time: 'الآن',
                    href: '/alerts'
                  });
                }
                if (data.low_stock_count > 0) {
                  this.notifications.push({
                    id: 'stock', type: 'low_stock',
                    title: 'تنبيهات المخزون',
                    message: data.low_stock_count + ' دووان مخزونها منخفض',
                    time: 'الآن',
                    href: '/medicines'
                  });
                }
              }
            }
          } catch (e) { /* silent */ }
          this.notificationsLoading = false;
},


        handleEscKey(e) {
          if (e.key === 'Escape') {
            this.closeMobileSidebar();
          }
        },

        closeMobileSidebar() {
          const sidebar = document.querySelector('.sidebar');

          if (sidebar) sidebar.classList.remove('open');
          if (overlay) overlay.classList.remove('visible');
          if (btn) btn.classList.remove('active');
          document.body.style.overflow = '';
        },
      };
    }

</script>
{% endblock %}
