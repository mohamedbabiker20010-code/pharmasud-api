<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 الجرد السريع - PharmaSUD</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        light: { bg: "#F6F8FA", card: "#FFFFFF", border: "#EEF2F6", text: "#0F172A", muted: "#64748B" }
                    }
                }
            }
        }
    </script>

  <style>
    .sidebar { width:248px; background:#fff; border-left:1px solid #EEF2F6; display:flex; flex-direction:column; padding:22px 16px; position:fixed; right:0; top:0; bottom:0; z-index:100; font-family:'IBM Plex Sans Arabic','IBM Plex Sans',sans-serif; }
    .sidebar .brand { display:flex; align-items:center; gap:11px; padding:0 8px 22px; }
    .sidebar .brand .icon { width:38px; height:38px; border-radius:11px; background:#1AA7EC; position:relative; flex-shrink:0; }
    .sidebar .brand .icon::before,.sidebar .brand .icon::after { content:''; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:#fff; border-radius:3px; }
    .sidebar .brand .icon::before { width:18px; height:5.5px; }
    .sidebar .brand .icon::after { width:5.5px; height:18px; }
    .sidebar .brand .name { font:700 18px/1 'IBM Plex Sans Arabic',sans-serif; letter-spacing:-0.02em; }
    .sidebar .brand .name span { color:#1AA7EC; }
    .sidebar .nav-section { font:600 11px/1 'IBM Plex Mono',monospace; letter-spacing:0.1em; color:#CBD5E1; padding:14px 10px 10px; }
    .sidebar .nav-item { display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; color:#475569; font-size:14px; font-weight:500; text-decoration:none; margin-bottom:4px; transition:all 0.2s ease; }
    .sidebar .nav-item:hover { background:#F8FAFC; color:#0F172A; }
    .sidebar .nav-item.active { background:#1AA7EC; color:#fff; box-shadow:0 8px 18px -8px rgba(26,167,236,0.55); }
    .sidebar .nav-item svg { width:19px; height:19px; flex-shrink:0; }
    .sidebar .nav-item .badge { margin-right:auto; background:#FEF2F2; color:#DC2626; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
    .sidebar .user-card { margin-top:auto; display:flex; align-items:center; gap:11px; padding:11px; border:1px solid #EEF2F6; border-radius:13px; cursor:pointer; }
    .sidebar .user-avatar { width:36px; height:36px; border-radius:10px; background:#1AA7EC; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .sidebar .user-name { font-size:13.5px; font-weight:600; }
    .sidebar .user-role { font-size:11.5px; color:#94A3B8; }
    .sidebar .user-card svg { width:16px; height:16px; color:#CBD5E1; flex-shrink:0; margin-right:auto; }
    .main-wrap { margin-right:248px; min-height:100vh; }
    @media(max-width:1024px){ .sidebar{display:none;} .main-wrap{margin-right:0;} }
  </style>

</head>
<body class="bg-light-bg text-light-text font-sans min-h-screen">

  <!-- Cloud Design Sidebar -->
  <aside class="sidebar" id="cloud-sidebar">
    <div class="brand">
      <div class="icon"></div>
      <div class="name">Pharma<span>SUD</span></div>
    </div>
    <div class="nav-section">MENU</div>
    <a href="/dashboard" class="nav-item" id="nav-dashboard"><i data-lucide="layout-dashboard"></i><span>لوحة التحكم</span></a>
    <a href="/pos" class="nav-item" id="nav-pos"><i data-lucide="scan-barcode"></i><span>نقطة البيع</span></a>
    <a href="/medicines" class="nav-item" id="nav-medicines"><i data-lucide="pill"></i><span>الأدوية</span></a>
    <a href="/inventory" class="nav-item active" id="nav-inventory"><i data-lucide="package"></i><span>المخزون</span></a>
    <a href="/batches" class="nav-item" id="nav-batches"><i data-lucide="calendar-clock"></i><span>الدفعات</span></a>
    <a href="/reports-sales" class="nav-item" id="nav-reports"><i data-lucide="chart-line"></i><span>التقارير</span></a>
    <a href="/employees" class="nav-item" id="nav-employees" style="display:none"><i data-lucide="users"></i><span>الموظفين</span></a>
    <a href="/alerts" class="nav-item" id="nav-alerts"><i data-lucide="bell"></i><span>التنبيهات</span><span class="badge">7</span></a>
    <a href="/settings" class="nav-item" id="nav-settings"><i data-lucide="settings"></i><span>الإعدادات</span></a>
    <div class="user-card" onclick="logout()">
      <div class="user-avatar" id="user-initials">U</div>
      <div style="min-width:0;flex:1">
        <div class="user-name" id="user-name">المستخدم</div>
        <div class="user-role" id="user-role">صيدلي</div>
      </div>
      <i data-lucide="chevron-left"></i>
    </div>
  </aside>
  <script>
    function logout() { localStorage.clear(); window.location.href='/login'; }
    document.addEventListener('DOMContentLoaded', function() {
      const name = localStorage.getItem('userName') || 'المستخدم';
      const role = localStorage.getItem('role') || 'pharmacist';
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-role').textContent = role === 'admin' ? 'مدير' : 'صيدلي';
      document.getElementById('user-initials').textContent = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      if(role === 'admin') document.getElementById('nav-employees').style.display='flex';
    });
  </script>

    <div class="max-w-3xl mx-auto p-4">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
            <h1 class="text-2xl font-bold">📊 الجرد السريع</h1>
            <a href="/dashboard" class="text-[#1AA7EC] hover:text-blue-300 text-sm">← العودة للرئيسية</a>
        </div>

        <!-- Scanner & Search bar -->
        <div class="flex gap-2 mb-4">
            <button onclick="startScanner()" class="bg-[#1AA7EC] hover:bg-blue-700 text-[#0F172A] px-4 py-2 rounded-xl font-medium transition">📷 مسح باركود</button>
            <input id="manual-barcode-input" type="text" placeholder="أو أدخل الباركود يدوياً..." class="flex-1 bg-dark-card border border-dark-border rounded-xl px-4 py-2 text-light-text" onkeydown="if(event.key==='Enter')searchManualBarcode()">
        </div>

        <!-- Scanner Container -->
        <div id="scanner-container" class="hidden mb-4">
            <div class="bg-black rounded-xl overflow-hidden relative">
                <video id="scanner-video" class="w-full h-64 object-cover" playsinline></video>
                <div id="scanner-status" class="absolute bottom-0 left-0 right-0 bg-black/70 text-[#0F172A] text-center py-1 text-sm"></div>
            </div>
            <div class="flex gap-2 mt-2">
                <button onclick="stopScanner()" class="flex-1 bg-red-600 hover:bg-red-700 text-[#0F172A] py-2 rounded-xl font-medium transition">إيقاف المسح</button>
                <button onclick="searchManualBarcode()" class="flex-1 bg-yellow-600 hover:bg-yellow-700 text-[#0F172A] py-2 rounded-xl font-medium transition">بحث يدوي</button>
            </div>
        </div>

        <!-- Notes -->
        <div class="mb-4">
            <input id="stocktake-notes" type="text" placeholder="ملاحظات (مثال: جرد شهر يونيو)" class="w-full bg-dark-card border border-dark-border rounded-xl px-4 py-2 text-light-text">
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-12 text-light-muted">جاري تحميل قائمة الجرد...</div>

        <!-- Error -->
        <div id="error" class="hidden bg-red-900/50 border border-red-700 rounded-lg p-4 mb-4 text-center"></div>
        <div id="success" class="hidden bg-green-900/50 border border-green-700 rounded-lg p-4 mb-4 text-center"></div>

        <!-- Medicine List -->
        <div id="medicines-container" class="hidden space-y-3 mb-4"></div>

        <!-- Submit -->
        <div id="submit-area" class="hidden">
            <button onclick="submitStocktake()" class="w-full bg-green-600 hover:bg-green-700 text-[#0F172A] rounded-xl py-3 font-bold text-lg transition">
                💾 حفظ نتائج الجرد
            </button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; }

        let allMedicines = [];

        // ═══════════════════════════════════════════════
        // Load stocktake data
        // ═══════════════════════════════════════════════
        async function loadStocktake() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('medicines-container');
            const submitArea = document.getElementById('submit-area');
            const error = document.getElementById('error');

            try {
                const res = await fetch('/api/inventory/stocktake/start', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) { throw new Error('HTTP ' + res.status); }
                const data = await res.json();
                allMedicines = data.medicines || [];

                loading.classList.add('hidden');
                container.classList.remove('hidden');
                submitArea.classList.remove('hidden');

                renderMedicines(allMedicines);

            } catch (e) {
                loading.classList.add('hidden');
                error.classList.remove('hidden');
                error.textContent = '❌ فشل تحميل الجرد: ' + e.message;
            }
        }

        function renderMedicines(list) {
            const container = document.getElementById('medicines-container');

            if (list.length === 0) {
                container.innerHTML = '<div class="text-center text-light-muted py-8">لا توجد أدوية</div>';
                return;
            }

            container.innerHTML = list.map(med => `
                <div class="bg-dark-card rounded-xl p-4 border border-dark-border" data-medicine-id="${med.medicine_id}">
                    <div class="flex items-start gap-3">
                        <div class="w-12 h-12 rounded-lg bg-dark-border flex-shrink-0 overflow-hidden">
                            <img src="${med.image_url}" alt="${med.trade_name}" class="w-full h-full object-cover" onerror="this.src='/static/images/default-medicine.svg'">
                        </div>
                        <div class="flex-1">
                            <div class="font-bold">${med.trade_name}</div>
                            <div class="text-light-muted text-xs">${med.barcode || 'بدون باركود'}</div>
                            <div class="text-light-muted text-sm mt-1">النظام: <span class="text-[#1AA7EC] font-bold">${med.system_quantity}</span> ${med.base_unit}</div>
                        </div>
                    </div>
                    <div class="mt-2">
                        <label class="text-light-muted text-sm">الفعلي:</label>
                        <input type="number" class="actual-qty w-full bg-light-bg border border-dark-border rounded-lg px-3 py-2 text-light-text text-center text-lg font-bold" value="${med.system_quantity}" min="0" data-medicine-id="${med.medicine_id}" data-system="${med.system_quantity}">
                    </div>
                </div>
            `).join('');
        }

        function scrollToMedicineAndFocus(barcode) {
            // Search for medicine by barcode
            const med = allMedicines.find(m => m.barcode === barcode);
            if (!med) {
                updateScannerStatus('❌ الباركود غير موجود في قاعدة البيانات');
                return;
            }

            // Find the element and scroll to it
            const card = document.querySelector(`[data-medicine-id="${med.medicine_id}"]`);
            if (!card) return;

            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            card.style.border = '2px solid var(--primary-blue)';
            setTimeout(() => { card.style.border = ''; }, 2000);

            // Focus the input
            const input = card.querySelector('.actual-qty');
            if (input) {
                input.focus();
                input.select();
            }
        }

        // ═══════════════════════════════════════════════
        // BARCODE SCANNER (standalone copy from pos.html)
        // ═══════════════════════════════════════════════
        let scannerStream = null;
        let scannerRunning = false;
        let scannerEngine = null;
        let scannerEngineType = '';

        async function startScanner() {
            document.getElementById('scanner-container').style.display = 'block';
            scannerRunning = true;
            let stream;
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                scannerStream = stream;
            } catch (e) {
                showScannerError('لا يمكن الوصول للكاميرا: ' + e.message);
                return;
            }

            const video = document.getElementById('scanner-video');
            video.srcObject = stream;
            await new Promise(function(resolve) {
                if (video.readyState >= 2) return resolve();
                video.onloadedmetadata = function() { resolve(); };
            });
            await video.play();

            if (video.videoWidth === 0) {
                showScannerError('الكاميرا لم تبدأ بشكل صحيح');
                return;
            }

            // Try native BarcodeDetector
            if ('BarcodeDetector' in window) {
                try {
                    var wanted = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'];
                    var supported = await BarcodeDetector.getSupportedFormats();
                    var usable = wanted.filter(function(f) { return supported.includes(f); });
                    if (usable.length > 0) {
                        scannerEngine = new BarcodeDetector({ formats: usable });
                        scannerEngineType = 'native';
                    }
                } catch (e) { scannerEngine = null; }
            }

            // Fallback to ZXing WASM
            if (!scannerEngine) {
                try {
                    var mod = await import('https://esm.sh/zxing-wasm@2/reader');
                    scannerEngine = mod.readBarcodesFromImageData;
                    scannerEngineType = 'wasm';
                } catch (e) {
                    showScannerError('تعذر تحميل محرك المسح - استخدم الإدخال اليدوي');
                    return;
                }
            }

            updateScannerStatus(scannerEngineType === 'native'
                ? '🟢 جاري المسح...' : '🟡 جاري المسح (متوافقية)...');

            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d', { willReadFrequently: true });

            function scanLoop() {
                if (!scannerRunning) return;
                if (video.readyState < 2 || video.videoWidth === 0) {
                    requestAnimationFrame(scanLoop);
                    return;
                }

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                try {
                    var results = [];
                    if (scannerEngineType === 'native') {
                        results = await scannerEngine.detect(canvas);
                    } else {
                        var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        var zx = await scannerEngine(imageData, {
                            tryHarder: true,
                            formats: ['EAN-13','EAN-8','UPC-A','UPC-E','Code-128','Code-39'],
                            maxNumberOfSymbols: 1
                        });
                        results = zx.map(function(r) {
                            return { rawValue: r.text, format: r.format };
                        });
                    }

                    if (results.length > 0) {
                        var barcode = results[0].rawValue;
                        if (navigator.vibrate) navigator.vibrate(120);
                        stopScannerInternal();
                        scrollToMedicineAndFocus(barcode);
                        return;
                    }
                } catch (e) {
                    updateScannerStatus('⚠️ ' + e.name);
                }

                setTimeout(function() { requestAnimationFrame(scanLoop); }, 120);
            }

            scanLoop();
        }

        function stopScannerInternal() {
            scannerRunning = false;
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
                scannerStream = null;
            }
            var video = document.getElementById('scanner-video');
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(function(t) { t.stop(); });
                video.srcObject = null;
            }
        }

        function stopScanner() {
            stopScannerInternal();
            document.getElementById('scanner-container').style.display = 'none';
        }

        function showScannerError(msg) {
            updateScannerStatus('❌ ' + msg);
        }

        function updateScannerStatus(text) {
            var el = document.getElementById('scanner-status');
            if (el) el.textContent = text;
        }

        function searchManualBarcode() {
            var input = document.getElementById('manual-barcode-input');
            var barcode = input.value.trim();
            if (!barcode) return;
            scrollToMedicineAndFocus(barcode);
            input.value = '';
        }

        // ═══════════════════════════════════════════════
        // SUBMIT
        // ═══════════════════════════════════════════════
        async function submitStocktake() {
            const inputs = document.querySelectorAll('.actual-qty');
            const items = [];
            let hasChanges = false;

            inputs.forEach(function(input) {
                const medId = input.getAttribute('data-medicine-id');
                const systemQty = parseInt(input.getAttribute('data-system'));
                const actualQty = parseInt(input.value) || 0;

                if (actualQty !== systemQty) hasChanges = true;
                items.push({
                    medicine_id: medId,
                    actual_quantity: actualQty
                });
            });

            if (!hasChanges) {
                document.getElementById('error').textContent = '⚠️ لم تقم بتغيير أي كمية';
                document.getElementById('error').classList.remove('hidden');
                setTimeout(() => document.getElementById('error').classList.add('hidden'), 3000);
                return;
            }

            const notes = document.getElementById('stocktake-notes').value.trim();

            try {
                const res = await fetch('/api/inventory/stocktake/submit', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ notes: notes, items: items })
                });
                const data = await res.json();
                if (!res.ok) { throw new Error(data.detail || 'فشل الحفظ'); }

                // Show result
                const success = document.getElementById('success');
                let msg = '✅ تم حفظ الجرد بنجاح!\n';
                if (data.adjustments && data.adjustments.length > 0) {
                    msg += data.adjustments.map(a =>
                        `• ${a.medicine_name}: ${a.action}`
                    ).join('\n');
                }
                if (data.unchanged_count > 0) {
                    msg += `\n• ${data.unchanged_count} دواء بدون تغيير`;
                }
                success.textContent = msg;
                success.classList.remove('hidden');

                // Reload after 3 seconds
                setTimeout(function() {
                    success.classList.add('hidden');
                    loadStocktake();
                }, 3000);

            } catch (e) {
                document.getElementById('error').textContent = '❌ ' + e.message;
                document.getElementById('error').classList.remove('hidden');
            }
        }

        // Start
        loadStocktake();
    </script>
</body>
</html>
