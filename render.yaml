services:
  - type: web
    name: pharmasud-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: pharmasud-db
          property: connectionString

databases:
  - name: pharmasud-db
    databaseName: pharmasud
    user: pharmasud
    plan: free
